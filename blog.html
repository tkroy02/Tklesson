<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson Blog - Study Tips & Academic Insights</title>
    <meta name="description" content="Discover study tips, academic insights, and educational resources at Tklesson. Learn about time management, college prep, and strategies for student success.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" sizes="16x16" href="/Tklesson1-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <script src="https://tklesson.com/resources-loader.js"></script>
    <script>loadCommonResources();</script>

    <link rel="manifest" href="/manifest.json">
    
    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --accent: #3399ff;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --danger: #e53e3e;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background: #f7f9fc;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1, h2, h3 {
            color: var(--primary);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        h1 { font-size: clamp(2rem, 5vw, 2.8rem); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

        /* Card animations - scroll triggered */
        .blog-post.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hero Section */
        .hero-blog {
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 80px 0 70px;
            position: relative;
            overflow: hidden;
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero-blog::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .hero-blog .hero-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
            animation: floatShape 12s ease-in-out infinite;
        }

        .hero-shape-1 { width: 400px; height: 400px; background: white; top: -12%; right: -8%; }
        .hero-shape-2 { width: 280px; height: 280px; background: var(--secondary); bottom: -10%; left: -6%; animation-direction: reverse; }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(25px, -20px) scale(1.06); }
            66% { transform: translate(-18px, 15px) scale(0.95); }
        }

        .hero-content { position: relative; z-index: 2; max-width: 750px; margin: 0 auto; }
        .hero-blog h1 { color: var(--text-light); margin-bottom: 1rem; animation: fadeInUp 0.8s ease-out; }
        .hero-blog h1 span { background: linear-gradient(135deg, #ffd700, #ffed80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-blog p { font-size: 1.1rem; opacity: 0.85; margin: 0 auto 2rem; animation: fadeInUp 0.8s ease-out 0.2s both; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Bar */
        .search-bar { max-width: 500px; margin: 0 auto; position: relative; animation: fadeInUp 0.8s ease-out 0.3s both; }
        .search-bar input {
            width: 100%; padding: 14px 50px 14px 20px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px; font-size: 0.95rem; background: rgba(255,255,255,0.10);
            color: #fff; outline: none; transition: var(--transition);
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
        .search-bar input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
        .search-btn {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            background: var(--secondary); color: var(--text-dark); border: none;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 700; font-size: 0.9rem; transition: var(--transition);
        }
        .search-btn:hover { background: var(--secondary-light); transform: translateY(-50%) scale(1.02); }

        /* Blog Content */
        .blog-content {
            background: var(--background); border-radius: var(--border-radius);
            padding: 50px 40px; box-shadow: var(--shadow);
            border: 1px solid rgba(11, 61, 145, 0.06);
        }
        .section-title { text-align: center; margin-bottom: 8px; }
        .section-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 40px; font-size: 1rem; }

        /* Loading State */
        .loading-spinner {
            text-align: center; padding: 60px; color: var(--text-muted);
        }
        .loading-spinner i { font-size: 2rem; margin-bottom: 12px; display: block; }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 28px;
            margin-bottom: 48px;
        }

.blog-post {
    opacity: 0;
    transform: translateY(30px);
    background: var(--background-light);
    border-radius: var(--border-radius);
    padding: 28px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(11, 61, 145, 0.08);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1),
                transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1),
                box-shadow 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2),
                border-color 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
}
        
        .blog-post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            transition: width 0.3s ease;
        }

        .blog-post:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(11, 61, 145, 0.15);
        }
        .blog-post:hover::before { width: 6px; }

        .post-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .post-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .post-excerpt {
            color: var(--text-gray);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }
        .post-tag {
            background: rgba(11, 61, 145, 0.08);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 16px;
            transition: var(--transition);
        }
        .read-more i { transition: transform 0.2s ease; }
        .read-more:hover i { transform: translateX(4px); }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 48px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-dots {
            padding: 8px 4px;
            color: var(--text-muted);
        }

        /* Sidebar */
        .sidebar {
            background: var(--background-light);
            border-radius: var(--border-radius);
            padding: 28px;
            border: 1px solid rgba(11, 61, 145, 0.06);
        }
        .sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
            border: none;
        }
        .tag:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        /* Back to Top */
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: var(--text-light);
            width: 48px; height: 48px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; z-index: 99;
            box-shadow: var(--shadow-hover); border: none;
            transition: var(--transition);
        }
        #back-to-top:hover { background: var(--primary-light); transform: translateY(-3px); }

        @media (max-width: 768px) {
            .hero-blog { padding: 60px 0 50px; }
            .hero-blog h1 { font-size: 1.8rem; }
            .blog-content { padding: 30px 20px; }
            .blog-grid { grid-template-columns: 1fr; gap: 20px; }
            #back-to-top { bottom: 20px; right: 20px; width: 42px; height: 42px; }
            .page-btn { padding: 6px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<section class="hero-blog">
    <div class="hero-shape hero-shape-1"></div>
    <div class="hero-shape hero-shape-2"></div>
    <div class="container hero-content">
        <h1>Tklesson <span>Blog</span></h1>
        <p>Insights, tutorials, and stories that inspire and educate</p>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search articles by title or tag..." aria-label="Search articles">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
</section>

<main class="container">
    <div class="blog-content">
        <h2 class="section-title">Latest Articles</h2>
        <p class="section-subtitle" id="resultCount"></p>
        
        <div class="blog-grid" id="blogGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading articles...</p>
            </div>
        </div>

        <div id="pagination" class="pagination-container"></div>

        <div class="sidebar">
            <h3><i class="fas fa-tags"></i> Popular Topics</h3>
            <div class="tags-container" id="tagsContainer">
                <div class="loading-spinner" style="padding: 20px;"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>
</main>

<button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'});">
    <i class="fas fa-arrow-up"></i>
</button>

<div id="footer"></div>

<script>
const ARTICLES_INDEX = 'articles/index.json';
const ARTICLES_PER_PAGE = 6;

let allArticles = [];
let currentSearchTerm = '';
let currentPage = 1;
let filteredArticles = [];

async function loadArticles() {
    const grid = document.getElementById('blogGrid');
    const resultCount = document.getElementById('resultCount');
    
    try {
        const response = await fetch(ARTICLES_INDEX);
        if (!response.ok) throw new Error('Failed to load articles');
        
        allArticles = await response.json();
        allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        if (resultCount) resultCount.textContent = `${allArticles.length} articles`;
        
        filteredArticles = [...allArticles];
        currentPage = 1;
        
        renderArticles();
        renderTags(allArticles);
        
    } catch (error) {
        console.error('Error loading articles:', error);
        grid.innerHTML = `
            <div style="text-align: center; padding: 60px; color: var(--danger);">
                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 12px; display: block;"></i>
                <p>Unable to load articles. Please try again later.</p>
            </div>
        `;
    }
}

function renderArticles() {
    const grid = document.getElementById('blogGrid');
    
    const start = (currentPage - 1) * ARTICLES_PER_PAGE;
    const pageArticles = filteredArticles.slice(start, start + ARTICLES_PER_PAGE);
    
    if (!pageArticles || pageArticles.length === 0) {
        grid.innerHTML = `
            <div style="text-align: center; padding: 60px; color: var(--text-muted); grid-column: 1/-1;">
                <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 12px; display: block;"></i>
                <p>No articles found matching your search.</p>
                <button onclick="clearSearch()" style="margin-top: 16px; padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer;">Clear Search</button>
            </div>
        `;
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    
    grid.innerHTML = pageArticles.map(article => `
        <article class="blog-post" onclick="openArticle('${article.slug}')">
            <div class="post-date">${formatDate(article.date)}</div>
            <h3 class="post-title">${escapeHtml(article.title)}</h3>
            <p class="post-excerpt">${escapeHtml(article.excerpt)}</p>
            <div class="post-tags">
                ${article.tags.map(tag => `<span class="post-tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
            <div class="read-more">
                Read Article <i class="fas fa-arrow-right"></i>
            </div>
        </article>
    `).join('');
    
    // Trigger scroll animation for new cards
    observeCards();
    
    // Render pagination controls
    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredArticles.length / ARTICLES_PER_PAGE);
    const container = document.getElementById('pagination');
    
    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }
    
    let html = '<div class="pagination-container">';
    html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Previous</button>`;
    
    // Show first page
    if (currentPage > 3) {
        html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
        if (currentPage > 4) html += `<span class="page-dots">...</span>`;
    }
    
    // Show pages around current page
    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    
    // Show last page
    if (currentPage < totalPages - 2) {
        if (currentPage < totalPages - 3) html += `<span class="page-dots">...</span>`;
        html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
    }
    
    html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
    html += '</div>';
    
    container.innerHTML = html;
}

function goToPage(page) {
    const totalPages = Math.ceil(filteredArticles.length / ARTICLES_PER_PAGE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderArticles();
    window.scrollTo({ top: 400, behavior: 'smooth' });
}

function renderTags(articles) {
    const tagsContainer = document.getElementById('tagsContainer');
    const tagCounts = {};
    
    articles.forEach(article => {
        if (article.tags && article.tags.length) {
            article.tags.forEach(tag => {
                tagCounts[tag] = (tagCounts[tag] || 0) + 1;
            });
        }
    });
    
    const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
    
    if (sortedTags.length === 0) {
        tagsContainer.innerHTML = '<p style="color: var(--text-muted);">No tags yet</p>';
        return;
    }

    tagsContainer.innerHTML = sortedTags.map(([tag, count]) => `
        <button class="tag" data-tag="${escapeHtml(tag)}">
            ${escapeHtml(tag)} <span style="opacity: 0.7; font-size: 0.7rem;">(${count})</span>
        </button>
    `).join('');

    tagsContainer.querySelectorAll('.tag').forEach(btn => {
        btn.addEventListener('click', () => filterByTag(btn.dataset.tag));
    });
}

function filterByTag(tag) {
    const searchInput = document.getElementById('searchInput');
    searchInput.value = tag;
    currentSearchTerm = tag.toLowerCase();
    applyFilters();
    
    // Scroll to blog grid after filter
    setTimeout(() => {
        const blogGrid = document.getElementById('blogGrid');
        blogGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
}
    
function performSearch() {
    const searchInput = document.getElementById('searchInput');
    currentSearchTerm = searchInput.value.trim().toLowerCase();
    applyFilters();
    
    // Scroll to blog grid after search
    setTimeout(() => {
        const blogGrid = document.getElementById('blogGrid');
        blogGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
}
    
function applyFilters() {
    if (!currentSearchTerm) {
        filteredArticles = [...allArticles];
    } else {
        filteredArticles = allArticles.filter(article => {
            const titleMatch = article.title.toLowerCase().includes(currentSearchTerm);
            const excerptMatch = article.excerpt.toLowerCase().includes(currentSearchTerm);
            const tagMatch = article.tags && article.tags.some(tag => tag.toLowerCase().includes(currentSearchTerm));
            return titleMatch || excerptMatch || tagMatch;
        });
    }
    
    currentPage = 1;
    renderArticles();
    document.getElementById('resultCount').textContent = `${filteredArticles.length} of ${allArticles.length} articles`;
}

function clearSearch() {
    const searchInput = document.getElementById('searchInput');
    searchInput.value = '';
    currentSearchTerm = '';
    filteredArticles = [...allArticles];
    currentPage = 1;
    renderArticles();
    document.getElementById('resultCount').textContent = `${allArticles.length} articles`;
    
    // Scroll to blog grid
    setTimeout(() => {
        const blogGrid = document.getElementById('blogGrid');
        blogGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
}

function openArticle(slug) {
    window.location.href = `article.html?slug=${slug}`;
}

function formatDate(dateString) {
    if (!dateString) return 'Unknown date';
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function observeCards() {
    const cards = document.querySelectorAll('.blog-post');
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });
    
    cards.forEach(card => observer.observe(card));
}

document.addEventListener('DOMContentLoaded', () => {
    loadArticles();
    
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    
    if (searchBtn) searchBtn.addEventListener('click', performSearch);
    if (searchInput) searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });
});

const backToTopBtn = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
    backToTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
});

fetch("header.html").then(r => r.text()).then(data => {
    document.getElementById("header").innerHTML = data;
    const header = document.querySelector("#header header");
    const navMenu = header?.querySelector("#navMenu");
    const hamburger = header?.querySelector(".hamburger");
    if(hamburger && navMenu){
        hamburger.addEventListener("click", () => {
            const isOpen = navMenu.classList.toggle("open");
            hamburger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
    }
    header?.querySelectorAll(".dropdown").forEach(dropdown => {
        const dropbtn = dropdown.querySelector(".dropbtn");
        dropbtn.addEventListener("click", e => {
            if(window.innerWidth <= 768){
                e.preventDefault();
                dropdown.classList.toggle("active");
                dropbtn.setAttribute("aria-expanded", dropdown.classList.contains("active") ? "true" : "false");
            }
        });
    });
});

fetch("footer.html").then(r => r.text()).then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

</body>
</html>
