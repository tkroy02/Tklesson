<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson - Article</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="16x16" href="/Tklesson1-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <script src="https://tklesson.com/resources-loader.js"></script>
    <script>loadCommonResources();</script>
    <link rel="manifest" href="/manifest.json">
    
    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background: #f7f9fc;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Hero */
        .article-hero {
            background: linear-gradient(135deg, #03152e 0%, #082250 40%, #0b3d91 100%);
            color: var(--text-light);
            padding: 80px 0 60px;
            position: relative;
            overflow: hidden;
        }

        .article-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--secondary);
            gap: 12px;
        }

        .article-title {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
            color: var(--text-light);
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .article-meta i {
            margin-right: 6px;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .article-tag {
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Content */
        .article-content {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 50px 60px;
            margin-top: -30px;
            position: relative;
            z-index: 2;
            box-shadow: var(--shadow);
        }

        .article-body {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-gray);
        }

        .article-body h2 {
            font-size: 1.6rem;
            margin: 1.5em 0 0.5em;
            color: var(--primary);
        }

        .article-body h3 {
            font-size: 1.3rem;
            margin: 1.2em 0 0.5em;
            color: var(--primary);
        }

        .article-body p {
            margin-bottom: 1.2em;
        }

        .article-body ul, .article-body ol {
            margin: 1em 0 1em 2em;
        }

        .article-body li {
            margin-bottom: 0.5em;
        }

        .article-body blockquote {
            border-left: 4px solid var(--secondary);
            padding: 1em 1.5em;
            margin: 1.5em 0;
            background: var(--background-light);
            font-style: italic;
        }

        /* Loading & Error */
        .loading-state, .error-state {
            text-align: center;
            padding: 80px 20px;
        }
        .loading-state i, .error-state i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            display: block;
        }

        /* Back to Top */
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: var(--text-light);
            width: 48px; height: 48px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 99; border: none;
            transition: var(--transition);
        }
        #back-to-top:hover { background: var(--primary-light); transform: translateY(-3px); }

        @media (max-width: 768px) {
            .article-hero { padding: 60px 0 40px; }
            .article-content { padding: 30px 24px; }
            .article-body { font-size: 0.95rem; }
            .article-body h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<main>
    <div id="articleContainer">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading article...</p>
        </div>
    </div>
</main>

<button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'});">
    <i class="fas fa-arrow-up"></i>
</button>

<div id="footer"></div>

<script>
    const ARTICLES_BASE_PATH = 'articles/';
    const ARTICLES_INDEX = 'articles/index.json';

    let articleCache = null;

    async function loadArticle() {
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');
    
    if (!slug) {
        showError('No article specified');
        return;
    }

    const container = document.getElementById('articleContainer');
    
    try {
        // Load ONLY the individual article JSON
        const articleResponse = await fetch(`articles/${slug}.json`);
        if (!articleResponse.ok) throw new Error('Article not found');
        const articleData = await articleResponse.json();
        
        renderArticle(articleData);
        
    } catch (error) {
        console.error('Error loading article:', error);
        showError('Unable to load article. Please try again.');
    }
}

    function renderArticle(meta, data) {
        const container = document.getElementById('articleContainer');
        
        // Combine metadata from index with content from article file
        const title = data.title || meta.title;
        const date = data.date || meta.date;
        const tags = data.tags || meta.tags || [];
        const content = data.content;
        const author = data.author || 'Tklesson Team';
        
        const readingTime = meta.readingTime || Math.ceil(content.split(' ').length / 200);
        
        container.innerHTML = `
            <div class="article-hero">
                <div class="container">
                    <a href="blog.html" class="back-link">
                        <i class="fas fa-arrow-left"></i> Back to Blog
                    </a>
                    <h1 class="article-title">${escapeHtml(title)}</h1>
                    <div class="article-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(date)}</span>
                        <span><i class="fas fa-user"></i> ${escapeHtml(author)}</span>
                        <span><i class="fas fa-clock"></i> ${readingTime} min read</span>
                    </div>
                    <div class="article-tags">
                        ${tags.map(tag => `<span class="article-tag">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="article-content">
                    <div class="article-body">
                        ${content}
                    </div>
                </div>
            </div>
        `;
        
        // Update page title
        document.title = `${title} - Tklesson Blog`;
    }

    function showError(message) {
        const container = document.getElementById('articleContainer');
        container.innerHTML = `
            <div class="container" style="padding: 80px 24px;">
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p style="color: var(--danger);">${escapeHtml(message)}</p>
                    <a href="blog.html" class="back-link" style="margin-top: 20px; display: inline-block;">
                        <i class="fas fa-arrow-left"></i> Return to Blog
                    </a>
                </div>
            </div>
        `;
    }

    function formatDate(dateString) {
        if (!dateString) return 'Unknown date';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // Load article on page load
    document.addEventListener('DOMContentLoaded', loadArticle);

    // Back to top button
    const backToTopBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
        backToTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });

    // Header and footer
    fetch("header.html").then(r => r.text()).then(data => {
        document.getElementById("header").innerHTML = data;
        const header = document.querySelector("#header header");
        const navMenu = header?.querySelector("#navMenu");
        const hamburger = header?.querySelector(".hamburger");
        if(hamburger && navMenu){
            hamburger.addEventListener("click", () => {
                const isOpen = navMenu.classList.toggle("open");
                hamburger.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
        }
        header?.querySelectorAll(".dropdown").forEach(dropdown => {
            const dropbtn = dropdown.querySelector(".dropbtn");
            dropbtn.addEventListener("click", e => {
                if(window.innerWidth <= 768){
                    e.preventDefault();
                    dropdown.classList.toggle("active");
                    dropbtn.setAttribute("aria-expanded", dropdown.classList.contains("active") ? "true" : "false");
                }
            });
        });
    });

    fetch("footer.html").then(r => r.text()).then(data => {
        document.getElementById("footer").innerHTML = data;
    });
</script>

</body>
</html>
