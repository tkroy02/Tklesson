<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Dashboard Header</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }

        /* ----------------------
           HEADER & LOGO STYLES
           ---------------------- */
        .tk-header {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            padding: 10px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
        }

        .logo-link .logo-icon {
            font-size: 2rem;
            color: #c9a84c;
            background: rgba(201, 168, 76, 0.1);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid rgba(201, 168, 76, 0.3);
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-link:hover .logo-icon {
            transform: scale(1.05);
            background: rgba(201, 168, 76, 0.2);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .logo-text h1 {
            margin: 0;
            font-size: 1.5rem;
            line-height: 1.2;
            font-weight: 700;
            background: linear-gradient(90deg, #c9a84c, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            margin: 0;
            font-size: 0.85rem;
            color: #a0aabf;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* ----------------------
           NAVIGATION MENU STYLES
           ---------------------- */
        .nav-menu {
            display: none;
            margin-left: auto;
            align-items: center;
            gap: 8px;
        }

        .nav-menu.open {
            display: flex;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.25s;
            font-weight: 500;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255,255,255,0.10);
            color: #ffd700;
        }

        /* Animated gold underline */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #c9a84c, #ffd700);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 70%;
        }

        /* USER SECTION */
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 16px;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.1);
            border: 2px solid #c9a84c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #c9a84c;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-avatar:hover {
            background: rgba(201, 168, 76, 0.2);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.4);
            transform: translateY(-2px);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        #admin-name {
            font-weight: 600;
            color: #e6e9f0;
            letter-spacing: 0.3px;
            font-size: 0.9rem;
        }

        #admin-email {
            display: block;
            font-size: 0.75rem;
            color: #a0aabf;
            margin-top: 2px;
        }

        /* LOGOUT BUTTON */
        .logout-btn {
            background: transparent;
            border: 1px solid #c9a84c;
            color: #c9a84c;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #c9a84c, #ffd700);
            color: #03152e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
        }

        /* ----------------------
           MOBILE & TABLET (max-width: 1200px)
           ---------------------- */
        @media (max-width: 1200px) {
            .hamburger {
                display: block;
                font-size: 1.6rem;
                cursor: pointer;
                margin-left: auto;
                background: transparent;
                color: #ffd700;
                border: none;
                line-height: 1;
                padding: 8px 10px;
                border-radius: 6px;
                transition: color 0.2s;
            }

            .hamburger:hover {
                color: #c9a84c;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 64px;
                left: 0;
                width: 100%;
                background-color: rgba(6, 29, 69, 0.97);
                backdrop-filter: blur(6px);
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                box-shadow: 0 16px 32px rgba(0,0,0,0.30);
                padding: 8px 0;
                margin-left: 0;
            }

            .nav-menu.open {
                display: flex;
            }

            .nav-link {
                width: 100%;
                padding: 12px 20px;
                border-radius: 0;
                justify-content: flex-start;
            }

            .user-section {
                margin-left: auto;
                margin-right: 12px;
            }
        }

        /* ----------------------
           LARGE DESKTOP (min-width: 1201px)
           ---------------------- */
        @media (min-width: 1201px) {
            .hamburger {
                display: none;
            }

            .nav-menu {
                display: flex !important;
                flex-direction: row;
            }
        }

        @media (max-width: 480px) {
            .tk-header { padding: 10px 15px; }
            .user-details { display: none; }
            .logout-btn { width: 36px; height: 36px; }
            .logo-text p { display: none; }
        }
    </style>
</head>
<body>

    <header class="tk-header" role="banner">
        <a href="super-dashboard.html" class="logo-link" aria-label="TK Dashboard Home">
            <div class="logo-icon">
                <i class="fas fa-tachometer-alt"></i>
            </div>
            <div class="logo-text">
                <h1>TK Dashboard</h1>
                <p>Access all your TK tools in one place</p>
            </div>
        </a>

        <button class="hamburger" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle menu">☰</button>

        <nav class="nav-menu" id="navMenu" role="navigation" aria-label="Primary">
            <a href="super-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="Tkmarketing.html" class="nav-link"><i class="fas fa-chart-line"></i> Marketing</a>
            <a href="Tkinsights.html" class="nav-link"><i class="fas fa-comments"></i> Insights</a>
            <a href="Tktask_manager.html" class="nav-link"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="Tkaccounting_manager.html" class="nav-link"><i class="fas fa-calculator"></i> Accounting</a>
            <a href="gst-hst-calculator.html" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Tax</a>
        </nav>

        <div class="user-section">
            <div class="user-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-details">
                <span id="admin-name">Admin</span>
                <span id="admin-email">admin@tklesson.com</span>
            </div>
            <button id="logout-btn" class="logout-btn" data-action="logout" title="Sign out to Etante">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <!-- Firebase SDK (only if not already loaded by parent page) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        // This script runs when super-header.html is loaded directly (not via fetch+innerHTML)
        // When fetched dynamically, parent page must re-attach these handlers
        (function() {
            const hamburger = document.querySelector(".hamburger");
            const navMenu = document.querySelector("#navMenu");

            if (hamburger && navMenu) {
                hamburger.addEventListener("click", () => {
                    const isOpen = navMenu.classList.toggle("open");
                    hamburger.setAttribute("aria-expanded", isOpen);
                });
            }

            document.querySelectorAll('#navMenu a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 1200 && navMenu && navMenu.classList.contains('open')) {
                        navMenu.classList.remove('open");
                        hamburger.setAttribute('aria-expanded', 'false');
                    }
                });
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth > 1200 && navMenu && navMenu.classList.contains('open')) {
                    navMenu.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                }
            });
        })();
    </script>
</body>
</html>
