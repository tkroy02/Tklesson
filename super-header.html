<header class="tk-header">
  <div class="header-content">
    <div class="logo">
      <i class="fas fa-tachometer-alt"></i>
      <div class="logo-text">
        <h1>TK Dashboard</h1>
        <p>Access all your TK tools in one place</p>
      </div>
    </div>

    <!-- Hamburger button added (matches student login pattern) -->
    <button class="hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <i class="fas fa-bars"></i>
    </button>

    <nav id="navMenu" class="menu">
      <a href="super-dashboard.html"><i class="fas fa-home"></i> Home</a>
      <a href="Tkmarketing.html"><i class="fas fa-chart-line"></i> Marketing</a>
      <a href="Tkinsights.html"><i class="fas fa-comments"></i> Insights</a>
      <a href="Tktask_manager.html"><i class="fas fa-tasks"></i> Tasks</a>
      <a href="Tkaccounting_manager.html"><i class="fas fa-calculator"></i> Accounting</a>
      <a href="gst-hst-calculator.html"><i class="fas fa-file-invoice-dollar"></i> Tax</a>
    </nav>

    <div class="user-section">
      <div class="user-avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="user-details">
        <span id="admin-name">Admin</span>
        <span id="admin-email" style="display:block;font-size:0.75rem;color:var(--tk-text-muted);margin-top:2px">admin@tklesson.com</span>
      </div>
      <button id="logout-btn" class="logout-btn" onclick="handleLogout()" title="Sign out to Etante">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>
</header>

<!-- Firebase SDK (only if not already loaded by parent page) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
  // Initialize Firebase (only if not already initialized)
  if (!firebase.apps.length) {
    const firebaseConfig = {
      apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
      authDomain: "tkmachines-945b9.firebaseapp.com",
      projectId: "tkmachines-945b9",
      storageBucket: "tkmachines-945b9.firebasestorage.app",
      messagingSenderId: "137087394703",
      appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
      measurementId: "G-Y8GH34Q2FN"
    };
    firebase.initializeApp(firebaseConfig);
  }

  const auth = firebase.auth();

  // Update user info from Firebase
  auth.onAuthStateChanged((user) => {
    if (user) {
      const adminName = document.getElementById('admin-name');
      const adminEmail = document.getElementById('admin-email');
      
      if (adminName) {
        adminName.textContent = user.displayName || 'Admin';
      }
      if (adminEmail) {
        adminEmail.textContent = user.email || 'admin@tklesson.com';
      }
    }
  });

  // Logout function — redirects to etante.html
  function handleLogout() {
    if (confirm('Sign out and go to Etante?')) {
      // Sign out from Firebase
      auth.signOut().then(() => {
        // Clear any stored session data
        sessionStorage.removeItem('firebaseAuthToken');
        localStorage.removeItem('tklesson_session');
        
        // Redirect to etante.html
        window.location.href = 'etante.html';
      }).catch((error) => {
        console.error('Sign out error:', error);
        // Force redirect even if Firebase fails
        sessionStorage.removeItem('firebaseAuthToken');
        window.location.href = 'etante.html';
      });
    }
  }
</script>

</style>
