<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In - Tklesson</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 20px) scale(0.94); }
        }

        /* ========== BACKGROUND ORBS ========== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.08;
            animation: floatShape 20s infinite ease-in-out;
        }

        .orb1 {
            width: 500px; height: 500px;
            background: white;
            top: -200px; left: -200px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px; height: 400px;
            background: var(--secondary);
            bottom: -150px; right: -150px;
            animation-delay: -7s;
        }

        .orb3 {
            width: 350px; height: 350px;
            background: var(--primary-light);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 1;
            width: 100%;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .crown-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #c9a84c, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: crownGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        @keyframes crownGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.8)); }
        }

        .logo h1 {
            color: var(--text-light);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* ========== FORM ========== */
        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.7rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-light);
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.08);
        }

        /* ========== BUTTON ========== */
        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--text-light);
            border: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.4);
            letter-spacing: -0.01em;
        }

        .login-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.5);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== ERROR ========== */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(10px);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ========== BACK LINK ========== */
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }

        .back-link a:hover {
            color: var(--secondary);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .login-container {
                padding: 2.5rem 1.5rem;
            }
            .logo h1 {
                font-size: 1.6rem;
            }
            .crown-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="login-container">
            <div class="logo">
                <div class="crown-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>Admin Access</h1>
                <p>Tklesson Premium Management</p>
            </div>

            <form id="adminLoginForm">
                <div class="error-message" id="errorMessage"></div>
                
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="admin@tklesson.com">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In to Admin Dashboard
                </button>
            </form>

            <div class="back-link">
                <a href="etante.html">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Main Site</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDq9F28x6D4ivUJoT3ycHRlU_c-YNctFtE",
            authDomain: "email-notifications-1c77b.firebaseapp.com",
            projectId: "email-notifications-1c77b",
            storageBucket: "email-notifications-1c77b.firebasestorage.app",
            messagingSenderId: "272046681025",
            appId: "1:272046681025:web:e0aff95e41caa65c6d1d40",
            measurementId: "G-B3VJ7R5R8H"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        class AdminSignIn {
            constructor() {
                this.auth = auth;
                this.db = db;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.checkExistingSession();
            }

            setupEventListeners() {
                document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleSignIn();
                });
            }

            checkExistingSession() {
                this.auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        const isAdmin = await this.isUserAdmin(user.uid);
                        if (isAdmin) {
                            window.location.href = 'premium-admin-dashboard.html';
                        }
                    }
                });
            }

            async handleSignIn() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                const errorMessage = document.getElementById('errorMessage');

                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span>Signing In...';
                errorMessage.style.display = 'none';

                try {
                    const userCredential = await this.auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    const isAdmin = await this.isUserAdmin(user.uid);
                    
                    if (isAdmin) {
                        window.location.href = 'premium-admin-dashboard.html';
                    } else {
                        await this.auth.signOut();
                        throw new Error('Access denied. Admin privileges required.');
                    }
                } catch (error) {
                    this.showError(this.getErrorMessage(error));
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Sign In to Admin Dashboard';
                }
            }

            async isUserAdmin(userId) {
                try {
                    const adminDoc = await this.db.collection('admins').doc(userId).get();
                    return adminDoc.exists;
                } catch (error) {
                    console.error('Error checking admin status:', error);
                    return false;
                }
            }

            showError(message) {
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }

            getErrorMessage(error) {
    switch (error.code) {
        case 'auth/invalid-email':
            return 'Invalid email address.';
        case 'auth/user-not-found':
            return 'No account found with this email.';
        case 'auth/wrong-password':
            return 'Incorrect password.';
        case 'auth/invalid-credential':
            return 'Invalid email or password. Please try again.';
        case 'auth/invalid-login-credentials':
            return 'Invalid email or password. Please try again.';
        case 'auth/too-many-requests':
            return 'Too many failed attempts. Try again later.';
        default:
            return 'Sign in failed. Please check your credentials and try again.';
    }
}
        }

        document.addEventListener('DOMContentLoaded', () => {
            new AdminSignIn();
        });
    </script>

</body>
</html>
