<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKLesson Support — Agent Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-mid: #243460;
    --navy-light: #2e4080;
    --accent: #4a72d4;
    --accent-soft: #6b8fe8;
    --white: #ffffff;
    --off-white: #f5f7fc;
    --text-muted: #8492b4;
    --border: rgba(74,114,212,0.2);
    --error: #e05b5b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,114,212,0.15) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,114,212,0.1) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    pointer-events: none;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(74,114,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,114,212,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px 52px;
    width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: white;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(74,114,212,0.4);
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent-soft); }

  .login-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    transition: all 0.2s;
  }

  input::placeholder { color: rgba(132,146,180,0.5); }
  input:focus {
    border-color: var(--accent);
    background: rgba(74,114,212,0.08);
    box-shadow: 0 0 0 3px rgba(74,114,212,0.15);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(74,114,212,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(74,114,212,0.5);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(224,91,91,0.1);
    border: 1px solid rgba(224,91,91,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f08080;
    margin-top: 14px;
    display: none;
  }

  .error-msg.show { display: block; animation: fadeUp 0.2s ease; }

  .footer-note {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .footer-note a { color: var(--accent-soft); text-decoration: none; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 28px 0;
  }

  .security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-mark">
      <div class="logo-icon">TK</div>
      <div class="logo-text">TK<span>Lesson</span></div>
    </div>
    <div class="login-subtitle">Support Agent Portal</div>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Agent Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="emailInput" placeholder="agent@tklesson.com" required autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      <span class="btn-label">Sign In to Dashboard</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="divider"></div>

  <div class="security-badge">
    🔐 Secure agent-only access · TKLesson Support
  </div>

  <div class="footer-note">
    Access restricted to authorized support agents.<br>
    <a href="#">Contact IT Support</a> if you need assistance.
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyPlaceholderKeyReplaceWithReal",
    authDomain: "tk-scheduler.firebaseapp.com",
    projectId: "tk-scheduler",
    storageBucket: "tk-scheduler.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:placeholder"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleLogin = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    btn.classList.add('loading');
    errorMsg.classList.remove('show');

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;

      // Verify agent exists in support_agents collection
      const agentDoc = await getDoc(doc(db, 'support_agents', uid));
      if (!agentDoc.exists()) {
        await auth.signOut();
        throw new Error('Access denied. This account is not authorized as a support agent.');
      }

      // Redirect to dashboard
      window.location.href = 'tutoring-support.html';
    } catch (err) {
      let message = 'Invalid email or password.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        message = 'Invalid email or password.';
      } else if (err.message) {
        message = err.message;
      }
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
      btn.classList.remove('loading');
    }
  };
</script>
</body>
</html>
