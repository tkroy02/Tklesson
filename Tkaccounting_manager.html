<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);

            /* Status colors */
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background-color: var(--background-light);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--primary);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
        h2 { font-size: clamp(1.8rem, 3.5vw, 2.4rem); text-align: center; margin-bottom: 1rem; }
        h3 { font-size: 1.25rem; }

        .section-badge {
            display: inline-block;
            background: var(--background-alt);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 12px;
        }

        .section-title { text-align: center; margin-bottom: 0.75rem; }

        .section-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
        html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            outline: none;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--text-light);
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.4);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--text-dark);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
        }
        .btn-secondary:hover {
            background-color: var(--secondary-light);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2.5px solid var(--primary);
        }
        .btn-outline:hover {
            background-color: var(--primary);
            color: var(--text-light);
            transform: translateY(-3px);
        }

        .btn-danger {
            background-color: var(--danger);
            color: var(--text-light);
            box-shadow: 0 4px 16px rgba(239, 71, 111, 0.3);
        }
        .btn-danger:hover {
            background-color: #dc2626;
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(239, 71, 111, 0.4);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 45px rgba(255, 215, 0, 0.55); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== HERO ========== */
        .hero {
            background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 80px 0 60px;
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .hero-bg-shapes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        .hero-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }

        .hero-shape-1 {
            width: 400px; height: 400px; background: white;
            top: -10%; right: -5%;
            animation: floatShape 12s ease-in-out infinite;
        }

        .hero-shape-2 {
            width: 250px; height: 250px; background: var(--secondary);
            bottom: -10%; left: -5%;
            animation: floatShape 15s ease-in-out infinite reverse;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 20px) scale(0.94); }
        }

        .hero-grid {
            position: absolute; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        .hero-content {
            position: relative; z-index: 2; text-align: center;
            max-width: 850px; margin: 0 auto;
        }

        .hero-title {
            color: var(--text-light); margin-bottom: 14px;
            animation: fadeInUp 0.8s ease-out 0.15s both;
        }

        .hero-title span {
            background: linear-gradient(135deg, #ffd700, #ffed80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-description {
            font-size: 1.15rem; margin-bottom: 12px; opacity: 0.85;
            animation: fadeInUp 0.8s ease-out 0.3s both; line-height: 1.6;
        }

        /* ========== MAIN CONTENT AREA ========== */
        .main-content {
            padding: 50px 0;
            position: relative;
            z-index: 1;
        }

        /* ========== CARDS ========== */
        .card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 28px;
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card-header i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .card-header h3 {
            font-size: 1.1rem;
            margin: 0;
        }

        /* ========== STATS ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 24px 16px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
        }

        .stat-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .stat-number.revenue { color: var(--success); }
        .stat-number.expense { color: var(--danger); }
        .stat-number.profit { color: var(--primary); }
        .stat-number.margin { color: var(--secondary); }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ========== FORMS ========== */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            background: var(--background);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.1);
        }

        .form-input::placeholder { color: var(--text-muted); }

        .form-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%230b3d91' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        /* ========== FILTERS & TABS ========== */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
        }

        .filter-btn, .tab-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: var(--background);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: capitalize;
        }

        .filter-btn:hover, .tab-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .filter-btn.active, .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== TABLES ========== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--background-alt);
        }

        .data-table td {
            padding: 14px 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--background-alt);
        }

        .data-table tr:hover td {
            background: var(--background-light);
        }

        /* ========== TRANSACTION ITEMS ========== */
        .transaction-item {
            background: var(--background);
            border-radius: var(--border-radius-sm);
            padding: 16px 20px;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
            animation: fadeIn 0.3s ease-out;
            margin-bottom: 12px;
        }

        .transaction-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .transaction-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .transaction-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .transaction-dot.revenue { background: var(--success); }
        .transaction-dot.expense { background: var(--danger); }

        .transaction-details h4 {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .transaction-details .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
        }

        .transaction-amount.revenue { color: var(--success); }
        .transaction-amount.expense { color: var(--danger); }

        .transaction-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.9rem;
            background: transparent;
        }

        .action-btn.edit {
            color: #1e40af;
            background: #dbeafe;
        }
        .action-btn.edit:hover { background: #1e40af; color: white; }

        .action-btn.delete {
            color: #dc2626;
            background: #fee2e2;
        }
        .action-btn.delete:hover { background: #dc2626; color: white; }

        /* ========== CHART CONTAINER ========== */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* ========== LOADING ========== */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 80px 20px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--background-alt);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ========== GRID LAYOUTS ========== */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 28px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
        }

        /* ========== PROGRESS RING (for profit margin) ========== */
        .progress-ring-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .hero { padding: 60px 0 40px; }
            .hero-title { font-size: 1.8rem; }
            .hero-description { font-size: 1rem; }
            .main-content { padding: 30px 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: center; }
            .chart-container { height: 250px; }
            .transaction-row { flex-direction: column; align-items: flex-start; }
            .transaction-actions { align-self: flex-end; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 1.5rem; }
        }
    </style>
</head>

<!-- Smooth scrolling -->
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    const targetId = this.getAttribute('href');
    if (targetId === '#') return;
    const target = document.querySelector(targetId);
    if (target) {
      e.preventDefault();
      window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
    }
  });
});
</script>

const { useState, useEffect, useRef, useCallback } = React;

function AccountingApp({ user }) {
    // Transaction state
    const [transactions, setTransactions] = useState([]);
    const [description, setDescription] = useState('');
    const [amount, setAmount] = useState('');
    const [type, setType] = useState('revenue');
    const [category, setCategory] = useState('');
    const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [syncing, setSyncing] = useState(false);

    // UI state
    const [filter, setFilter] = useState('all');
    const [timeRange, setTimeRange] = useState('all');
    const [editingId, setEditingId] = useState(null);
    const [editData, setEditData] = useState({});
    const [activeTab, setActiveTab] = useState('overview');

    // Chart refs
    const financialChartRef = useRef(null);
    const categoryChartRef = useRef(null);
    const trendChartRef = useRef(null);
    const cashFlowChartRef = useRef(null);

    // Chart instances ref (no re-renders needed)
    const chartInstances = useRef({
        financialChart: null,
        categoryChart: null,
        trendChart: null,
        cashFlowChart: null
    });

    // Categories
    const revenueCategories = ['Sales', 'Services', 'Investments', 'Other Income'];
    const expenseCategories = ['Supplies', 'Salaries', 'Rent', 'Utilities', 'Marketing', 'Travel', 'Equipment', 'Other Expenses'];

    // ── Load transactions from Firestore ──
    useEffect(() => {
        if (!user) return;

        setLoading(true);
        const unsubscribe = db.collection('transactions_account')
            .where('userId', '==', user.uid)
            .orderBy('createdAt', 'desc')
            .onSnapshot(function(snapshot) {
                const txs = [];
                snapshot.forEach(function(doc) {
                    const data = doc.data();
                    txs.push({
                        id: doc.id,
                        description: data.description || '',
                        amount: data.amount || 0,
                        type: data.type || 'expense',
                        category: data.category || '',
                        date: data.date || '',
                        createdAt: data.createdAt ? data.createdAt.toDate() : new Date()
                    });
                });
                setTransactions(txs);
                setLoading(false);
            }, function(error) {
                console.error('Error loading transactions:', error);
                setLoading(false);
            });

        return () => unsubscribe();
    }, [user]);

    // ── Calculations ──
    const filterTransactions = useCallback(() => {
        let filtered = transactions;

        if (filter !== 'all') {
            filtered = filtered.filter(t => t.type === filter);
        }

        const now = new Date();
        if (timeRange === 'month') {
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            filtered = filtered.filter(t => new Date(t.date) >= startOfMonth);
        } else if (timeRange === 'week') {
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay());
            startOfWeek.setHours(0, 0, 0, 0);
            filtered = filtered.filter(t => new Date(t.date) >= startOfWeek);
        }

        return filtered;
    }, [transactions, filter, timeRange]);

    const calculateTotals = useCallback(() => {
        const filtered = filterTransactions();
        const revenue = filtered
            .filter(t => t.type === 'revenue')
            .reduce((sum, t) => sum + parseFloat(t.amount), 0);
        const expenses = filtered
            .filter(t => t.type === 'expense')
            .reduce((sum, t) => sum + parseFloat(t.amount), 0);
        const profit = revenue - expenses;
        const profitMargin = revenue > 0 ? (profit / revenue) * 100 : 0;
        return { revenue, expenses, profit, profitMargin };
    }, [filterTransactions]);

    const categoryBreakdown = useCallback(() => {
        const breakdown = {};
        const filtered = filterTransactions();
        filtered.forEach(t => {
            if (!breakdown[t.category]) breakdown[t.category] = 0;
            breakdown[t.category] += parseFloat(t.amount);
        });
        return breakdown;
    }, [filterTransactions]);

    const getMonthlyTrendData = useCallback(() => {
        const monthlyData = {};
        const now = new Date();
        const months = [];

        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const key = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
            months.push(key);
            monthlyData[key] = { revenue: 0, expenses: 0 };
        }

        transactions.forEach(t => {
            const d = new Date(t.date);
            const key = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
            if (monthlyData[key]) {
                if (t.type === 'revenue') {
                    monthlyData[key].revenue += parseFloat(t.amount);
                } else {
                    monthlyData[key].expenses += parseFloat(t.amount);
                }
            }
        });

        return {
            labels: months,
            revenue: months.map(m => monthlyData[m].revenue),
            expenses: months.map(m => monthlyData[m].expenses)
        };
    }, [transactions]);

    const getCashFlowData = useCallback(() => {
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const data = { revenue: 0, expenses: 0 };

        transactions
            .filter(t => new Date(t.date) >= startOfMonth)
            .forEach(t => {
                if (t.type === 'revenue') {
                    data.revenue += parseFloat(t.amount);
                } else {
                    data.expenses += parseFloat(t.amount);
                }
            });

        return data;
    }, [transactions]);

    // ── CRUD Operations ──
    const addTransaction = async (e) => {
        e.preventDefault();
        if (!description.trim() || !amount || !category) return;

        setSaving(true);
        try {
            await db.collection('transactions_account').add({
                description: description.trim(),
                amount: parseFloat(amount),
                type,
                category,
                date,
                userId: user.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            resetForm();
        } catch (error) {
            console.error('Error adding transaction:', error);
            alert('Failed to save transaction. Please try again.');
        } finally {
            setSaving(false);
        }
    };

    const saveEdit = async () => {
        if (!editData.description?.trim() || !editData.amount || !editData.category) return;

        setSaving(true);
        try {
            await db.collection('transactions_account').doc(editingId).update({
                description: editData.description.trim(),
                amount: parseFloat(editData.amount),
                type: editData.type,
                category: editData.category,
                date: editData.date,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            cancelEditing();
        } catch (error) {
            console.error('Error updating transaction:', error);
            alert('Failed to update transaction. Please try again.');
        } finally {
            setSaving(false);
        }
    };

    const deleteTransaction = async (id) => {
        if (!confirm('Are you sure you want to delete this transaction?')) return;
        try {
            await db.collection('transactions_account').doc(id).delete();
        } catch (error) {
            console.error('Error deleting transaction:', error);
        }
    };

    const startEditing = (tx) => {
        setEditingId(tx.id);
        setEditData({
            description: tx.description,
            amount: tx.amount,
            type: tx.type,
            category: tx.category,
            date: tx.date
        });
        window.scrollTo({ top: document.getElementById('tx-form')?.offsetTop - 100, behavior: 'smooth' });
    };

    const cancelEditing = () => {
        setEditingId(null);
        setEditData({});
    };

    const resetForm = () => {
        setDescription('');
        setAmount('');
        setCategory('');
        setType('revenue');
        setDate(new Date().toISOString().split('T')[0]);
    };

    // ── Chart Rendering ──
    const destroyChart = (key) => {
        if (chartInstances.current[key]) {
            chartInstances.current[key].destroy();
            chartInstances.current[key] = null;
        }
    };

    const renderFinancialChart = () => {
        const canvas = financialChartRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        destroyChart('financialChart');

        const { revenue, expenses, profit } = calculateTotals();

        chartInstances.current.financialChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Revenue', 'Expenses', 'Profit'],
                datasets: [{
                    data: [revenue, expenses, profit],
                    backgroundColor: [
                        'rgba(6, 214, 160, 0.8)',
                        'rgba(239, 71, 111, 0.8)',
                        'rgba(11, 61, 145, 0.8)'
                    ],
                    borderColor: [
                        '#06d6a0',
                        '#ef476f',
                        '#0b3d91'
                    ],
                    borderWidth: 2,
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.label}: $${ctx.raw.toFixed(2)}`
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: (v) => '$' + v,
                            color: '#708090'
                        },
                        grid: { color: 'rgba(11, 61, 145, 0.06)' }
                    },
                    x: {
                        ticks: { color: '#4a5568' },
                        grid: { display: false }
                    }
                }
            }
        });
    };

    const renderCategoryChart = () => {
        const canvas = categoryChartRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        destroyChart('categoryChart');

        const breakdown = categoryBreakdown();
        const labels = Object.keys(breakdown);
        const data = Object.values(breakdown);

        if (labels.length === 0) return;

        const colors = labels.map((_, i) => {
            const hue = (i * 137.5) % 360;
            return `hsla(${hue}, 65%, 55%, 0.8)`;
        });
        const borders = labels.map((_, i) => {
            const hue = (i * 137.5) % 360;
            return `hsl(${hue}, 65%, 45%)`;
        });

        chartInstances.current.categoryChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderColor: borders,
                    borderWidth: 2,
                    hoverOffset: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            boxWidth: 12,
                            padding: 15,
                            color: '#4a5568'
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => {
                                const total = data.reduce((a, b) => a + b, 0);
                                const pct = ((ctx.raw / total) * 100).toFixed(1);
                                return `${ctx.label}: $${ctx.raw.toFixed(2)} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
    };

    const renderTrendChart = () => {
        const canvas = trendChartRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        destroyChart('trendChart');

        const trend = getMonthlyTrendData();

        chartInstances.current.trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: trend.labels,
                datasets: [
                    {
                        label: 'Revenue',
                        data: trend.revenue,
                        borderColor: '#06d6a0',
                        backgroundColor: 'rgba(6, 214, 160, 0.1)',
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'Expenses',
                        data: trend.expenses,
                        borderColor: '#ef476f',
                        backgroundColor: 'rgba(239, 71, 111, 0.1)',
                        tension: 0.3,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.dataset.label}: $${ctx.raw.toFixed(2)}`
                        }
                    },
                    legend: {
                        labels: { color: '#4a5568' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: (v) => '$' + v,
                            color: '#708090'
                        },
                        grid: { color: 'rgba(11, 61, 145, 0.06)' }
                    },
                    x: {
                        ticks: { color: '#4a5568' },
                        grid: { color: 'rgba(11, 61, 145, 0.06)' }
                    }
                }
            }
        });
    };

    const renderCashFlowChart = () => {
        const canvas = cashFlowChartRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        destroyChart('cashFlowChart');

        const cf = getCashFlowData();

        chartInstances.current.cashFlowChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Revenue', 'Expenses'],
                datasets: [{
                    data: [cf.revenue, cf.expenses],
                    backgroundColor: [
                        'rgba(6, 214, 160, 0.8)',
                        'rgba(239, 71, 111, 0.8)'
                    ],
                    borderColor: ['#06d6a0', '#ef476f'],
                    borderWidth: 2,
                    hoverOffset: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.label}: $${ctx.raw.toFixed(2)}`
                        }
                    },
                    legend: {
                        labels: { color: '#4a5568' }
                    }
                }
            }
        });
    };

    const renderAllCharts = () => {
        if (typeof Chart === 'undefined') return;

        if (activeTab === 'overview') {
            setTimeout(() => {
                renderFinancialChart();
                renderCategoryChart();
            }, 100);
        } else if (activeTab === 'analytics') {
            setTimeout(() => {
                renderTrendChart();
                renderCashFlowChart();
            }, 100);
        }
    };

    // Re-render charts when data or tab changes
    useEffect(() => {
        if (!loading && transactions.length > 0) {
            renderAllCharts();
        }
    }, [transactions, filter, timeRange, activeTab, loading]);

    // Cleanup charts on unmount
    useEffect(() => {
        return () => {
            ['financialChart', 'categoryChart', 'trendChart', 'cashFlowChart'].forEach(destroyChart);
        };
    }, []);

    // ── Formatting ──
    const formatCurrency = (value) => {
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2
        }).format(value);
    };

    const formatDate = (dateStr) => {
        return new Date(dateStr).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });
    };

    // ── Progress Ring Component ──
    const ProgressRing = ({ value, max, size = 120, strokeWidth = 10, color }) => {
        const radius = (size - strokeWidth) / 2;
        const circumference = radius * 2 * Math.PI;
        const pct = Math.min((value / max) * 100, 100);
        const offset = circumference - (pct / 100) * circumference;

        return (
            <svg width={size} height={size}>
                <circle
                    stroke="rgba(11, 61, 145, 0.1)"
                    strokeWidth={strokeWidth}
                    fill="transparent"
                    r={radius}
                    cx={size / 2}
                    cy={size / 2}
                />
                <circle
                    stroke={color}
                    strokeWidth={strokeWidth}
                    strokeDasharray={circumference}
                    strokeDashoffset={offset}
                    strokeLinecap="round"
                    fill="transparent"
                    r={radius}
                    cx={size / 2}
                    cy={size / 2}
                    style={{
                        transition: 'stroke-dashoffset 0.6s ease',
                        transform: 'rotate(-90deg)',
                        transformOrigin: '50% 50%'
                    }}
                />
                <text
                    x="50%"
                    y="50%"
                    textAnchor="middle"
                    dy=".3em"
                    fontSize="18"
                    fontWeight="800"
                    fill="#0b3d91"
                >
                    {Math.round(pct)}%
                </text>
            </svg>
        );
    };

    // ── Loading State ──
    if (loading) {
        return (
            <div className="loading-overlay">
                <div className="spinner"></div>
                <p className="loading-text">Loading your accounting data...</p>
            </div>
        );
    }

    // ── Derived Data ──
    const { revenue, expenses, profit, profitMargin } = calculateTotals();
    const filteredTransactions = filterTransactions();
    const isEditing = editingId !== null;

    // ── Render ──
    return (
        <div>
            {/* Stats Cards */}
            <div className="stats-grid">
                <div className="stat-card">
                    <div className="stat-number revenue">{formatCurrency(revenue)}</div>
                    <div className="stat-label">Total Revenue</div>
                </div>
                <div className="stat-card">
                    <div className="stat-number expense">{formatCurrency(expenses)}</div>
                    <div className="stat-label">Total Expenses</div>
                </div>
                <div className="stat-card">
                    <div className="stat-number profit" style={{ color: profit >= 0 ? '#0b3d91' : '#ef476f' }}>
                        {formatCurrency(profit)}
                    </div>
                    <div className="stat-label">Net Profit</div>
                </div>
                <div className="stat-card">
                    <div className="stat-number margin">{profitMargin.toFixed(1)}%</div>
                    <div className="stat-label">Profit Margin</div>
                </div>
            </div>

            {/* Tabs */}
            <div className="filter-bar" style={{ justifyContent: 'center' }}>
                <div className="filter-group">
                    <button
                        className={`tab-btn ${activeTab === 'overview' ? 'active' : ''}`}
                        onClick={() => setActiveTab('overview')}
                    >
                        <i className="fas fa-home" style={{ marginRight: '6px' }}></i> Overview
                    </button>
                    <button
                        className={`tab-btn ${activeTab === 'analytics' ? 'active' : ''}`}
                        onClick={() => setActiveTab('analytics')}
                    >
                        <i className="fas fa-chart-bar" style={{ marginRight: '6px' }}></i> Analytics
                    </button>
                    <button
                        className={`tab-btn ${activeTab === 'transactions' ? 'active' : ''}`}
                        onClick={() => setActiveTab('transactions')}
                    >
                        <i className="fas fa-list" style={{ marginRight: '6px' }}></i> Transactions
                    </button>
                </div>
            </div>

            {/* ─── OVERVIEW TAB ─── */}
            {activeTab === 'overview' && (
                <div className="grid-2">
                    {/* Left column: Form + Filters */}
                    <div>
                        {/* Add/Edit Form */}
                        <div className="card" id="tx-form">
                            <div className="card-header">
                                <i className="fas fa-plus-circle" style={{ color: '#06d6a0' }}></i>
                                <h3>{isEditing ? 'Edit Transaction' : 'Add Transaction'}</h3>
                            </div>
                            <form onSubmit={isEditing ? saveEdit : addTransaction}>
                                <div className="form-group">
                                    <label className="form-label">Type *</label>
                                    <select
                                        value={isEditing ? editData.type : type}
                                        onChange={(e) => isEditing
                                            ? setEditData({ ...editData, type: e.target.value })
                                            : setType(e.target.value)
                                        }
                                        className="form-select"
                                        required
                                    >
                                        <option value="revenue">Revenue</option>
                                        <option value="expense">Expense</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Category *</label>
                                    <select
                                        value={isEditing ? editData.category : category}
                                        onChange={(e) => isEditing
                                            ? setEditData({ ...editData, category: e.target.value })
                                            : setCategory(e.target.value)
                                        }
                                        className="form-select"
                                        required
                                    >
                                        <option value="">Select Category</option>
                                        {(isEditing ? editData.type : type) === 'revenue'
                                            ? revenueCategories.map(c => <option key={c} value={c}>{c}</option>)
                                            : expenseCategories.map(c => <option key={c} value={c}>{c}</option>)
                                        }
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Description *</label>
                                    <input
                                        type="text"
                                        value={isEditing ? editData.description : description}
                                        onChange={(e) => isEditing
                                            ? setEditData({ ...editData, description: e.target.value })
                                            : setDescription(e.target.value)
                                        }
                                        placeholder="Transaction description"
                                        className="form-input"
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Amount *</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={isEditing ? editData.amount : amount}
                                        onChange={(e) => isEditing
                                            ? setEditData({ ...editData, amount: e.target.value })
                                            : setAmount(e.target.value)
                                        }
                                        placeholder="0.00"
                                        className="form-input"
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Date *</label>
                                    <input
                                        type="date"
                                        value={isEditing ? editData.date : date}
                                        onChange={(e) => isEditing
                                            ? setEditData({ ...editData, date: e.target.value })
                                            : setDate(e.target.value)
                                        }
                                        className="form-input"
                                        required
                                    />
                                </div>

                                <div style={{ display: 'flex', gap: '10px' }}>
                                    {isEditing ? (
                                        <>
                                            <button type="submit" className="btn btn-primary" style={{ flex: 1 }} disabled={saving}>
                                                <i className="fas fa-save"></i> {saving ? 'Saving...' : 'Save Changes'}
                                            </button>
                                            <button type="button" className="btn btn-sm" onClick={cancelEditing}
                                                style={{ background: '#e2e8f0', color: '#0b1e3d', borderRadius: '50px' }}>
                                                Cancel
                                            </button>
                                        </>
                                    ) : (
                                        <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={saving}>
                                            <i className="fas fa-plus"></i> {saving ? 'Saving...' : 'Add Transaction'}
                                        </button>
                                    )}
                                </div>
                            </form>
                        </div>

                        {/* Filters */}
                        <div className="card">
                            <div className="card-header">
                                <i className="fas fa-filter"></i>
                                <h3>Filters</h3>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Transaction Type</label>
                                <div className="filter-group">
                                    {['all', 'revenue', 'expense'].map(f => (
                                        <button
                                            key={f}
                                            className={`filter-btn ${filter === f ? 'active' : ''}`}
                                            onClick={() => setFilter(f)}
                                        >
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="form-group" style={{ marginBottom: 0 }}>
                                <label className="form-label">Time Range</label>
                                <div className="filter-group">
                                    {['all', 'month', 'week'].map(t => (
                                        <button
                                            key={t}
                                            className={`filter-btn ${timeRange === t ? 'active' : ''}`}
                                            onClick={() => setTimeRange(t)}
                                        >
                                            {t === 'all' ? 'All Time' : t === 'month' ? 'This Month' : 'This Week'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Right column: Charts */}
                    <div>
                        <div className="card">
                            <div className="card-header">
                                <i className="fas fa-chart-bar" style={{ color: '#ffd700' }}></i>
                                <h3>Financial Overview</h3>
                            </div>
                            <div className="chart-container">
                                <canvas ref={financialChartRef}></canvas>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-header">
                                <i className="fas fa-chart-pie" style={{ color: '#ffd700' }}></i>
                                <h3>Category Breakdown</h3>
                            </div>
                            <div className="chart-container">
                                <canvas ref={categoryChartRef}></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ─── ANALYTICS TAB ─── */}
            {activeTab === 'analytics' && (
                <div className="grid-2">
                    <div className="card">
                        <div className="card-header">
                            <i className="fas fa-chart-line" style={{ color: '#06d6a0' }}></i>
                            <h3>Monthly Trends</h3>
                        </div>
                        <div className="chart-container">
                            <canvas ref={trendChartRef}></canvas>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <i className="fas fa-money-bill-wave" style={{ color: '#06d6a0' }}></i>
                            <h3>Monthly Cash Flow</h3>
                        </div>
                        <div className="chart-container">
                            <canvas ref={cashFlowChartRef}></canvas>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <i className="fas fa-tachometer-alt" style={{ color: '#ffd700' }}></i>
                            <h3>Financial Health</h3>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center', padding: '20px 0' }}>
                            <div className="progress-ring-container">
                                <ProgressRing
                                    value={profitMargin > 0 ? profitMargin : 0}
                                    max={50}
                                    color="#06d6a0"
                                />
                                <span style={{ fontWeight: 600, color: '#4a5568' }}>Profit Margin</span>
                            </div>
                            <div className="progress-ring-container">
                                <ProgressRing
                                    value={revenue > 0 ? (expenses / revenue) * 100 : 0}
                                    max={100}
                                    color="#ef476f"
                                />
                                <span style={{ fontWeight: 600, color: '#4a5568' }}>Expense Ratio</span>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <i className="fas fa-table" style={{ color: '#ffd700' }}></i>
                            <h3>Category Details</h3>
                        </div>
                        <div style={{ overflowX: 'auto' }}>
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Category</th>
                                        <th style={{ textAlign: 'right' }}>Amount</th>
                                        <th style={{ textAlign: 'right' }}>% of Revenue</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.entries(categoryBreakdown()).map(([cat, total]) => {
                                        const pct = revenue > 0 ? (total / revenue) * 100 : 0;
                                        return (
                                            <tr key={cat}>
                                                <td>{cat}</td>
                                                <td style={{
                                                    textAlign: 'right',
                                                    fontWeight: 600,
                                                    color: revenueCategories.includes(cat) ? '#06d6a0' : '#ef476f'
                                                }}>
                                                    {formatCurrency(total)}
                                                </td>
                                                <td style={{ textAlign: 'right', color: '#708090' }}>
                                                    {pct.toFixed(1)}%
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {Object.keys(categoryBreakdown()).length === 0 && (
                                        <tr>
                                            <td colSpan="3" style={{ textAlign: 'center', padding: '30px', color: '#708090' }}>
                                                No data to display
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            )}

            {/* ─── TRANSACTIONS TAB ─── */}
            {activeTab === 'transactions' && (
                <div className="card">
                    <div className="card-header" style={{ justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <i className="fas fa-list"></i>
                            <h3>All Transactions</h3>
                        </div>
                        <span style={{ fontSize: '0.9rem', color: '#708090' }}>
                            {filteredTransactions.length} transaction{filteredTransactions.length !== 1 ? 's' : ''}
                        </span>
                    </div>

                    {filteredTransactions.length === 0 ? (
                        <div className="empty-state">
                            <i className="fas fa-receipt"></i>
                            <p>No transactions found. Add your first transaction to get started!</p>
                        </div>
                    ) : (
                        <div>
                            {filteredTransactions.map(tx => (
                                <div key={tx.id} className="transaction-item">
                                    <div className="transaction-row">
                                        <div className="transaction-info">
                                            <div className={`transaction-dot ${tx.type}`}></div>
                                            <div className="transaction-details">
                                                <h4>{tx.description}</h4>
                                                <span className="meta">
                                                    {formatDate(tx.date)} • {tx.category}
                                                </span>
                                            </div>
                                        </div>
                                        <div className={`transaction-amount ${tx.type}`}>
                                            {tx.type === 'revenue' ? '+' : '-'}{formatCurrency(tx.amount)}
                                        </div>
                                        <div className="transaction-actions">
                                            <button
                                                className="action-btn edit"
                                                onClick={() => startEditing(tx)}
                                                title="Edit"
                                            >
                                                <i className="fas fa-edit"></i>
                                            </button>
                                            <button
                                                className="action-btn delete"
                                                onClick={() => deleteTransaction(tx.id)}
                                                title="Delete"
                                            >
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            )}

            {/* Footer note */}
            <div style={{ textAlign: 'center', marginTop: '32px' }}>
                <p style={{ color: '#708090', fontSize: '0.85rem' }}>
                    <i className="fas fa-shield-alt" style={{ marginRight: '6px' }}></i>
                    Data securely stored in Firebase • Real-time sync
                </p>
            </div>
        </div>
    );
}
</script>

</body>
</html>
