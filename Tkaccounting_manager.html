                                    {formatCurrency(revenue)}
                                </div>
                                <div style={{color: '#a0aabf', fontSize: '0.85rem'}}>Total Revenue</div>
                                <i className="fas fa-arrow-up" style={{color: '#34d399', marginTop: '0.5rem'}}></i>
                            </div>
                            <div className="navy-card" style={{padding: '1.5rem', textAlign: 'center'}}>
                                <div style={{fontSize: '1.75rem', fontWeight: 'bold', color: '#f87171', marginBottom: '0.5rem'}}>
                                    {formatCurrency(expenses)}
                                </div>
                                <div style={{color: '#a0aabf', fontSize: '0.85rem'}}>Total Expenses</div>
                                <i className="fas fa-arrow-down" style={{color: '#f87171', marginTop: '0.5rem'}}></i>
                            </div>
                            <div className="navy-card" style={{padding: '1.5rem', textAlign: 'center'}}>
                                <div style={{
                                    fontSize: '1.75rem',
                                    fontWeight: 'bold',
                                    color: profit >= 0 ? '#60a5fa' : '#f87171',
                                    marginBottom: '0.5rem'
                                }}>
                                    {formatCurrency(profit)}
                                </div>
                                <div style={{color: '#a0aabf', fontSize: '0.85rem'}}>Net Profit</div>
                                <i className={`fas ${profit >= 0 ? 'fa-smile' : 'fa-frown'}`} 
                                   style={{color: profit >= 0 ? '#60a5fa' : '#f87171', marginTop: '0.5rem'}}></i>
                            </div>
                            <div className="navy-card" style={{padding: '1.5rem', textAlign: 'center'}}>
                                <div style={{
                                    fontSize: '1.75rem',
                                    fontWeight: 'bold',
                                    color: '#f1c40f',
                                    marginBottom: '0.5rem'
                                }}>
                                    {profitMargin.toFixed(1)}%
                                </div>
                                <div style={{color: '#a0aabf', fontSize: '0.85rem'}}>Profit Margin</div>
                                <i className="fas fa-percentage" style={{color: '#f1c40f', marginTop: '0.5rem'}}></i>
                            </div>
                        </div>

                        {/* Overview Tab */}
                        {activeTab === 'overview' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1 space-y-6">
                                    {/* Add/Edit Transaction Form */}
                                    <div className="navy-card" style={{padding: '1.5rem'}}>
                                        <h2 style={{
                                            fontSize: '1.25rem',
                                            fontWeight: '600',
                                            color: '#e6e9f0',
                                            marginBottom: '1rem'
                                        }}>
                                            <i className="fas fa-plus-circle" style={{color: '#34d399', marginRight: '0.5rem'}}></i>
                                            {editingId ? 'Edit Transaction' : 'Add Transaction'}
                                        </h2>
                                        <form onSubmit={editingId ? saveEdit : addTransaction} className="space-y-4">
                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.25rem'
                                                }}>
                                                    Type *
                                                </label>
                                                <select
                                                    value={editingId ? editData.type : type}
                                                    onChange={(e) => editingId 
                                                        ? setEditData({...editData, type: e.target.value})
                                                        : setType(e.target.value)
                                                    }
                                                    className="navy-input"
                                                    style={{
                                                        width: '100%',
                                                        padding: '0.5rem 0.75rem',
                                                        borderRadius: '8px',
                                                        fontSize: '0.95rem'
                                                    }}
                                                    required
                                                >
                                                    <option value="revenue">Revenue</option>
                                                    <option value="expense">Expense</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.25rem'
                                                }}>
                                                    Category *
                                                </label>
                                                <select
                                                    value={editingId ? editData.category : category}
                                                    onChange={(e) => editingId
                                                        ? setEditData({...editData, category: e.target.value})
                                                        : setCategory(e.target.value)
                                                    }
                                                    className="navy-input"
                                                    style={{
                                                        width: '100%',
                                                        padding: '0.5rem 0.75rem',
                                                        borderRadius: '8px',
                                                        fontSize: '0.95rem'
                                                    }}
                                                    required
                                                >
                                                    <option value="">Select Category</option>
                                                    {(editingId ? editData.type : type) === 'revenue' 
                                                        ? revenueCategories.map(cat => (
                                                            <option key={cat} value={cat}>{cat}</option>
                                                        ))
                                                        : expenseCategories.map(cat => (
                                                            <option key={cat} value={cat}>{cat}</option>
                                                        ))
                                                    }
                                                </select>
                                            </div>

                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.25rem'
                                                }}>
                                                    Description *
                                                </label>
                                                <input
                                                    type="text"
                                                    value={editingId ? editData.description : description}
                                                    onChange={(e) => editingId
                                                        ? setEditData({...editData, description: e.target.value})
                                                        : setDescription(e.target.value)
                                                    }
                                                    placeholder="Transaction description"
                                                    className="navy-input"
                                                    style={{
                                                        width: '100%',
                                                        padding: '0.5rem 0.75rem',
                                                        borderRadius: '8px',
                                                        fontSize: '0.95rem'
                                                    }}
                                                    required
                                                />
                                            </div>

                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.25rem'
                                                }}>
                                                    Amount *
                                                </label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editingId ? editData.amount : amount}
                                                    onChange={(e) => editingId
                                                        ? setEditData({...editData, amount: e.target.value})
                                                        : setAmount(e.target.value)
                                                    }
                                                    placeholder="0.00"
                                                    className="navy-input"
                                                    style={{
                                                        width: '100%',
                                                        padding: '0.5rem 0.75rem',
                                                        borderRadius: '8px',
                                                        fontSize: '0.95rem'
                                                    }}
                                                    required
                                                />
                                            </div>

                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.25rem'
                                                }}>
                                                    Date *
                                                </label>
                                                <input
                                                    type="date"
                                                    value={editingId ? editData.date : date}
                                                    onChange={(e) => editingId
                                                        ? setEditData({...editData, date: e.target.value})
                                                        : setDate(e.target.value)
                                                    }
                                                    className="navy-input"
                                                    style={{
                                                        width: '100%',
                                                        padding: '0.5rem 0.75rem',
                                                        borderRadius: '8px',
                                                        fontSize: '0.95rem'
                                                    }}
                                                    required
                                                />
                                            </div>

                                            <div className="flex gap-2">
                                                {editingId ? (
                                                    <>
                                                        <button
                                                            type="submit"
                                                            disabled={saving}
                                                            className="navy-button-primary"
                                                            style={{
                                                                flex: '1',
                                                                padding: '0.625rem 1rem',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                transition: 'all 0.3s',
                                                                opacity: saving ? 0.6 : 1
                                                            }}
                                                        >
                                                            {saving ? 'Saving...' : (
                                                                <><i className="fas fa-save mr-2"></i>Save Changes</>
                                                            )}
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={cancelEditing}
                                                            style={{
                                                                padding: '0.625rem 1rem',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                background: 'rgba(160, 170, 191, 0.2)',
                                                                color: '#e6e9f0',
                                                                border: '1px solid rgba(160, 170, 191, 0.3)',
                                                                transition: 'all 0.3s'
                                                            }}
                                                        >
                                                            Cancel
                                                        </button>
                                                    </>
                                                ) : (
                                                    <button
                                                        type="submit"
                                                        disabled={saving}
                                                        className="navy-button-primary"
                                                        style={{
                                                            width: '100%',
                                                            padding: '0.75rem 1rem',
                                                            borderRadius: '8px',
                                                            cursor: 'pointer',
                                                            transition: 'all 0.3s',
                                                            opacity: saving ? 0.6 : 1,
                                                            fontWeight: '600',
                                                            fontSize: '1rem'
                                                        }}
                                                    >
                                                        {saving ? 'Saving...' : (
                                                            <><i className="fas fa-plus mr-2"></i>Add Transaction</>
                                                        )}
                                                    </button>
                                                )}
                                            </div>
                                        </form>
                                    </div>

                                    {/* Filters */}
                                    <div className="navy-card" style={{padding: '1.5rem'}}>
                                        <h3 style={{
                                            fontSize: '1.125rem',
                                            fontWeight: '600',
                                            color: '#e6e9f0',
                                            marginBottom: '1rem'
                                        }}>
                                            <i className="fas fa-filter" style={{color: '#60a5fa', marginRight: '0.5rem'}}></i>
                                            Filters
                                        </h3>
                                        <div className="space-y-4">
                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.5rem'
                                                }}>
                                                    Transaction Type
                                                </label>
                                                <div className="flex gap-2 flex-wrap">
                                                    {['all', 'revenue', 'expense'].map(f => (
                                                        <button
                                                            key={f}
                                                            onClick={() => setFilter(f)}
                                                            style={{
                                                                padding: '0.375rem 0.75rem',
                                                                borderRadius: '8px',
                                                                textTransform: 'capitalize',
                                                                fontSize: '0.875rem',
                                                                background: filter === f ? 'rgba(212, 175, 55, 0.2)' : 'rgba(20, 29, 59, 0.6)',
                                                                color: filter === f ? '#f1c40f' : '#a0aabf',
                                                                border: filter === f ? '1px solid rgba(212, 175, 55, 0.4)' : '1px solid rgba(160, 170, 191, 0.2)',
                                                                cursor: 'pointer',
                                                                transition: 'all 0.3s'
                                                            }}
                                                        >
                                                            {f}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <label style={{
                                                    display: 'block',
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500',
                                                    color: '#a0aabf',
                                                    marginBottom: '0.5rem'
                                                }}>
                                                    Time Range
                                                </label>
                                                <div className="flex gap-2 flex-wrap">
                                                    {['all', 'month', 'week'].map(t => (
                                                        <button
                                                            key={t}
                                                            onClick={() => setTimeRange(t)}
                                                            style={{
                                                                padding: '0.375rem 0.75rem',
                                                                borderRadius: '8px',
                                                                textTransform: 'capitalize',
                                                                fontSize: '0.875rem',
                                                                background: timeRange === t ? 'rgba(212, 175, 55, 0.2)' : 'rgba(20, 29, 59, 0.6)',
                                                                color: timeRange === t ? '#f1c40f' : '#a0aabf',
                                                                border: timeRange === t ? '1px solid rgba(212, 175, 55, 0.4)' : '1px solid rgba(160, 170, 191, 0.2)',
                                                                cursor: 'pointer',
                                                                transition: 'all 0.3s'
                                                            }}
                                                        >
                                                            {t}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-2 space-y-6">
                                    {/* Financial Overview Chart */}
                                    <div className="navy-card" style={{padding: '1.5rem'}}>
                                        <h3 style={{
                                            fontSize: '1.125rem',
                                            fontWeight: '600',
                                            color: '#e6e9f0',
                                            marginBottom: '1rem'
                                        }}>
                                            <i className="fas fa-chart-bar" style={{color: '#d4af37', marginRight: '0.5rem'}}></i>
                                            Financial Overview
                                        </h3>
                                        <div className="chart-container">
                                            <canvas ref={financialChartRef}></canvas>
                                        </div>
                                    </div>

                                    {/* Category Breakdown Chart */}
                                    <div className="navy-card" style={{padding: '1.5rem'}}>
                                        <h3 style={{
                                            fontSize: '1.125rem',
                                            fontWeight: '600',
                                            color: '#e6e9f0',
                                            marginBottom: '1rem'
                                        }}>
                                            <i className="fas fa-chart-pie" style={{color: '#f1c40f', marginRight: '0.5rem'}}></i>
                                            Category Breakdown
                                        </h3>
                                        <div className="chart-container">
                                            <canvas ref={categoryChartRef}></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Analytics Tab */}
                        {activeTab === 'analytics' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="navy-card" style={{padding: '1.5rem'}}>
                                    <h3 style={{
                                        fontSize: '1.125rem',
                                        fontWeight: '600',
                                        color: '#e6e9f0',
                                        marginBottom: '1rem'
                                    }}>
                                        <i className="fas fa-chart-line" style={{color: '#60a5fa', marginRight: '0.5rem'}}></i>
                                        Monthly Trends
                                    </h3>
                                    <div className="chart-container">
                                        <canvas ref={trendChartRef}></canvas>
                                    </div>
                                </div>

                                <div className="navy-card" style={{padding: '1.5rem'}}>
                                    <h3 style={{
                                        fontSize: '1.125rem',
                                        fontWeight: '600',
                                        color: '#e6e9f0',
                                        marginBottom: '1rem'
                                    }}>
                                        <i className="fas fa-money-bill-wave" style={{color: '#34d399', marginRight: '0.5rem'}}></i>
                                        Monthly Cash Flow
                                    </h3>
                                    <div className="chart-container">
                                        <canvas ref={cashFlowChartRef}></canvas>
                                    </div>
                                </div>

                                <div className="navy-card" style={{padding: '1.5rem'}}>
                                    <h3 style={{
                                        fontSize: '1.125rem',
                                        fontWeight: '600',
                                        color: '#e6e9f0',
                                        marginBottom: '1rem'
                                    }}>
                                        <i className="fas fa-tachometer-alt" style={{color: '#d4af37', marginRight: '0.5rem'}}></i>
                                        Financial Health
                                    </h3>
                                    <div style={{display: 'flex', justifyContent: 'space-around', alignItems: 'center'}}>
                                        <div className="text-center">
                                            <ProgressRing 
                                                value={profitMargin > 0 ? profitMargin : 0} 
                                                max={50} 
                                                color="#10b981" 
                                            />
                                            <p style={{marginTop: '0.5rem', fontSize: '0.875rem', fontWeight: '500', color: '#a0aabf'}}>
                                                Profit Margin
                                            </p>
                                        </div>
                                        <div className="text-center">
                                            <ProgressRing 
                                                value={revenue > 0 ? (expenses / revenue) * 100 : 0} 
                                                max={100} 
                                                color="#ef4444" 
                                            />
                                            <p style={{marginTop: '0.5rem', fontSize: '0.875rem', fontWeight: '500', color: '#a0aabf'}}>
                                                Expense Ratio
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="navy-card" style={{padding: '1.5rem'}}>
                                    <h3 style={{
                                        fontSize: '1.125rem',
                                        fontWeight: '600',
                                        color: '#e6e9f0',
                                        marginBottom: '1rem'
                                    }}>
                                        <i className="fas fa-table" style={{color: '#f1c40f', marginRight: '0.5rem'}}></i>
                                        Category Details
                                    </h3>
                                    <div style={{overflowX: 'auto'}}>
                                        <table style={{width: '100%', borderCollapse: 'collapse'}}>
                                            <thead>
                                                <tr style={{borderBottom: '1px solid rgba(212, 175, 55, 0.2)'}}>
                                                    <th style={{textAlign: 'left', padding: '0.5rem 0', color: '#a0aabf', fontSize: '0.875rem'}}>Category</th>
                                                    <th style={{textAlign: 'right', padding: '0.5rem 0', color: '#a0aabf', fontSize: '0.875rem'}}>Amount</th>
                                                    <th style={{textAlign: 'right', padding: '0.5rem 0', color: '#a0aabf', fontSize: '0.875rem'}}>Percentage</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {Object.entries(categoryBreakdown()).map(([cat, total]) => {
                                                    const percentage = revenue > 0 ? (total / revenue) * 100 : 0;
                                                    return (
                                                        <tr key={cat} style={{borderBottom: '1px solid rgba(212, 175, 55, 0.1)'}}>
                                                            <td style={{padding: '0.5rem 0', color: '#e6e9f0'}}>{cat}</td>
                                                            <td style={{
                                                                textAlign: 'right',
                                                                fontWeight: '500',
                                                                color: revenueCategories.includes(cat) ? '#34d399' : '#f87171'
                                                            }}>
                                                                {formatCurrency(total)}
                                                            </td>
                                                            <td style={{textAlign: 'right', color: '#a0aabf'}}>
                                                                {percentage.toFixed(1)}%
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Transactions Tab */}
                        {activeTab === 'transactions' && (
                            <div className="navy-card" style={{padding: '1.5rem'}}>
                                <div style={{
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center',
                                    marginBottom: '1rem'
                                }}>
                                    <h2 style={{
                                        fontSize: '1.25rem',
                                        fontWeight: '600',
                                        color: '#e6e9f0'
                                    }}>
                                        <i className="fas fa-list" style={{color: '#60a5fa', marginRight: '0.5rem'}}></i>
                                        Transactions ({filteredTransactions.length})
                                    </h2>
                                    <div style={{fontSize: '0.875rem', color: '#a0aabf'}}>
                                        Showing: {filter === 'all' ? 'All' : filter} • {timeRange === 'all' ? 'All time' : `This ${timeRange}`}
                                    </div>
                                </div>

                                {filteredTransactions.length === 0 ? (
                                    <div style={{textAlign: 'center', padding: '2rem 0', color: '#a0aabf'}}>
                                        <i className="fas fa-receipt" style={{fontSize: '2.5rem', marginBottom: '1rem', color: 'rgba(160, 170, 191, 0.3)'}}></i>
                                        <p>No transactions found. Add your first transaction above!</p>
                                    </div>
                                ) : (
                                    <div style={{maxHeight: '24rem', overflowY: 'auto'}} className="space-y-3">
                                        {filteredTransactions.map(transaction => (
                                            <div key={transaction.id} 
                                                 style={{
                                                     border: '1px solid rgba(212, 175, 55, 0.15)',
                                                     borderRadius: '8px',
                                                     padding: '1rem',
                                                     transition: 'all 0.3s',
                                                     background: 'rgba(20, 29, 59, 0.4)'
                                                 }}
                                                 className="fade-in"
                                                 onMouseEnter={(e) => {
                                                     e.currentTarget.style.borderColor = 'rgba(212, 175, 55, 0.4)';
                                                     e.currentTarget.style.background = 'rgba(20, 29, 59, 0.6)';
                                                 }}
                                                 onMouseLeave={(e) => {
                                                     e.currentTarget.style.borderColor = 'rgba(212, 175, 55, 0.15)';
                                                     e.currentTarget.style.background = 'rgba(20, 29, 59, 0.4)';
                                                 }}
                                            >
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                                                    <div style={{flex: '1'}}>
                                                        <div style={{display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '0.25rem'}}>
                                                            <span style={{
                                                                display: 'inline-block',
                                                                width: '0.75rem',
                                                                height: '0.75rem',
                                                                borderRadius: '50%',
                                                                background: transaction.type === 'revenue' ? '#34d399' : '#f87171'
                                                            }}></span>
                                                            <span style={{fontWeight: '600', color: '#e6e9f0'}}>
                                                                {transaction.description}
                                                            </span>
                                                            <span style={{
                                                                fontSize: '0.75rem',
                                                                color: '#a0aabf',
                                                                background: 'rgba(20, 29, 59, 0.6)',
                                                                padding: '0.25rem 0.5rem',
                                                                borderRadius: '4px'
                                                            }}>
                                                                {transaction.category}
                                                            </span>
                                                        </div>
                                                        <div style={{fontSize: '0.875rem', color: '#a0aabf', marginLeft: '1.5rem'}}>
                                                            {new Date(transaction.date).toLocaleDateString()} • 
                                                            {transaction.type === 'revenue' ? ' Revenue' : ' Expense'}
                                                        </div>
                                                    </div>
                                                    <div style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                                        <span style={{
                                                            fontWeight: 'bold',
                                                            color: transaction.type === 'revenue' ? '#34d399' : '#f87171'
                                                        }}>
                                                            {transaction.type === 'revenue' ? '+' : '-'}{formatCurrency(transaction.amount)}
                                                        </span>
                                                        <div style={{display: 'flex', gap: '0.25rem'}}>
                                                            <button
                                                                onClick={() => startEditing(transaction)}
                                                                style={{
                                                                    padding: '0.25rem',
                                                                    color: '#60a5fa',
                                                                    background: 'transparent',
                                                                    border: 'none',
                                                                    borderRadius: '4px',
                                                                    cursor: 'pointer',
                                                                    transition: 'all 0.2s'
                                                                }}
                                                                title="Edit transaction"
                                                                onMouseEnter={(e) => e.target.style.background = 'rgba(96, 165, 250, 0.1)'}
                                                                onMouseLeave={(e) => e.target.style.background = 'transparent'}
                                                            >
                                                                <i className="fas fa-edit"></i>
                                                            </button>
                                                            <button
                                                                onClick={() => deleteTransaction(transaction.id)}
                                                                style={{
                                                                    padding: '0.25rem',
                                                                    color: '#f87171',
                                                                    background: 'transparent',
                                                                    border: 'none',
                                                                    borderRadius: '4px',
                                                                    cursor: 'pointer',
                                                                    transition: 'all 0.2s'
                                                                }}
                                                                title="Delete transaction"
                                                                onMouseEnter={(e) => e.target.style.background = 'rgba(248, 113, 113, 0.1)'}
                                                                onMouseLeave={(e) => e.target.style.background = 'transparent'}
                                                            >
                                                                <i className="fas fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Footer */}
                        <div className="text-center mt-8">
                            <p style={{color: '#a0aabf', fontSize: '0.875rem'}}>
                                Data is securely stored in Firebase ✅
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // Use React 18 createRoot
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AccountingApp />);
    </script>
</body>
</html>
