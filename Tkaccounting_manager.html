<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Accounting Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <style>
        /* =====================================================
           SHARED DESIGN SYSTEM
        ===================================================== */
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --success: #06d6a0;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background-color: var(--background-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1, h2, h3, h4 {
            color: var(--primary);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        /* =====================================================
           HERO
        ===================================================== */
        .hero {
            background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 90px 0 80px;
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .hero-bg-shapes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        .hero-shape {
            position: absolute; border-radius: 50%; opacity: 0.07;
        }
        .hero-shape-1 {
            width: 480px; height: 480px; background: white;
            top: -15%; right: -8%;
            animation: floatShape 12s ease-in-out infinite;
        }
        .hero-shape-2 {
            width: 320px; height: 320px; background: var(--secondary);
            bottom: -18%; left: -6%;
            animation: floatShape 15s ease-in-out infinite reverse;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(28px, -22px) scale(1.07); }
            66% { transform: translate(-18px, 18px) scale(0.95); }
        }

        .hero-grid {
            position: absolute; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .hero-content {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; gap: 28px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .hero-icon {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white;
            backdrop-filter: blur(8px);
            margin: 0 auto 4px;
        }

        .hero-title {
            color: var(--text-light);
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            margin-bottom: 6px;
        }

        .hero-title span {
            background: linear-gradient(135deg, #ffd700, #ffed80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle { opacity: 0.75; font-size: 1.1rem; font-weight: 500; }

        .hero-auth-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(6, 214, 160, 0.15);
            border: 1px solid rgba(6, 214, 160, 0.35);
            color: #06d6a0;
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 0.85rem; font-weight: 600;
        }

        .hero-nav {
            display: flex; gap: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px; padding: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .hero-nav-link {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 18px; color: rgba(255,255,255,0.8);
            border-radius: 50px; transition: var(--transition);
            font-weight: 600; font-size: 0.88rem; cursor: pointer;
            background: transparent; border: none; font-family: 'Inter', sans-serif;
        }

        .hero-nav-link:hover,
        .hero-nav-link.active { background: rgba(255,255,255,0.18); color: white; }

        .hero-user {
            display: flex; align-items: center; gap: 12px; justify-content: center;
        }

        .user-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: white;
        }

        .logout-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 16px; border-radius: 50px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            display: flex; align-items: center; gap: 7px;
            transition: var(--transition); font-family: 'Inter', sans-serif;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.22); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* =====================================================
           HAMBURGER MENU  ← NEW
        ===================================================== */
        .hamburger-btn {
            display: none;                          /* hidden on desktop */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.25s ease;
            padding: 0;
        }
        .hamburger-btn:hover { background: rgba(255,255,255,0.22); }

        .hamburger-line {
            display: block;
            width: 22px; height: 2.5px;
            background: white;
            border-radius: 3px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Animate ≡ → × */
        .hamburger-btn.open .hamburger-line:nth-child(1) {
            transform: translateY(7.5px) rotate(45deg);
        }
        .hamburger-btn.open .hamburger-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger-btn.open .hamburger-line:nth-child(3) {
            transform: translateY(-7.5px) rotate(-45deg);
        }

        /* =====================================================
           MAIN
        ===================================================== */
        .main-content { padding: 48px 0 64px; }

        /* =====================================================
           KPI CARDS
        ===================================================== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px; margin-bottom: 36px;
        }

        .kpi-card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 26px 22px; text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.6s ease-out both;
        }

        .kpi-card:nth-child(1) { animation-delay: 0.05s; }
        .kpi-card:nth-child(2) { animation-delay: 0.1s; }
        .kpi-card:nth-child(3) { animation-delay: 0.15s; }
        .kpi-card:nth-child(4) { animation-delay: 0.2s; }

        .kpi-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
            transform: translateY(-6px);
        }

        .kpi-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 1.25rem; color: white;
        }

        .kpi-icon.green  { background: linear-gradient(135deg, #06d6a0, #05b387); }
        .kpi-icon.blue   { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .kpi-icon.purple { background: linear-gradient(135deg, #8338ec, #7229d9); }
        .kpi-icon.orange { background: linear-gradient(135deg, #ffd166, #ffc043); }
        .kpi-icon.red    { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .kpi-number { font-size: 1.7rem; font-weight: 900; margin-bottom: 3px; }
        .kpi-number.green  { color: #06d6a0; }
        .kpi-number.blue   { color: var(--primary); }
        .kpi-number.purple { color: #8338ec; }
        .kpi-number.orange { color: #f59e0b; }
        .kpi-number.red    { color: #ef4444; }

        .kpi-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }

        /* =====================================================
           TABS
        ===================================================== */
        .tabs-nav {
            display: flex; justify-content: center;
            gap: 8px; margin-bottom: 36px; flex-wrap: wrap;
        }

        .tab-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 11px 22px; font-size: 0.93rem; font-weight: 600;
            border-radius: 50px; border: 2px solid transparent;
            background: var(--background); color: var(--text-muted);
            cursor: pointer; transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .tab-btn:hover { color: var(--primary); border-color: var(--primary-light); transform: translateY(-2px); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 16px rgba(11,61,145,0.3); border-color: transparent; }

        /* =====================================================
           CARDS
        ===================================================== */
        .card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 30px; transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
        }
        .card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-lg); }

        .card-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
        }

        .card-header-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white; flex-shrink: 0;
        }
        .card-header-icon.green  { background: linear-gradient(135deg, #06d6a0, #05b387); }
        .card-header-icon.blue   { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .card-header-icon.purple { background: linear-gradient(135deg, #8338ec, #7229d9); }
        .card-header-icon.gold   { background: linear-gradient(135deg, #ffd700, #f59e0b); }
        .card-header-icon.red    { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .card-header h3 { font-size: 1.1rem; font-weight: 800; margin: 0; }

        /* =====================================================
           GRID LAYOUTS
        ===================================================== */
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }

        /* =====================================================
           FORM
        ===================================================== */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: flex; align-items: center; gap: 7px;
            font-size: 0.85rem; font-weight: 600;
            color: var(--text-dark); margin-bottom: 5px;
        }
        .form-label i { color: var(--primary); font-size: 0.78rem; }

        .form-input, .form-select {
            width: 100%; padding: 10px 14px;
            font-size: 0.93rem; font-family: 'Inter', sans-serif;
            border: 2px solid #e2e8f0; border-radius: var(--border-radius-sm);
            background: var(--background); color: var(--text-dark);
            transition: var(--transition);
        }
        .form-input:focus, .form-select:focus {
            outline: none; border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.09);
        }
        .form-input::placeholder { color: var(--text-muted); }

        /* =====================================================
           BUTTONS
        ===================================================== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 26px; font-size: 0.93rem; font-weight: 700;
            border-radius: 50px; transition: var(--transition);
            cursor: pointer; border: none; outline: none;
            gap: 8px; letter-spacing: -0.01em;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--primary); color: white;
            box-shadow: 0 4px 16px rgba(11,61,145,0.28);
        }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 7px 24px rgba(11,61,145,0.38); }

        .btn-secondary {
            background: transparent; color: var(--primary);
            border: 2.5px solid var(--primary);
        }
        .btn-secondary:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        .btn-success {
            background: linear-gradient(135deg, #06d6a0, #05b387); color: white;
            box-shadow: 0 4px 16px rgba(6,214,160,0.28);
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(6,214,160,0.4); }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626); color: white;
        }
        .btn-danger:hover { transform: translateY(-2px); }

        .btn-premium {
            background: linear-gradient(135deg, #c9a84c, #ffd700, #c9a84c);
            color: var(--text-dark); font-weight: 800;
            box-shadow: var(--shadow-glow);
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .btn-premium:hover { transform: translateY(-2px) scale(1.02); }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 22px rgba(255,215,0,0.28); }
            50%       { box-shadow: 0 0 40px rgba(255,215,0,0.52); }
        }

        .btn-full { width: 100%; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        .btn-sm {
            padding: 6px 14px; font-size: 0.8rem;
            border-radius: var(--border-radius-sm);
        }

        .btn-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--background-alt); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-icon.edit  { color: var(--primary-light); }
        .btn-icon.edit:hover  { background: var(--primary); color: white; }
        .btn-icon.trash { color: #ef4444; }
        .btn-icon.trash:hover { background: #ef4444; color: white; }

        /* =====================================================
           TRANSACTIONS
        ===================================================== */
        .transaction-list { max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .transaction-list::-webkit-scrollbar { width: 5px; }
        .transaction-list::-webkit-scrollbar-track { background: var(--background-light); border-radius: 10px; }
        .transaction-list::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }

        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; border-radius: var(--border-radius-sm);
            margin-bottom: 10px; background: var(--background-light);
            border: 1px solid transparent; transition: var(--transition);
        }
        .transaction-item:hover {
            border-color: var(--primary-light);
            background: var(--background-alt);
            transform: translateX(4px);
        }

        .transaction-info { flex: 1; }
        .transaction-info strong {
            display: block; font-size: 0.93rem; font-weight: 700;
            color: var(--text-dark); margin-bottom: 3px;
        }
        .transaction-meta {
            display: flex; gap: 10px; flex-wrap: wrap;
            font-size: 0.78rem; color: var(--text-muted); align-items: center;
        }

        .transaction-amount { font-weight: 800; font-size: 1rem; }
        .transaction-amount.revenue { color: #06d6a0; }
        .transaction-amount.expense { color: #ef4444; }

        .category-tag {
            display: inline-block; padding: 2px 9px;
            background: var(--primary); color: white;
            border-radius: 50px; font-size: 0.73rem; font-weight: 600;
        }

        .type-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
            display: inline-block;
        }
        .type-dot.revenue { background: #06d6a0; }
        .type-dot.expense { background: #ef4444; }

        /* =====================================================
           TABLE
        ===================================================== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left; padding: 12px 14px;
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); border-bottom: 2px solid var(--background-alt);
        }
        .data-table td {
            padding: 12px 14px; font-size: 0.88rem;
            border-bottom: 1px solid var(--background-alt); color: var(--text-dark);
        }
        .data-table tr:hover td { background: var(--background-light); }

        /* =====================================================
           CHARTS
        ===================================================== */
        .chart-wrapper { position: relative; height: 260px; margin: 8px 0; }

        /* =====================================================
           FILTER PILLS
        ===================================================== */
        .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-pill {
            padding: 5px 14px; border-radius: 50px;
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            border: 1.5px solid #e2e8f0; background: var(--background);
            color: var(--text-muted); font-family: 'Inter', sans-serif;
            text-transform: capitalize;
        }
        .filter-pill:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-pill.active {
            background: var(--primary); color: white;
            border-color: var(--primary);
        }

        /* =====================================================
           SECTION BADGE
        ===================================================== */
        .section-badge {
            display: inline-block; background: var(--background-alt);
            color: var(--primary); font-weight: 700; font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 10px;
        }

        /* =====================================================
           PROGRESS RING
        ===================================================== */
        .progress-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .progress-ring-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; }

        /* =====================================================
           EMPTY STATE
        ===================================================== */
        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--text-muted);
        }
        .empty-state i { font-size: 2.5rem; color: #cbd5e1; display: block; margin-bottom: 14px; }
        .empty-state h3 { font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
        .empty-state p { font-size: 0.85rem; }

        /* =====================================================
           LOADING
        ===================================================== */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--background-light);
            z-index: 999; display: flex;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .loading-spinner {
            width: 46px; height: 46px;
            border: 3px solid var(--background-alt);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

        /* =====================================================
           AUTH WALL
        ===================================================== */
        .auth-wall {
            min-height: 100vh; background: var(--background-light);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--background); border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg); padding: 48px 40px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .auth-icon {
            width: 64px; height: 64px; border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white; margin: 0 auto 20px;
        }

        /* =====================================================
           RESPONSIVE
        ===================================================== */
        @media (max-width: 900px) {
            .grid-2 { grid-template-columns: 1fr; }

            /* Show hamburger button on mobile */
            .hamburger-btn { display: flex; }

            /* Nav hidden by default on mobile; revealed via .open class */
            .hero-nav {
                display: none;
                flex-direction: column;
                gap: 4px;
                border-radius: 16px;
                padding: 10px;
                width: 100%;
                max-width: 360px;
                margin: 0 auto;
                /* keep the same glass-morphism style */
                background: rgba(255,255,255,0.1);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.15);
            }
            .hero-nav.open { display: flex; }

            .hero-nav-link { justify-content: center; }
        }
        @media (max-width: 640px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .hero { padding: 60px 0 50px; }
        }
        @media (max-width: 420px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="super-header-container"></div>
    <div id="root"></div>
    <div id="super-footer-container"></div>

    <script>
        async function loadComponent(url, containerId) {
            try {
                const res = await fetch(url);
                if (!res.ok) return;
                const container = document.getElementById(containerId);
                container.innerHTML = await res.text();

                // innerHTML silently skips <script> tags — re-create each one so
                // the browser actually executes them (e.g. the hamburger toggle).
                container.querySelectorAll('script').forEach(function (oldScript) {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(function (attr) {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.textContent = oldScript.textContent;
                    oldScript.replaceWith(newScript);
                });
            } catch (e) { console.warn('Could not load ' + url); }
        }
        loadComponent('super-header.html', 'super-header-container');
        loadComponent('super-footer.html', 'super-footer-container');

        const firebaseConfig = await fetch('https://us-central1-email-notifications-1c77b.cloudfunctions.net/getClientConfig')
    .then(r => r.json());
        
        let firebaseInitialized = false;
        try {
            firebase.initializeApp(firebaseConfig);
            firebaseInitialized = true;
        } catch (e) { console.error('Firebase init failed:', e); }

        function handleLogout() {
            if (firebaseInitialized) {
                firebase.auth().signOut()
                    .then(() => window.location.href = 'etante.html')
                    .catch(() => window.location.href = 'etante.html');
            } else {
                window.location.href = 'etante.html';
            }
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ── helpers ── */
        const fmt = v => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v);

        const REV_CATS  = ['Sales', 'Services', 'Investments', 'Other Income'];
        const EXP_CATS  = ['Supplies', 'Salaries', 'Rent', 'Utilities', 'Marketing', 'Travel', 'Equipment', 'Other Expenses'];

        /* ── progress ring ── */
        function ProgressRing({ value, max, size = 110, sw = 9, color, label }) {
            const r   = (size - sw) / 2;
            const circ = r * 2 * Math.PI;
            const pct  = Math.min(value / max, 1);
            const dash = circ - pct * circ;
            return (
                <div className="progress-ring-wrap">
                    <svg width={size} height={size}>
                        <circle stroke="#eef3fb" strokeWidth={sw} fill="transparent" r={r} cx={size/2} cy={size/2}/>
                        <circle
                            stroke={color} strokeWidth={sw}
                            strokeDasharray={circ} strokeDashoffset={dash}
                            strokeLinecap="round" fill="transparent"
                            r={r} cx={size/2} cy={size/2}
                            style={{ transition: 'stroke-dashoffset .5s ease', transform: 'rotate(-90deg)', transformOrigin: '50% 50%' }}
                        />
                        <text x="50%" y="50%" textAnchor="middle" dy=".3em"
                              fontSize="15" fontWeight="900" fill="#0b3d91"
                              fontFamily="Inter, sans-serif">
                            {Math.round(pct * 100)}%
                        </text>
                    </svg>
                    <span className="progress-ring-label">{label}</span>
                </div>
            );
        }

        /* ══════════════════════════════════════════════════════
           MAIN APP
        ══════════════════════════════════════════════════════ */
        function AccountingApp() {
            /* state */
            const [transactions, setTransactions] = useState([]);
            const [description, setDescription]   = useState('');
            const [amount, setAmount]               = useState('');
            const [type, setType]                   = useState('revenue');
            const [category, setCategory]           = useState('');
            const [date, setDate]                   = useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading]             = useState(true);
            const [saving, setSaving]               = useState(false);
            const [currentUser, setCurrentUser]     = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [authChecked, setAuthChecked]     = useState(false);
            const [filter, setFilter]               = useState('all');
            const [timeRange, setTimeRange]         = useState('all');
            const [editingId, setEditingId]         = useState(null);
            const [editData, setEditData]           = useState({});
            const [activeTab, setActiveTab]         = useState('overview');
            const [menuOpen, setMenuOpen]           = useState(false);   /* ← NEW */

            /* chart refs */
            const financialRef  = useRef(null);
            const categoryRef   = useRef(null);
            const trendRef      = useRef(null);
            const cashFlowRef   = useRef(null);
            const chartsRef     = useRef({ financial: null, category: null, trend: null, cashFlow: null });

            /* ── firebase init ── */
            useEffect(() => {
                if (typeof firebase === 'undefined' || !firebase.apps.length) {
                    setAuthChecked(true); setLoading(false); return;
                }
                setFirebaseReady(true);
                firebase.auth().onAuthStateChanged(async user => {
                    setAuthChecked(true);
                    if (user) {
                        setCurrentUser(user);
                        await loadTransactions(user);
                    } else {
                        setLoading(false);
                        window.location.href = 'etante.html';
                    }
                });
            }, []);

            /* ── data ops ── */
            const loadTransactions = async user => {
                try {
                    setLoading(true);
                    const snap = await firebase.firestore()
                        .collection('transactions_account')
                        .where('userId', '==', user.uid)
                        .orderBy('createdAt', 'desc')
                        .get();
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                } catch (e) { console.error(e); setTransactions([]); }
                finally { setLoading(false); }
            };

            const addTransaction = async e => {
                e.preventDefault();
                if (!description.trim() || !amount || !category) return;
                try {
                    setSaving(true);
                    const data = { description: description.trim(), amount: parseFloat(amount), type, category, date };
                    const ref  = await firebase.firestore().collection('transactions_account').add({
                        ...data, userId: currentUser.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setTransactions(prev => [{ id: ref.id, ...data, userId: currentUser.uid, createdAt: new Date() }, ...prev]);
                    setDescription(''); setAmount(''); setCategory('');
                    setDate(new Date().toISOString().split('T')[0]);
                } catch (e) { alert('Save failed. Try again.'); }
                finally { setSaving(false); }
            };

            const deleteTransaction = async id => {
                if (!confirm('Delete this transaction?')) return;
                try {
                    await firebase.firestore().collection('transactions_account').doc(id).delete();
                    setTransactions(prev => prev.filter(t => t.id !== id));
                } catch (e) { setTransactions(prev => prev.filter(t => t.id !== id)); }
            };

            const saveEdit = async e => {
                e.preventDefault();
                try {
                    setSaving(true);
                    const upd = { ...editData, amount: parseFloat(editData.amount) };
                    await firebase.firestore().collection('transactions_account').doc(editingId).update({
                        ...upd, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setTransactions(prev => prev.map(t => t.id === editingId ? { ...t, ...upd } : t));
                    setEditingId(null); setEditData({});
                } catch (e) { alert('Update failed. Try again.'); }
                finally { setSaving(false); }
            };

            /* ── calculations ── */
            const filtered = () => {
                let list = transactions;
                if (filter !== 'all') list = list.filter(t => t.type === filter);
                const now = new Date();
                if (timeRange === 'month') {
                    const start = new Date(now.getFullYear(), now.getMonth(), 1);
                    list = list.filter(t => new Date(t.date) >= start);
                } else if (timeRange === 'week') {
                    const start = new Date(now); start.setDate(now.getDate() - now.getDay());
                    list = list.filter(t => new Date(t.date) >= start);
                }
                return list;
            };

            const totals = () => {
                const list = filtered();
                const revenue  = list.filter(t => t.type === 'revenue').reduce((s, t) => s + parseFloat(t.amount), 0);
                const expenses = list.filter(t => t.type === 'expense').reduce((s, t) => s + parseFloat(t.amount), 0);
                const profit   = revenue - expenses;
                const margin   = revenue > 0 ? (profit / revenue) * 100 : 0;
                return { revenue, expenses, profit, margin };
            };

            const catBreakdown = () => {
                const bd = {};
                filtered().forEach(t => { bd[t.category] = (bd[t.category] || 0) + t.amount; });
                return bd;
            };

            const monthlyTrend = () => {
                const now = new Date(); const data = {};
                const months = Array.from({ length: 6 }, (_, i) => {
                    const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
                    const k = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    data[k] = { revenue: 0, expenses: 0 }; return k;
                });
                transactions.forEach(t => {
                    const k = new Date(t.date).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    if (data[k]) data[k][t.type === 'revenue' ? 'revenue' : 'expenses'] += t.amount;
                });
                return { labels: months, revenue: months.map(m => data[m].revenue), expenses: months.map(m => data[m].expenses) };
            };

            const cashFlow = () => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), 1);
                const list = transactions.filter(t => new Date(t.date) >= start);
                return {
                    revenue:  list.filter(t => t.type === 'revenue').reduce((s, t) => s + t.amount, 0),
                    expenses: list.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0),
                };
            };

            /* ── charts ── */
            const destroyChart = key => {
                if (chartsRef.current[key]) { chartsRef.current[key].destroy(); chartsRef.current[key] = null; }
            };

            useEffect(() => {
                if (!loading && currentUser && transactions.length >= 0) {
                    const t = setTimeout(() => renderCharts(), 80);
                    return () => clearTimeout(t);
                }
            }, [transactions, filter, timeRange, activeTab, loading]);

            useEffect(() => { return () => Object.keys(chartsRef.current).forEach(destroyChart); }, []);

            const renderCharts = () => {
                if (typeof Chart === 'undefined') return;
                const { revenue, expenses, profit } = totals();

                if (activeTab === 'overview') {
                    /* financial bar */
                    if (financialRef.current) {
                        destroyChart('financial');
                        chartsRef.current.financial = new Chart(financialRef.current.getContext('2d'), {
                            type: 'bar',
                            data: {
                                labels: ['Revenue', 'Expenses', 'Profit'],
                                datasets: [{
                                    data: [revenue, expenses, profit],
                                    backgroundColor: ['rgba(6,214,160,0.8)', 'rgba(239,68,68,0.8)', 'rgba(11,61,145,0.8)'],
                                    borderColor:     ['#06d6a0', '#ef4444', '#0b3d91'],
                                    borderWidth: 2, borderRadius: 10, borderSkipped: false,
                                }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { display: false },
                                    tooltip: { callbacks: { label: c => `${c.label}: ${fmt(c.raw)}` } } },
                                scales: {
                                    y: { beginAtZero: true, ticks: { callback: v => fmt(v), color: '#708090', font: { family: 'Inter' } },
                                         grid: { color: 'rgba(11,61,145,0.06)' } },
                                    x: { ticks: { color: '#708090', font: { family: 'Inter' } }, grid: { display: false } }
                                }
                            }
                        });
                    }
                    /* category doughnut */
                    if (categoryRef.current) {
                        destroyChart('category');
                        const bd = catBreakdown(); const labels = Object.keys(bd); const vals = Object.values(bd);
                        const colors = labels.map((_, i) => `hsla(${(i * 137.5) % 360}, 65%, 58%, 0.85)`);
                        chartsRef.current.category = new Chart(categoryRef.current.getContext('2d'), {
                            type: 'doughnut',
                            data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 3, borderColor: '#fff', hoverOffset: 10 }] },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: {
                                    legend: { position: 'bottom', labels: { padding: 14, color: '#4a5568', font: { family: 'Inter', weight: '600' } } },
                                    tooltip: { callbacks: { label: c => {
                                        const total = vals.reduce((a, b) => a + b, 0);
                                        return `${c.label}: ${fmt(c.raw)} (${((c.raw / total) * 100).toFixed(1)}%)`;
                                    }}}
                                }
                            }
                        });
                    }
                }

                if (activeTab === 'analytics') {
                    /* monthly trend line */
                    if (trendRef.current) {
                        destroyChart('trend');
                        const td = monthlyTrend();
                        chartsRef.current.trend = new Chart(trendRef.current.getContext('2d'), {
                            type: 'line',
                            data: {
                                labels: td.labels,
                                datasets: [
                                    { label: 'Revenue', data: td.revenue, borderColor: '#06d6a0', backgroundColor: 'rgba(6,214,160,0.08)', tension: 0.35, fill: true, borderWidth: 2.5, pointBackgroundColor: '#06d6a0' },
                                    { label: 'Expenses', data: td.expenses, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)', tension: 0.35, fill: true, borderWidth: 2.5, pointBackgroundColor: '#ef4444' }
                                ]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: {
                                    legend: { labels: { color: '#4a5568', font: { family: 'Inter', weight: '600' } } },
                                    tooltip: { callbacks: { label: c => `${c.dataset.label}: ${fmt(c.raw)}` } }
                                },
                                scales: {
                                    y: { beginAtZero: true, ticks: { callback: v => fmt(v), color: '#708090', font: { family: 'Inter' } }, grid: { color: 'rgba(11,61,145,0.06)' } },
                                    x: { ticks: { color: '#708090', font: { family: 'Inter' } }, grid: { display: false } }
                                }
                            }
                        });
                    }
                    /* cash flow pie */
                    if (cashFlowRef.current) {
                        destroyChart('cashFlow');
                        const cf = cashFlow();
                        chartsRef.current.cashFlow = new Chart(cashFlowRef.current.getContext('2d'), {
                            type: 'pie',
                            data: {
                                labels: ['Revenue', 'Expenses'],
                                datasets: [{ data: [cf.revenue, cf.expenses],
                                    backgroundColor: ['rgba(6,214,160,0.8)', 'rgba(239,68,68,0.8)'],
                                    borderColor: ['#06d6a0', '#ef4444'],
                                    borderWidth: 3, hoverOffset: 14 }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: {
                                    legend: { labels: { color: '#4a5568', font: { family: 'Inter', weight: '600' } } },
                                    tooltip: { callbacks: { label: c => `${c.label}: ${fmt(c.raw)}` } }
                                }
                            }
                        });
                    }
                }
            };

            /* ── helper: switch tab and close mobile menu ── */
            const switchTab = tab => {
                setActiveTab(tab);
                setMenuOpen(false);   /* auto-close on mobile after selecting */
            };

            /* ─────────────────────────────────────────────────
               RENDER STATES
            ───────────────────────────────────────────────── */

            if (!authChecked || loading) {
                return (
                    <div className="loading-overlay">
                        <div className="loading-spinner"></div>
                        <p className="loading-text">
                            {!authChecked ? 'Checking authentication…' : 'Loading your data…'}
                        </p>
                    </div>
                );
            }

            if (!currentUser) {
                return (
                    <div className="auth-wall">
                        <div className="auth-card">
                            <div className="auth-icon"><i className="fas fa-lock"></i></div>
                            <h2 style={{fontSize:'1.4rem', marginBottom:'10px'}}>Authentication Required</h2>
                            <p style={{color:'var(--text-muted)', marginBottom:'24px', fontSize:'0.93rem'}}>
                                Please log in to access the accounting manager.
                            </p>
                            <button className="btn btn-primary btn-full"
                                    onClick={() => window.location.href = 'etante.html'}>
                                <i className="fas fa-sign-in-alt"></i> Go to Login
                            </button>
                        </div>
                    </div>
                );
            }

            const { revenue, expenses, profit, margin } = totals();
            const filteredList = filtered();

            /* ─────────────────────────────────────────────────
               MAIN RENDER
            ───────────────────────────────────────────────── */
            return (
                <>
                    {/* ── HERO ── */}
                    <header className="hero">
                        <div className="hero-bg-shapes">
                            <div className="hero-shape hero-shape-1"></div>
                            <div className="hero-shape hero-shape-2"></div>
                            <div className="hero-grid"></div>
                        </div>
                        <div className="container">
                            <div className="hero-content">
                                <div>
                                    <div className="hero-icon">
                                        <i className="fas fa-chart-line"></i>
                                    </div>
                                    <h1 className="hero-title">
                                        Accounting <span>Manager</span>
                                    </h1>
                                    <p className="hero-subtitle">Track revenue, expenses & profits with advanced analytics</p>
                                </div>

                                <div className="hero-auth-badge">
                                    <i className="fas fa-shield-alt"></i>
                                    Authenticated — data saved securely
                                </div>

                                {/* ── HAMBURGER BUTTON (mobile only) ── */}
                                <button
                                    className={`hamburger-btn${menuOpen ? ' open' : ''}`}
                                    onClick={() => setMenuOpen(prev => !prev)}
                                    aria-label="Toggle navigation"
                                    aria-expanded={menuOpen}
                                >
                                    <span className="hamburger-line"></span>
                                    <span className="hamburger-line"></span>
                                    <span className="hamburger-line"></span>
                                </button>

                                {/* ── NAV: gets .open class on mobile when menuOpen is true ── */}
                                <nav className={`hero-nav${menuOpen ? ' open' : ''}`}>
                                    {['overview','analytics','transactions'].map(tab => (
                                        <button key={tab}
                                                className={`hero-nav-link${activeTab === tab ? ' active' : ''}`}
                                                onClick={() => switchTab(tab)}>
                                            <i className={`fas ${tab==='overview'?'fa-home':tab==='analytics'?'fa-chart-bar':'fa-receipt'}`}></i>
                                            {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                        </button>
                                    ))}
                                </nav>

                                <div className="hero-user">
                                    <div className="user-avatar"><i className="fas fa-user"></i></div>
                                    <span style={{color:'rgba(255,255,255,0.75)', fontSize:'0.88rem', fontWeight:'600'}}>
                                        {currentUser.email}
                                    </span>
                                    <button className="logout-btn" onClick={handleLogout}>
                                        <i className="fas fa-sign-out-alt"></i> Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* ── MAIN ── */}
                    <main className="main-content">
                        <div className="container">

                            {/* KPI grid */}
                            <div className="kpi-grid">
                                <div className="kpi-card">
                                    <div className="kpi-icon green"><i className="fas fa-arrow-up"></i></div>
                                    <div className="kpi-number green">{fmt(revenue)}</div>
                                    <div className="kpi-label">Total Revenue</div>
                                </div>
                                <div className="kpi-card">
                                    <div className="kpi-icon red"><i className="fas fa-arrow-down"></i></div>
                                    <div className="kpi-number red">{fmt(expenses)}</div>
                                    <div className="kpi-label">Total Expenses</div>
                                </div>
                                <div className="kpi-card">
                                    <div className="kpi-icon blue"><i className={`fas ${profit >= 0 ? 'fa-smile' : 'fa-frown'}`}></i></div>
                                    <div className={`kpi-number ${profit >= 0 ? 'green' : 'red'}`}>{fmt(profit)}</div>
                                    <div className="kpi-label">Net Profit</div>
                                </div>
                                <div className="kpi-card">
                                    <div className="kpi-icon orange"><i className="fas fa-percentage"></i></div>
                                    <div className="kpi-number orange">{margin.toFixed(1)}%</div>
                                    <div className="kpi-label">Profit Margin</div>
                                </div>
                            </div>

                            {/* ── Tab: Overview ── */}
                            {activeTab === 'overview' && (
                                <div className="grid-2">

                                    {/* Left col: form + filters */}
                                    <div style={{display:'flex', flexDirection:'column', gap:'24px'}}>

                                        {/* Add / Edit form */}
                                        <div className="card">
                                            <div className="card-header">
                                                <div className={`card-header-icon ${editingId ? 'gold' : 'green'}`}>
                                                    <i className={`fas ${editingId ? 'fa-edit' : 'fa-plus-circle'}`}></i>
                                                </div>
                                                <h3>{editingId ? 'Edit Transaction' : 'Add Transaction'}</h3>
                                            </div>

                                            <form onSubmit={editingId ? saveEdit : addTransaction}>
                                                <div className="form-group">
                                                    <label className="form-label"><i className="fas fa-exchange-alt"></i> Type</label>
                                                    <select className="form-select"
                                                            value={editingId ? editData.type : type}
                                                            onChange={e => editingId ? setEditData({...editData, type: e.target.value}) : setType(e.target.value)}
                                                            required>
                                                        <option value="revenue">Revenue</option>
                                                        <option value="expense">Expense</option>
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label"><i className="fas fa-tags"></i> Category</label>
                                                    <select className="form-select"
                                                            value={editingId ? editData.category : category}
                                                            onChange={e => editingId ? setEditData({...editData, category: e.target.value}) : setCategory(e.target.value)}
                                                            required>
                                                        <option value="">Select category…</option>
                                                        {((editingId ? editData.type : type) === 'revenue' ? REV_CATS : EXP_CATS).map(c => (
                                                            <option key={c} value={c}>{c}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label"><i className="far fa-file-alt"></i> Description</label>
                                                    <input type="text" className="form-input"
                                                           placeholder="Transaction description"
                                                           value={editingId ? editData.description : description}
                                                           onChange={e => editingId ? setEditData({...editData, description: e.target.value}) : setDescription(e.target.value)}
                                                           required/>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label"><i className="fas fa-dollar-sign"></i> Amount</label>
                                                    <input type="number" step="0.01" className="form-input"
                                                           placeholder="0.00"
                                                           value={editingId ? editData.amount : amount}
                                                           onChange={e => editingId ? setEditData({...editData, amount: e.target.value}) : setAmount(e.target.value)}
                                                           required/>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label"><i className="far fa-calendar"></i> Date</label>
                                                    <input type="date" className="form-input"
                                                           value={editingId ? editData.date : date}
                                                           onChange={e => editingId ? setEditData({...editData, date: e.target.value}) : setDate(e.target.value)}
                                                           required/>
                                                </div>

                                                {editingId ? (
                                                    <div style={{display:'flex', gap:'10px', marginTop:'4px'}}>
                                                        <button type="submit" disabled={saving}
                                                                className="btn btn-premium"
                                                                style={{flex:1, borderRadius:'50px'}}>
                                                            <i className="fas fa-save"></i> {saving ? 'Saving…' : 'Save Changes'}
                                                        </button>
                                                        <button type="button" className="btn btn-secondary"
                                                                onClick={() => { setEditingId(null); setEditData({}); }}>
                                                            Cancel
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <button type="submit" disabled={saving}
                                                            className="btn btn-success btn-full"
                                                            style={{marginTop:'4px'}}>
                                                        <i className="fas fa-plus"></i>
                                                        {saving ? 'Saving…' : 'Add Transaction'}
                                                    </button>
                                                )}
                                            </form>
                                        </div>

                                        {/* Filters */}
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon blue"><i className="fas fa-filter"></i></div>
                                                <h3>Filters</h3>
                                            </div>
                                            <div style={{marginBottom:'18px'}}>
                                                <div className="form-label" style={{marginBottom:'10px'}}>
                                                    <i className="fas fa-exchange-alt"></i> Transaction Type
                                                </div>
                                                <div className="filter-pills">
                                                    {['all','revenue','expense'].map(f => (
                                                        <button key={f} className={`filter-pill${filter===f?' active':''}`}
                                                                onClick={() => setFilter(f)}>{f}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <div className="form-label" style={{marginBottom:'10px'}}>
                                                    <i className="far fa-calendar-alt"></i> Time Range
                                                </div>
                                                <div className="filter-pills">
                                                    {['all','month','week'].map(t => (
                                                        <button key={t} className={`filter-pill${timeRange===t?' active':''}`}
                                                                onClick={() => setTimeRange(t)}>{t}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Right col: charts */}
                                    <div style={{display:'flex', flexDirection:'column', gap:'24px'}}>
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon blue"><i className="fas fa-chart-bar"></i></div>
                                                <h3>Financial Overview</h3>
                                            </div>
                                            <div className="chart-wrapper">
                                                <canvas ref={financialRef}></canvas>
                                            </div>
                                        </div>
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon gold"><i className="fas fa-chart-pie"></i></div>
                                                <h3>Category Breakdown</h3>
                                            </div>
                                            <div className="chart-wrapper">
                                                <canvas ref={categoryRef}></canvas>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ── Tab: Analytics ── */}
                            {activeTab === 'analytics' && (
                                <div style={{display:'flex', flexDirection:'column', gap:'24px'}}>
                                    <div className="grid-2">
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon blue"><i className="fas fa-chart-line"></i></div>
                                                <h3>Monthly Trends</h3>
                                            </div>
                                            <div className="chart-wrapper"><canvas ref={trendRef}></canvas></div>
                                        </div>
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon green"><i className="fas fa-money-bill-wave"></i></div>
                                                <h3>Monthly Cash Flow</h3>
                                            </div>
                                            <div className="chart-wrapper"><canvas ref={cashFlowRef}></canvas></div>
                                        </div>
                                    </div>

                                    <div className="grid-2">
                                        {/* Health rings */}
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon gold"><i className="fas fa-tachometer-alt"></i></div>
                                                <h3>Financial Health</h3>
                                            </div>
                                            <div style={{display:'flex', justifyContent:'space-around', alignItems:'center', padding:'12px 0'}}>
                                                <ProgressRing value={Math.max(margin,0)} max={50} color="#06d6a0" label="Profit Margin"/>
                                                <ProgressRing value={revenue > 0 ? (expenses / revenue) * 100 : 0} max={100} color="#ef4444" label="Expense Ratio"/>
                                            </div>
                                        </div>

                                        {/* Category table */}
                                        <div className="card">
                                            <div className="card-header">
                                                <div className="card-header-icon purple"><i className="fas fa-table"></i></div>
                                                <h3>Category Details</h3>
                                            </div>
                                            <div style={{overflowX:'auto'}}>
                                                <table className="data-table">
                                                    <thead>
                                                        <tr>
                                                            <th>Category</th>
                                                            <th style={{textAlign:'right'}}>Amount</th>
                                                            <th style={{textAlign:'right'}}>% of Revenue</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {Object.entries(catBreakdown()).map(([cat, total]) => (
                                                            <tr key={cat}>
                                                                <td>{cat}</td>
                                                                <td style={{
                                                                    textAlign:'right', fontWeight:700,
                                                                    color: REV_CATS.includes(cat) ? '#06d6a0' : '#ef4444'
                                                                }}>{fmt(total)}</td>
                                                                <td style={{textAlign:'right', color:'var(--text-muted)'}}>
                                                                    {revenue > 0 ? ((total/revenue)*100).toFixed(1) : '0.0'}%
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {Object.keys(catBreakdown()).length === 0 && (
                                                            <tr><td colSpan="3" style={{textAlign:'center', color:'var(--text-muted)', padding:'24px'}}>No data</td></tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ── Tab: Transactions ── */}
                            {activeTab === 'transactions' && (
                                <div className="card">
                                    <div className="card-header" style={{justifyContent:'space-between', flexWrap:'wrap', gap:'12px'}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                            <div className="card-header-icon blue"><i className="fas fa-list"></i></div>
                                            <h3>Transactions <span style={{color:'var(--text-muted)', fontWeight:600}}>({filteredList.length})</span></h3>
                                        </div>
                                        <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                                            <div className="filter-pills">
                                                {['all','revenue','expense'].map(f => (
                                                    <button key={f} className={`filter-pill${filter===f?' active':''}`}
                                                            onClick={() => setFilter(f)}>{f}</button>
                                                ))}
                                            </div>
                                            <div className="filter-pills">
                                                {['all','month','week'].map(t => (
                                                    <button key={t} className={`filter-pill${timeRange===t?' active':''}`}
                                                            onClick={() => setTimeRange(t)}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {filteredList.length === 0 ? (
                                        <div className="empty-state">
                                            <i className="fas fa-receipt"></i>
                                            <h3>No transactions found</h3>
                                            <p>Add your first transaction in the Overview tab.</p>
                                        </div>
                                    ) : (
                                        <div className="transaction-list">
                                            {filteredList.map(t => (
                                                <div key={t.id} className="transaction-item">
                                                    <div className="transaction-info">
                                                        <strong>
                                                            <span className={`type-dot ${t.type}`} style={{marginRight:'8px'}}></span>
                                                            {t.description}
                                                        </strong>
                                                        <div className="transaction-meta">
                                                            <span><i className="far fa-calendar"></i> {new Date(t.date).toLocaleDateString()}</span>
                                                            <span className="category-tag">{t.category}</span>
                                                            <span style={{color: t.type==='revenue' ? '#06d6a0' : '#ef4444', fontSize:'0.75rem', fontWeight:600}}>
                                                                {t.type}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                                        <span className={`transaction-amount ${t.type}`}>
                                                            {t.type === 'revenue' ? '+' : '-'}{fmt(t.amount)}
                                                        </span>
                                                        <button className="btn-icon edit"
                                                                onClick={() => { setEditingId(t.id); setEditData({...t}); setActiveTab('overview'); }}
                                                                title="Edit">
                                                            <i className="fas fa-edit"></i>
                                                        </button>
                                                        <button className="btn-icon trash"
                                                                onClick={() => deleteTransaction(t.id)}
                                                                title="Delete">
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </main>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<AccountingApp />);
    </script>
</body>
</html>
