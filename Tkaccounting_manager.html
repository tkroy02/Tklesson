<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Accounting Manager</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <style>
        :root {
            /* Navy & Gold Theme */
            --tk-navy-dark: #0a1128;
            --tk-navy-main: #141d3b;
            --tk-navy-light: #1e2a4a;
            --tk-gold-main: #d4af37;
            --tk-gold-light: #f1c40f;
            --tk-gold-glow: rgba(212, 175, 55, 0.4);
            --tk-text-light: #e6e9f0;
            --tk-text-muted: #a0aabf;
            --tk-bg-surface: rgba(20, 29, 59, 0.6);
            --tk-border: rgba(212, 175, 55, 0.3);
            --tk-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Keep existing vars for React components */
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --border-radius: 12px;
            --box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(160deg, var(--tk-navy-dark) 0%, var(--tk-navy-main) 30%, var(--tk-navy-light) 60%, #0f1a30 100%);
            color: var(--tk-text-light);
            line-height: 1.6;
        }

        /* ===== DROPDOWN/THEME FIXES ===== */

        /* Force dark color scheme for native selects */
        select,
        .form-select,
        .form-input[type="date"] {
            color-scheme: dark;
        }

        /* Style the select element itself */
        .form-select,
        select {
            background: rgba(20, 29, 59, 0.95) !important;
            color: var(--tk-text-light) !important;
            border: 1px solid var(--tk-border) !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23d4af37' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") !important;
            background-position: right 0.5rem center !important;
            background-repeat: no-repeat !important;
            background-size: 1.5em 1.5em !important;
            padding-right: 2.5rem !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
        }

        /* Hover/focus states for selects */
        .form-select:hover,
        select:hover {
            border-color: var(--tk-gold-light) !important;
        }

        .form-select:focus,
        select:focus {
            border-color: var(--tk-gold-main) !important;
            box-shadow: 0 0 0 3px var(--tk-gold-glow) !important;
            background-color: rgba(30, 42, 74, 0.95) !important;
        }

        /* Style dropdown options (works in Firefox, limited in Chrome/Safari) */
        .form-select option,
        select option {
            background: var(--tk-navy-main) !important;
            color: var(--tk-text-light) !important;
            padding: 8px 12px !important;
        }

        .form-select option:hover,
        select option:hover,
        .form-select option:checked,
        select option:checked {
            background: var(--tk-gold-main) !important;
            color: var(--tk-navy-dark) !important;
        }

        /* Fix for date input */
        input[type="date"] {
            color-scheme: dark;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(0.2) saturate(2) hue-rotate(10deg) brightness(1.1);
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            filter: invert(1) sepia(0.3) saturate(3) hue-rotate(10deg) brightness(1.2);
        }

        /* Ensure placeholder text has proper contrast */
        .form-input::placeholder,
        .form-select option[value=""] {
            color: var(--tk-text-muted) !important;
            opacity: 0.8;
        }

        /* Fix for disabled state */
        .form-select:disabled,
        select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(20, 29, 59, 0.7) !important;
        }

        /* Containers for dynamic header/footer */
        #super-header-container, #super-footer-container { width: 100%; z-index: 50; }

        /* Background decorations */
        .bg-orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(90px); opacity: 0.10;
        }
        .bg-orb:nth-child(1) { width:500px; height:500px; background: var(--tk-navy-light); top:-140px; left:-100px; animation: drift 22s infinite ease-in-out; }
        .bg-orb:nth-child(2) { width:380px; height:380px; background: var(--tk-gold-main); bottom:-100px; right:-90px; animation: drift 26s infinite ease-in-out reverse; }
        .bg-orb:nth-child(3) { width:280px; height:280px; background: var(--tk-gold-glow); top:50%; left:60%; animation: drift 30s infinite ease-in-out; opacity:0.06; }
        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,-30px) scale(1.06); }
            66% { transform: translate(-25px,20px) scale(0.95); }
        }
        .grid-pattern {
            position: fixed; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: radial-gradient(ellipse at center, black 22%, transparent 72%);
        }

        /* Main content area */
        .hub-container {
            position: relative; z-index: 10; flex: 1;
            max-width: 1400px; margin: 0 auto; padding: 24px 20px 40px;
            width: 100%;
        }

        /* Glass card styling for React components */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .glass-card:hover {
            border-color: var(--tk-border);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
            transition: var(--tk-transition);
        }

        /* Form elements */
        .form-input, .form-select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--tk-text-light);
            border-radius: 8px;
            padding: 10px 14px;
            transition: var(--tk-transition);
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--tk-gold-main);
            box-shadow: 0 0 0 3px var(--tk-gold-glow);
            background: rgba(255, 255, 255, 0.1);
        }
        .form-input::placeholder { color: var(--tk-text-muted); }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--tk-gold-main), var(--tk-gold-light));
            color: var(--tk-navy-dark);
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--tk-transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--tk-gold-glow);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--tk-text-light);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--tk-transition);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--tk-gold-main);
        }

        /* Stats cards */
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            transition: var(--tk-transition);
        }
        .stat-card:hover {
            border-color: var(--tk-gold-main);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        }
        .stat-value { font-size: 1.75rem; font-weight: 700; margin: 8px 0; }
        .stat-label { color: var(--tk-text-muted); font-size: 0.85rem; }
        .stat-value.revenue { color: #34d399; }
        .stat-value.expense { color: #f87171; }
        .stat-value.profit { color: #60a5fa; }
        .stat-value.margin { color: var(--tk-gold-light); }

        /* Tabs */
        .tab-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: var(--tk-transition);
            background: transparent;
            border: none;
            color: var(--tk-text-muted);
            cursor: pointer;
        }
        .tab-btn:hover { color: var(--tk-gold-light); }
        .tab-btn.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--tk-gold-light);
            border: 1px solid var(--tk-border);
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            color: var(--tk-text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--tk-text-light);
        }
        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Charts */
        .chart-container {
            position: relative;
            height: 280px;
            width: 100%;
        }

        /* Loading */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(10, 17, 40, 0.95);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(8px);
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tk-gold-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--tk-text-muted); font-size: 0.9rem; }

        /* Animations */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NAVY THEME OVERRIDES FOR REACT COMPONENTS */
        .navy-card {
            background: rgba(20, 29, 59, 0.8) !important;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .navy-card:hover {
            border-color: rgba(212, 175, 55, 0.4) !important;
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        .navy-input {
            background: rgba(20, 29, 59, 0.6) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: #e6e9f0 !important;
        }

        .navy-input:focus {
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2) !important;
        }

        .navy-button-primary {
            background: linear-gradient(135deg, #d4af37, #f1c40f) !important;
            color: #0a1128 !important;
            font-weight: 700;
            border: none !important;
        }

        .navy-button-primary:hover {
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4) !important;
            transform: translateY(-2px);
        }

        .navy-tab-active {
            background: rgba(212, 175, 55, 0.15) !important;
            color: #f1c40f !important;
            border: 1px solid rgba(212, 175, 55, 0.3) !important;
        }

        .navy-text-primary {
            color: #f1c40f !important;
        }

        .navy-text-secondary {
            color: #a0aabf !important;
        }

        .navy-border {
            border-color: rgba(212, 175, 55, 0.2) !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hub-container { padding: 16px 12px 30px; }
            .stat-card { padding: 16px 12px; }
            .stat-value { font-size: 1.4rem; }
            .chart-container { height: 240px; }
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function AccountingApp() {
            // State for transactions
            const [transactions, setTransactions] = useState([]);
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('revenue');
            const [category, setCategory] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [authChecked, setAuthChecked] = useState(false);
            const [chartsRendering, setChartsRendering] = useState(false);
            
            // State for filtering and views
            const [filter, setFilter] = useState('all');
            const [timeRange, setTimeRange] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({});
            const [activeTab, setActiveTab] = useState('overview');

            // Chart references
            const financialChartRef = useRef(null);
            const categoryChartRef = useRef(null);
            const trendChartRef = useRef(null);
            const cashFlowChartRef = useRef(null);

            // Chart instances
            const [chartInstances, setChartInstances] = useState({
                financialChart: null,
                categoryChart: null,
                trendChart: null,
                cashFlowChart: null
            });

            // Categories
            const revenueCategories = ['Sales', 'Services', 'Investments', 'Other Income'];
            const expenseCategories = ['Supplies', 'Salaries', 'Rent', 'Utilities', 'Marketing', 'Travel', 'Equipment', 'Other Expenses'];

            // Initialize Firebase and check auth status
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                            setFirebaseReady(true);
                            console.log('✅ Firebase is ready');
                            
                            // Set up auth state listener
                            firebase.auth().onAuthStateChanged(async (user) => {
                                console.log('🔐 Auth state changed:', user ? user.email : 'No user');
                                setAuthChecked(true);
                                
                                if (user) {
                                    // User is logged in via your login system
                                    setCurrentUser(user);
                                    await loadTransactionsFromFirebase(user);
                                    
                                    // Update UI with user info
                                    updateUserInfo(user);
                                } else {
                                    // No user - redirect to login page
                                    console.log('🚫 No authenticated user - redirecting to login');
                                    setLoading(false);
                                    window.location.href = 'login.html';
                                }
                            });
                        } else {
                            console.log('🚫 Firebase not available');
                            setFirebaseReady(false);
                            setAuthChecked(true);
                            setLoading(false);
                        }
                    } catch (error) {
                        console.error('❌ Firebase init error:', error);
                        setFirebaseReady(false);
                        setAuthChecked(true);
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            // Update user info in the header
            const updateUserInfo = (user) => {
                try {
                    const adminNameElement = document.getElementById('admin-name');
                    const adminEmailElement = document.getElementById('admin-email');
                    
                    if (adminNameElement && adminEmailElement) {
                        adminNameElement.textContent = user.displayName || 'User';
                        adminEmailElement.textContent = user.email || 'Logged in';
                    }
                } catch (error) {
                    console.log('Could not update user info in header');
                }
            };

            // Load transactions from Firebase
            const loadTransactionsFromFirebase = async (user) => {
                try {
                    setLoading(true);
                    console.log('📥 Loading transactions for user:', user.uid);
                    
                    const db = firebase.firestore();
                    const snapshot = await db
                        .collection('transactions_account')
                        .where('userId', '==', user.uid)
                        .orderBy('createdAt', 'desc')
                        .get();
                    
                    const transactionsData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    console.log(`✅ Loaded ${transactionsData.length} transactions`);
                    setTransactions(transactionsData);
                } catch (error) {
                    console.error("❌ Error loading transactions:", error);
                    // Start with empty array if there's an error
                    setTransactions([]);
                } finally {
                    setLoading(false);
                }
            };

            // Save transaction to Firebase
            const saveTransactionToFirebase = async (transactionData) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                const transactionWithUser = {
                    ...transactionData,
                    userId: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                console.log('💾 Saving transaction to Firebase:', transactionWithUser);
                
                const docRef = await db.collection('transactions_account').add(transactionWithUser);
                console.log('✅ Transaction saved with ID:', docRef.id);
                
                return docRef.id;
            };

            // Update transaction in Firebase
            const updateTransactionInFirebase = async (transactionId, updateData) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                const updateWithTimestamp = {
                    ...updateData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                console.log('✏️ Updating transaction:', transactionId, updateWithTimestamp);
                
                await db.collection('transactions_account').doc(transactionId).update(updateWithTimestamp);
                console.log('✅ Transaction updated:', transactionId);
            };

            // Delete transaction from Firebase
            const deleteTransactionFromFirebase = async (transactionId) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                console.log('🗑️ Deleting transaction:', transactionId);
                
                await db.collection('transactions_account').doc(transactionId).delete();
                console.log('✅ Transaction deleted:', transactionId);
            };

            // Calculations
            const calculateTotals = () => {
                const filtered = filterTransactions();
                const revenue = filtered
                    .filter(t => t.type === 'revenue')
                    .reduce((sum, t) => sum + parseFloat(t.amount), 0);
                
                const expenses = filtered
                    .filter(t => t.type === 'expense')
                    .reduce((sum, t) => sum + parseFloat(t.amount), 0);
                
                const profit = revenue - expenses;
                const profitMargin = revenue > 0 ? (profit / revenue) * 100 : 0;

                return { revenue, expenses, profit, profitMargin };
            };

            const filterTransactions = () => {
                let filtered = transactions;
                
                if (filter !== 'all') {
                    filtered = filtered.filter(t => t.type === filter);
                }
                
                const now = new Date();
                if (timeRange === 'month') {
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                    filtered = filtered.filter(t => new Date(t.date) >= startOfMonth);
                } else if (timeRange === 'week') {
                    const startOfWeek = new Date(now);
                    startOfWeek.setDate(now.getDate() - now.getDay());
                    filtered = filtered.filter(t => new Date(t.date) >= startOfWeek);
                }
                
                return filtered;
            };

            // Add transaction with Firebase integration
            const addTransaction = async (e) => {
                e.preventDefault();
                if (!description.trim() || !amount || !category) return;

                try {
                    setSaving(true);
                    const newTransaction = {
                        description: description.trim(),
                        amount: parseFloat(amount),
                        type,
                        category,
                        date
                    };

                    let transactionId;

                    // Save to Firebase
                    if (firebaseReady && currentUser) {
                        try {
                            transactionId = await saveTransactionToFirebase(newTransaction);
                            console.log('✅ Successfully saved to Firebase');
                        } catch (firebaseError) {
                            console.error('❌ Firebase save failed:', firebaseError);
                            throw new Error('Failed to save to database');
                        }
                    } else {
                        throw new Error('Not authenticated');
                    }

                    // Update local state
                    const transactionWithId = {
                        id: transactionId,
                        ...newTransaction,
                        userId: currentUser.uid,
                        createdAt: new Date()
                    };

                    setTransactions([transactionWithId, ...transactions]);
                    resetForm();
                    
                } catch (error) {
                    console.error("❌ Error adding transaction:", error);
                    alert('Failed to save transaction. Please try again.');
                } finally {
                    setSaving(false);
                }
            };

            // Delete transaction
            const deleteTransaction = async (id) => {
                if (!confirm('Are you sure you want to delete this transaction?')) return;
                
                try {
                    // Delete from Firebase
                    if (firebaseReady && currentUser) {
                        await deleteTransactionFromFirebase(id);
                    }
                    
                    setTransactions(transactions.filter(t => t.id !== id));
                    console.log('✅ Transaction deleted');
                    
                } catch (error) {
                    console.error("❌ Error deleting transaction:", error);
                    // Still remove from local state even if Firebase fails
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            // Save edit
            const saveEdit = async () => {
                try {
                    setSaving(true);
                    
                    const updatedData = {
                        ...editData,
                        amount: parseFloat(editData.amount)
                    };

                    // Update in Firebase
                    if (firebaseReady && currentUser) {
                        await updateTransactionInFirebase(editingId, updatedData);
                    }
                    
                    // Update local state
                    setTransactions(transactions.map(t => 
                        t.id === editingId ? { ...t, ...updatedData } : t
                    ));
                    
                    cancelEditing();
                    console.log('✅ Transaction updated');
                    
                } catch (error) {
                    console.error("❌ Error updating transaction:", error);
                    alert('Failed to update transaction. Please try again.');
                } finally {
                    setSaving(false);
                }
            };

            // Keep existing helper functions
            const startEditing = (transaction) => {
                setEditingId(transaction.id);
                setEditData({ ...transaction });
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditData({});
            };

            const resetForm = () => {
                setDescription('');
                setAmount('');
                setCategory('');
                setDate(new Date().toISOString().split('T')[0]);
            };

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(value);
            };

            // Chart rendering effects
            useEffect(() => {
                if (transactions.length > 0 && !loading && currentUser) {
                    const timer = setTimeout(() => {
                        if (activeTab === 'overview' || activeTab === 'analytics') {
                            console.log('Rendering charts for tab:', activeTab);
                            renderAllCharts();
                        }
                    }, 100);
                    
                    return () => clearTimeout(timer);
                }
            }, [transactions, filter, timeRange, loading, currentUser, activeTab]);

            useEffect(() => {
                if ((activeTab === 'overview' || activeTab === 'analytics') && transactions.length > 0 && !loading) {
                    console.log('Tab switched to:', activeTab, '- re-rendering charts');
                    const timer = setTimeout(() => {
                        renderAllCharts();
                    }, 50);
                    
                    return () => clearTimeout(timer);

            // Clean up charts on unmount
            useEffect(() => {
                return () => {
                    Object.values(chartInstances).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') {
                            chart.destroy();
                        }
                    });
                };
            }, []);

            const renderAllCharts = () => {
                if (typeof Chart === 'undefined') {
                    console.log('Chart.js not loaded yet');
                    return;
                }

                setChartsRendering(true);
                
                try {
                    if (activeTab === 'overview') {
                        renderFinancialChart();
                        renderCategoryChart();
                    } else if (activeTab === 'analytics') {
                        renderTrendChart();
                        renderCashFlowChart();
                    }

                    console.error('Error rendering charts:', error);
                } finally {
                    setChartsRendering(false);
                }
            };

            const renderFinancialChart = () => {
                if (!financialChartRef.current) {
                    console.log('Financial chart canvas not ready');
                    return;
                }

                const ctx = financialChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.financialChart) {
                    chartInstances.financialChart.destroy();
                }

                            'rgb(59, 130, 246)'

                        borderSkipped: false,

                            legend: {
                                display: false

                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return formatCurrency(value);
                                    },
                                    color: '#a0aabf'
                                },
                                grid: {
                                    color: 'rgba(212, 175, 55, 0.1)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#a0aabf'
                                },
                                grid: {
                                    color: 'rgba(212, 175, 55, 0.1)'
                                }
                            }
                        }

                setChartInstances(prev => ({ ...prev, financialChart: newChart }));
            };

            const renderCategoryChart = () => {
                if (!categoryChartRef.current) {
                    console.log('Category chart canvas not ready');
                    return;
                }

                const ctx = categoryChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.categoryChart) {
                    chartInstances.categoryChart.destroy();
                }

                const breakdown = categoryBreakdown();
                const labels = Object.keys(breakdown);
                const data = Object.values(breakdown);
                
                const backgroundColors = labels.map((_, i) => {
                    const hue = (i * 137.5) % 360;
                    return `hsla(${hue}, 70%, 65%, 0.8)`;
                });
                
                const borderColors = labels.map((_, i) => {
                    const hue = (i * 137.5) % 360;
                    return `hsl(${hue}, 70%, 50%)`;
                });
                
                const newChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: backgroundColors,
                            borderColor: borderColors,
                            borderWidth: 2,
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: {
                                    boxWidth: 12,
                                    padding: 15,
                                    color: '#a0aabf'
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.raw;
                                        const total = data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return `${context.label}: ${formatCurrency(value)} (${percentage}%)`;
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, categoryChart: newChart }));
            };

            const renderTrendChart = () => {
                if (!trendChartRef.current) {
                    console.log('Trend chart canvas not ready');
                    return;
                }

                const ctx = trendChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.trendChart) {
                    chartInstances.trendChart.destroy();
                }

                const trendData = getMonthlyTrendData();
                
                const newChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trendData.labels,
                        datasets: [
                            {
                                label: 'Revenue',
                                data: trendData.revenue,
                                borderColor: 'rgb(16, 185, 129)',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.3,
                                fill: true
                            },
                            {
                                label: 'Expenses',
                                data: trendData.expenses,
                                borderColor: 'rgb(239, 68, 68)',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                tension: 0.3,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            },
                            legend: {
                                labels: {
                                    color: '#a0aabf'
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return formatCurrency(value);
                                    },
                                    color: '#a0aabf'
                                },
                                grid: {
                                    color: 'rgba(212, 175, 55, 0.1)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#a0aabf'
                                },
                                grid: {
                                    color: 'rgba(212, 175, 55, 0.1)'
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, trendChart: newChart }));

            const renderCashFlowChart = () => {
                if (!cashFlowChartRef.current) {
                    console.log('Cash flow chart canvas not ready');
                    return;
                }

                const ctx = cashFlowChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.cashFlowChart) {
                    chartInstances.cashFlowChart.destroy();
                }

                const newChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Revenue', 'Expenses'],
                        datasets: [{
                            data: [cashFlow.revenue, cashFlow.expenses],
                            backgroundColor: [
                                'rgba(16, 185, 129, 0.8)',
                                'rgba(239, 68, 68, 0.8)'
                            ],
                            borderColor: [
                                'rgb(16, 185, 129)',
                                'rgb(239, 68, 68)'
                            ],
                            borderWidth: 2,
                            hoverOffset: 15
                        }]

                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            },
                            legend: {
                                labels: {
                                    color: '#a0aabf'
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, cashFlowChart: newChart }));
            };

            const categoryBreakdown = () => {
                const breakdown = {};
                const filteredTransactions = filterTransactions();
                filteredTransactions.forEach(t => {
                    if (!breakdown[t.category]) breakdown[t.category] = 0;
                    breakdown[t.category] += t.amount;
                });
                return breakdown;
            };

            const getMonthlyTrendData = () => {
                const monthlyData = {};
                const now = new Date();
                const months = [];
                
                for (let i = 5; i >= 0; i--) {
                    const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const monthKey = date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    months.push(monthKey);
                    monthlyData[monthKey] = { revenue: 0, expenses: 0 };
                }
                
                transactions.forEach(t => {
                    const date = new Date(t.date);
                    const monthKey = date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    
                    if (monthlyData[monthKey]) {
                        if (t.type === 'revenue') {
                            monthlyData[monthKey].revenue += t.amount;
                        } else {
                            monthlyData[monthKey].expenses += t.amount;
                        }
                    }
                });
                
                return {
                    labels: months,
                    revenue: months.map(m => monthlyData[m].revenue),
                    expenses: months.map(m => monthlyData[m].expenses)
                };
            };

            const getCashFlowData = () => {
                const cashFlow = { revenue: 0, expenses: 0 };
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                
                transactions
                    .filter(t => new Date(t.date) >= startOfMonth)
                    .forEach(t => {
                        if (t.type === 'revenue') {
                            cashFlow.revenue += t.amount;
                        } else {
                            cashFlow.expenses += t.amount;
                        }
                    });
                
                return cashFlow;
            };

            const ProgressRing = ({ value, max, size = 120, strokeWidth = 10, color }) => {
                const radius = (size - strokeWidth) / 2;
                const circumference = radius * 2 * Math.PI;
                const strokeDashoffset = circumference - (value / max) * circumference;
                
                return (
                    <svg width={size} height={size} className="progress-ring">
                        <circle
                            className="progress-ring-bg"
                            stroke="rgba(212, 175, 55, 0.15)"
                            strokeWidth={strokeWidth}
                            fill="transparent"
                            r={radius}
                            cx={size / 2}
                            cy={size / 2}
                        />
                        <circle
                            className="progress-ring-circle"
                            stroke={color}
                            strokeWidth={strokeWidth}
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            strokeLinecap="round"
                            fill="transparent"
                            r={radius}
                            cx={size / 2}
                            cy={size / 2}
                            style={{
                                transition: 'stroke-dashoffset 0.5s ease',
                                transform: 'rotate(-90deg)',
                                transformOrigin: '50% 50%'
                            }}
                        />
                        <text 
                            x="50%" 
                            y="50%" 
                            textAnchor="middle" 
                            dy=".3em" 
                            fontSize="16" 
                            fontWeight="bold"
                            fill="#f1c40f"
                        >
                            {Math.round((value / max) * 100)}%
                        </text>
                    </svg>
                );
            };

            // Show loading screen while checking auth
            if (!authChecked || loading) {
                return (
                    <div style={{
                        background: 'linear-gradient(160deg, #0a1128 0%, #141d3b 30%, #1e2a4a 60%, #0f1a30 100%)',
                        minHeight: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <div className="text-center">
                            <div className="loading-spinner mb-4"></div>
                            <p style={{color: '#a0aabf'}}>
                                {!authChecked ? 'Checking authentication...' : 'Loading your accounting data...'}
                            </p>
                        </div>
                    </div>
                );
            }

            // Show auth required message if no user
            if (!currentUser) {
                return (
                    <div style={{
                        background: 'linear-gradient(160deg, #0a1128 0%, #141d3b 30%, #1e2a4a 60%, #0f1a30 100%)',
                        minHeight: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <div className="text-center">
                            <div className="navy-card" style={{
                                padding: '2rem',
                                borderRadius: '12px',
                                maxWidth: '28rem',
                                margin: '0 auto'
                            }}>
                                <i className="fas fa-lock" style={{fontSize: '2.5rem', color: '#d4af37', marginBottom: '1rem'}}></i>
                                <h2 style={{fontSize: '1.5rem', fontWeight: 'bold', color: '#e6e9f0', marginBottom: '1rem'}}>
                                    Authentication Required
                                </h2>
                                <p style={{color: '#a0aabf', marginBottom: '1.5rem'}}>
                                    Please log in to access the accounting manager.
                                </p>
                                <button 
                                    onClick={() => window.location.href = 'login.html'}
                                    className="navy-button-primary"
                                    style={{
                                        padding: '0.75rem 1.5rem',
                                        borderRadius: '8px',
                                        fontWeight: '600',
                                        cursor: 'pointer',
                                        transition: 'all 0.3s'
                                    }}
                                >
                                    <i className="fas fa-sign-in-alt mr-2"></i>
                                    Go to Login
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const { revenue, expenses, profit, profitMargin } = calculateTotals();
            const filteredTransactions = filterTransactions();

            // Main app with Navy & Gold theme
            return (
                <div style={{
                    background: 'linear-gradient(160deg, #0a1128 0%, #141d3b 30%, #1e2a4a 60%, #0f1a30 100%)',
                    minHeight: '100vh',
                    padding: '2rem 1rem',
                    position: 'relative'
                }}>
                    {/* Background decorations */}
                    <div className="bg-orb" style={{position: 'fixed'}}></div>
                    <div className="bg-orb" style={{position: 'fixed'}}></div>
                    <div className="bg-orb" style={{position: 'fixed'}}></div>
                    <div className="grid-pattern" style={{position: 'fixed'}}></div>

                    <div style={{maxWidth: '1400px', margin: '0 auto', position: 'relative', zIndex: 10}}>
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 style={{
                                fontSize: '2.5rem',
                                fontWeight: 'bold',
                                color: '#f1c40f',
                                marginBottom: '0.5rem'
                            }}>
                                <i className="fas fa-chart-line" style={{marginRight: '0.75rem'}}></i>
                                Modern Accounting Manager
                            </h1>
                            <p style={{color: '#a0aabf'}}>
                                Track revenue, expenses, and profits with advanced analytics
                            </p>
                            <div className="mt-2">
                                <p style={{color: '#34d399', fontSize: '0.875rem'}}>
                                    ✅ Authenticated - Data saved securely
                                </p>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex justify-center mb-8">
                            <div className="navy-card" style={{
                                borderRadius: '12px',
                                padding: '0.25rem',
                                display: 'flex',
                                background: 'rgba(20, 29, 59, 0.8)'
                            }}>
                                {['overview', 'analytics', 'transactions'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        style={{
                                            padding: '0.75rem 1.5rem',
                                            borderRadius: '8px',
                                            textTransform: 'capitalize',
                                            fontWeight: '500',
                                            transition: 'all 0.3s',
                                            background: activeTab === tab ? 'rgba(212, 175, 55, 0.15)' : 'transparent',
                                            color: activeTab === tab ? '#f1c40f' : '#a0aabf',
                                            border: activeTab === tab ? '1px solid rgba(212, 175, 55, 0.3)' : '1px solid transparent',
                                            cursor: 'pointer',
                                            fontSize: '0.95rem'
                                        }}
                                        onMouseEnter={(e) => {
                                            if (activeTab !== tab) {
                                                e.target.style.color = '#f1c40f';
                                            }
                                        }}
                                        onMouseLeave={(e) => {
                                            if (activeTab !== tab) {
                                                e.target.style.color = '#a0aabf';
                                            }

                                    >
                                        <i className={`fas ${
                                            tab === 'overview' ? 'fa-home' :

                                        {tab}
                                    </button>

                        </div>

                        {/* Stats Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                            <div className="navy-card" style={{padding: '1.5rem', textAlign: 'center'}}>
