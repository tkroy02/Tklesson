<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson Machine • Command Hub</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --navy-deep: #040d1f;
            --navy: #0a1628;
            --navy-mid: #0f1f3a;
            --navy-light: #162d50;
            --blue: #0b3d91;
            --blue-bright: #1a5bc6;
            --blue-glow: #3b82f6;
            --gold: #e8a80c;
            --gold-light: #f5c842;
            --surface: #ffffff;
            --surface-alt: #f6f8fc;
            --border: #e0e6ef;
            --border-light: #eef2f8;
            --text: #141f2e;
            --text-secondary: #44566b;
            --text-muted: #7b8ea8;
            --success: #0d8a4e;
            --warning: #c2780a;
            --danger: #c62828;
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --shadow: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
            --shadow-lg: 0 16px 44px rgba(0,0,0,0.09), 0 4px 14px rgba(0,0,0,0.04);
            --shadow-xl: 0 24px 60px rgba(0,0,0,0.13), 0 8px 22px rgba(0,0,0,0.05);
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: linear-gradient(160deg, #040d1f 0%, #0a1628 30%, #0f1f3a 60%, #0b1a35 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
        }
        
        /* Container for dynamically loaded header/footer */
        #super-header-container, #super-footer-container { width: 100%; }

        .bg-orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(90px); opacity: 0.10;
        }
        .bg-orb:nth-child(1) { width:500px; height:500px; background: var(--blue); top:-140px; left:-100px; animation: drift 22s infinite ease-in-out; }
        .bg-orb:nth-child(2) { width:380px; height:380px; background: var(--gold); bottom:-100px; right:-90px; animation: drift 26s infinite ease-in-out reverse; }
        .bg-orb:nth-child(3) { width:280px; height:280px; background: var(--blue-glow); top:50%; left:60%; animation: drift 30s infinite ease-in-out; opacity:0.06; }
        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,-30px) scale(1.06); }
            66% { transform: translate(-25px,20px) scale(0.95); }
        }
        .grid-pattern {
            position: fixed; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: radial-gradient(ellipse at center, black 22%, transparent 72%);
        }

        .hub-container {
            position: relative; z-index:10; flex: 1;
            max-width: 1150px; margin: 0 auto; padding: 36px 28px 40px;
            width: 100%;
        }

        .hub-header {
            text-align: center; margin-bottom: 40px;
        }
        .hub-logo {
            display: inline-flex; align-items: center; justify-content: center;
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            border-radius: 18px; margin-bottom: 16px;
            box-shadow: 0 12px 32px rgba(11,61,145,0.4);
            position: relative;
        }
        .hub-logo i { font-size: 1.9rem; color: var(--gold); }
        .hub-logo::after {
            content:''; position:absolute; inset:-3px; border-radius:21px;
            background: linear-gradient(135deg, var(--gold), transparent, var(--blue-glow));
            z-index:-1; opacity:0.45;
        }
        .hub-header h1 {
            font-size: 2rem; font-weight:800; color: white;
            letter-spacing: -0.5px;
        }
        .hub-header h1 span {
            background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hub-header p {
            color: rgba(255,255,255,0.5); font-size:0.88rem; margin-top:4px;
        }

        .section-label {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }
        .section-label span {
            font-weight: 700; font-size:0.75rem; text-transform: uppercase;
            letter-spacing: 0.7px; color: rgba(255,255,255,0.4); white-space: nowrap;
        }
        .section-label::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.08); }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 16px; margin-bottom: 36px;
        }
        .portal-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius); padding: 24px 20px;
            text-decoration: none; color: white; transition: all var(--transition);
            cursor: pointer; display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .portal-card:hover {
            transform: translateY(-5px); background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.18); box-shadow: var(--shadow-xl);
        }
        .portal-card .portal-icon {
            width: 46px; height: 46px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .portal-card .portal-label { font-weight: 700; font-size: 0.92rem; line-height: 1.3; }
        .portal-card .portal-sub { font-size: 0.7rem; color: rgba(255,255,255,0.35); font-family: monospace; letter-spacing: 0.3px; }
        .portal-card.premium .portal-icon { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .portal-card.tutoring .portal-icon { background: rgba(232,168,12,0.2); color: var(--gold-light); }
        .portal-card.schools .portal-icon { background: rgba(13,138,78,0.2); color: #34d399; }
        .portal-card.chats .portal-icon { background: rgba(124,58,237,0.2); color: #a78bfa; }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 36px;
        }
        .tool-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm); padding: 18px 16px;
            text-decoration: none; color: rgba(255,255,255,0.75);
            transition: all var(--transition);
            display: flex; align-items: center; gap: 12px;
            font-weight: 500; font-size: 0.85rem;
        }
        .tool-card:hover {
            background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14);
            color: white; transform: translateY(-2px); box-shadow: var(--shadow-md);
        }
        .tool-card i { font-size: 1rem; width: 22px; text-align: center; }
        .tool-card.marketing i { color: #60a5fa; }
        .tool-card.insights i { color: #34d399; }
        .tool-card.tasks i { color: var(--gold-light); }
        .tool-card.accounting i { color: #a78bfa; }
        .tool-card.tax i { color: #f87171; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed; inset:0; background: rgba(4,13,31,0.85); z-index:999;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
            backdrop-filter: blur(8px);
        }
        .loading-spinner {
            width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: rgba(255,255,255,0.5); font-size:0.85rem; }

        @media (max-width: 600px) {
            .hub-container { padding: 24px 14px 30px; }
            .hub-header h1 { font-size:1.5rem; }
            .portal-grid { grid-template-columns: 1fr; }
            .tool-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- Dynamic Header Container -->
    <div id="super-header-container"></div>

    <div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div>
    <div class="grid-pattern"></div>

    <!-- Loading overlay (hidden after auth check) -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Verifying credentials...</div>
    </div>

    <div class="hub-container" id="hub-content" style="display: none;">

        <div class="hub-header">
            <div class="hub-logo"><i class="fas fa-crown"></i></div>
            <h1>Tklesson <span>Machine</span></h1>
            <p>Command & Control Hub • Authorized Personnel Only</p>
        </div>

        <div class="section-label"><span>Oversight Portals</span></div>
        <div class="portal-grid">
            <a href="premium-admin-dashboard.html" class="portal-card premium">
                <div class="portal-icon"><i class="fas fa-crown"></i></div>
                <div class="portal-label">Tklesson Premium Admin</div>
            </a>
            <a href="testing/admin-dashboard.html" class="portal-card tutoring">
                <div class="portal-icon"><i class="fas fa-user-tie"></i></div>
                <div class="portal-label">Tutoring Oversight</div>
            </a>
            <a href="super-admin-school-dashboard.html" class="portal-card schools">
                <div class="portal-icon"><i class="fas fa-school-flag"></i></div>
                <div class="portal-label">Schools Oversight</div>
            </a>
            <a href="testing/admin-chat.html" class="portal-card chats">
                <div class="portal-icon"><i class="fas fa-comments"></i></div>
                <div class="portal-label">Chats Oversight</div>
            </a>
        </div>

        <div class="section-label"><span>Business Operations</span></div>
        <div class="tool-grid">
            <a href="Tkmarketing.html" class="tool-card marketing"><i class="fas fa-bullhorn"></i> TK Marketing</a>
            <a href="Tkinsights.html" class="tool-card insights"><i class="fas fa-chart-line"></i> TK Insights</a>
            <a href="Tktask_manager.html" class="tool-card tasks"><i class="fas fa-tasks"></i> Task Manager</a>
            <a href="Tkaccounting_manager.html" class="tool-card accounting"><i class="fas fa-calculator"></i> Accounting Manager</a>
            <a href="gst-hst-calculator.html" class="tool-card tax"><i class="fas fa-file-invoice-dollar"></i> Tax Compliance</a>
        </div>
    </div>

    <!-- Dynamic Footer Container -->
    <div id="super-footer-container"></div>

    <script>
        // Fetch and inject external header/footer
        async function loadSharedComponents() {
            const headerContainer = document.getElementById('super-header-container');
            const footerContainer = document.getElementById('super-footer-container');
            
            try {
                const [headerRes, footerRes] = await Promise.all([
                    fetch('super-header.html'),
                    fetch('super-footer.html')
                ]);
                
                if (!headerRes.ok || !footerRes.ok) throw new Error('Failed to load components');
                
                const [headerHtml, footerHtml] = await Promise.all([
                    headerRes.text(),
                    footerRes.text()
                ]);
                
                headerContainer.innerHTML = headerHtml;
                footerContainer.innerHTML = footerHtml;
                
                // Execute any inline scripts in loaded content (necessary for Firebase in header)
                [headerContainer, footerContainer].forEach(container => {
                    container.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) newScript.src = oldScript.src;
                        else newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                });

                // ---------- HAMBURGER MENU SETUP ----------
const header = headerContainer.querySelector('header');
const navMenu = header?.querySelector('#navMenu');
const hamburger = header?.querySelector('.hamburger');

if (hamburger && navMenu) {

    // Toggle on button click
    hamburger.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = navMenu.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', String(isOpen));
    });

    // Close when any nav link is clicked
    navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            navMenu.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
        });
    });

    // Close when clicking outside the header
    document.addEventListener('click', (e) => {
        if (!header.contains(e.target)) {
            navMenu.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
        }
    });

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && navMenu.classList.contains('open')) {
            navMenu.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
            hamburger.focus(); // return focus to trigger element
        }
    });
}
            } catch (err) {
                console.error('Error loading header/footer:', err);
                headerContainer.innerHTML = '<header class="tk-header" style="background:#0a1128;color:#fff;padding:12px 20px;text-align:center;font-weight:600">TK Dashboard</header>';
            }
        }

        // Load components first, then initialize Firebase auth
        (function() {
            // Start loading header/footer immediately
            loadSharedComponents();

            // Firebase configuration
            const firebaseConfig = {
                apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
                authDomain: "tkmachines-945b9.firebaseapp.com",
                projectId: "tkmachines-945b9",
                storageBucket: "tkmachines-945b9.firebasestorage.app",
                messagingSenderId: "137087394703",
                appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
                measurementId: "G-Y8GH34Q2FN"
            };

            // Initialize Firebase (only once; header may have already done it)
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const auth = firebase.auth();

            // DOM elements
            const loadingOverlay = document.getElementById('loading-overlay');
            const hubContent = document.getElementById('hub-content');

            // Auth state listener – redirect if not authenticated
            auth.onAuthStateChanged((user) => {
                loadingOverlay.style.display = 'none';
                
                if (user) {
                    hubContent.style.display = 'block';
                    console.log('✅ Firebase Auth active:', user.email);
                } else {
                    console.warn('🔒 No authenticated user — redirecting to login');
                    window.location.href = 'etante.html';
                }
            }, (error) => {
                loadingOverlay.style.display = 'none';
                console.error('Firebase Auth error:', error);
                window.location.href = 'etante.html';
            });

            // Optional: Session timeout (30 min inactivity)
            let inactivityTimer;
            function resetInactivityTimer() {
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    auth.signOut().then(() => {
                        sessionStorage.removeItem('firebaseAuthToken');
                        window.location.href = 'etante.html?timeout=1';
                    });
                }, 30 * 60 * 1000);
            }
            
            ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
                document.addEventListener(event, resetInactivityTimer, { passive: true });
            });
            resetInactivityTimer();
        })();
    </script>
</body>
</html>
