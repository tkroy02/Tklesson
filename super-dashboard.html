<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TK Dashboard - Access All Your TK Tools</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
  <meta name="theme-color" content="#0b3d91">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #0b3d91;
      --primary-light: #1e5bbf;
      --primary-dark: #082b6f;
      --secondary: #ffd700;
      --secondary-light: #ffe066;
      --text-dark: #0b1e3d;
      --text-light: #ffffff;
      --text-gray: #4a5568;
      --text-muted: #708090;
      --background: #ffffff;
      --background-light: #f7f9fc;
      --background-alt: #eef3fb;
      --border-radius: 16px;
      --border-radius-sm: 10px;
      --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
      --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
      --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
      --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
      --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      --success: #06d6a0;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      color: var(--text-gray);
      background-color: var(--background);
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    h1, h2, h3, h4, h5, h6 { color: var(--primary); font-weight: 800; line-height: 1.25; letter-spacing: -0.02em; }
    h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
    h2 { font-size: clamp(1.8rem, 3.5vw, 2.4rem); text-align: center; margin-bottom: 1rem; }
    h3 { font-size: 1.25rem; }

    .section-badge { display: inline-block; background: var(--background-alt); color: var(--primary); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 16px; border-radius: 50px; margin-bottom: 12px; }
    .section-title { text-align: center; margin-bottom: 0.75rem; }
    .section-subtitle { text-align: center; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 3.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

    /* ========== BUTTONS ========== */
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 32px; font-size: 1rem; font-weight: 700; border-radius: 50px; transition: var(--transition); cursor: pointer; border: none; outline: none; gap: 10px; letter-spacing: -0.01em; font-family: 'Inter', sans-serif; }
    .btn-primary { background-color: var(--primary); color: var(--text-light); box-shadow: 0 4px 16px rgba(11,61,145,0.3); }
    .btn-primary:hover { background-color: var(--primary-light); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(11,61,145,0.4); }
    .btn-secondary { background-color: var(--secondary); color: var(--text-dark); box-shadow: 0 4px 16px rgba(255,215,0,0.3); }
    .btn-secondary:hover { background-color: var(--secondary-light); transform: translateY(-3px); }
    .btn-outline { background-color: transparent; color: var(--primary); border: 2.5px solid var(--primary); }
    .btn-outline:hover { background-color: var(--primary); color: var(--text-light); transform: translateY(-3px); }
    .btn-outline-white { background-color: transparent; color: var(--text-light); border: 2px solid rgba(255,255,255,0.5); }
    .btn-outline-white:hover { background-color: rgba(255,255,255,0.15); border-color: white; transform: translateY(-3px); }
    .btn-premium { background: linear-gradient(135deg, #c9a84c, #ffd700, #c9a84c); color: var(--text-dark); font-weight: 800; box-shadow: var(--shadow-glow); animation: glowPulse 2.5s ease-in-out infinite; }
    .btn-premium:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 45px rgba(255,215,0,0.5); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 10px 20px; font-size: 0.88rem; }
    .btn-danger-outline { background: transparent; color: var(--danger); border: 2px solid var(--danger); }
    .btn-danger-outline:hover { background: var(--danger); color: white; transform: translateY(-2px); }

    @keyframes glowPulse { 0%,100% { box-shadow:0 0 25px rgba(255,215,0,0.3); } 50% { box-shadow:0 0 45px rgba(255,215,0,0.55); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    /* ========== SETUP REQUIRED BANNER ========== */
    .sq-banner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 950;
      background: linear-gradient(90deg, #92400e, #b45309);
      color: white; padding: 12px 24px;
      align-items: center; justify-content: space-between; gap: 16px;
      font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .sq-banner.show { display: flex; }
    .sq-banner-btn {
      background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5);
      color: white; padding: 6px 16px; border-radius: 50px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      white-space: nowrap; font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    .sq-banner-btn:hover { background: rgba(255,255,255,0.32); }

    /* ========== HERO ========== */
    .hero { background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%); color: var(--text-light); padding: 100px 0 90px; position: relative; overflow: hidden; isolation: isolate; }
    .hero-bg-shapes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
    .hero-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .hero-shape-1 { width:500px; height:500px; background:white; top:-15%; right:-10%; animation:floatShape 12s ease-in-out infinite; }
    .hero-shape-2 { width:350px; height:350px; background:var(--secondary); bottom:-12%; left:-8%; animation:floatShape 15s ease-in-out infinite reverse; }
    .hero-shape-3 { width:200px; height:200px; background:white; top:40%; left:20%; animation:floatShape 10s ease-in-out infinite 2s; }
    @keyframes floatShape { 0%,100% { transform:translate(0,0) scale(1); } 33% { transform:translate(30px,-25px) scale(1.08); } 66% { transform:translate(-20px,20px) scale(0.94); } }
    .hero-grid { position:absolute; inset:0; z-index:0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px); background-size:60px 60px; opacity:0.5; }
    .hero-content { position:relative; z-index:2; text-align:center; max-width:850px; margin:0 auto; }
    .hero-logo-accent { width:80px; height:80px; border-radius:50%; border:3px solid rgba(255,255,255,0.3); box-shadow:0 8px 32px rgba(0,0,0,0.3); margin:0 auto 28px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#c9a84c,#ffd700); animation:floatLogo 5s ease-in-out infinite; }
    @keyframes floatLogo { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-8px); } }
    .hero-title { color:var(--text-light); margin-bottom:18px; animation:fadeInUp 0.8s ease-out 0.15s both; }
    .hero-title span { background:linear-gradient(135deg,#ffd700,#ffed80); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-description { font-size:1.2rem; margin-bottom:12px; opacity:0.85; animation:fadeInUp 0.8s ease-out 0.3s both; line-height:1.6; }
    .hero-motto { font-style:italic; margin-bottom:36px; color:var(--secondary-light); font-size:1.1rem; font-weight:500; animation:fadeInUp 0.8s ease-out 0.4s both; }
    .hero-buttons { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; animation:fadeInUp 0.8s ease-out 0.55s both; }

    /* ========== TOOLS GRID ========== */
    .tools-section { padding: 90px 0; background: var(--background); }
    .tools-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:28px; margin-top:50px; }
    .tool-card { text-align:center; padding:36px 28px; background:var(--background-light); border-radius:var(--border-radius); transition:var(--transition); border:1px solid transparent; display:flex; flex-direction:column; align-items:center; }
    .tool-card:hover { border-color:var(--primary-light); box-shadow:var(--shadow-lg); transform:translateY(-6px); }
    .tool-icon { width:70px; height:70px; margin:0 auto 20px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:white; transition:var(--transition); }
    .tool-card:hover .tool-icon { transform:scale(1.08); }
    .tool-card h3 { margin-bottom:8px; font-size:1.1rem; }
    .tool-card p { color:var(--text-muted); font-size:0.95rem; margin-bottom:20px; flex-grow:1; }
    .tool-link { display:inline-flex; align-items:center; gap:8px; color:var(--primary); font-weight:600; font-size:0.95rem; transition:var(--transition); }
    .tool-link:hover { gap:12px; color:var(--primary-light); }

    /* ========== STATS ========== */
    .stats-section { padding: 70px 0; background: var(--background-alt); }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:24px; margin-top:40px; }
    .stat-card { background:white; border-radius:var(--border-radius); padding:28px 20px; text-align:center; transition:var(--transition); border:1px solid transparent; }
    .stat-card:hover { border-color:var(--primary-light); box-shadow:var(--shadow); transform:translateY(-4px); }
    .stat-number { font-size:2.2rem; font-weight:900; color:var(--primary); margin-bottom:6px; }
    .stat-label { color:var(--text-muted); font-size:0.9rem; }

    /* ========== QUICK LINKS ========== */
    .quick-links-section { padding: 70px 0; background: var(--background-light); }
    .quick-links-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; margin-top:40px; }
    .quick-link-card { display:flex; align-items:center; gap:16px; padding:22px 24px; background:white; border-radius:var(--border-radius-sm); transition:var(--transition); border:1px solid transparent; }
    .quick-link-card:hover { border-color:var(--primary-light); box-shadow:var(--shadow); transform:translateX(6px); }
    .quick-link-icon { width:48px; height:48px; border-radius:14px; background:var(--background-alt); display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:var(--primary); flex-shrink:0; transition:var(--transition); }
    .quick-link-card:hover .quick-link-icon { background:var(--primary); color:white; }
    .quick-link-info h4 { font-size:0.95rem; margin-bottom:2px; }
    .quick-link-info p { font-size:0.8rem; color:var(--text-muted); }

    /* ========== SECURITY FAB ========== */
    .security-fab { position:fixed; bottom:32px; right:32px; width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.3rem; box-shadow:0 8px 28px rgba(11,61,145,0.45); transition:var(--transition); z-index:900; }
    .security-fab:hover { transform:scale(1.1) translateY(-3px); box-shadow:0 12px 36px rgba(11,61,145,0.55); }
    .security-fab-tooltip { position:fixed; bottom:100px; right:32px; background:var(--text-dark); color:white; font-size:0.78rem; font-weight:600; padding:6px 12px; border-radius:8px; opacity:0; pointer-events:none; transition:opacity 0.25s ease; white-space:nowrap; z-index:900; }
    .security-fab:hover + .security-fab-tooltip { opacity:1; }

    /* ========== MODAL ========== */
    .modal-backdrop { position:fixed; inset:0; background:rgba(11,30,61,0.65); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    .modal-backdrop.open { opacity:1; pointer-events:all; }
    .modal { background:var(--background); border-radius:var(--border-radius); box-shadow:0 24px 64px rgba(11,61,145,0.2); width:100%; max-width:480px; overflow:hidden; transform:translateY(32px) scale(0.97); transition:transform 0.35s cubic-bezier(0.25,0.8,0.25,1.2); max-height:90vh; overflow-y:auto; }
    .modal-backdrop.open .modal { transform:translateY(0) scale(1); }

    .modal-header { background:linear-gradient(160deg,#03152e,#0b3d91); padding:28px 28px 24px; position:relative; }
    .modal-header-icon { width:52px; height:52px; border-radius:16px; background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:white; margin-bottom:14px; }
    .modal-header h2 { color:white; font-size:1.35rem; text-align:left; margin-bottom:4px; letter-spacing:-0.02em; }
    .modal-header p { color:rgba(255,255,255,0.65); font-size:0.85rem; }
    .modal-close { position:absolute; top:20px; right:20px; width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,0.12); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:var(--transition); }
    .modal-close:hover { background:rgba(255,255,255,0.24); }

    .modal-tabs { display:flex; gap:0; border-bottom:2px solid var(--background-alt); padding:0 20px; background:var(--background); overflow-x:auto; }
    .modal-tab { padding:14px 16px; font-size:0.82rem; font-weight:700; color:var(--text-muted); cursor:pointer; border:none; background:transparent; border-bottom:3px solid transparent; margin-bottom:-2px; transition:var(--transition); display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; white-space:nowrap; }
    .modal-tab:hover { color:var(--primary); }
    .modal-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

    .modal-body { padding:28px; }
    .modal-panel { display:none; animation:fadeInUp 0.35s ease-out; }
    .modal-panel.active { display:block; }

    .modal-form-group { margin-bottom:18px; }
    .modal-label { display:flex; align-items:center; gap:7px; font-size:0.85rem; font-weight:600; color:var(--text-dark); margin-bottom:6px; }
    .modal-label i { color:var(--primary); font-size:0.78rem; }
    .modal-input { width:100%; padding:11px 15px; font-size:0.95rem; font-family:'Inter',sans-serif; border:2px solid #e2e8f0; border-radius:var(--border-radius-sm); background:var(--background); color:var(--text-dark); transition:var(--transition); }
    .modal-input:focus { outline:none; border-color:var(--primary-light); box-shadow:0 0 0 4px rgba(11,61,145,0.09); }
    .modal-input::placeholder { color:var(--text-muted); }

    /* Security question inputs — monospace feel */
    .sq-input { font-family:monospace; letter-spacing:0.04em; font-size:0.98rem; }

    .modal-status { padding:12px 16px; border-radius:var(--border-radius-sm); font-size:0.85rem; font-weight:600; display:none; margin-bottom:16px; animation:fadeInUp 0.3s ease-out; }
    .modal-status.show { display:flex; align-items:flex-start; gap:10px; }
    .modal-status.success { background:#d1fae5; color:#065f46; border:1px solid #a7f3d0; }
    .modal-status.error   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .modal-status.info    { background:var(--background-alt); color:var(--primary); border:1px solid #bfdbfe; }
    .modal-status.warning { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }

    .step-indicator { display:flex; align-items:center; gap:0; margin-bottom:24px; position:relative; }
    .step-indicator::before { content:''; position:absolute; top:16px; left:16px; right:16px; height:2px; background:var(--background-alt); z-index:0; }
    .step { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; position:relative; z-index:1; }
    .step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:800; background:var(--background-alt); color:var(--text-muted); border:2px solid var(--background-alt); transition:var(--transition); }
    .step.active .step-dot { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 4px 12px rgba(11,61,145,0.3); }
    .step.done .step-dot   { background:var(--success); color:white; border-color:var(--success); }
    .step-label { font-size:0.72rem; font-weight:600; color:var(--text-muted); text-align:center; }
    .step.active .step-label { color:var(--primary); }
    .step.done .step-label   { color:var(--success); }

    .otp-row { display:flex; gap:10px; justify-content:center; margin:16px 0; }
    .otp-digit { width:48px; height:54px; text-align:center; font-size:1.4rem; font-weight:800; color:var(--primary); border:2px solid #e2e8f0; border-radius:var(--border-radius-sm); background:var(--background); transition:var(--transition); font-family:'Inter',sans-serif; }
    .otp-digit:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px rgba(11,61,145,0.09); }

    .modal-divider { border:none; border-top:1px solid var(--background-alt); margin:20px 0; }

    .security-status-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-radius:var(--border-radius-sm); background:var(--background-light); border:1px solid var(--background-alt); margin-bottom:12px; }
    .security-status-left { display:flex; align-items:center; gap:12px; }
    .security-status-icon { font-size:1.1rem; }
    .security-status-label { font-size:0.88rem; font-weight:700; color:var(--text-dark); }
    .security-status-desc  { font-size:0.78rem; color:var(--text-muted); }
    .status-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:50px; font-size:0.73rem; font-weight:700; }
    .status-pill.enabled  { background:#d1fae5; color:#065f46; }
    .status-pill.disabled { background:#fee2e2; color:#991b1b; }

    /* Q label style */
    .q-label { font-size:0.8rem; font-weight:600; color:var(--text-muted); font-style:italic; margin-bottom:6px; line-height:1.5; display:block; }

    #recaptcha-container { margin:12px 0; min-height:78px; }

    /* ========== RESPONSIVE ========== */
    @media (max-width:768px) {
      .hero { padding:70px 0 60px; }
      .hero-buttons { flex-direction:column; align-items:center; }
      .hero-buttons .btn { width:100%; max-width:320px; }
      .hero-logo-accent { width:60px; height:60px; }
      section { padding:60px 0 !important; }
      .tools-grid { grid-template-columns:1fr; }
      .stats-grid { grid-template-columns:repeat(2,1fr); }
    }
    @media (max-width:480px) {
      .stats-grid { grid-template-columns:1fr; }
      .otp-row { gap:6px; }
      .otp-digit { width:42px; height:48px; font-size:1.2rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header"></div>
<script>
  /* ── Firebase init — fetched from Cloud Function ── */
  let auth, db;

  async function initFirebase() {
    const config = await fetch('https://us-central1-email-notifications-1c77b.cloudfunctions.net/getClientConfig')
      .then(r => r.json());
    if (!firebase.apps.length) firebase.initializeApp(config);
    auth = firebase.auth();
    db   = firebase.firestore();
  }

  await initFirebase();

  /* ── Auth guard + hydrate UI ── */
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'etante.html'; return; }

    document.getElementById('overview-email').textContent = user.email || 'Unknown';
    document.getElementById('pw-email').value = user.email || '';

    try {
      const snap    = await db.collection('user_security').doc(user.uid).get();
      const data    = snap.exists ? snap.data() : {};
      const enrolled = data.totpEnabled === true;
      const sqSet    = !!(data.sqHash1 && data.sqHash2 && data.sqHash3);

      updateTFAStatusUI(enrolled);
      updateSQStatusUI(sqSet);

      if (enrolled) {
        document.getElementById('disable-tfa-btn').style.display = 'block';
        goToTFAStep(3);
      } else {
        initTOTPSecret(user.email);
      }

      if (sqSet) {
        document.getElementById('sq-configured-state').style.display = 'block';
        document.getElementById('sq-setup-form').style.display = 'none';
      }

      // Load dynamic questions from Firestore
      await renderSecurityQuestions();
    } catch (e) {
      console.warn('Could not load security data:', e);
      initTOTPSecret(user.email || 'user');
    }

    if (sessionStorage.getItem('sq_setup_required') === 'true') {
      document.getElementById('sq-setup-banner').classList.add('show');
      sessionStorage.removeItem('sq_setup_required');
    }
  });

  function updateTFAStatusUI(enrolled) {
    const pill = document.getElementById('tfa-status-pill');
    const desc = document.getElementById('tfa-status-desc');
    if (!pill || !desc) return;
    if (enrolled) {
      pill.className = 'status-pill enabled';
      pill.innerHTML = '<i class="fas fa-check"></i> On';
      desc.textContent = 'Authenticator app connected';
    } else {
      pill.className = 'status-pill disabled';
      pill.innerHTML = '<i class="fas fa-times"></i> Off';
      desc.textContent = 'Not configured';
    }
  }

  function updateSQStatusUI(set) {
    const pill = document.getElementById('sq-status-pill');
    const desc = document.getElementById('sq-status-desc');
    if (!pill || !desc) return;
    if (set) {
      pill.className = 'status-pill enabled';
      pill.innerHTML = '<i class="fas fa-check"></i> On';
      desc.textContent = '3 Omegaic questions configured';
    } else {
      pill.className = 'status-pill disabled';
      pill.innerHTML = '<i class="fas fa-times"></i> Off';
      desc.textContent = 'Not configured';
    }
  }

  /* ── Security Questions — fetched from Firestore ── */
  let securityQuestions = null;

  async function loadSecurityQuestions() {
    if (securityQuestions) return securityQuestions;
    try {
      const snap = await db.collection('app_config').doc('security_questions').get();
      if (snap.exists && snap.data().questions) {
        securityQuestions = snap.data().questions;
        return securityQuestions;
      }
      console.warn('No security questions found in Firestore. Using fallback.');
      return getFallbackQuestions();
    } catch (err) {
      console.error('Failed to load security questions:', err);
      return getFallbackQuestions();
    }
  }

  function getFallbackQuestions() {
    return [
      { id: 'sq1', question: 'Security Question 1 — please configure in Firestore', icon: 'fa-shield' },
      { id: 'sq2', question: 'Security Question 2 — please configure in Firestore', icon: 'fa-shield' },
      { id: 'sq3', question: 'Security Question 3 — please configure in Firestore', icon: 'fa-shield' }
    ];
  }

  async function renderSecurityQuestions() {
    const questions = await loadSecurityQuestions();
    const container = document.getElementById('sq-questions-container');
    if (!container) return;
    container.innerHTML = questions.map(q => `
      <div class="modal-form-group">
        <span class="q-label">${q.question}</span>
        <div style="position:relative;display:flex;align-items:center;">
          <input type="password" id="sq-ans-${q.id.replace('sq','')}" class="modal-input sq-input"
                 placeholder="Your answer" autocomplete="off" spellcheck="false"
                 style="padding-right:2.8rem;">
          <i class="fas fa-eye" onclick="toggleSQ('sq-ans-${q.id.replace('sq','')}',this)"
             style="position:absolute;right:14px;cursor:pointer;color:#7a8aa8;font-size:0.95rem;"></i>
        </div>
      </div>
    `).join('');
  }

  /* ════════════════════════════
     MODAL CONTROLS
  ════════════════════════════ */
  function openSecurityModal()  { document.getElementById('securityModal').classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeSecurityModal() { document.getElementById('securityModal').classList.remove('open'); document.body.style.overflow = ''; }
  function handleBackdropClick(e) { if (e.target.id === 'securityModal') closeSecurityModal(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSecurityModal(); });

  function switchModalTab(name) {
    ['overview','password','2fa','sq'].forEach(n => {
      document.getElementById('tab-' + n)?.classList.remove('active');
      document.getElementById('panel-' + n)?.classList.remove('active');
    });
    document.getElementById('tab-'   + name)?.classList.add('active');
    document.getElementById('panel-' + name)?.classList.add('active');
    if (name === '2fa') startCountdown();
    if (name === 'sq')  hideSQStatus();
  }

  /* ════════════════════════════
     PASSWORD RESET
  ════════════════════════════ */
  function showPWStatus(msg, type) {
    const el = document.getElementById('pw-status');
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle' };
    el.className = `modal-status ${type} show`;
    el.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}"></i><span>${msg}</span>`;
  }

  async function sendPasswordReset() {
    const email = document.getElementById('pw-email').value.trim();
    if (!email) { showPWStatus('Please enter your email address.', 'error'); return; }
    const btn = document.getElementById('pw-send-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';
    try {
      await auth.sendPasswordResetEmail(email);
      showPWStatus(`Reset link sent to <strong>${email}</strong>. Check your inbox.`, 'success');
      btn.innerHTML = '<i class="fas fa-check"></i> Email Sent';
      setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Email'; }, 30000);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Email';
      const msgs = { 'auth/user-not-found':'No account found with that email.', 'auth/invalid-email':'Please enter a valid email.', 'auth/too-many-requests':'Too many attempts. Wait a few minutes.' };
      showPWStatus(msgs[err.code] || `Error: ${err.message}`, 'error');
    }
  }

  /* ════════════════════════════
     TOTP ENGINE
  ════════════════════════════ */
  let totpSecret = '';
  const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

  function generateSecret(len = 20) {
    const buf = new Uint8Array(len);
    crypto.getRandomValues(buf);
    return Array.from(buf).map(b => B32[b % 32]).join('');
  }

  function base32Decode(s) {
    let bits = 0, val = 0; const out = [];
    for (const c of s.toUpperCase().replace(/=+$/, '')) {
      const idx = B32.indexOf(c); if (idx < 0) continue;
      val = (val << 5) | idx; bits += 5;
      if (bits >= 8) { out.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
    }
    return new Uint8Array(out);
  }

  async function getTOTP(secret, offset = 0) {
    const T = Math.floor(Date.now() / 1000 / 30) + offset;
    const buf = new ArrayBuffer(8);
    new DataView(buf).setUint32(4, T, false);
    const key  = await crypto.subtle.importKey('raw', base32Decode(secret), { name:'HMAC', hash:'SHA-1' }, false, ['sign']);
    const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', key, buf));
    const off  = hmac[hmac.length - 1] & 0xf;
    const code = ((hmac[off] & 0x7f) << 24 | hmac[off+1] << 16 | hmac[off+2] << 8 | hmac[off+3]) % 1_000_000;
    return code.toString().padStart(6, '0');
  }

  async function verifyTOTP(secret, token) {
    for (const offset of [0, -1, 1]) { if (await getTOTP(secret, offset) === token) return true; }
    return false;
  }

  function initTOTPSecret(email) {
    totpSecret = generateSecret();
    const label  = encodeURIComponent(`TK Dashboard:${email}`);
    const issuer = encodeURIComponent('TK Dashboard');
    const uri    = `otpauth://totp/${label}?secret=${totpSecret}&issuer=${issuer}&algorithm=SHA1&digits=6&period=30`;
    const qrEl   = document.getElementById('totp-qr');
    if (qrEl) { qrEl.innerHTML = ''; try { new QRCode(qrEl, { text: uri, width: 174, height: 174, correctLevel: QRCode.CorrectLevel.M }); } catch (e) { qrEl.textContent = 'QR generation failed.'; } }
    const secretEl = document.getElementById('totp-secret-display');
    if (secretEl) secretEl.textContent = totpSecret.match(/.{1,4}/g).join(' ');
  }

  function copySecret() {
    navigator.clipboard.writeText(totpSecret).then(() => {
      const el = document.getElementById('totp-secret-display');
      const orig = el.textContent;
      el.textContent = '✓ Copied!';
      setTimeout(() => { el.textContent = orig; }, 1500);
    });
  }

  function goToTFAStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById(`tfa-step${i}`).style.display = i === n ? 'block' : 'none';
      const stepEl = document.getElementById(`step-${i}`);
      stepEl.classList.remove('active','done');
      if (i < n)  stepEl.classList.add('done');
      if (i === n) stepEl.classList.add('active');
    });
    if (n === 2) { document.getElementById('otp0').focus(); startCountdown(); }
  }

  function showTFAStatus(msg, type) {
    const el = document.getElementById('tfa-status');
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle', warning:'fa-exclamation-triangle' };
    el.className = `modal-status ${type} show`;
    el.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}"></i><span>${msg}</span>`;
  }
  function hideTFAStatus() { document.getElementById('tfa-status').className = 'modal-status'; }

  let countdownTimer = null;
  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    const ring = document.getElementById('totp-ring');
    const label = document.getElementById('totp-countdown');
    if (!ring || !label) return;
    const circ = 56.5;
    function tick() {
      const rem = 30 - (Math.floor(Date.now() / 1000) % 30);
      if (ring)  { ring.style.strokeDashoffset = circ * (1 - rem / 30); ring.style.stroke = rem <= 5 ? '#ef4444' : 'var(--primary)'; }
      if (label) label.textContent = rem + 's';
    }
    tick(); countdownTimer = setInterval(tick, 1000);
  }

  async function verifyTOTPCode() {
    const code = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`).value).join('').trim();
    if (code.length < 6) { showTFAStatus('Please enter all 6 digits from your app.', 'error'); return; }
    const btn = document.getElementById('tfa-verify-btn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying…';
    try {
      const valid = await verifyTOTP(totpSecret, code);
      if (!valid) throw new Error('Incorrect code — make sure your phone clock is accurate and try again.');
      const user = auth.currentUser;
      await db.collection('user_security').doc(user.uid).set({ totpEnabled: true, totpSecret: totpSecret, enrolledAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      updateTFAStatusUI(true);
      hideTFAStatus();
      if (countdownTimer) clearInterval(countdownTimer);
      goToTFAStep(3);
      document.getElementById('disable-tfa-btn').style.display = 'block';
    } catch (err) {
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Verify &amp; Enable';
      showTFAStatus(err.message || 'Verification failed.', 'error');
    }
  }

  async function disableTOTP() {
    if (!confirm('Disable authenticator app protection?')) return;
    try {
      const user = auth.currentUser;
      await db.collection('user_security').doc(user.uid).update({ totpEnabled: false, totpSecret: null });
      updateTFAStatusUI(false);
      document.getElementById('disable-tfa-btn').style.display = 'none';
      initTOTPSecret(user.email || 'user');
      goToTFAStep(1);
      showTFAStatus('Authenticator app has been disconnected.', 'info');
    } catch (err) { showTFAStatus(`Error: ${err.message}`, 'error'); }
  }

  function otpNext(el, idx) {
    el.value = el.value.replace(/[^0-9]/g, '');
    if (el.value && idx < 5) document.getElementById(`otp${idx + 1}`).focus();
    const all = [0,1,2,3,4,5].every(i => document.getElementById(`otp${i}`).value);
    if (all) verifyTOTPCode();
  }

  document.querySelectorAll('.otp-digit').forEach((el, idx) => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !el.value && idx > 0) document.getElementById(`otp${idx - 1}`).focus();
    });
  });

  /* ════════════════════════════
     SHA-256 HELPER
  ════════════════════════════ */
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str.trim().toLowerCase()));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toggleSQ(id, icon) {
    const input = document.getElementById(id);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.classList.toggle('fa-eye',      !show);
    icon.classList.toggle('fa-eye-slash', show);
    icon.style.color = show ? 'var(--gold, #d4af37)' : '#7a8aa8';
  }
      
  /* ════════════════════════════
     SECURITY QUESTIONS
  ════════════════════════════ */
  function showSQStatus(msg, type) {
    const el = document.getElementById('sq-modal-status');
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle', warning:'fa-exclamation-triangle' };
    el.className = `modal-status ${type} show`;
    el.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}"></i><span>${msg}</span>`;
  }
  function hideSQStatus() { document.getElementById('sq-modal-status').className = 'modal-status'; }

  function showSQSetupForm() {
    document.getElementById('sq-configured-state').style.display = 'none';
    document.getElementById('sq-setup-form').style.display = 'block';
    ['sq-ans-1','sq-ans-2','sq-ans-3'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    hideSQStatus();
  }

  async function saveSecurityQuestions() {
    const a1 = document.getElementById('sq-ans-1')?.value?.trim() || '';
    const a2 = document.getElementById('sq-ans-2')?.value?.trim() || '';
    const a3 = document.getElementById('sq-ans-3')?.value?.trim() || '';

    if (!a1 || !a2 || !a3) {
      showSQStatus('Please answer all three questions before saving.', 'error');
      return;
    }

    const btn  = document.getElementById('sq-save-btn');
    const text = document.getElementById('sq-save-text');
    btn.disabled = true;
    text.textContent = 'Hashing & saving…';
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Hashing & saving…</span>';

    try {
      const [h1, h2, h3] = await Promise.all([sha256(a1), sha256(a2), sha256(a3)]);

      const user = auth.currentUser;
      await db.collection('user_security').doc(user.uid).set(
        { sqHash1: h1, sqHash2: h2, sqHash3: h3, sqConfiguredAt: firebase.firestore.FieldValue.serverTimestamp() },
        { merge: true }
      );

      ['sq-ans-1','sq-ans-2','sq-ans-3'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });

      updateSQStatusUI(true);
      showSQStatus('Security questions saved successfully. Your answers are stored as hashes only.', 'success');

      setTimeout(() => {
        document.getElementById('sq-setup-form').style.display = 'none';
        document.getElementById('sq-configured-state').style.display = 'block';
        hideSQStatus();
      }, 1800);

      document.getElementById('sq-setup-banner').classList.remove('show');

    } catch (err) {
      showSQStatus(`Error saving: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> <span id="sq-save-text">Save Security Questions</span>';
    }
  }

  async function clearSecurityQuestions() {
    if (!confirm('Remove your security questions? You will be asked to set them up again on new devices.')) return;
    try {
      const user = auth.currentUser;
      await db.collection('user_security').doc(user.uid).update({ sqHash1: null, sqHash2: null, sqHash3: null });
      updateSQStatusUI(false);
      document.getElementById('sq-configured-state').style.display = 'none';
      document.getElementById('sq-setup-form').style.display = 'block';
      showSQStatus('Security questions removed. Please set them up again.', 'warning');
    } catch (err) {
      showSQStatus(`Error: ${err.message}`, 'error');
    }
  }

  /* ── Smooth scroll ── */
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      const id = this.getAttribute('href');
      if (id === '#') return;
      const target = document.querySelector(id);
      if (target) { e.preventDefault(); window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' }); }
    });
  });
</script>
