<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }

        /* ----------------------
           HEADER & LOGO STYLES
           ---------------------- */
        .header {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            padding: 10px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-link img {
            max-height: 44px;
            transition: transform 0.3s ease;
        }

        .logo-link:hover img {
            transform: scale(1.05);
        }

        /* ----------------------
           INSTALL BUTTON (header)
           ---------------------- */
        .install-btn {
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 16px;
            white-space: nowrap;
            transition: all 0.25s;
            text-decoration: none;
            position: relative;
        }

        .install-btn:hover {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,255,255,0.55);
            transform: translateY(-1px);
        }

        .install-btn:active {
            transform: translateY(0);
        }

        /* Platform dropdown */
        .install-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #061d45;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            min-width: 210px;
            z-index: 999;
        }

        .install-btn.open .install-dropdown {
            display: block;
        }

        .install-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .install-option:hover {
            background: rgba(255,255,255,0.10);
        }

        .install-option i {
            width: 18px;
            text-align: center;
            font-size: 1rem;
        }

        .install-option span.badge {
            margin-left: auto;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.15);
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* ----------------------
           NAVIGATION MENU STYLES
           ---------------------- */
        .nav-menu {
            display: none;
        }

        .nav-menu.open {
            display: flex;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: background-color 0.25s;
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: rgba(255,255,255,0.10);
        }

        .premium-link {
            background: linear-gradient(135deg, #c9a84c, #ffd700);
            color: #082b6f !important;
            font-weight: 700;
        }

        .premium-link:hover {
            background: linear-gradient(135deg, #ffd700, #ffe066) !important;
            color: #082b6f !important;
        }

        .dropdown {
            position: relative;
        }

        .dropbtn {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .dropdown-content {
            display: none;
            flex-direction: column;
            background-color: rgba(6, 29, 69, 0.95);
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.30);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .dropdown:hover .dropdown-content {
            display: flex;
        }

        /* ----------------------
           MOBILE & TABLET (max-width: 1200px)
           ---------------------- */
        @media (max-width: 1200px) {
            .install-btn {
                margin-left: auto;
                margin-right: 12px;
            }

            .install-dropdown {
                left: auto;
                right: 0;
                transform: none;
            }

            .hamburger {
                display: block;
                font-size: 1.6rem;
                cursor: pointer;
                background: transparent;
                color: #fff;
                border: none;
                line-height: 1;
                padding: 8px 10px;
                border-radius: 6px;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 64px;
                left: 0;
                width: 100%;
                background-color: rgba(6, 29, 69, 0.97);
                backdrop-filter: blur(6px);
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                box-shadow: 0 16px 32px rgba(0,0,0,0.30);
                padding: 8px 0;
            }

            .nav-menu.open {
                display: flex;
            }

            .nav-link {
                width: 100%;
                padding: 12px 20px;
                border-radius: 0;
            }

            .dropdown {
                width: 100%;
            }

            .dropdown-content {
                display: none;
                position: static;
                width: 100%;
                box-shadow: none;
                background-color: rgba(11, 61, 145, 0.6);
                border: none;
                border-radius: 0;
            }

            .dropdown.active .dropdown-content {
                display: flex;
            }

            .dropdown-content .nav-link {
                padding-left: 36px;
            }
        }

        /* ----------------------
           LARGE DESKTOP (min-width: 1201px)
           ---------------------- */
        @media (min-width: 1201px) {
            .hamburger {
                display: none;
            }

            .nav-menu {
                display: flex !important;
                flex-direction: row;
                gap: 20px;
                margin-left: auto;
                align-items: center;
            }

            .dropdown-content {
                position: absolute;
                top: 100%;
                left: 0;
                min-width: 200px;
            }

            .dropdown:hover .dropdown-content {
                display: flex;
            }

            .install-btn {
                margin-left: auto;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>

    <header class="header" role="banner">
        <a href="/index.html" class="logo-link" aria-label="Tklesson Home">
            <img src="Tklesson3.png" alt="Tklesson Logo">
        </a>

        <!-- Install button with platform dropdown -->
        <button class="install-btn" id="install-btn" aria-label="Install Tklesson app" aria-expanded="false">
            <i class="fas fa-download"></i> Get the App
            <div class="install-dropdown" id="install-dropdown">
                <a href="/downloads/Tklesson.apk" download class="install-option">
                    <i class="fab fa-android"></i> Android
                    <span class="badge">.apk</span>
                </a>
                <a href="/downloads/Tklesson.msixbundle" download class="install-option">
                    <i class="fab fa-windows"></i> Windows
                    <span class="badge">.msix</span>
                </a>
            </div>
        </button>

        <button class="hamburger" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle menu">☰</button>

        <nav class="nav-menu" id="navMenu" role="navigation" aria-label="Primary">
            <a href="/index.html" class="nav-link">Home</a>

            <div class="dropdown">
                <a href="#" class="nav-link dropbtn" aria-haspopup="true">Rates and Offers ▼</a>
                <div class="dropdown-content" role="menu">
                    <a href="/viewrates.html" class="nav-link">View Rates</a>
                    <a href="/rewardsandoffers.html" class="nav-link">Rewards &amp; Offers</a>
                </div>
            </div>

            <div class="dropdown">
                <a href="#" class="nav-link dropbtn" aria-haspopup="true">Resources ▼</a>
                <div class="dropdown-content" role="menu">
                    <a href="/frq.html" class="nav-link">FAQ</a>
                    <a href="/casestudies.html" class="nav-link">Case Studies</a>
                    <a href="/blog.html" class="nav-link">Blog</a>
                    <a href="/forschools.html" class="nav-link">Tklesson for Schools</a>
                    <a href="/values.html" class="nav-link">Our Values</a>
                    <a href="/contactinfo.html" class="nav-link">Contact Information</a>
                    <a href="/fltools.html" class="nav-link">Free Learning Tools</a>
                    <a href="/premium.html" class="nav-link premium-link">Premium Learning Tools</a>
                    <a href="/careers.html" class="nav-link">Careers</a>
                </div>
            </div>

            <a href="/privacy.html" class="nav-link">Privacy Policy</a>
            <a href="/terms.html" class="nav-link">Terms of Service</a>
            <a href="/deletedata.html" class="nav-link">Data Deletion</a>
        </nav>
    </header>

    <script>
        // ═══════════════════════════════════════
        // INSTALL BUTTON DROPDOWN
        // ═══════════════════════════════════════
        const installBtn = document.getElementById('install-btn');

        installBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = installBtn.classList.toggle('open');
            installBtn.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', (e) => {
            if (!installBtn.contains(e.target)) {
                installBtn.classList.remove('open');
                installBtn.setAttribute('aria-expanded', 'false');
            }
        });

        // ═══════════════════════════════════════
        // NAVIGATION LOGIC
        // ═══════════════════════════════════════
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector("#navMenu");
        const dropdowns = document.querySelectorAll(".dropdown");

        if (hamburger && navMenu) {
            hamburger.addEventListener("click", () => {
                const isOpen = navMenu.classList.toggle("open");
                hamburger.setAttribute("aria-expanded", isOpen);
            });
        }

        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            if (dropbtn) {
                dropbtn.addEventListener('click', (e) => {
                    if (window.innerWidth <= 1200) {
                        e.preventDefault();
                        const isOpen = dropdown.classList.toggle('active');
                        dropbtn.setAttribute('aria-expanded', isOpen);
                    }
                });
            }
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 1200) {
                dropdowns.forEach(dropdown => {
                    if (!dropdown.contains(e.target)) {
                        dropdown.classList.remove('active');
                        const dropbtn = dropdown.querySelector('.dropbtn');
                        if (dropbtn) dropbtn.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        });

        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            dropdown.addEventListener('mouseenter', () => {
                if (window.innerWidth > 1200 && dropbtn) dropbtn.setAttribute('aria-expanded', 'true');
            });
            dropdown.addEventListener('mouseleave', () => {
                if (window.innerWidth > 1200 && dropbtn) dropbtn.setAttribute('aria-expanded', 'false');
            });
        });

        document.querySelectorAll('#navMenu > a:not(.dropbtn)').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 1200 && navMenu.classList.contains('open')) {
                    navMenu.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                }
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 1200 && navMenu.classList.contains('open')) {
                navMenu.classList.remove('open');
                hamburger.setAttribute('aria-expanded', 'false');
            }
        });
    </script>
</body>
</html>
