<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }

        .header {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            padding: 10px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-link img {
            max-height: 44px;
            transition: transform 0.3s ease;
        }

        .logo-link:hover img {
            transform: scale(1.05);
        }

        .nav-menu {
            display: none;
        }

        .nav-menu.open {
            display: flex;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: background-color 0.25s;
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: rgba(255,255,255,0.10);
        }

        .premium-link {
            background: linear-gradient(135deg, #c9a84c, #ffd700);
            color: #082b6f !important;
            font-weight: 700;
        }

        .premium-link:hover {
            background: linear-gradient(135deg, #ffd700, #ffe066) !important;
            color: #082b6f !important;
        }

        .dropdown {
            position: relative;
        }

        .dropbtn {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .dropdown-content {
            display: none;
            flex-direction: column;
            background-color: rgba(6, 29, 69, 0.95);
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.30);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .dropdown:hover .dropdown-content {
            display: flex;
        }

        @media (max-width: 1200px) {
            .hamburger {
                display: block;
                font-size: 1.6rem;
                cursor: pointer;
                margin-left: auto;
                background: transparent;
                color: #fff;
                border: none;
                line-height: 1;
                padding: 8px 10px;
                border-radius: 6px;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 64px;
                left: 0;
                width: 100%;
                background-color: rgba(6, 29, 69, 0.97);
                backdrop-filter: blur(6px);
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                box-shadow: 0 16px 32px rgba(0,0,0,0.30);
                padding: 8px 0;
            }

            .nav-menu.open {
                display: flex;
            }

            .nav-link {
                width: 100%;
                padding: 12px 20px;
                border-radius: 0;
            }

            .dropdown {
                width: 100%;
            }

            .dropdown-content {
                display: none;
                position: static;
                width: 100%;
                box-shadow: none;
                background-color: rgba(11, 61, 145, 0.6);
                border: none;
                border-radius: 0;
            }

            .dropdown.active .dropdown-content {
                display: flex;
            }

            .dropdown-content .nav-link {
                padding-left: 36px;
            }
        }

        @media (min-width: 1201px) {
            .hamburger {
                display: none;
            }

            .nav-menu {
                display: flex !important;
                flex-direction: row;
                gap: 20px;
                margin-left: auto;
                align-items: center;
            }

            .dropdown-content {
                position: absolute;
                top: 100%;
                left: 0;
                min-width: 200px;
            }

            .dropdown:hover .dropdown-content {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <header class="header" role="banner">
        <a href="/index.html" class="logo-link" aria-label="Tklesson Home">
            <img src="Tklesson3.png" alt="Tklesson Logo">
        </a>

        <button class="hamburger" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle menu">☰</button>

        <nav class="nav-menu" id="navMenu" role="navigation" aria-label="Primary">
            <a href="/index.html" class="nav-link">Home</a>
            
            <div class="dropdown">
                <a href="#" class="nav-link dropbtn" aria-haspopup="true">Rates and Offers ▼</a>
                <div class="dropdown-content" role="menu">
                    <a href="/viewrates.html" class="nav-link">View Rates</a>
                    <a href="/rewardsandoffers.html" class="nav-link">Rewards &amp; Offers</a>
                    <a href="#" class="nav-link" id="download-app-nav">📲 Download App</a>
                </div>
            </div>

            <div class="dropdown">
                <a href="#" class="nav-link dropbtn" aria-haspopup="true">Resources ▼</a>
                <div class="dropdown-content" role="menu">
                    <a href="/frq.html" class="nav-link">FAQ</a>
                    <a href="/casestudies.html" class="nav-link">Case Studies</a>
                    <a href="/blog.html" class="nav-link">Blog</a>
                    <a href="/forschools.html" class="nav-link">Tklesson for Schools</a>
                    <a href="/values.html" class="nav-link">Our Values</a>
                    <a href="/contactinfo.html" class="nav-link">Contact Information</a>
                    <a href="/fltools.html" class="nav-link">Free Learning Tools</a>
                    <a href="/premium.html" class="nav-link premium-link">Premium Learning Tools</a>
                    <a href="/careers.html" class="nav-link">Careers</a>
                </div>
            </div>

            <a href="/privacy.html" class="nav-link">Privacy Policy</a>
            <a href="/terms.html" class="nav-link">Terms of Service</a>
            <a href="/deletedata.html" class="nav-link">Data Deletion</a>
        </nav>
    </header>

    <script>
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector("#navMenu");
        const dropdowns = document.querySelectorAll(".dropdown");

        if (hamburger && navMenu) {
            hamburger.addEventListener("click", () => {
                const isOpen = navMenu.classList.toggle("open");
                hamburger.setAttribute("aria-expanded", isOpen);
            });
        }

        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            if (dropbtn) {
                dropbtn.addEventListener('click', (e) => {
                    if (window.innerWidth <= 1200) {
                        e.preventDefault();
                        const isOpen = dropdown.classList.toggle('active');
                        dropbtn.setAttribute('aria-expanded', isOpen);
                    }
                });
            }
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 1200) {
                dropdowns.forEach(dropdown => {
                    if (!dropdown.contains(e.target)) {
                        dropdown.classList.remove('active');
                        const dropbtn = dropdown.querySelector('.dropbtn');
                        if (dropbtn) dropbtn.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        });

        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            dropdown.addEventListener('mouseenter', () => {
                if (window.innerWidth > 1200 && dropbtn) {
                    dropbtn.setAttribute('aria-expanded', 'true');
                }
            });
            dropdown.addEventListener('mouseleave', () => {
                if (window.innerWidth > 1200 && dropbtn) {
                    dropbtn.setAttribute('aria-expanded', 'false');
                }
            });
        });

        document.querySelectorAll('#navMenu > a:not(.dropbtn)').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 1200 && navMenu.classList.contains('open')) {
                    navMenu.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                }
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 1200 && navMenu.classList.contains('open')) {
                navMenu.classList.remove('open');
                hamburger.setAttribute('aria-expanded', 'false');
            }
        });

        // Download App modal trigger
        const downloadAppNav = document.getElementById('download-app-nav');
        if (downloadAppNav) {
            downloadAppNav.addEventListener('click', (e) => {
                e.preventDefault();
                const modal = document.getElementById('install-modal-overlay');
                if (modal) {
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                } else {
                    window.location.href = '/index.html#download';
                }
            });
        }
    </script>
</body>
</html>
