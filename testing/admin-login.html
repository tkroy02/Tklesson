<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tklesson</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" sizes="16x16" href="/Tklesson1-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --error: #ef4444;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f7f9fc;
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
        html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

        .login-container {
            background: var(--background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: 1px solid rgba(11, 61, 145, 0.06);
        }

        .login-header {
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .logo img {
            height: 44px;
        }

        .logo h1 {
            font-size: 1.4rem;
            color: var(--text-light);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .login-header p {
            opacity: 0.75;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .login-form {
            padding: 28px 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-with-icon input {
            padding-left: 42px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid rgba(11, 61, 145, 0.10);
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--background-light);
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.08);
            background: white;
        }

        .btn {
            padding: 13px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            padding: 18px 20px;
            border-top: 1px solid rgba(11, 61, 145, 0.06);
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .alert {
            padding: 12px 14px;
            border-radius: var(--border-radius-sm);
            margin-bottom: 18px;
            display: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .loading {
            display: none;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .login-container { border-radius: var(--border-radius-sm); }
            .login-header { padding: 28px 20px; }
            .login-form { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="/Tklesson1.png" alt="Tklesson Logo">
                <h1>Admin Portal</h1>
            </div>
            <p>Sign in to access the admin dashboard</p>
        </div>

        <div class="login-form">
            <div id="errorMessage" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="button-group">
                <button id="loginBtn" class="btn btn-primary">
                    <span class="btn-text">Sign In</span>
                    <div class="loading" id="loadingSpinner">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>

                <button id="homeBtn" class="btn btn-secondary">
                    <i class="fas fa-home"></i>
                    <span>Back to Homepage</span>
                </button>
            </div>
        </div>

        <div class="login-footer">
            <p>Restricted access. Authorized personnel only.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjo5LY4EsFlX8j_8NbLUObooUsCqJM8KM",
            authDomain: "tk-scheduler.firebaseapp.com",
            projectId: "tk-scheduler",
            storageBucket: "tk-scheduler.appspot.com",
            messagingSenderId: "746606755052",
            appId: "1:746606755052:web:d7eae92976cb2f2fa9f9c9",
            measurementId: "G-Q5L607R3N7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const homeBtn = document.getElementById('homeBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const btnText = document.querySelector('.btn-text');

        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'admin-dashboard.html';
        });

        async function login(email, password) {
            try {
                loadingSpinner.style.display = 'block';
                btnText.style.display = 'none';
                errorMessage.style.display = 'none';
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                console.error("Login error:", error);
                loadingSpinner.style.display = 'none';
                btnText.style.display = 'block';
                errorText.textContent = getErrorMessage(error.code);
                errorMessage.style.display = 'flex';
            }
        }

        function getErrorMessage(errorCode) {
            switch(errorCode) {
                case 'auth/invalid-email': return 'Invalid email address format.';
                case 'auth/user-disabled': return 'This account has been disabled.';
                case 'auth/user-not-found': return 'No account found with this email.';
                case 'auth/wrong-password': return 'Incorrect password.';
                case 'auth/too-many-requests': return 'Too many failed attempts. Please try again later.';
                default: return 'An error occurred during login. Please try again.';
            }
        }

        function goToHomepage() { window.location.href = '/index.html'; }

        loginBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email) { errorText.textContent = 'Please enter your email address.'; errorMessage.style.display = 'flex'; emailInput.focus(); return; }
            if (!password) { errorText.textContent = 'Please enter your password.'; errorMessage.style.display = 'flex'; passwordInput.focus(); return; }
            login(email, password);
        });

        homeBtn.addEventListener('click', goToHomepage);

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
