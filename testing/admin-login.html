<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tklesson</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" sizes="16x16" href="/Tklesson1-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --error: #ef4444;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f7f9fc;
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
        html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

        .login-container {
            background: var(--background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: 1px solid rgba(11, 61, 145, 0.06);
        }

        .login-header {
            background: linear-gradient(135deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .logo img { height: 44px; }

        .logo h1 {
            font-size: 1.4rem;
            color: var(--text-light);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .login-header p {
            opacity: 0.75;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .login-form { padding: 28px 24px; }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .input-with-icon { position: relative; }

        .input-with-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-with-icon input { padding-left: 42px; }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid rgba(11, 61, 145, 0.10);
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--background-light);
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.08);
            background: white;
        }

        .c-otp-digit {
            width:46px; height:54px;
            border:2px solid rgba(11,61,145,0.15); border-radius:10px;
            text-align:center; font-size:1.4rem; font-weight:700;
            font-family:'Inter',sans-serif; color:var(--primary);
            background:var(--background-light);
            transition:border-color 0.2s, box-shadow 0.2s;
            caret-color:transparent; padding:0;
        }
        .c-otp-digit:focus {
            outline:none; border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(11,61,145,0.1); background:white;
        }
        .c-otp-digit.error {
            border-color:var(--error);
            box-shadow:0 0 0 3px rgba(239,68,68,0.1);
            animation:shake 0.4s ease;
        }
        @keyframes shake {
            0%,100% { transform:translateX(0); }
            25%      { transform:translateX(-6px); }
            50%      { transform:translateX(6px); }
            75%      { transform:translateX(-4px); }
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @media (max-width:480px) {
            .c-otp-digit { width:40px; height:48px; font-size:1.2rem; }
        }

        .btn {
            padding: 13px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            padding: 18px 20px;
            border-top: 1px solid rgba(11, 61, 145, 0.06);
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .alert {
            padding: 12px 14px;
            border-radius: var(--border-radius-sm);
            margin-bottom: 18px;
            display: none;
            font-size: 0.9rem;
            font-weight: 500;
            align-items: center;
            gap: 8px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .loading { display: none; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .login-container { border-radius: var(--border-radius-sm); }
            .login-header { padding: 28px 20px; }
            .login-form { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="/Tklesson3.png" alt="Tklesson Logo">
                <h1>Admin Portal</h1>
            </div>
            <p>Sign in to access the admin dashboard</p>
        </div>

        <div class="login-form">
            <div id="errorMessage" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="button-group">
                <button id="loginBtn" class="btn btn-primary" type="button">
                    <span class="btn-text">Sign In</span>
                    <div class="loading" id="loadingSpinner">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>

                <button id="homeBtn" class="btn btn-secondary" type="button">
                    <i class="fas fa-home"></i>
                    <span>Back to Homepage</span>
                </button>
            </div>
        </div>

        <div class="login-footer">
            <p>Restricted access. Authorized personnel only.</p>
        </div>
    </div>

    <!-- 2FA CHALLENGE MODAL -->
    <div id="tfa-challenge-modal" style="display:none; position:fixed; inset:0;
        z-index:9999; background:rgba(3,21,46,0.85); backdrop-filter:blur(6px);
        align-items:center; justify-content:center; padding:24px; overflow-y:auto;">
        <div style="background:white; border-radius:16px; padding:40px 36px;
            max-width:420px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.4);
            margin:auto; animation:fadeIn 0.4s ease-out both;">

            <div style="text-align:center; margin-bottom:28px;">
                <div style="width:56px; height:56px; background:#eef3fb; border-radius:50%;
                    display:flex; align-items:center; justify-content:center; margin:0 auto 14px;">
                    <i class="fas fa-shield-alt" style="color:#0b3d91; font-size:1.5rem;"></i>
                </div>
                <h2 style="color:#0b3d91; font-size:1.3rem; font-weight:800; margin-bottom:6px;">
                    Two-Factor Verification
                </h2>
                <p style="color:#708090; font-size:0.88rem;" id="tfa-challenge-subtitle">
                    Enter the 6-digit code from your authenticator app.
                </p>
            </div>

            <div style="display:flex; background:#f7f9fc; border-radius:10px;
                padding:4px; margin-bottom:24px; gap:4px;">
                <button id="tab-otp" onclick="switchAdminChallengeTab('otp')"
                    style="flex:1; padding:9px; border:none; border-radius:8px;
                    font-weight:600; font-size:0.85rem; cursor:pointer;
                    background:#0b3d91; color:white; font-family:'Inter',sans-serif; transition:all 0.2s;">
                    <i class="fas fa-mobile-alt"></i> Auth App
                </button>
                <button id="tab-backup" onclick="switchAdminChallengeTab('backup')"
                    style="flex:1; padding:9px; border:none; border-radius:8px;
                    font-weight:600; font-size:0.85rem; cursor:pointer;
                    background:transparent; color:#708090; font-family:'Inter',sans-serif; transition:all 0.2s;">
                    <i class="fas fa-key"></i> Backup Code
                </button>
            </div>

            <div id="challenge-otp-panel">
                <div style="display:flex; gap:8px; justify-content:center; margin-bottom:16px;" id="challenge-otp-inputs">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input class="c-otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                </div>
                <p style="text-align:center; font-size:0.8rem; color:#708090; margin-bottom:16px;">
                    Code refreshes in <span id="c-otp-countdown">30</span>s
                </p>
            </div>

            <div id="challenge-backup-panel" style="display:none;">
                <input type="text" id="c-backup-code-input"
                    placeholder="XXXX-XXXX"
                    style="width:100%; padding:13px 16px; border:2px solid #e2e8f0;
                    border-radius:10px; font-size:1rem; font-family:monospace;
                    text-align:center; letter-spacing:2px; text-transform:uppercase;
                    margin-bottom:16px; box-sizing:border-box; color:#0b3d91; font-weight:700;"
                    oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')">
            </div>

            <div id="challenge-error" style="display:none; background:#fef2f2;
                border:1px solid #fecaca; color:#ef4444; padding:10px 14px;
                border-radius:8px; font-size:0.85rem; text-align:center; margin-bottom:16px;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="challenge-error-text">Incorrect code.</span>
            </div>

            <div id="challenge-lockout" style="display:none; background:#fef2f2;
                border:1px solid #fecaca; color:#ef4444; padding:14px;
                border-radius:8px; font-size:0.88rem; text-align:center; margin-bottom:16px;">
                <i class="fas fa-ban"></i>
                <strong>Too many failed attempts.</strong><br>
                <span style="font-size:0.82rem;">Please log in again to retry.</span>
            </div>

            <button onclick="submitAdminChallenge()" id="challenge-submit-btn"
                style="width:100%; padding:14px;
                background:linear-gradient(to right, #0b3d91, #1e5bbf);
                color:white; border:none; border-radius:50px; font-size:1rem;
                font-weight:700; cursor:pointer; font-family:'Inter',sans-serif;
                display:flex; align-items:center; justify-content:center; gap:8px;">
                <span id="challenge-btn-text">Verify & Sign In</span>
                <span id="challenge-btn-spinner" style="display:none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>

            <button onclick="cancelAdminChallenge()" style="width:100%;
                margin-top:10px; padding:12px; background:none;
                border:1.5px solid #e2e8f0; border-radius:50px; font-size:0.9rem;
                font-weight:600; color:#708090; cursor:pointer; font-family:'Inter',sans-serif;">
                <i class="fas fa-arrow-left" style="margin-right:6px;"></i>
                Back to Login
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp }       from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                       from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc }
                                       from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
        import { getFunctions, httpsCallable }
                                       from "https://www.gstatic.com/firebasejs/12.2.1/firebase-functions.js";

        // ── Config via server fetch ──────────────────────────────
        const config = await fetch('https://us-central1-tk-scheduler.cloudfunctions.net/getClientConfig')
            .then(r => r.json());

        const app       = initializeApp(config);
        const auth      = getAuth(app);
        const db        = getFirestore(app);
        const functions = getFunctions(app);

        // ── Cloud function callables ─────────────────────────────
        const initiateTFA = httpsCallable(functions, 'initiateTFA');
        const verifyTOTP  = httpsCallable(functions, 'verifyTOTP');

        // ── State ────────────────────────────────────────────────
        let _pendingAdminSession      = null;
        let _adminChallengeToken      = null;
        let _adminChallengeFailCount  = 0;
        let _adminChallengeTab        = 'otp';
        let _adminCountdownTimer      = null;
        const ADMIN_CHALLENGE_MAX_ATTEMPTS = 5;

        // ── Auth state listener ──────────────────────────────────
        onAuthStateChanged(auth, (user) => {
            if (user && sessionStorage.getItem('adminAuthenticated') === 'true') {
                if (!window.location.href.includes('admin-dashboard.html')) {
                    window.location.href = 'admin-dashboard.html';
                }
            } else if (!user) {
                sessionStorage.removeItem('adminAuthenticated');
                sessionStorage.removeItem('adminEmail');
                sessionStorage.removeItem('adminUid');
            }
        });

        // ── Error messages ───────────────────────────────────────
        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email':            'Invalid email address format.',
                'auth/user-not-found':           'No account found with this email.',
                'auth/wrong-password':           'Incorrect password. Please try again.',
                'auth/invalid-credential':       'Invalid email or password.',
                'auth/too-many-requests':        'Too many failed attempts. Please try again later.',
                'auth/network-request-failed':   'Network error. Check your internet connection.'
            };
            return messages[code] || 'Login failed. Please try again.';
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'flex';
        }

        function resetLoginButton() {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.querySelector('#loginBtn .btn-text').style.display = 'inline';
            document.getElementById('loginBtn').disabled = false;
        }

        // ── Login ────────────────────────────────────────────────
       async function login(email, password) {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.querySelector('#loginBtn .btn-text').style.display = 'none';
    document.getElementById('errorMessage').style.display = 'none';
    document.getElementById('loginBtn').disabled = true;
    try {
        const { user } = await signInWithEmailAndPassword(auth, email, password);
        
        // Force token to fully propagate before any Cloud Function calls
        await user.getIdToken(true);
        
        const adminSnap = await getDoc(doc(db, 'admins', user.uid));
        if (!adminSnap.exists()) {
            await signOut(auth);
            resetLoginButton();
            showError('Access denied. Admin privileges required.');
            return;
        }

                const adminData = adminSnap.data();
                _pendingAdminSession = {
                    uid:              user.uid,
                    email:            user.email,
                    twoFactorEnabled: adminData.twoFactorEnabled === true
                };

                resetLoginButton();

                if (_pendingAdminSession.twoFactorEnabled) {
                    try {
                        const result = await initiateTFA({ context: 'admins' });
                        _adminChallengeToken = result.data.challengeToken;
                        openAdminChallengeModal();
                    } catch (err) {
                        console.error('initiateTFA error:', err);
                        showError('Failed to initiate 2FA. Please try again.');
                        await signOut(auth);
                    }
                } else {
                    commitAdminSession();
                }

            } catch (error) {
                console.error('Login error:', error);
                resetLoginButton();
                showError(getErrorMessage(error.code));
            }
        }

        // ── Commit session ───────────────────────────────────────
        function commitAdminSession() {
            sessionStorage.setItem('adminAuthenticated', 'true');
            sessionStorage.setItem('adminEmail', _pendingAdminSession.email);
            sessionStorage.setItem('adminUid', _pendingAdminSession.uid);
            if (!window.location.href.includes('admin-dashboard.html')) {
                window.location.href = 'admin-dashboard.html';
            }
        }

        // ── Challenge modal ──────────────────────────────────────
        function openAdminChallengeModal() {
            _adminChallengeFailCount = 0;
            _adminChallengeTab = 'otp';
            document.getElementById('tfa-challenge-modal').style.display  = 'flex';
            document.getElementById('challenge-error').style.display      = 'none';
            document.getElementById('challenge-lockout').style.display    = 'none';
            document.getElementById('challenge-submit-btn').disabled      = false;
            switchAdminChallengeTab('otp');
        }

        window.cancelAdminChallenge = async () => {
            document.getElementById('tfa-challenge-modal').style.display = 'none';
            stopAdminChallengeCountdown();
            _pendingAdminSession     = null;
            _adminChallengeToken     = null;
            _adminChallengeFailCount = 0;
            await signOut(auth);
            resetLoginButton();
        };

        window.switchAdminChallengeTab = (tab) => {
            _adminChallengeTab = tab;
            const isOtp = tab === 'otp';
            document.getElementById('challenge-otp-panel').style.display    = isOtp ? 'block' : 'none';
            document.getElementById('challenge-backup-panel').style.display = isOtp ? 'none'  : 'block';
            document.getElementById('tab-otp').style.background    = isOtp ? '#0b3d91'     : 'transparent';
            document.getElementById('tab-otp').style.color         = isOtp ? 'white'        : '#708090';
            document.getElementById('tab-backup').style.background = isOtp ? 'transparent' : '#0b3d91';
            document.getElementById('tab-backup').style.color      = isOtp ? '#708090'      : 'white';
            document.getElementById('tfa-challenge-subtitle').textContent = isOtp
                ? 'Enter the 6-digit code from your authenticator app.'
                : 'Enter one of your saved backup codes.';
            document.getElementById('challenge-error').style.display = 'none';

            if (isOtp) { wireAdminOTPInputs(); startAdminChallengeCountdown(); }
            else { stopAdminChallengeCountdown(); setTimeout(() => document.getElementById('c-backup-code-input').focus(), 100); }
        };

        function startAdminChallengeCountdown() {
            stopAdminChallengeCountdown();
            const tick = () => {
                const el = document.getElementById('c-otp-countdown');
                if (el) el.textContent = 30 - (Math.floor(Date.now() / 1000) % 30);
            };
            tick();
            _adminCountdownTimer = setInterval(tick, 1000);
        }

        function stopAdminChallengeCountdown() {
            if (_adminCountdownTimer) { clearInterval(_adminCountdownTimer); _adminCountdownTimer = null; }
        }

        function wireAdminOTPInputs() {
            const container = document.getElementById('challenge-otp-inputs');
            container.querySelectorAll('.c-otp-digit').forEach(input => {
                input.parentNode.replaceChild(input.cloneNode(true), input);
            });
            const inputs = container.querySelectorAll('.c-otp-digit');
            inputs.forEach((input, i) => {
                input.value = '';
                input.classList.remove('error');
                input.addEventListener('input', e => {
                    e.target.value = e.target.value.replace(/\D/g, '').slice(-1);
                    if (e.target.value && i < inputs.length - 1) inputs[i + 1].focus();
                });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
                });
                input.addEventListener('paste', e => {
                    e.preventDefault();
                    const pasted = (e.clipboardData || window.clipboardData)
                        .getData('text').replace(/\D/g, '').slice(0, 6);
                    pasted.split('').forEach((char, idx) => { if (inputs[idx]) inputs[idx].value = char; });
                    const nextEmpty = [...inputs].findIndex(inp => !inp.value);
                    (nextEmpty !== -1 ? inputs[nextEmpty] : inputs[5]).focus();
                });
                if (i === 0) setTimeout(() => input.focus(), 150);
            });
        }

        // ── Submit challenge (server-side) ───────────────────────
        window.submitAdminChallenge = async () => {
            if (_adminChallengeFailCount >= ADMIN_CHALLENGE_MAX_ATTEMPTS) return;

            const errorEl   = document.getElementById('challenge-error');
            const errorText = document.getElementById('challenge-error-text');
            errorEl.style.display = 'none';
            document.getElementById('challenge-btn-text').style.display    = 'none';
            document.getElementById('challenge-btn-spinner').style.display = 'inline';
            document.getElementById('challenge-submit-btn').disabled       = true;

            const resetBtn = () => {
                document.getElementById('challenge-btn-text').style.display    = 'inline';
                document.getElementById('challenge-btn-spinner').style.display = 'none';
                document.getElementById('challenge-submit-btn').disabled       = false;
            };

            try {
                if (_adminChallengeTab === 'otp') {
                    const code = [...document.querySelectorAll('#challenge-otp-inputs .c-otp-digit')]
                        .map(i => i.value).join('');
                    if (code.length !== 6) { shakeAdminInputs(); resetBtn(); return; }

                    const result = await verifyTOTP({ challengeToken: _adminChallengeToken, token: code });

                    if (!result.data.valid) {
                        _adminChallengeFailCount++;
                        shakeAdminInputs();
                        handleAdminChallengeFailure();
                        resetBtn(); return;
                    }

                } else {
                    const entered = document.getElementById('c-backup-code-input').value.trim().toUpperCase();
                    if (!entered) { resetBtn(); return; }

                    const adminRef  = doc(db, 'admins', _pendingAdminSession.uid);
                    const adminSnap = await getDoc(adminRef);
                    const codes     = adminSnap.data()?.twoFactorBackupCodes || [];
                    const encoded   = btoa(entered);
                    const idx       = codes.indexOf(encoded);

                    if (idx === -1) {
                        _adminChallengeFailCount++;
                        document.getElementById('c-backup-code-input').style.borderColor = '#ef4444';
                        handleAdminChallengeFailure();
                        resetBtn(); return;
                    }

                    const updatedCodes = codes.filter((_, i) => i !== idx);
                    await updateDoc(adminRef, { twoFactorBackupCodes: updatedCodes });
                }

                stopAdminChallengeCountdown();
                document.getElementById('tfa-challenge-modal').style.display = 'none';
                commitAdminSession();

            } catch (err) {
                console.error('Admin challenge error:', err);
                if (err.code === 'resource-exhausted' || err.code === 'failed-precondition') {
                    await adminLockout();
                } else {
                    errorText.textContent = 'Verification failed. Please try again.';
                    errorEl.style.display = 'block';
                    resetBtn();
                }
            }
        };

        function handleAdminChallengeFailure() {
            const left = ADMIN_CHALLENGE_MAX_ATTEMPTS - _adminChallengeFailCount;
            if (left <= 0) {
                adminLockout();
            } else {
                document.getElementById('challenge-error-text').textContent =
                    `Incorrect code. ${left} attempt${left !== 1 ? 's' : ''} remaining.`;
                document.getElementById('challenge-error').style.display = 'block';
                if (_adminChallengeTab === 'otp') clearAdminOTP();
            }
        }

        async function adminLockout() {
            stopAdminChallengeCountdown();
            document.getElementById('challenge-error').style.display   = 'none';
            document.getElementById('challenge-lockout').style.display = 'block';
            document.getElementById('challenge-submit-btn').disabled   = true;
            await signOut(auth);
            _pendingAdminSession = null;
            _adminChallengeToken = null;
        }

        function shakeAdminInputs() {
            document.querySelectorAll('#challenge-otp-inputs .c-otp-digit').forEach(i => {
                i.classList.add('error');
                setTimeout(() => i.classList.remove('error'), 600);
            });
        }

        function clearAdminOTP() {
            document.querySelectorAll('#challenge-otp-inputs .c-otp-digit').forEach(i => i.value = '');
            const first = document.querySelector('#challenge-otp-inputs .c-otp-digit');
            if (first) first.focus();
        }

        // ── Event listeners ──────────────────────────────────────
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Please enter both email and password.'); return; }
            login(email, password);
        });

        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loginBtn').click(); }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('tfa-challenge-modal').style.display === 'flex') {
                e.preventDefault();
                submitAdminChallenge();
            }
        });

        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
