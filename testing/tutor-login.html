<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Login | Tklesson</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://tklesson.com/resources-loader.js"></script>
    <script>loadCommonResources();</script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --accent: #3399ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.15);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f7f9fc;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
        html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: var(--background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 36px 32px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(11, 61, 145, 0.06);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--primary));
        }

        .tutor-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--background-alt);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            margin-bottom: 16px;
        }

        .logo img {
            height: 55px;
            width: auto;
        }

        .header h2 {
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 6px;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group.error .form-control {
            border-color: var(--danger);
            background-color: rgba(239, 68, 68, 0.03);
        }

        .form-group.error .input-icon {
            color: var(--danger);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.78rem;
            margin-top: 5px;
            padding-left: 44px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .form-group.error .error-message {
            opacity: 1;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 46px;
            border: 2px solid rgba(11, 61, 145, 0.10);
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            transition: var(--transition);
            background-color: var(--background-light);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.08);
            outline: none;
            background-color: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.25);
            letter-spacing: -0.01em;
        }

        .btn:hover {
            background: linear-gradient(to right, var(--primary-light), var(--primary));
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.35);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #loginMsg {
            padding: 12px 16px;
            border-radius: var(--border-radius-sm);
            margin-top: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        #loginMsg.visible {
            opacity: 1;
            max-height: 200px;
        }

        .success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            font-size: 0.95rem;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .forgot-password {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-bottom: 18px;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .forgot-password a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .student-redirect {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(11, 61, 145, 0.06);
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .student-redirect a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .student-redirect a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .verification-notice {
            margin-top: 16px;
            padding: 14px;
            background-color: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: var(--border-radius-sm);
            text-align: center;
            display: none;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .verification-notice.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .resend-btn:hover {
            color: var(--primary-light);
        }

        .resend-btn:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-10px); }
            30%, 60%, 90% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.6s ease;
        }

        @media (max-width: 500px) {
            .card {
                padding: 24px 18px;
            }
            .header h2 {
                font-size: 1.4rem;
            }
            .tutor-badge {
                display: block;
                text-align: center;
            }
            .logo img {
                height: 48px;
            }
        }

        @media (min-width: 1201px) {
            #header .hamburger {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="page-wrapper">
    <div class="container">
        <div class="card">
            <div class="tutor-badge">
                <i class="fas fa-chalkboard-teacher"></i> Tutor Access
            </div>

            <div class="header">
                <div class="logo">
                    <img src="/Tklesson1.png" alt="Tklesson Logo">
                </div>
                <h2>Tutor Portal</h2>
                <p>Sign in to manage your tutoring sessions</p>
            </div>

            <form id="loginForm">
                <div class="form-group" id="emailGroup">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-control" placeholder="Tutor Email Address" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group" id="passwordGroup">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <i class="fas fa-eye password-toggle" id="passwordToggle"></i>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="forgot-password">
                    <a href="reset-password.html">Forgot your password?</a>
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Tutor Login
                </button>
            </form>

            <div class="verification-notice" id="verificationNotice">
                <p>Your email address has not been verified yet.</p>
                <button id="resendVerificationBtn" class="resend-btn">Resend verification email</button>
                <p id="resendStatus" style="font-size: 12px; margin-top: 8px;"></p>
            </div>

            <p id="loginMsg" role="alert"></p>

            <div class="student-redirect">
                Are you a student? <a href="student-login.html">Access student portal here</a>
            </div>

            <div class="footer">
                Don't have a tutor account? <a href="/careers.html">Careers Page</a>
            </div>
        </div>
    </div>
</div>

<div id="footer"></div>

<script>
fetch("/header.html")
.then(response => response.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
    const header = document.querySelector("#header header");
    const navMenu = header.querySelector("#navMenu");
    const hamburger = header.querySelector(".hamburger");
    if(hamburger && navMenu){
        hamburger.addEventListener("click", () => {
            const isOpen = navMenu.classList.toggle("open");
            hamburger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
    }
    header.querySelectorAll(".dropdown").forEach(dropdown => {
        const dropbtn = dropdown.querySelector(".dropbtn");
        dropbtn.addEventListener("click", e => {
            if(window.innerWidth <= 1200){
                e.preventDefault();
                const nowActive = dropdown.classList.toggle("active");
                dropbtn.setAttribute("aria-expanded", nowActive ? "true" : "false");
            }
        });
    });
});

fetch("/footer.html")
.then(response => response.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBjo5LY4EsFlX8j_8NbLUObooUsCqJM8KM",
        authDomain: "tk-scheduler.firebaseapp.com",
        projectId: "tk-scheduler",
        storageBucket: "tk-scheduler.appspot.com",
        messagingSenderId: "746606755052",
        appId: "1:746606755052:web:d7eae92976cb2f2fa9f9c9",
        measurementId: "G-Q5L607R3N7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const loginMsg = document.getElementById("loginMsg");
        const passwordInput = document.getElementById("password");
        const passwordToggle = document.getElementById("passwordToggle");
        const emailInput = document.getElementById("email");
        const verificationNotice = document.getElementById("verificationNotice");
        const resendVerificationBtn = document.getElementById("resendVerificationBtn");
        const resendStatus = document.getElementById("resendStatus");

        let currentUser = null;

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            passwordToggle.classList.toggle('fa-eye');
            passwordToggle.classList.toggle('fa-eye-slash');
        });

        function validateEmail(email) {
            if (!email.trim()) return "Email is required";
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return "Please enter a valid email address";
            return null;
        }

        function validatePassword(password) {
            if (!password) return "Password is required";
            return null;
        }

        function showFieldError(fieldId, message) {
            const group = document.getElementById(fieldId + 'Group');
            const error = document.getElementById(fieldId + 'Error');
            if (group && error) { group.classList.add('error'); error.textContent = message; }
        }

        function clearFieldError(fieldId) {
            const group = document.getElementById(fieldId + 'Group');
            const error = document.getElementById(fieldId + 'Error');
            if (group && error) { group.classList.remove('error'); error.textContent = ''; }
        }

        function showMessage(message, type) {
            loginMsg.textContent = message;
            loginMsg.className = type + ' visible';
            if (type === 'error') { form.classList.add('shake'); setTimeout(() => form.classList.remove('shake'), 600); }
        }

        emailInput.addEventListener('input', () => {
            const error = validateEmail(emailInput.value);
            if (error) showFieldError('email', error); else clearFieldError('email');
        });

        passwordInput.addEventListener('input', () => {
            const error = validatePassword(passwordInput.value);
            if (error) showFieldError('password', error); else clearFieldError('password');
        });

        async function checkTutorStatus(uid) {
            try {
                const tutorDoc = await db.collection('tutors').doc(uid).get();
                if (tutorDoc.exists) {
                    const tutorData = tutorDoc.data();
                    return { isTutor: true, isApproved: tutorData.approved === true, status: tutorData.status || 'pending' };
                }
                return { isTutor: false, isApproved: false, status: 'not-tutor' };
            } catch (error) {
                console.error("Error checking tutor status:", error);
                return { isTutor: false, isApproved: false, status: 'error' };
            }
        }

        resendVerificationBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            resendVerificationBtn.disabled = true;
            resendStatus.textContent = "Sending...";
            try {
                await currentUser.sendEmailVerification();
                resendStatus.textContent = "Verification email sent! Please check your inbox.";
                resendStatus.style.color = "var(--success)";
                setTimeout(() => { resendVerificationBtn.disabled = false; resendStatus.textContent = ""; }, 60000);
            } catch (error) {
                console.error("Error sending verification email:", error);
                resendStatus.textContent = "Error sending email. Please try again.";
                resendStatus.style.color = "var(--danger)";
                setTimeout(() => { resendVerificationBtn.disabled = false; resendStatus.textContent = ""; }, 5000);
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            loginMsg.textContent = ""; loginMsg.className = ""; verificationNotice.classList.remove("visible");

            const formData = { email: emailInput.value.trim(), password: passwordInput.value };
            const emailError = validateEmail(formData.email);
            const passwordError = validatePassword(formData.password);
            let hasErrors = false;
            if (emailError) { showFieldError('email', emailError); hasErrors = true; } else clearFieldError('email');
            if (passwordError) { showFieldError('password', passwordError); hasErrors = true; } else clearFieldError('password');
            if (hasErrors) { showMessage("Please correct the errors above.", "error"); return; }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(formData.email, formData.password);
                const user = userCredential.user;
                currentUser = user;

                if (!user.emailVerified) {
                    showMessage("Please verify your email address to continue.", "warning");
                    verificationNotice.classList.add("visible");
                    await auth.signOut();
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Tutor Login';
                    return;
                }

                const { isTutor, isApproved, status } = await checkTutorStatus(user.uid);
                if (!isTutor) {
                    await auth.signOut();
                    showMessage("Access denied. Only approved tutors can log in to this portal.", "error");
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Tutor Login';
                    return;
                }
                if (!isApproved) {
                    await auth.signOut();
                    let message = "Your account is pending approval. Please contact administrator.";
                    if (status === 'rejected') message = "Your tutor application was not approved. Please contact administrator for more information.";
                    showMessage(message, "error");
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Tutor Login';
                    return;
                }

                console.log("Login successful:", user.email);
                showMessage("Login successful! Redirecting to tutor portal...", "success");
                sessionStorage.setItem('userAuthenticated', 'true');
                sessionStorage.setItem('userEmail', user.email);
                sessionStorage.setItem('userRole', 'tutor');
                sessionStorage.setItem('userId', user.uid);
                sessionStorage.setItem('userApproved', 'true');
                setTimeout(() => { window.location.href = "tutor-dashboard.html"; }, 1500);
            } catch (error) {
                console.error("Error logging in:", error.message);
                let errorMessage = "Login failed. Please try again.";
                switch (error.code) {
                    case 'auth/user-not-found': errorMessage = "No account found with this email."; break;
                    case 'auth/wrong-password': errorMessage = "Incorrect password."; break;
                    case 'auth/invalid-email': errorMessage = "Invalid email address format."; break;
                    case 'auth/user-disabled': errorMessage = "This account has been disabled."; break;
                    default: errorMessage = error.message;
                }
                showMessage(errorMessage, "error");
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Tutor Login';
            }
        });
    });
</script>

</body>
</html>
