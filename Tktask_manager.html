<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager with Firebase</title>

    <!-- React 18 with proper createRoot -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDK v9 Modular -->

            authDomain: "tkmachines-945b9.firebaseapp.com",
            projectId: "tkmachines-945b9",
            storageBucket: "tkmachines-945b9.firebasestorage.app",
            messagingSenderId: "137087394703",

            measurementId: "G-Y8GH34Q2FN"

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);

        window.firebaseModules = {

        };

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

   <style>
    :root {
        /* Refined Deep Navy Spectrum */
        --navy-deep: #020617;
        --navy: #0a1224;
        --navy-mid: #0f1d35;
        --navy-light: #162a4a;
        
        /* Sophisticated Gold Palette */
        --gold: #C5963A;
        --gold-light: #E8C876;
        --gold-dark: #9A752D;
        --gold-glow: rgba(197, 150, 58, 0.25);
        
        /* Text Hierarchy (White with optical scaling) */
        --text-primary: #FFFFFF;
        --text-secondary: rgba(255, 255, 255, 0.68);
        --text-muted: rgba(255, 255, 255, 0.42);
        --text-inverse: #020617;
        
        /* UI Surfaces */
        --surface-glass: rgba(10, 18, 36, 0.45);
        --surface-glass-hover: rgba(14, 22, 42, 0.55);
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-focus: rgba(197, 150, 58, 0.4);
        --border-highlight: rgba(255, 255, 255, 0.12);
        
        /* Status Colors (Harmonized with palette) */
        --success: #2E7D52;
        --success-light: #34D399;
        --warning: #B87A1A;
        --danger: #A62B2B;
        --danger-light: #FCA5A5;
        
        /* Spacing & Radius */
        --radius-sm: 10px;
        --radius: 16px;
        --radius-lg: 22px;
        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 16px;
        --space-lg: 24px;
        --space-xl: 32px;
        
        /* Premium Shadows */
        --shadow-soft: 0 4px 16px rgba(0,0,0,0.15), 0 1px 4px rgba(0,0,0,0.1);
        --shadow-md: 0 10px 32px rgba(0,0,0,0.22), 0 4px 12px rgba(0,0,0,0.12);
        --shadow-lg: 0 16px 48px rgba(0,0,0,0.28), 0 8px 20px rgba(0,0,0,0.15);
        --shadow-gold: 0 8px 24px rgba(197, 150, 58, 0.25);
        
        /* Transitions & Typography */
        --transition: 0.28s cubic-bezier(0.25, 0.1, 0.25, 1);
        --font: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
        background: var(--gold);
        color: var(--navy-deep);
    }

    body {
        min-height: 100vh;
        background: radial-gradient(120% 100% at 20% 0%, var(--navy-mid) 0%, var(--navy-deep) 40%, var(--navy) 100%);
        color: var(--text-primary);
        line-height: 1.55;
        position: relative;
        overflow-x: hidden;
    }

    /* Subtle Background Ambiance */
    .bg-orb {
        position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
        filter: blur(110px); opacity: 0.06; mix-blend-mode: screen;
    }
    .bg-orb:nth-child(1) { width:420px; height:420px; background: var(--navy-light); top:-120px; left:-80px; animation: drift 24s infinite ease-in-out; }
    .bg-orb:nth-child(2) { width:340px; height:340px; background: var(--gold); bottom:-90px; right:-70px; animation: drift 28s infinite ease-in-out reverse; opacity: 0.04; }
    .bg-orb:nth-child(3) { width:260px; height:260px; background: #1a3b6e; top:45%; left:65%; animation: drift 34s infinite ease-in-out; opacity: 0.03; }
    
    @keyframes drift {
        0%,100% { transform: translate(0,0) scale(1); }
        50% { transform: translate(30px,-25px) scale(1.04); }
    }

    .grid-pattern {
        position: fixed; inset:0; pointer-events:none; z-index:0;
        background-image:
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 80px 80px;
        mask-image: radial-gradient(ellipse at 30% 20%, black 20%, transparent 70%);
    }

    /* Layout Wrappers */
    #super-header-container, #super-footer-container { width: 100%; position: relative; z-index: 10; }
    #root { position: relative; z-index: 10; }

    /* Task Manager Core Layout */
    .tm-page {
        min-height: calc(100vh - 60px);
        padding: var(--space-xl) var(--space-md);
    }
    .tm-container {
        max-width: 720px;
        margin: 0 auto;
        position: relative;
    }

    /* Typography & Title */
    .tm-title {
        text-align: center;
        margin-bottom: 32px;
    }
    .tm-title h1 {
        font-size: 2.4rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.03em;
        margin-bottom: 10px;
        line-height: 1.15;
    }
    .tm-title h1 i { color: var(--gold); margin-right: 12px; font-weight: 500; }
    .tm-title h1 span {
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 600;
    }

    /* Status Badges */
    .tm-status {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 14px; border-radius: 999px;
        font-size: 0.76rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .tm-status.idle { background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); color: var(--text-muted); }
    .tm-status.syncing { background: rgba(26, 59, 110, 0.25); border: 1px solid rgba(26, 59, 110, 0.4); color: #7aa2f7; }
    .tm-status.synced { background: rgba(46, 125, 82, 0.2); border: 1px solid rgba(46, 125, 82, 0.35); color: var(--success-light); }
    .tm-status.error { background: rgba(166, 43, 43, 0.18); border: 1px solid rgba(166, 43, 43, 0.35); color: var(--danger-light); }
    .tm-status.loading { background: var(--gold-glow); border: 1px solid rgba(197, 150, 58, 0.35); color: var(--gold-light); }

    .tm-welcome {
        text-align: center; color: var(--text-muted);
        font-size: 0.82rem; margin-top: 8px; font-weight: 500;
    }

    /* Stats Grid */
    .tm-stats {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: var(--space-md); margin-bottom: 28px;
    }
    .tm-stat-card {
        background: var(--surface-glass); border: 1px solid var(--border-subtle);
        border-radius: var(--radius); padding: 20px 14px; text-align: center;
        backdrop-filter: blur(18px); transition: var(--transition);
        box-shadow: var(--shadow-soft);
    }
    .tm-stat-card:hover {
        background: var(--surface-glass-hover); border-color: var(--border-highlight);
        transform: translateY(-3px); box-shadow: var(--shadow-md);
    }
    .tm-stat-card .stat-num {
        font-size: 2rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em;
    }
    .tm-stat-card .stat-num.total { color: #7aa2f7; }
    .tm-stat-card .stat-num.active { color: var(--success-light); }
    .tm-stat-card .stat-num.done { color: var(--gold); }
    .tm-stat-card .stat-label {
        font-size: 0.78rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase;
    }

    /* Form Card */
    .tm-form-card {
        background: var(--surface-glass); border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg); padding: 28px; margin-bottom: 28px;
        backdrop-filter: blur(20px); box-shadow: var(--shadow-md);
        position: relative; overflow: hidden;
    }
    .tm-form-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(197, 150, 58, 0.2), transparent);
    }
    .tm-form-card h2 {
        font-size: 1.1rem; font-weight: 600; color: var(--text-primary);
        margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        letter-spacing: -0.01em;
    }
    .tm-form-card h2 i { color: var(--gold); }

    .tm-input-group { margin-bottom: 18px; }
    .tm-input-group label {
        display: block; font-size: 0.78rem; font-weight: 600;
        color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .tm-input-group input, .tm-input-group textarea {
        width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
        color: var(--text-primary); font-size: 0.92rem; outline: none;
        transition: var(--transition);
    }
    .tm-input-group input:focus, .tm-input-group textarea:focus {
        border-color: var(--gold); background: rgba(255,255,255,0.05);
        box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .tm-input-group input::placeholder, .tm-input-group textarea::placeholder {
        color: var(--text-muted);
    }
    .tm-input-group textarea { resize: vertical; min-height: 88px; }

    /* Buttons */
    .tm-btn {
        padding: 12px 20px; border: none; border-radius: var(--radius-sm);
        font-size: 0.88rem; font-weight: 600; cursor: pointer;
        transition: var(--transition); display: inline-flex; align-items: center;
        justify-content: center; gap: 8px; letter-spacing: 0.01em;
    }
    .tm-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    
    .tm-btn-primary {
        background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
        color: var(--gold-light); border: 1px solid rgba(197, 150, 58, 0.2);
        width: 100%;
    }
    .tm-btn-primary:hover:not(:disabled) {
        transform: translateY(-2px); border-color: var(--gold);
        box-shadow: var(--shadow-gold); background: linear-gradient(135deg, var(--navy-light), #1a3b6e);
    }

    .tm-btn-green {
        background: linear-gradient(135deg, var(--success), #236b45);
        color: var(--success-light); flex: 1; border: 1px solid rgba(52, 211, 153, 0.15);
    }
    .tm-btn-green:hover:not(:disabled) {
        transform: translateY(-2px); box-shadow: 0 8px 20px rgba(46, 125, 82, 0.3);
    }

    .tm-btn-gray {
        background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
    }
    .tm-btn-gray:hover:not(:disabled) {
        background: rgba(255,255,255,0.08); color: var(--text-primary); border-color: var(--border-highlight);
    }

    .tm-btn-red {
        background: rgba(166, 43, 43, 0.12); border: 1px solid rgba(166, 43, 43, 0.25);
        color: var(--danger-light);
    }
    .tm-btn-red:hover:not(:disabled) {
        background: rgba(166, 43, 43, 0.2); border-color: rgba(166, 43, 43, 0.4);
    }

    .tm-btn-filter {
        padding: 8px 16px; border-radius: 8px; font-size: 0.8rem;
        font-weight: 600; cursor: pointer; transition: var(--transition);
        border: none; letter-spacing: 0.02em;
    }
    .tm-btn-filter.active {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold));
        color: var(--navy-deep); box-shadow: 0 4px 12px rgba(197, 150, 58, 0.2);
    }
    .tm-btn-filter:not(.active) {
        background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
    }
    .tm-btn-filter:not(.active):hover {
        background: rgba(255,255,255,0.06); color: var(--text-primary);
    }

    /* Filters Bar */
    .tm-filters {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }
    .tm-filter-group { display: flex; gap: 8px; }

    /* Task List & Cards */
    .tm-task-list { display: flex; flex-direction: column; gap: 14px; }
    .tm-task-card {
        background: var(--surface-glass); border: 1px solid var(--border-subtle);
        border-radius: var(--radius); padding: 18px 20px; backdrop-filter: blur(16px);
        transition: var(--transition); box-shadow: var(--shadow-soft);
    }
    .tm-task-card:hover {
        background: var(--surface-glass-hover); border-color: var(--border-highlight);
        transform: translateY(-2px); box-shadow: var(--shadow-md);
    }

    .tm-task-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
    .tm-task-left { display: flex; align-items: flex-start; gap: 14px; flex: 1; }
    
    .tm-checkbox {
        width: 24px; height: 24px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.25); background: transparent;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; margin-top: 3px; transition: var(--transition);
    }
    .tm-checkbox:hover { border-color: var(--gold); }
    .tm-checkbox.checked {
        background: linear-gradient(135deg, var(--success), #1a5c3e);
        border-color: var(--success); color: var(--success-light);
    }
    .tm-checkbox i { font-size: 0.7rem; }

    .tm-task-body { flex: 1; }
    .tm-task-body.completed .tm-task-title { text-decoration: line-through; opacity: 0.45; }
    .tm-task-body.completed .tm-task-desc { opacity: 0.35; }

    .tm-task-title {
        font-size: 1.05rem; font-weight: 600; color: var(--text-primary);
        margin-bottom: 6px; line-height: 1.35; letter-spacing: -0.01em;
    }
    .tm-task-desc {
        font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 10px;
        line-height: 1.5;
    }
    .tm-task-meta {
        display: flex; align-items: center; gap: 16px; font-size: 0.75rem;
        color: var(--text-muted); font-weight: 500;
    }
    .tm-task-meta i { margin-right: 5px; opacity: 0.7; }
    .tm-task-meta .meta-completed { color: var(--success-light); }
    .tm-task-meta .meta-cloud { color: #7aa2f7; }

    .tm-task-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .tm-task-actions button {
        width: 36px; height: 36px; border-radius: 8px; border: 1px solid transparent;
        background: transparent; cursor: pointer; display: flex; align-items: center;
        justify-content: center; font-size: 0.88rem; transition: var(--transition);
    }
    .tm-task-actions .btn-edit { color: #7aa2f7; }
    .tm-task-actions .btn-edit:hover { background: rgba(122, 162, 247, 0.1); border-color: rgba(122, 162, 247, 0.2); }
    .tm-task-actions .btn-delete { color: var(--danger-light); }
    .tm-task-actions .btn-delete:hover { background: rgba(252, 165, 165, 0.1); border-color: rgba(252, 165, 165, 0.2); }

    /* Edit Mode */
    .tm-edit-form { display: flex; flex-direction: column; gap: 12px; }
    .tm-edit-form input, .tm-edit-form textarea {
        width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.04);
        border: 1px solid var(--border-subtle); border-radius: 8px;
        color: var(--text-primary); font-size: 0.9rem; outline: none;
    }
    .tm-edit-form input:focus, .tm-edit-form textarea:focus {
        border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .tm-edit-form textarea { resize: vertical; min-height: 65px; }
    .tm-edit-actions { display: flex; gap: 10px; }
    .tm-edit-actions .tm-btn { padding: 9px 16px; font-size: 0.82rem; }

    /* Empty & Loading States */
    .tm-empty {
        text-align: center; padding: 56px 24px;
        background: var(--surface-glass); border: 1px solid var(--border-subtle);
        border-radius: var(--radius); box-shadow: var(--shadow-soft);
    }
    .tm-empty i { font-size: 2.8rem; color: var(--text-muted); margin-bottom: 16px; opacity: 0.4; }
    .tm-empty p { color: var(--text-secondary); font-size: 0.95rem; font-weight: 500; }

    .tm-loading-card {
        text-align: center; padding: 56px 24px;
        background: var(--surface-glass); border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
    }
    .tm-spinner {
        width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.08);
        border-top-color: var(--gold); border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tm-loading-card p { color: var(--text-muted); font-size: 0.95rem; }

    /* Footer & Animations */
    .tm-footer-note { text-align: center; margin-top: 40px; padding-bottom: 28px; }
    .tm-footer-note p { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 4px; }

    .fade-in { animation: fadeIn 0.35s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-spinner {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--gold);
        border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* Responsive */
    @media (max-width: 576px) {
        .tm-stats { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tm-stat-card { padding: 16px 10px; }
        .tm-stat-card .stat-num { font-size: 1.5rem; }
        .tm-title h1 { font-size: 1.75rem; }
        .tm-filters { flex-direction: column; align-items: stretch; }
        .tm-filter-group { justify-content: center; flex-wrap: wrap; }
        .tm-task-row { flex-direction: column; gap: 12px; }
        .tm-task-actions { align-self: flex-end; margin-top: 4px; }
        .tm-form-card { padding: 22px 18px; }
    }
</style>
</head>
<body>
    <!-- Dynamic Header Container -->
    <div id="super-header-container"></div>

    <!-- Background effects -->
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="grid-pattern"></div>

    <div id="root"></div>

    <!-- Dynamic Footer Container -->
    <div id="super-footer-container"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TaskManager() {
            const [tasks, setTasks] = useState([]);
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [filter, setFilter] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDescription, setEditDescription] = useState('');
            const [loading, setLoading] = useState(false);
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [user, setUser] = useState(null);
            const rootRef = useRef(null);

            // Initialize Firebase and authentication
            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseModules) {
                        const { auth, onAuthStateChanged } = window.firebaseModules;

                        setFirebaseInitialized(true);
                        console.log("Firebase v9 initialized successfully");

                        // Set up auth state listener
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                console.log("User is authenticated:", currentUser.email);
                            } else {
                                // User is not logged in, redirect to login page
                                console.log("User not authenticated, redirecting to login...");
                                window.location.href = 'login.html';
                                return;
                            }
                        });
                    } else {
                        // Firebase not loaded yet, check again
                        setTimeout(checkFirebase, 100);
                    }
                };

                checkFirebase();

                // Load initial data from localStorage as fallback
                const savedTasks = localStorage.getItem('tasks');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
            }, []);

            // Set up real-time Firestore listener - ONLY when user is authenticated
            useEffect(() => {
                if (!user || !window.firebaseModules) return;

                const {
                    db,
                    collection,
                    onSnapshot,
                    query,
                    where,
                    orderBy
                } = window.firebaseModules;

                const tasksQuery = query(
                    collection(db, "tasks"),
                    where("userId", "==", user.uid),
                    orderBy("createdAt", "desc")
                );

                const unsubscribe = onSnapshot(
                    tasksQuery,
                    (snapshot) => {
                        const tasksArray = [];
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            tasksArray.push({
                                id: doc.id,
                                ...data,
                                createdAt: data.createdAt ? data.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()
                            });
                        });
                        setTasks(tasksArray);
                        setSyncStatus('synced');
                    },
                    (error) => {
                        console.error("Error fetching tasks:", error);
                        setSyncStatus('error');
                        // Fallback to localStorage
                        const savedTasks = localStorage.getItem('tasks');
                        if (savedTasks) {
                            setTasks(JSON.parse(savedTasks));
                        }
                    }
                );

                return () => unsubscribe();
            }, [user]);

            // Save to localStorage as backup whenever tasks change
            useEffect(() => {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!title.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const newTask = {
                    title: title.trim(),
                    description: description.trim(),
                    completed: false,
                    userId: user.uid,
                    createdAt: window.firebaseModules.serverTimestamp()
                };

                try {
                    const { db, collection, addDoc } = window.firebaseModules;
                    await addDoc(collection(db, "tasks"), newTask);
                    setTitle('');
                    setDescription('');
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error adding task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    const localTask = {
                        ...newTask,
                        id: Date.now().toString(),
                        createdAt: new Date().toISOString()
                    };
                    setTasks([localTask, ...tasks]);
                    setTitle('');
                    setDescription('');
                } finally {
                    setLoading(false);
                }
            };

            const deleteTask = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, "tasks", id));
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error deleting task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => task.id !== id));
                } finally {
                    setLoading(false);
                }
            };

            const toggleComplete = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const taskToUpdate = tasks.find(task => task.id === id);
                const updatedStatus = !taskToUpdate.completed;

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", id), {
                        completed: updatedStatus
                    });
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === id ? { ...task, completed: updatedStatus } : task
                    ));
                } finally {
                    setLoading(false);
                }
            };

            const startEditing = (task) => {
                setEditingId(task.id);
                setEditTitle(task.title);
                setEditDescription(task.description || '');
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditTitle('');
                setEditDescription('');
            };

            const saveEdit = async () => {
                if (!editTitle.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", editingId), {
                        title: editTitle.trim(),
                        description: editDescription.trim()
                    });
                    cancelEditing();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === editingId
                            ? { ...task, title: editTitle.trim(), description: editDescription.trim() }
                            : task
                    ));
                    cancelEditing();
                } finally {
                    setLoading(false);
                }
            };

            const clearCompleted = async () => {
                const completedTasks = tasks.filter(task => task.completed);
                if (completedTasks.length === 0 || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, writeBatch } = window.firebaseModules;
                    const batch = writeBatch(db);

                    completedTasks.forEach(task => {
                        const taskRef = doc(db, "tasks", task.id);
                        batch.delete(taskRef);
                    });

                    await batch.commit();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error clearing completed tasks:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => !task.completed));
                } finally {
                    setLoading(false);
                }
            };

            const logout = async () => {
                if (!window.firebaseModules) return;

                try {
                    const { auth, signOut } = window.firebaseModules;
                    await signOut(auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error("Error signing out:", error);
                }
            };

            const filteredTasks = tasks.filter(task => {
                if (filter === 'active') return !task.completed;
                if (filter === 'completed') return task.completed;
                return true;
            });

            const completedCount = tasks.filter(task => task.completed).length;
            const activeCount = tasks.length - completedCount;

            // Status message based on sync state
            const getStatusMessage = () => {
                if (!window.firebaseModules) return "Loading Firebase...";
                if (!user) return "Checking authentication...";
                if (!firebaseInitialized) return "Initializing Firebase...";
                if (syncStatus === 'syncing') return "Syncing with cloud...";
                if (syncStatus === 'error') return "Sync error - using local storage";
                if (syncStatus === 'synced') return "All tasks synced with cloud";
                return "Connected to Firebase";
            };

            const getStatusClass = () => {
                if (!window.firebaseModules) return 'loading';
                if (!user) return 'loading';
                if (!firebaseInitialized) return 'loading';
                if (syncStatus === 'syncing') return 'syncing';
                if (syncStatus === 'error') return 'error';
                if (syncStatus === 'synced') return 'synced';
                return 'idle';
            };

            return (
                <div className="tm-page">
                    <div className="tm-container">
                        {/* Header */}
                        <div className="tm-title">
                            <h1><i className="fas fa-tasks"></i>Task <span>Manager</span></h1>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                                <span className={`tm-status ${getStatusClass()}`}>
                                    {syncStatus === 'syncing' && <div className="btn-spinner"></div>}
                                    {getStatusMessage()}
                                </span>
                            </div>
                            {user && (
                                <p className="tm-welcome">
                                    Welcome, {user.email}
                                </p>
                            )}
                        </div>

                        {/* Stats Cards */}
                        <div className="tm-stats">
                            <div className="tm-stat-card">
                                <div className="stat-num total">{tasks.length}</div>
                                <div className="stat-label">Total</div>
                            </div>
                            <div className="tm-stat-card">
                                <div className="stat-num active">{activeCount}</div>
                                <div className="stat-label">Active</div>
                            </div>
                            <div className="tm-stat-card">
                                <div className="stat-num done">{completedCount}</div>
                                <div className="stat-label">Done</div>
                            </div>
                        </div>

                        {/* Add Task Form */}
                        <div className="tm-form-card">
                            <h2><i className="fas fa-plus-circle"></i>
                                {editingId ? 'Edit Task' : 'Add New Task'}
                            </h2>
                            <form onSubmit={editingId ? saveEdit : addTask}>
                                <div className="tm-input-group">
                                    <label>Task Title *</label>
                                    <input
                                        type="text"
                                        value={editingId ? editTitle : title}
                                        onChange={(e) => editingId ? setEditTitle(e.target.value) : setTitle(e.target.value)}
                                        placeholder="What needs to be done?"
                                        required
                                        disabled={loading}
                                    />
                                </div>
                                <div className="tm-input-group">
                                    <label>Description</label>
                                    <textarea
                                        value={editingId ? editDescription : description}
                                        onChange={(e) => editingId ? setEditDescription(e.target.value) : setDescription(e.target.value)}
                                        placeholder="Add some details..."
                                        rows="3"
                                        disabled={loading}
                                    />
                                </div>
                                <div style={{display:'flex',gap:'10px'}}>
                                    {editingId ? (
                                        <>
                                            <button
                                                type="submit"
                                                className="tm-btn tm-btn-green"
                                                disabled={loading}
                                            >
                                                {loading && <div className="btn-spinner"></div>}
                                                <i className="fas fa-save"></i> Save Changes
                                            </button>
                                            <button
                                                type="button"
                                                onClick={cancelEditing}
                                                className="tm-btn tm-btn-gray"
                                                disabled={loading}
                                            >
                                                Cancel
                                            </button>
                                        </>
                                    ) : (
                                        <button
                                            type="submit"
                                            className="tm-btn tm-btn-primary"
                                            disabled={loading || !user}
                                        >
                                            {loading && <div className="btn-spinner"></div>}
                                            <i className="fas fa-plus"></i> Add Task
                                        </button>
                                    )}
                                </div>
                            </form>
                        </div>

                        {/* Filters */}
                        <div className="tm-filters">
                            <div className="tm-filter-group">
                                {['all', 'active', 'completed'].map((f) => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`tm-btn-filter ${filter === f ? 'active' : ''}`}
                                        disabled={loading}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                            {completedCount > 0 && (
                                <button
                                    onClick={clearCompleted}
                                    className="tm-btn tm-btn-red"
                                    disabled={loading}
                                >
                                    {loading && <div className="btn-spinner"></div>}
                                    <i className="fas fa-trash"></i> Clear Completed
                                </button>
                            )}
                        </div>

                        {/* Task List */}
                        <div className="tm-task-list">
                            {loading && tasks.length === 0 ? (
                                <div className="tm-loading-card">
                                    <div className="tm-spinner"></div>
                                    <p>Loading tasks...</p>
                                </div>
                            ) : filteredTasks.length === 0 ? (
                                <div className="tm-empty">
                                    <i className="fas fa-inbox"></i>
                                    <p>
                                        {filter === 'completed'
                                            ? "No completed tasks yet - keep going!"
                                            : filter === 'active'
                                            ? "No active tasks - time to add some!"
                                            : "No tasks yet. Add your first task to get started!"
                                        }
                                    </p>
                                </div>
                            ) : (
                                filteredTasks.map((task) => (
                                    <div key={task.id} className="tm-task-card fade-in">
                                        {editingId === task.id ? (
                                            <div className="tm-edit-form">
                                                <input
                                                    type="text"
                                                    value={editTitle}
                                                    onChange={(e) => setEditTitle(e.target.value)}
                                                    disabled={loading}
                                                />
                                                <textarea
                                                    value={editDescription}
                                                    onChange={(e) => setEditDescription(e.target.value)}
                                                    rows="2"
                                                    disabled={loading}
                                                />
                                                <div className="tm-edit-actions">
                                                    <button
                                                        onClick={saveEdit}
                                                        className="tm-btn tm-btn-green"
                                                        disabled={loading}
                                                    >
                                                        {loading && <div className="btn-spinner"></div>}
                                                        Save
                                                    </button>
                                                    <button
                                                        onClick={cancelEditing}
                                                        className="tm-btn tm-btn-gray"
                                                        disabled={loading}
                                                    >
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="tm-task-row">
                                                <div className="tm-task-left">
                                                    <button
                                                        onClick={() => toggleComplete(task.id)}
                                                        className={`tm-checkbox ${task.completed ? 'checked' : ''}`}
                                                        disabled={loading}
                                                    >
                                                        {task.completed && <i className="fas fa-check"></i>}
                                                    </button>
                                                    <div className={`tm-task-body ${task.completed ? 'completed' : ''}`}>
                                                        <div className="tm-task-title">{task.title}</div>
                                                        {task.description && (
                                                            <div className="tm-task-desc">{task.description}</div>
                                                        )}
                                                        <div className="tm-task-meta">
                                                            <span>
                                                                <i className="fas fa-calendar"></i>
                                                                {task.createdAt}
                                                            </span>
                                                            {task.completed && (
                                                                <span className="meta-completed">
                                                                    <i className="fas fa-check-circle"></i>
                                                                    Completed
                                                                </span>
                                                            )}
                                                            {firebaseInitialized && syncStatus === 'synced' && (
                                                                <span className="meta-cloud">
                                                                    <i className="fas fa-cloud"></i>
                                                                    Cloud
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="tm-task-actions">
                                                    <button
                                                        onClick={() => startEditing(task)}
                                                        className="btn-edit"
                                                        title="Edit task"
                                                        disabled={loading}
                                                    >
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => deleteTask(task.id)}
                                                        className="btn-delete"
                                                        title="Delete task"
                                                        disabled={loading}
                                                    >
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Footer */}
                        <div className="tm-footer-note">
                            <p>Built with React 18 and Firebase v9</p>
                            <p>Tasks automatically sync to the cloud and persist locally</p>
                        </div>
                    </div>
                </div>
            );
        }

        // Use React 18 createRoot instead of ReactDOM.render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskManager />);
    </script>

    <script>
        // ===== FETCH HEADER/FOOTER =====
        async function loadSharedComponents() {
            const headerContainer = document.getElementById('super-header-container');
            const footerContainer = document.getElementById('super-footer-container');

            try {
                const [headerRes, footerRes] = await Promise.all([
                    fetch('super-header.html'),
                    fetch('super-footer.html')
                ]);

                if (!headerRes.ok || !footerRes.ok) throw new Error('Failed to load components');

                const [headerHtml, footerHtml] = await Promise.all([
                    headerRes.text(),
                    footerRes.text()
                ]);

                headerContainer.innerHTML = headerHtml;
                footerContainer.innerHTML = footerHtml;

                // Execute any inline scripts in loaded content
                headerContainer.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
                footerContainer.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });

            } catch (err) {
                console.error('Error loading header/footer:', err);
                headerContainer.innerHTML = '<header style="background:#0a1628;color:#fff;padding:12px 20px;text-align:center;font-weight:600;font-family:Inter,sans-serif;">TK Dashboard</header>';
            }
        }

        // Load shared components
        loadSharedComponents();
    </script>
</body>
</html>
