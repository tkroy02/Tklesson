<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- React 18 with proper createRoot -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK v9 Modular -->

            authDomain: "tkmachines-945b9.firebaseapp.com",
            projectId: "tkmachines-945b9",
            storageBucket: "tkmachines-945b9.firebasestorage.app",
            messagingSenderId: "137087394703",

        const app = initializeApp(firebaseConfig);

        window.firebaseModules = {

        };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy-deep: #040d1f;
            --navy: #0a1628;
            --navy-mid: #0f1f3a;
            --navy-light: #162d50;
            --blue: #0b3d91;
            --blue-bright: #1a5bc6;
            --blue-glow: #3b82f6;
            --gold: #e8a80c;
            --gold-light: #f5c842;
            --gold-dark: #b8860b;
            --surface: #ffffff;
            --surface-alt: #f6f8fc;
            --border: #e0e6ef;
            --border-light: #eef2f8;
            --text: #141f2e;
            --text-secondary: #44566b;
            --text-muted: #7b8ea8;
            --success: #0d8a4e;
            --warning: #c2780a;
            --danger: #c62828;
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --shadow: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
            --shadow-lg: 0 16px 44px rgba(0,0,0,0.09), 0 4px 14px rgba(0,0,0,0.04);
            --shadow-xl: 0 24px 60px rgba(0,0,0,0.13), 0 8px 22px rgba(0,0,0,0.05);
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #040d1f 0%, #0a1628 30%, #0f1f3a 60%, #0b1a35 100%);
            color: var(--text);
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Background orbs */
        .bg-orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(90px); opacity: 0.08;
        }
        .bg-orb:nth-child(1) { width:500px; height:500px; background: var(--blue); top:-140px; left:-100px; animation: drift 22s infinite ease-in-out; }
        .bg-orb:nth-child(2) { width:380px; height:380px; background: var(--gold); bottom:-100px; right:-90px; animation: drift 26s infinite ease-in-out reverse; }
        .bg-orb:nth-child(3) { width:280px; height:280px; background: var(--blue-glow); top:50%; left:60%; animation: drift 30s infinite ease-in-out; opacity:0.05; }
        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,-30px) scale(1.06); }
            66% { transform: translate(-25px,20px) scale(0.95); }
        }
        .grid-pattern {
            position: fixed; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: radial-gradient(ellipse at center, black 22%, transparent 72%);
        }

        /* Dynamic header/footer containers */
        #super-header-container, #super-footer-container { width: 100%; position: relative; z-index: 10; }

        /* Task Manager wrapper */
        #root {
            position: relative;
            z-index: 10;
        }

        /* Override Tailwind classes for dark theme */
        .tm-page {
            min-height: calc(100vh - 60px);
            padding: 32px 16px;
        }
        .tm-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }
        .tm-title {
            text-align: center;
            margin-bottom: 28px;
        }
        .tm-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .tm-title h1 i {
            color: var(--gold);
            margin-right: 10px;
        }
        .tm-title h1 span {
            background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tm-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .tm-status.idle { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
        .tm-status.syncing { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.2); color: #60a5fa; }
        .tm-status.synced { background: rgba(13,138,78,0.12); border: 1px solid rgba(13,138,78,0.2); color: #34d399; }
        .tm-status.error { background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.2); color: #fca5a5; }
        .tm-status.loading { background: rgba(232,168,12,0.12); border: 1px solid rgba(232,168,12,0.2); color: var(--gold-light); }

        .tm-welcome {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.82rem;
            margin-top: 6px;
        }

        /* Stats cards */
        .tm-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .tm-stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-sm);
            padding: 18px 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .tm-stat-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }
        .tm-stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2px;
        }
        .tm-stat-card .stat-num.total { color: var(--blue-glow); }
        .tm-stat-card .stat-num.active { color: #34d399; }
        .tm-stat-card .stat-num.done { color: var(--gold); }
        .tm-stat-card .stat-label {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        /* Form card */
        .tm-form-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
        }
        .tm-form-card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tm-form-card h2 i {
            color: var(--gold);
        }
        .tm-input-group {
            margin-bottom: 16px;
        }
        .tm-input-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }
        .tm-input-group input,
        .tm-input-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
            transition: var(--transition);
        }
        .tm-input-group input:focus,
        .tm-input-group textarea:focus {
            border-color: var(--blue-glow);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        .tm-input-group input::placeholder,
        .tm-input-group textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .tm-input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .tm-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .tm-btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--blue-bright));
            color: white;
            width: 100%;
        }
        .tm-btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(11,61,145,0.35);
        }
        .tm-btn-green {
            background: linear-gradient(135deg, #0d8a4e, #10b981);
            color: white;
            flex: 1;
        }
        .tm-btn-green:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(13,138,78,0.35);
        }
        .tm-btn-gray {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }
        .tm-btn-gray:hover:not(:disabled) {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .tm-btn-red {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.3);
            color: #fca5a5;
        }
        .tm-btn-red:hover:not(:disabled) {
            background: rgba(220,38,38,0.25);
        }
        .tm-btn-filter {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: var(--font);
        }
        .tm-btn-filter.active {
            background: linear-gradient(135deg, var(--blue), var(--blue-bright));
            color: white;
        }
        .tm-btn-filter:not(.active) {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
        }
        .tm-btn-filter:not(.active):hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* Filters bar */
        .tm-filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tm-filter-group {
            display: flex;
            gap: 8px;
        }

        /* Task cards */
        .tm-task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tm-task-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .tm-task-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .tm-task-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .tm-task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }
        .tm-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: var(--transition);
        }
        .tm-checkbox:hover {
            border-color: var(--gold);
        }
        .tm-checkbox.checked {
            background: linear-gradient(135deg, var(--success), #10b981);
            border-color: var(--success);
            color: white;
        }
        .tm-checkbox i {
            font-size: 0.65rem;
        }
        .tm-task-body {
            flex: 1;
        }
        .tm-task-body.completed .tm-task-title {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .tm-task-body.completed .tm-task-desc {
            opacity: 0.35;
        }
        .tm-task-title {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .tm-task-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .tm-task-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
        }
        .tm-task-meta i {
            margin-right: 4px;
        }
        .tm-task-meta .meta-completed {
            color: #34d399;
        }
        .tm-task-meta .meta-cloud {
            color: var(--blue-glow);
        }
        .tm-task-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .tm-task-actions button {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .tm-task-actions .btn-edit {
            color: var(--blue-glow);
        }
        .tm-task-actions .btn-edit:hover {
            background: rgba(59,130,246,0.1);
        }
        .tm-task-actions .btn-delete {
            color: #fca5a5;
        }
        .tm-task-actions .btn-delete:hover {
            background: rgba(220,38,38,0.1);
        }

        /* Edit mode inside task card */
        .tm-edit-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .tm-edit-form input,
        .tm-edit-form textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
        }
        .tm-edit-form input:focus,
        .tm-edit-form textarea:focus {
            border-color: var(--blue-glow);
        }
        .tm-edit-form textarea {
            resize: vertical;
            min-height: 60px;
        }
        .tm-edit-actions {
            display: flex;
            gap: 8px;
        }
        .tm-edit-actions .tm-btn {
            padding: 8px 16px;
            font-size: 0.82rem;
        }

        /* Empty state */
        .tm-empty {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
        }
        .tm-empty i {
            font-size: 3rem;
            color: rgba(255,255,255,0.1);
            margin-bottom: 14px;
        }
        .tm-empty p {
            color: rgba(255,255,255,0.35);
            font-size: 0.95rem;
        }

        /* Loading state */
        .tm-loading-card {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
        }
        .tm-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tm-loading-card p {
            color: rgba(255,255,255,0.4);
            font-size: 0.95rem;
        }

        /* Footer note */
        .tm-footer-note {
            text-align: center;
            margin-top: 32px;
            padding-bottom: 24px;
        }
        .tm-footer-note p {
            color: rgba(255,255,255,0.25);
            font-size: 0.75rem;
            margin-bottom: 3px;
        }

        /* Fade animation */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Small spinner for buttons */
        .btn-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @media (max-width: 576px) {
            .tm-stats {
                gap: 8px;
            }
            .tm-stat-card {
                padding: 14px 8px;
            }
            .tm-stat-card .stat-num {
                font-size: 1.4rem;
            }
            .tm-title h1 {
                font-size: 1.6rem;
            }
            .tm-filters {
                flex-direction: column;
                align-items: stretch;
            }
            .tm-filter-group {
                justify-content: center;
            }
            .tm-task-row {
                flex-direction: column;
                gap: 10px;
            }
            .tm-task-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- Dynamic Header Container -->
    <div id="super-header-container"></div>

    <!-- Background effects -->
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="grid-pattern"></div>

    <div id="root"></div>

    <!-- Dynamic Footer Container -->
    <div id="super-footer-container"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TaskManager() {
            const [tasks, setTasks] = useState([]);
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [filter, setFilter] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDescription, setEditDescription] = useState('');
            const [loading, setLoading] = useState(false);
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [user, setUser] = useState(null);
            const rootRef = useRef(null);

            // Initialize Firebase and authentication
            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseModules) {
                        const { auth, onAuthStateChanged } = window.firebaseModules;

                        setFirebaseInitialized(true);
                        console.log("Firebase v9 initialized successfully");

                        // Set up auth state listener
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                console.log("User is authenticated:", currentUser.email);
                            } else {
                                // User is not logged in, redirect to login page
                                console.log("User not authenticated, redirecting to login...");
                                window.location.href = 'login.html';
                                return;
                            }
                        });
                    } else {
                        // Firebase not loaded yet, check again
                        setTimeout(checkFirebase, 100);
                    }
                };

                checkFirebase();

                // Load initial data from localStorage as fallback
                const savedTasks = localStorage.getItem('tasks');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
            }, []);

            // Set up real-time Firestore listener - ONLY when user is authenticated
            useEffect(() => {
                if (!user || !window.firebaseModules) return;

                const {
                    db,
                    collection,
                    onSnapshot,
                    query,
                    where,
                    orderBy
                } = window.firebaseModules;

                const tasksQuery = query(
                    collection(db, "tasks"),
                    where("userId", "==", user.uid),
                    orderBy("createdAt", "desc")
                );

                const unsubscribe = onSnapshot(
                    tasksQuery,
                    (snapshot) => {
                        const tasksArray = [];
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            tasksArray.push({
                                id: doc.id,
                                ...data,
                                createdAt: data.createdAt ? data.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()
                            });
                        });
                        setTasks(tasksArray);
                        setSyncStatus('synced');
                    },
                    (error) => {
                        console.error("Error fetching tasks:", error);
                        setSyncStatus('error');
                        // Fallback to localStorage
                        const savedTasks = localStorage.getItem('tasks');
                        if (savedTasks) {
                            setTasks(JSON.parse(savedTasks));
                        }
                    }
                );

                return () => unsubscribe();
            }, [user]);

            // Save to localStorage as backup whenever tasks change
            useEffect(() => {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!title.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const newTask = {
                    title: title.trim(),
                    description: description.trim(),
                    completed: false,
                    userId: user.uid,
                    createdAt: window.firebaseModules.serverTimestamp()
                };

                try {
                    const { db, collection, addDoc } = window.firebaseModules;
                    await addDoc(collection(db, "tasks"), newTask);
                    setTitle('');
                    setDescription('');
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error adding task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    const localTask = {
                        ...newTask,
                        id: Date.now().toString(),
                        createdAt: new Date().toISOString()
                    };
                    setTasks([localTask, ...tasks]);
                    setTitle('');
                    setDescription('');
                } finally {
                    setLoading(false);
                }
            };

            const deleteTask = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, "tasks", id));
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error deleting task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => task.id !== id));
                } finally {
                    setLoading(false);
                }
            };

            const toggleComplete = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const taskToUpdate = tasks.find(task => task.id === id);
                const updatedStatus = !taskToUpdate.completed;

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", id), {
                        completed: updatedStatus
                    });
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === id ? { ...task, completed: updatedStatus } : task
                    ));
                } finally {
                    setLoading(false);
                }
            };

            const startEditing = (task) => {
                setEditingId(task.id);
                setEditTitle(task.title);
                setEditDescription(task.description || '');
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditTitle('');
                setEditDescription('');
            };

            const saveEdit = async () => {
                if (!editTitle.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", editingId), {
                        title: editTitle.trim(),
                        description: editDescription.trim()
                    });
                    cancelEditing();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === editingId
                            ? { ...task, title: editTitle.trim(), description: editDescription.trim() }
                            : task
                    ));
                    cancelEditing();
                } finally {
                    setLoading(false);
                }
            };

            const clearCompleted = async () => {
                const completedTasks = tasks.filter(task => task.completed);
                if (completedTasks.length === 0 || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, writeBatch } = window.firebaseModules;
                    const batch = writeBatch(db);

                    completedTasks.forEach(task => {
                        const taskRef = doc(db, "tasks", task.id);
                        batch.delete(taskRef);
                    });

                    await batch.commit();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error clearing completed tasks:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => !task.completed));
                } finally {
                    setLoading(false);
                }
            };

            const logout = async () => {
                if (!window.firebaseModules) return;

                try {
                    const { auth, signOut } = window.firebaseModules;
                    await signOut(auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error("Error signing out:", error);
                }
            };

            const filteredTasks = tasks.filter(task => {
                if (filter === 'active') return !task.completed;
                if (filter === 'completed') return task.completed;
                return true;
            });

            const completedCount = tasks.filter(task => task.completed).length;
            const activeCount = tasks.length - completedCount;

            // Status message based on sync state
            const getStatusMessage = () => {
                if (!window.firebaseModules) return "Loading Firebase...";
                if (!user) return "Checking authentication...";
                if (!firebaseInitialized) return "Initializing Firebase...";
                if (syncStatus === 'syncing') return "Syncing with cloud...";
                if (syncStatus === 'error') return "Sync error - using local storage";
                if (syncStatus === 'synced') return "All tasks synced with cloud";
                return "Connected to Firebase";
            };

            const getStatusClass = () => {
                if (!window.firebaseModules) return 'loading';
                if (!user) return 'loading';
                if (!firebaseInitialized) return 'loading';
                if (syncStatus === 'syncing') return 'syncing';
                if (syncStatus === 'error') return 'error';
                if (syncStatus === 'synced') return 'synced';
                return 'idle';
            };

            return (
                <div className="tm-page">
                    <div className="tm-container">
                        {/* Header */}
                        <div className="tm-title">
                            <h1><i className="fas fa-tasks"></i>Task <span>Manager</span></h1>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                                <span className={`tm-status ${getStatusClass()}`}>
                                    {syncStatus === 'syncing' && <div className="btn-spinner"></div>}
                                    {getStatusMessage()}
                                </span>
                            </div>
                            {user && (
                                <p className="tm-welcome">
                                    Welcome, {user.email}
                                </p>
                            )}
                        </div>

                        {/* Stats Cards */}
                        <div className="tm-stats">
                            <div className="tm-stat-card">
                                <div className="stat-num total">{tasks.length}</div>
                                <div className="stat-label">Total</div>
                            </div>
                            <div className="tm-stat-card">
                                <div className="stat-num active">{activeCount}</div>
                                <div className="stat-label">Active</div>
                            </div>
                            <div className="tm-stat-card">
                                <div className="stat-num done">{completedCount}</div>
                                <div className="stat-label">Done</div>
                            </div>
                        </div>

                        {/* Add Task Form */}
                        <div className="tm-form-card">
                            <h2><i className="fas fa-plus-circle"></i>
                                {editingId ? 'Edit Task' : 'Add New Task'}
                            </h2>
                            <form onSubmit={editingId ? saveEdit : addTask}>
                                <div className="tm-input-group">
                                    <label>Task Title *</label>
                                    <input
                                        type="text"
                                        value={editingId ? editTitle : title}
                                        onChange={(e) => editingId ? setEditTitle(e.target.value) : setTitle(e.target.value)}
                                        placeholder="What needs to be done?"
                                        required
                                        disabled={loading}
                                    />
                                </div>
                                <div className="tm-input-group">
                                    <label>Description</label>
                                    <textarea
                                        value={editingId ? editDescription : description}
                                        onChange={(e) => editingId ? setEditDescription(e.target.value) : setDescription(e.target.value)}
                                        placeholder="Add some details..."
                                        rows="3"
                                        disabled={loading}
                                    />
                                </div>
                                <div style={{display:'flex',gap:'10px'}}>
                                    {editingId ? (
                                        <>
                                            <button
                                                type="submit"
                                                className="tm-btn tm-btn-green"
                                                disabled={loading}
                                            >
                                                {loading && <div className="btn-spinner"></div>}
                                                <i className="fas fa-save"></i> Save Changes
                                            </button>
                                            <button
                                                type="button"
                                                onClick={cancelEditing}
                                                className="tm-btn tm-btn-gray"
                                                disabled={loading}
                                            >
                                                Cancel
                                            </button>
                                        </>
                                    ) : (
                                        <button
                                            type="submit"
                                            className="tm-btn tm-btn-primary"
                                            disabled={loading || !user}
                                        >
                                            {loading && <div className="btn-spinner"></div>}
                                            <i className="fas fa-plus"></i> Add Task
                                        </button>
                                    )}
                                </div>
                            </form>
                        </div>

                        {/* Filters */}
                        <div className="tm-filters">
                            <div className="tm-filter-group">
                                {['all', 'active', 'completed'].map((f) => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`tm-btn-filter ${filter === f ? 'active' : ''}`}
                                        disabled={loading}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                            {completedCount > 0 && (
                                <button
                                    onClick={clearCompleted}
                                    className="tm-btn tm-btn-red"
                                    disabled={loading}
                                >
                                    {loading && <div className="btn-spinner"></div>}
                                    <i className="fas fa-trash"></i> Clear Completed
                                </button>
                            )}
                        </div>

                        {/* Task List */}
                        <div className="tm-task-list">
                            {loading && tasks.length === 0 ? (
                                <div className="tm-loading-card">
                                    <div className="tm-spinner"></div>
                                    <p>Loading tasks...</p>
                                </div>
                            ) : filteredTasks.length === 0 ? (
                                <div className="tm-empty">
                                    <i className="fas fa-inbox"></i>
                                    <p>
                                        {filter === 'completed'
                                            ? "No completed tasks yet - keep going!"
                                            : filter === 'active'
                                            ? "No active tasks - time to add some!"
                                            : "No tasks yet. Add your first task to get started!"
                                        }
                                    </p>
                                </div>
                            ) : (
                                filteredTasks.map((task) => (
                                    <div key={task.id} className="tm-task-card fade-in">
                                        {editingId === task.id ? (
                                            <div className="tm-edit-form">
                                                <input
                                                    type="text"
                                                    value={editTitle}
                                                    onChange={(e) => setEditTitle(e.target.value)}
                                                    disabled={loading}
                                                />
                                                <textarea
                                                    value={editDescription}
                                                    onChange={(e) => setEditDescription(e.target.value)}
                                                    rows="2"
                                                    disabled={loading}
                                                />
                                                <div className="tm-edit-actions">
                                                    <button
                                                        onClick={saveEdit}
                                                        className="tm-btn tm-btn-green"
                                                        disabled={loading}
                                                    >
                                                        {loading && <div className="btn-spinner"></div>}
                                                        Save
                                                    </button>
                                                    <button
                                                        onClick={cancelEditing}
                                                        className="tm-btn tm-btn-gray"
                                                        disabled={loading}
                                                    >
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="tm-task-row">
                                                <div className="tm-task-left">
                                                    <button
                                                        onClick={() => toggleComplete(task.id)}
                                                        className={`tm-checkbox ${task.completed ? 'checked' : ''}`}
                                                        disabled={loading}
                                                    >
                                                        {task.completed && <i className="fas fa-check"></i>}
                                                    </button>
                                                    <div className={`tm-task-body ${task.completed ? 'completed' : ''}`}>
                                                        <div className="tm-task-title">{task.title}</div>
                                                        {task.description && (
                                                            <div className="tm-task-desc">{task.description}</div>
                                                        )}
                                                        <div className="tm-task-meta">
                                                            <span>
                                                                <i className="fas fa-calendar"></i>
                                                                {task.createdAt}
                                                            </span>
                                                            {task.completed && (
                                                                <span className="meta-completed">
                                                                    <i className="fas fa-check-circle"></i>
                                                                    Completed
                                                                </span>
                                                            )}
                                                            {firebaseInitialized && syncStatus === 'synced' && (
                                                                <span className="meta-cloud">
                                                                    <i className="fas fa-cloud"></i>
                                                                    Cloud
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="tm-task-actions">
                                                    <button
                                                        onClick={() => startEditing(task)}
                                                        className="btn-edit"
                                                        title="Edit task"
                                                        disabled={loading}
                                                    >
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => deleteTask(task.id)}
                                                        className="btn-delete"
                                                        title="Delete task"
                                                        disabled={loading}
                                                    >
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Footer */}
                        <div className="tm-footer-note">
                            <p>Built with React 18 and Firebase v9</p>
                            <p>Tasks automatically sync to the cloud and persist locally</p>
                        </div>
                    </div>
                </div>
            );
        }

        // Use React 18 createRoot instead of ReactDOM.render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskManager />);
    </script>

    <script>
        // ===== FETCH HEADER/FOOTER =====
        async function loadSharedComponents() {
            const headerContainer = document.getElementById('super-header-container');
            const footerContainer = document.getElementById('super-footer-container');

            try {
                const [headerRes, footerRes] = await Promise.all([
                    fetch('super-header.html'),
                    fetch('super-footer.html')
                ]);

                if (!headerRes.ok || !footerRes.ok) throw new Error('Failed to load components');

                const [headerHtml, footerHtml] = await Promise.all([
                    headerRes.text(),
                    footerRes.text()
                ]);

                headerContainer.innerHTML = headerHtml;
                footerContainer.innerHTML = footerHtml;

                // Execute any inline scripts in loaded content
                headerContainer.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
                footerContainer.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });

            } catch (err) {
                console.error('Error loading header/footer:', err);
                headerContainer.innerHTML = '<header style="background:#0a1628;color:#fff;padding:12px 20px;text-align:center;font-weight:600;font-family:Inter,sans-serif;">TK Dashboard</header>';
            }
        }

        // Load shared components
        loadSharedComponents();
    </script>
</body>
</html>
