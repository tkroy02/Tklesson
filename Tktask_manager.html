        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",

            storageBucket: "tkmachines-945b9.firebasestorage.app",
            messagingSenderId: "137087394703",

        const app = initializeApp(firebaseConfig);

<script>
fetch("super-header.html")
.then(response => response.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
    const header = document.querySelector("#header header");
    const navMenu = header.querySelector("#navMenu");
    const hamburger = header.querySelector(".hamburger");

    const logoutBtn = header.querySelector("#logout-btn");
    if (logoutBtn) {
        logoutBtn.addEventListener("click", function() {
            if (confirm('Sign out and go to Etante?')) {
                window.location.href = 'etante.html';
            }
        });
    }

    if(hamburger && navMenu){
        hamburger.addEventListener("click", () => {
            const isOpen = navMenu.classList.toggle("open");
            hamburger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
    }
    header.querySelectorAll(".dropdown").forEach(dropdown => {
        const dropbtn = dropdown.querySelector(".dropbtn");
        if(dropbtn) {
            dropbtn.addEventListener("click", e => {
                if(window.innerWidth <= 1200){
                    e.preventDefault();
                    const nowActive = dropdown.classList.toggle("active");
                    dropbtn.setAttribute("aria-expanded", nowActive ? "true" : "false");
                }
            });
        }
    });
});
</script>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Tklesson Design System colors for React components
    const colors = {
        primary: '#0b3d91',
        primaryLight: '#1e5bbf',
        primaryDark: '#082b6f',
        secondary: '#ffd700',
        textDark: '#0b1e3d',
        textGray: '#4a5568',
        textMuted: '#708090',
        background: '#ffffff',
        backgroundLight: '#f7f9fc',
        backgroundAlt: '#eef3fb',
        success: '#06d6a0',
        danger: '#ef476f',
        warning: '#ffd166'
    };

    function TaskManager() {
        const [tasks, setTasks] = useState([]);
        const [title, setTitle] = useState('');
        const [description, setDescription] = useState('');
        const [filter, setFilter] = useState('all');
        const [editingId, setEditingId] = useState(null);
        const [editTitle, setEditTitle] = useState('');
        const [editDescription, setEditDescription] = useState('');
        const [loading, setLoading] = useState(false);
        const [firebaseInitialized, setFirebaseInitialized] = useState(false);
        const [syncStatus, setSyncStatus] = useState('idle');
        const [user, setUser] = useState(null);
        const rootRef = useRef(null);

        useEffect(() => {
            const checkFirebase = () => {
                if (window.firebaseModules) {
                    const { auth, onAuthStateChanged } = window.firebaseModules;
                    setFirebaseInitialized(true);
                    onAuthStateChanged(auth, (currentUser) => {
                        if (currentUser) {
                            setUser(currentUser);
                        } else {
                            window.location.href = 'login.html';
                            return;
                        }
                    });
                } else {
                    setTimeout(checkFirebase, 100);
                }
            };
            checkFirebase();
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) setTasks(JSON.parse(savedTasks));
        }, []);

        useEffect(() => {
            if (!user || !window.firebaseModules) return;
            const { db, collection, onSnapshot, query, where, orderBy } = window.firebaseModules;
            const tasksQuery = query(
                collection(db, "tasks"),
                where("userId", "==", user.uid),
                orderBy("createdAt", "desc")
            );
            const unsubscribe = onSnapshot(
                tasksQuery,
                (snapshot) => {
                    const tasksArray = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        tasksArray.push({
                            id: doc.id,
                            ...data,
                            createdAt: data.createdAt ? data.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()
                        });
                    });
                    setTasks(tasksArray);
                    setSyncStatus('synced');
                },
                (error) => {
                    console.error("Error fetching tasks:", error);
                    setSyncStatus('error');
                    const savedTasks = localStorage.getItem('tasks');
                    if (savedTasks) setTasks(JSON.parse(savedTasks));
                }
            );
            return () => unsubscribe();
        }, [user]);

        useEffect(() => {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }, [tasks]);

        const addTask = async (e) => {
            e.preventDefault();
            if (!title.trim() || !window.firebaseModules) return;
            setLoading(true);
            setSyncStatus('syncing');
            const newTask = {
                title: title.trim(),
                description: description.trim(),
                completed: false,
                userId: user.uid,
                createdAt: window.firebaseModules.serverTimestamp()
            };
            try {
                const { db, collection, addDoc } = window.firebaseModules;
                await addDoc(collection(db, "tasks"), newTask);
                setTitle('');
                setDescription('');
                setSyncStatus('synced');
            } catch (error) {
                console.error("Error adding task:", error);
                setSyncStatus('error');
                const localTask = { ...newTask, id: Date.now().toString(), createdAt: new Date().toISOString() };
                setTasks([localTask, ...tasks]);
                setTitle('');
                setDescription('');
            } finally {
                setLoading(false);
            }
        };

        const deleteTask = async (id) => {
            if (!window.firebaseModules) return;
            setLoading(true);
            setSyncStatus('syncing');
            try {
                const { db, doc, deleteDoc } = window.firebaseModules;
                await deleteDoc(doc(db, "tasks", id));
                setSyncStatus('synced');
            } catch (error) {
                console.error("Error deleting task:", error);
                setSyncStatus('error');
                setTasks(tasks.filter(task => task.id !== id));
            } finally {
                setLoading(false);
            }
        };

        const toggleComplete = async (id) => {
            if (!window.firebaseModules) return;
            setLoading(true);
            setSyncStatus('syncing');
            const taskToUpdate = tasks.find(task => task.id === id);
            const updatedStatus = !taskToUpdate.completed;
            try {
                const { db, doc, updateDoc } = window.firebaseModules;
                await updateDoc(doc(db, "tasks", id), { completed: updatedStatus });
                setSyncStatus('synced');
            } catch (error) {
                console.error("Error updating task:", error);
                setSyncStatus('error');
                setTasks(tasks.map(task => task.id === id ? { ...task, completed: updatedStatus } : task));
            } finally {
                setLoading(false);
            }
        };

        const startEditing = (task) => {
            setEditingId(task.id);
            setEditTitle(task.title);
            setEditDescription(task.description || '');
        };

        const cancelEditing = () => {
            setEditingId(null);
            setEditTitle('');
            setEditDescription('');
        };

        const saveEdit = async () => {
            if (!editTitle.trim() || !window.firebaseModules) return;
            setLoading(true);
            setSyncStatus('syncing');
            try {
                const { db, doc, updateDoc } = window.firebaseModules;
                await updateDoc(doc(db, "tasks", editingId), {
                    title: editTitle.trim(),
                    description: editDescription.trim()
                });
                cancelEditing();
                setSyncStatus('synced');
            } catch (error) {
                console.error("Error updating task:", error);
                setSyncStatus('error');
                setTasks(tasks.map(task => task.id === editingId
                    ? { ...task, title: editTitle.trim(), description: editDescription.trim() }
                    : task));
                cancelEditing();
            } finally {
                setLoading(false);
            }
        };

        const clearCompleted = async () => {
            const completedTasks = tasks.filter(task => task.completed);
            if (completedTasks.length === 0 || !window.firebaseModules) return;
            setLoading(true);
            setSyncStatus('syncing');
            try {
                const { db, doc, writeBatch } = window.firebaseModules;
                const batch = writeBatch(db);
                completedTasks.forEach(task => { batch.delete(doc(db, "tasks", task.id)); });
                await batch.commit();
                setSyncStatus('synced');
            } catch (error) {
                console.error("Error clearing completed tasks:", error);
                setSyncStatus('error');
                setTasks(tasks.filter(task => !task.completed));
            } finally {
                setLoading(false);
            }
        };

        const filteredTasks = tasks.filter(task => {
            if (filter === 'active') return !task.completed;
            if (filter === 'completed') return task.completed;
            return true;
        });

        const completedCount = tasks.filter(task => task.completed).length;
        const activeCount = tasks.length - completedCount;

        const getStatusMessage = () => {
            if (!window.firebaseModules) return "Loading Firebase...";
            if (!user) return "Checking authentication...";
            if (!firebaseInitialized) return "Initializing Firebase...";
            if (syncStatus === 'syncing') return "Syncing with cloud...";
            if (syncStatus === 'error') return "Sync error - using local storage";
            if (syncStatus === 'synced') return "All tasks synced with cloud";
            return "Connected to Firebase";
        };

        const getStatusColor = () => {
            if (!window.firebaseModules) return { bg: '#fef3c7', text: '#92400e' };
            if (!user) return { bg: '#fef3c7', text: '#92400e' };
            if (!firebaseInitialized) return { bg: '#fef3c7', text: '#92400e' };
            if (syncStatus === 'error') return { bg: '#fee2e2', text: '#991b1b' };
            if (syncStatus === 'syncing') return { bg: '#dbeafe', text: '#1e40af' };
            return { bg: '#d1fae5', text: '#065f46' };
        };

        const statusStyle = getStatusColor();

        // Tklesson-styled React components
        const cardStyle = {
            background: colors.background,
            borderRadius: '16px',
            padding: '28px',
            boxShadow: '0 4px 20px rgba(11, 61, 145, 0.08)',
            border: '1px solid transparent',
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)',
            marginBottom: '24px'
        };

        const inputStyle = {
            width: '100%',
            padding: '12px 16px',
            fontSize: '1rem',
            fontFamily: 'Inter, sans-serif',
            border: '2px solid #e2e8f0',
            borderRadius: '10px',
            background: colors.background,
            color: colors.textDark,
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)',
            outline: 'none'
        };

        const btnPrimaryStyle = {
            display: 'inline-flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '14px 32px',
            fontSize: '1rem',
            fontWeight: 700,
            borderRadius: '50px',
            cursor: 'pointer',
            border: 'none',
            gap: '10px',
            backgroundColor: colors.primary,
            color: colors.textLight,
            boxShadow: '0 4px 16px rgba(11, 61, 145, 0.3)',
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)'
        };

        const btnSecondaryStyle = {
            ...btnPrimaryStyle,
            backgroundColor: colors.backgroundAlt,
            color: colors.primary,
            boxShadow: 'none'
        };

        const btnDangerStyle = {
            ...btnPrimaryStyle,
            backgroundColor: colors.danger,
            boxShadow: '0 4px 16px rgba(239, 71, 111, 0.3)'
        };

        const btnFilterStyle = (active) => ({
            padding: '10px 20px',
            borderRadius: '50px',
            border: 'none',
            cursor: 'pointer',
            fontWeight: 600,
            fontSize: '0.9rem',
            backgroundColor: active ? colors.primary : colors.background,
            color: active ? colors.textLight : colors.textGray,
            boxShadow: active ? '0 4px 16px rgba(11, 61, 145, 0.3)' : '0 2px 8px rgba(11, 61, 145, 0.06)',
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)'
        });

        const kpiCardStyle = {
            background: colors.background,
            borderRadius: '16px',
            padding: '24px',
            textAlign: 'center',
            boxShadow: '0 4px 20px rgba(11, 61, 145, 0.08)',
            border: '1px solid transparent',
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)'
        };

        const taskCardStyle = {
            background: colors.background,
            borderRadius: '16px',
            padding: '20px',
            boxShadow: '0 4px 20px rgba(11, 61, 145, 0.08)',
            border: '1px solid transparent',
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)',
            marginBottom: '16px'
        };

        const actionBtnStyle = (color, bg) => ({
            width: '36px',
            height: '36px',
            borderRadius: '10px',
            border: 'none',
            cursor: 'pointer',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: bg,
            color: color,
            transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)'
        });

        return (
            <div>
                {/* Status Bar */}
                <div style={{ textAlign: 'center', marginBottom: '28px' }}>
                    <span style={{
                        display: 'inline-flex',
                        alignItems: 'center',
                        gap: '8px',
                        padding: '8px 20px',
                        borderRadius: '50px',
                        fontSize: '0.85rem',
                        fontWeight: 600,
                        background: statusStyle.bg,
                        color: statusStyle.text
                    }}>
                        {syncStatus === 'syncing' && <i className="fas fa-spinner fa-spin"></i>}
                        {syncStatus === 'synced' && <i className="fas fa-cloud"></i>}
                        {syncStatus === 'error' && <i className="fas fa-exclamation-triangle"></i>}
                        {getStatusMessage()}
                    </span>
                </div>

                {/* KPI Cards */}
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))',
                    gap: '20px',
                    marginBottom: '32px'
                }}>
                    <div style={kpiCardStyle}>
                        <div style={{ fontSize: '2rem', fontWeight: 900, color: colors.primary, marginBottom: '4px' }}>{tasks.length}</div>
                        <div style={{ fontSize: '0.85rem', color: colors.textMuted, fontWeight: 500 }}>Total Tasks</div>
                    </div>
                    <div style={kpiCardStyle}>
                        <div style={{ fontSize: '2rem', fontWeight: 900, color: colors.success, marginBottom: '4px' }}>{activeCount}</div>
                        <div style={{ fontSize: '0.85rem', color: colors.textMuted, fontWeight: 500 }}>Active</div>
                    </div>
                    <div style={kpiCardStyle}>
                        <div style={{ fontSize: '2rem', fontWeight: 900, color: colors.secondary, marginBottom: '4px' }}>{completedCount}</div>
                        <div style={{ fontSize: '0.85rem', color: colors.textMuted, fontWeight: 500 }}>Completed</div>
                    </div>
                </div>

                {/* Add/Edit Task Form */}
                <div style={cardStyle}>
                    <h3 style={{ fontSize: '1.2rem', marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <i className="fas fa-plus-circle" style={{ color: colors.success }}></i>
                        {editingId ? 'Edit Task' : 'Add New Task'}
                    </h3>
                    <form onSubmit={editingId ? saveEdit : addTask}>
                        <div style={{ marginBottom: '16px' }}>
                            <label style={{ display: 'block', fontSize: '0.9rem', fontWeight: 600, color: colors.textDark, marginBottom: '6px' }}>
                                Task Title *
                            </label>
                            <input
                                type="text"
                                value={editingId ? editTitle : title}
                                onChange={(e) => editingId ? setEditTitle(e.target.value) : setTitle(e.target.value)}
                                placeholder="What needs to be done?"
                                style={inputStyle}
                                required
                                disabled={loading}
                            />
                        </div>
                        <div style={{ marginBottom: '20px' }}>
                            <label style={{ display: 'block', fontSize: '0.9rem', fontWeight: 600, color: colors.textDark, marginBottom: '6px' }}>
                                Description
                            </label>
                            <textarea
                                value={editingId ? editDescription : description}
                                onChange={(e) => editingId ? setEditDescription(e.target.value) : setDescription(e.target.value)}
                                placeholder="Add some details..."
                                rows="3"
                                style={{ ...inputStyle, resize: 'vertical', minHeight: '80px' }}
                                disabled={loading}
                            />
                        </div>
                        <div style={{ display: 'flex', gap: '12px' }}>
                            {editingId ? (
                                <>
                                    <button type="submit" style={btnPrimaryStyle} disabled={loading}>
                                        {loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-save"></i>}
                                        Save Changes
                                    </button>
                                    <button type="button" onClick={cancelEditing} style={btnSecondaryStyle} disabled={loading}>
                                        Cancel
                                    </button>
                                </>
                            ) : (
                                <button type="submit" style={{ ...btnPrimaryStyle, width: '100%' }} disabled={loading || !user}>
                                    {loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-plus"></i>}
                                    Add Task
                                </button>
                            )}
                        </div>
                    </form>
                </div>

                {/* Filters */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
                    <div style={{ display: 'flex', gap: '8px' }}>
                        {['all', 'active', 'completed'].map((f) => (
                            <button
                                key={f}
                                onClick={() => setFilter(f)}
                                style={btnFilterStyle(filter === f)}
                                disabled={loading}
                            >
                                {f.charAt(0).toUpperCase() + f.slice(1)}
                            </button>
                        ))}
                    </div>
                    {completedCount > 0 && (
                        <button onClick={clearCompleted} style={btnDangerStyle} disabled={loading}>
                            {loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-trash"></i>}
                            Clear Completed
                        </button>
                    )}
                </div>

                {/* Task List */}
                <div>
                    {loading && tasks.length === 0 ? (
                        <div style={{ ...cardStyle, textAlign: 'center', padding: '60px' }}>
                            <i className="fas fa-spinner fa-spin" style={{ fontSize: '2rem', color: colors.primary, marginBottom: '16px' }}></i>
                            <p style={{ color: colors.textMuted }}>Loading tasks...</p>
                        </div>
                    ) : filteredTasks.length === 0 ? (
                        <div style={{ ...cardStyle, textAlign: 'center', padding: '60px' }}>
                            <i className="fas fa-inbox" style={{ fontSize: '3rem', color: '#cbd5e1', marginBottom: '16px' }}></i>
                            <p style={{ color: colors.textMuted, fontSize: '1.1rem' }}>
                                {filter === 'completed' ? "No completed tasks yet - keep going!" :
                                 filter === 'active' ? "No active tasks - time to add some!" :
                                 "No tasks yet. Add your first task to get started!"}
                            </p>
                        </div>
                    ) : (
                        filteredTasks.map((task) => (
                            <div key={task.id} style={taskCardStyle}>
                                {editingId === task.id ? (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                        <input
                                            type="text"
                                            value={editTitle}
                                            onChange={(e) => setEditTitle(e.target.value)}
                                            style={inputStyle}
                                            disabled={loading}
                                        />
                                        <textarea
                                            value={editDescription}
                                            onChange={(e) => setEditDescription(e.target.value)}
                                            style={{ ...inputStyle, resize: 'vertical', minHeight: '60px' }}
                                            rows="2"
                                            disabled={loading}
                                        />
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button onClick={saveEdit} style={btnPrimaryStyle} disabled={loading}>
                                                {loading && <i className="fas fa-spinner fa-spin"></i>}
                                                Save
                                            </button>
                                            <button onClick={cancelEditing} style={btnSecondaryStyle} disabled={loading}>
                                                Cancel
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: '14px', flex: 1 }}>
                                            <button
                                                onClick={() => toggleComplete(task.id)}
                                                style={{
                                                    marginTop: '4px',
                                                    width: '24px',
                                                    height: '24px',
                                                    borderRadius: '50%',
                                                    border: `2px solid ${task.completed ? colors.success : '#cbd5e1'}`,
                                                    background: task.completed ? colors.success : 'transparent',
                                                    color: 'white',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    cursor: 'pointer',
                                                    flexShrink: 0,
                                                    transition: 'all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)'
                                                }}
                                                disabled={loading}
                                            >
                                                {task.completed && <i className="fas fa-check" style={{ fontSize: '0.7rem' }}></i>}
                                            </button>
                                            <div style={{ flex: 1, opacity: task.completed ? 0.6 : 1, textDecoration: task.completed ? 'line-through' : 'none' }}>
                                                <h4 style={{ fontSize: '1.05rem', fontWeight: 700, color: colors.textDark, marginBottom: '4px' }}>
                                                    {task.title}
                                                </h4>
                                                {task.description && (
                                                    <p style={{ color: colors.textGray, fontSize: '0.9rem', marginBottom: '8px' }}>{task.description}</p>
                                                )}
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '16px', fontSize: '0.8rem', color: colors.textMuted }}>
                                                    <span><i className="fas fa-calendar" style={{ marginRight: '4px' }}></i>{task.createdAt}</span>
                                                    {task.completed && (
                                                        <span style={{ color: colors.success, fontWeight: 600 }}>
                                                            <i className="fas fa-check-circle" style={{ marginRight: '4px' }}></i>Completed
                                                        </span>
                                                    )}
                                                    {firebaseInitialized && syncStatus === 'synced' && (
                                                        <span style={{ color: colors.primary }}>
                                                            <i className="fas fa-cloud" style={{ marginRight: '4px' }}></i>Cloud
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', gap: '6px', marginLeft: '12px' }}>
                                            <button
                                                onClick={() => startEditing(task)}
                                                style={actionBtnStyle(colors.primary, colors.backgroundAlt)}
                                                title="Edit task"
                                                disabled={loading}
                                            >
                                                <i className="fas fa-edit" style={{ fontSize: '0.85rem' }}></i>
                                            </button>
                                            <button
                                                onClick={() => deleteTask(task.id)}
                                                style={actionBtnStyle('#dc2626', '#fee2e2')}
                                                title="Delete task"
                                                disabled={loading}
                                            >
                                                <i className="fas fa-trash" style={{ fontSize: '0.85rem' }}></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))
                    )}
                </div>

                {/* Footer */}
                <div style={{ textAlign: 'center', marginTop: '40px', color: colors.textMuted, fontSize: '0.85rem' }}>
                    <p>Built with React 18 and Firebase v9</p>
                    <p>Tasks automatically sync to the cloud and persist locally</p>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TaskManager />);
</script>

</body>
</html>
