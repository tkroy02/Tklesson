<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager with Firebase</title>
    
    <!-- React 18 with proper createRoot -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS via CDN -->

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDK v9 Modular -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy, serverTimestamp, writeBatch } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js';

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
            authDomain: "tkmachines-945b9.firebaseapp.com",
            projectId: "tkmachines-945b9",
            storageBucket: "tkmachines-945b9.firebasestorage.app",
            messagingSenderId: "137087394703",
            appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
            measurementId: "G-Y8GH34Q2FN"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);

        // Make Firebase available globally for React component
        window.firebaseModules = {
            db,
            auth,
            collection,
            addDoc,
            updateDoc,
            deleteDoc,
            doc,
            onSnapshot,
            query,
            where,
            orderBy,
            serverTimestamp,
            writeBatch,
            onAuthStateChanged,
            signOut
        };
    </script>
    
    <style>
        :root {
            /* Navy & Gold Theme */
            --tk-navy-dark: #0a1128;
            --tk-navy-main: #141d3b;
            --tk-navy-light: #1e2a4a;
            --tk-gold-main: #d4af37;
            --tk-gold-light: #f1c40f;
            --tk-gold-glow: rgba(212, 175, 55, 0.4);
            --tk-text-light: #e6e9f0;
            --tk-text-muted: #a0aabf;
            --tk-bg-surface: rgba(20, 29, 59, 0.6);
            --tk-border: rgba(212, 175, 55, 0.3);
            --tk-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #06d6a0;
            --warning: #ffd166;

            --info: #3b82f6;
        }

            margin: 0;

            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;

            flex-direction: column;

            background: linear-gradient(160deg, var(--tk-navy-dark) 0%, var(--tk-navy-main) 30%, var(--tk-navy-light) 60%, #0f1a30 100%);

        /* Containers for dynamic header/footer */

        /* Background decorations */
        .bg-orb {

        .bg-orb:nth-child(1) {

        .bg-orb:nth-child(2) {

            height:380px; 
            background: var(--tk-gold-main); 
            bottom:-100px; 
            right:-90px; 
            animation: drift 26s infinite ease-in-out reverse; 
        }
        .bg-orb:nth-child(3) { 
            width:280px; 
            height:280px;

        .grid-pattern {

            inset:0;

            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

        }

        /* Navy Card Styling */
        .navy-card {
            background: rgba(20, 29, 59, 0.8) !important;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .navy-card:hover {
            border-color: rgba(212, 175, 55, 0.4) !important;
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
        }

        .navy-input {
            background: rgba(20, 29, 59, 0.6) !important;

            color: #e6e9f0 !important;
        }

        .navy-input:focus {

        .navy-button-primary {

        .navy-button-primary:hover {

        .navy-button-primary:disabled {

            transform: none;
        }

        .navy-button-secondary {

            color: #e6e9f0 !important;
            border: 1px solid rgba(160, 170, 191, 0.3) !important;
            transition: all 0.3s;
        }

        .navy-button-secondary:hover {
            background: rgba(160, 170, 191, 0.25) !important;
            border-color: #d4af37 !important;
        }

        .task-completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0a1128;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header will be loaded from super-header.html -->
    <div id="super-header-container"></div>

    <!-- Background decorations -->
    <div class="bg-orb" style="position: fixed;"></div>
    <div class="bg-orb" style="position: fixed;"></div>
    <div class="bg-orb" style="position: fixed;"></div>
    <div class="grid-pattern" style="position: fixed;"></div>

    <div id="root"></div>

    <!-- Footer will be loaded from super-footer.html -->
    <div id="super-footer-container"></div>

    <script>
        // Load super-header and super-footer
        async function loadComponent(url, containerId) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById(containerId).innerHTML = html;
                } else {
                    console.warn(`Could not load ${url}: ${response.status}`);
                }
            } catch (error) {
                console.warn(`Error loading ${url}:`, error);
            }
        }
        
        // Load header and footer
        loadComponent('super-header.html', 'super-header-container');
        loadComponent('super-footer.html', 'super-footer-container');
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TaskManager() {
            const [tasks, setTasks] = useState([]);
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [filter, setFilter] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDescription, setEditDescription] = useState('');
            const [loading, setLoading] = useState(false);
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [user, setUser] = useState(null);

            // Initialize Firebase and authentication
            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseModules) {
                        const { auth, onAuthStateChanged } = window.firebaseModules;
                        
                        setFirebaseInitialized(true);
                        console.log("Firebase v9 initialized successfully");

                        // Set up auth state listener
                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                console.log("User is authenticated:", currentUser.email);
                                
                                // Update header user info
                                updateUserInfo(currentUser);
                            } else {
                                // User is not logged in, redirect to login page
                                console.log("User not authenticated, redirecting to login...");
                                window.location.href = 'login.html';
                                return;
                            }
                        });
                    } else {
                        // Firebase not loaded yet, check again
                        setTimeout(checkFirebase, 100);
                    }
                };

                checkFirebase();

                // Load initial data from localStorage as fallback
                const savedTasks = localStorage.getItem('tasks');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
            }, []);

            // Update user info in header
            const updateUserInfo = (user) => {
                setTimeout(() => {
                    try {
                        const adminNameElement = document.getElementById('admin-name');
                        const adminEmailElement = document.getElementById('admin-email');
                        
                        if (adminNameElement && adminEmailElement) {
                            adminNameElement.textContent = user.displayName || 'User';
                            adminEmailElement.textContent = user.email || 'Logged in';
                        }
                    } catch (error) {
                        console.log('Could not update user info in header');
                    }
                }, 500); // Delay to allow header to load
            };

            // Set up real-time Firestore listener - ONLY when user is authenticated
            useEffect(() => {
                if (!user || !window.firebaseModules) return;

                const { 
                    db, 
                    collection, 
                    onSnapshot, 
                    query, 
                    where, 
                    orderBy 
                } = window.firebaseModules;

                const tasksQuery = query(
                    collection(db, "tasks"),
                    where("userId", "==", user.uid),
                    orderBy("createdAt", "desc")
                );
                
                const unsubscribe = onSnapshot(
                    tasksQuery,
                    (snapshot) => {
                        const tasksArray = [];
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            tasksArray.push({ 
                                id: doc.id, 
                                ...data,
                                createdAt: data.createdAt ? data.createdAt.toDate().toLocaleDateString() : new Date().toLocaleDateString()
                            });
                        });
                        setTasks(tasksArray);
                        setSyncStatus('synced');
                    },
                    (error) => {
                        console.error("Error fetching tasks:", error);
                        setSyncStatus('error');
                        // Fallback to localStorage
                        const savedTasks = localStorage.getItem('tasks');
                        if (savedTasks) {
                            setTasks(JSON.parse(savedTasks));
                        }
                    }
                );

                return () => unsubscribe();
            }, [user]);

            // Save to localStorage as backup whenever tasks change
            useEffect(() => {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!title.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const newTask = {
                    title: title.trim(),
                    description: description.trim(),
                    completed: false,
                    userId: user.uid,
                    createdAt: window.firebaseModules.serverTimestamp()
                };

                try {
                    const { db, collection, addDoc } = window.firebaseModules;
                    await addDoc(collection(db, "tasks"), newTask);
                    setTitle('');
                    setDescription('');
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error adding task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    const localTask = {
                        ...newTask,
                        id: Date.now().toString(),
                        createdAt: new Date().toISOString()
                    };
                    setTasks([localTask, ...tasks]);
                    setTitle('');
                    setDescription('');
                } finally {
                    setLoading(false);
                }
            };

            const deleteTask = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, "tasks", id));
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error deleting task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => task.id !== id));
                } finally {
                    setLoading(false);
                }
            };

            const toggleComplete = async (id) => {
                if (!window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                const taskToUpdate = tasks.find(task => task.id === id);
                const updatedStatus = !taskToUpdate.completed;

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", id), {
                        completed: updatedStatus
                    });
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === id ? { ...task, completed: updatedStatus } : task
                    ));
                } finally {
                    setLoading(false);
                }
            };

            const startEditing = (task) => {
                setEditingId(task.id);
                setEditTitle(task.title);
                setEditDescription(task.description || '');
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditTitle('');
                setEditDescription('');
            };

            const saveEdit = async () => {
                if (!editTitle.trim() || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, updateDoc } = window.firebaseModules;
                    await updateDoc(doc(db, "tasks", editingId), {
                        title: editTitle.trim(),
                        description: editDescription.trim()
                    });
                    cancelEditing();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error updating task:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.map(task =>
                        task.id === editingId
                            ? { ...task, title: editTitle.trim(), description: editDescription.trim() }
                            : task
                    ));
                    cancelEditing();
                } finally {
                    setLoading(false);
                }
            };

            const clearCompleted = async () => {
                const completedTasks = tasks.filter(task => task.completed);
                if (completedTasks.length === 0 || !window.firebaseModules) return;

                setLoading(true);
                setSyncStatus('syncing');

                try {
                    const { db, doc, writeBatch } = window.firebaseModules;
                    const batch = writeBatch(db);
                    
                    completedTasks.forEach(task => {
                        const taskRef = doc(db, "tasks", task.id);
                        batch.delete(taskRef);
                    });
                    
                    await batch.commit();
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Error clearing completed tasks:", error);
                    setSyncStatus('error');
                    // Fallback to local state
                    setTasks(tasks.filter(task => !task.completed));
                } finally {
                    setLoading(false);
                }
            };

            const logout = async () => {
                if (!window.firebaseModules) return;
                
                try {
                    const { auth, signOut } = window.firebaseModules;
                    await signOut(auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error("Error signing out:", error);
                }
            };

            const filteredTasks = tasks.filter(task => {
                if (filter === 'active') return !task.completed;
                if (filter === 'completed') return task.completed;
                return true;
            });

            const completedCount = tasks.filter(task => task.completed).length;
            const activeCount = tasks.length - completedCount;

            // Status message based on sync state
            const getStatusMessage = () => {
                if (!window.firebaseModules) return "Loading Firebase...";
                if (!user) return "Checking authentication...";
                if (!firebaseInitialized) return "Initializing Firebase...";
                if (syncStatus === 'syncing') return "Syncing with cloud...";
                if (syncStatus === 'error') return "Sync error - using local storage";
                if (syncStatus === 'synced') return "All tasks synced with cloud ☁️";
                return "Connected to Firebase";
            };

            return (
                <div style={{
                    minHeight: '100vh',
                    padding: '2rem 1rem',
                    position: 'relative',
                    zIndex: 10
                }}>
                    <div style={{ maxWidth: '42rem', margin: '0 auto' }}>
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 style={{
                                fontSize: '2.5rem',
                                fontWeight: 'bold',
                                color: '#f1c40f',
                                marginBottom: '0.5rem'
                            }}>
                                <i className="fas fa-tasks" style={{ marginRight: '0.75rem' }}></i>
                                Task Manager
                            </h1>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem', fontSize: '0.875rem' }}>
                                {syncStatus === 'syncing' && <div className="loading-spinner" style={{ borderColor: '#d4af37', borderTopColor: 'transparent' }}></div>}
                                <span style={{
                                    padding: '0.25rem 0.75rem',
                                    borderRadius: '9999px',
                                    fontSize: '0.8rem',
                                    background: !window.firebaseModules || !user || !firebaseInitialized 
                                        ? 'rgba(251, 191, 36, 0.2)' 
                                        : syncStatus === 'error' 
                                            ? 'rgba(239, 71, 111, 0.2)' 
                                            : syncStatus === 'syncing' 
                                                ? 'rgba(59, 130, 246, 0.2)' 
                                                : 'rgba(6, 214, 160, 0.2)',
                                    color: !window.firebaseModules || !user || !firebaseInitialized 
                                        ? '#fbbf24' 
                                        : syncStatus === 'error' 
                                            ? '#f87171' 
                                            : syncStatus === 'syncing' 
                                                ? '#60a5fa' 
                                                : '#34d399'
                                }}>
                                    {getStatusMessage()}
                                </span>
                            </div>
                            {user && (
                                <p style={{ fontSize: '0.875rem', color: '#a0aabf', marginTop: '0.5rem' }}>
                                    Welcome, {user.email}
                                </p>
                            )}
                        </div>

                        {/* Stats Cards */}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem', marginBottom: '1.5rem' }}>
                            <div className="navy-card" style={{ padding: '1rem', textAlign: 'center', borderRadius: '8px' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold', color: '#60a5fa' }}>{tasks.length}</div>
                                <div style={{ fontSize: '0.8rem', color: '#a0aabf' }}>Total</div>
                            </div>
                            <div className="navy-card" style={{ padding: '1rem', textAlign: 'center', borderRadius: '8px' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold', color: '#34d399' }}>{activeCount}</div>
                                <div style={{ fontSize: '0.8rem', color: '#a0aabf' }}>Active</div>
                            </div>
                            <div className="navy-card" style={{ padding: '1rem', textAlign: 'center', borderRadius: '8px' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: 'bold', color: '#d4af37' }}>{completedCount}</div>
                                <div style={{ fontSize: '0.8rem', color: '#a0aabf' }}>Done</div>
                            </div>
                        </div>

                        {/* Add Task Form */}
                        <div className="navy-card" style={{ padding: '1.5rem', marginBottom: '1.5rem', borderRadius: '12px' }}>
                            <h2 style={{
                                fontSize: '1.25rem',
                                fontWeight: '600',
                                color: '#e6e9f0',
                                marginBottom: '1rem'
                            }}>
                                <i className="fas fa-plus-circle" style={{ color: '#34d399', marginRight: '0.5rem' }}></i>
                                {editingId ? 'Edit Task' : 'Add New Task'}
                            </h2>
                            <form onSubmit={editingId ? saveEdit : addTask} className="space-y-4">
                                <div>
                                    <label style={{
                                        display: 'block',
                                        fontSize: '0.875rem',
                                        fontWeight: '500',
                                        color: '#a0aabf',
                                        marginBottom: '0.25rem'
                                    }}>
                                        Task Title *
                                    </label>
                                    <input
                                        type="text"
                                        value={editingId ? editTitle : title}
                                        onChange={(e) => editingId ? setEditTitle(e.target.value) : setTitle(e.target.value)}
                                        placeholder="What needs to be done?"
                                        className="navy-input"
                                        style={{
                                            width: '100%',
                                            padding: '0.5rem 0.75rem',
                                            borderRadius: '8px',
                                            fontSize: '0.95rem'
                                        }}
                                        required
                                        disabled={loading}
                                    />
                                </div>
                                <div>
                                    <label style={{
                                        display: 'block',
                                        fontSize: '0.875rem',
                                        fontWeight: '500',
                                        color: '#a0aabf',
                                        marginBottom: '0.25rem'
                                    }}>
                                        Description
                                    </label>
                                    <textarea
                                        value={editingId ? editDescription : description}
                                        onChange={(e) => editingId ? setEditDescription(e.target.value) : setDescription(e.target.value)}
                                        placeholder="Add some details..."
                                        rows="3"
                                        className="navy-input"
                                        style={{
                                            width: '100%',
                                            padding: '0.5rem 0.75rem',
                                            borderRadius: '8px',
                                            fontSize: '0.95rem',
                                            resize: 'vertical'
                                        }}
                                        disabled={loading}
                                    />
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    {editingId ? (
                                        <>
                                            <button
                                                type="submit"
                                                className="navy-button-primary"
                                                style={{
                                                    flex: '1',
                                                    padding: '0.5rem 1rem',
                                                    borderRadius: '8px',
                                                    cursor: 'pointer',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    opacity: loading ? 0.6 : 1
                                                }}
                                                disabled={loading}
                                            >
                                                {loading ? <div className="loading-spinner" style={{ marginRight: '0.5rem' }}></div> : <i className="fas fa-save" style={{ marginRight: '0.5rem' }}></i>}
                                                Save Changes
                                            </button>
                                            <button
                                                type="button"
                                                onClick={cancelEditing}
                                                className="navy-button-secondary"
                                                style={{
                                                    padding: '0.5rem 1rem',
                                                    borderRadius: '8px',
                                                    cursor: 'pointer',
                                                    opacity: loading ? 0.6 : 1
                                                }}
                                                disabled={loading}
                                            >
                                                Cancel
                                            </button>
                                        </>
                                    ) : (
                                        <button
                                            type="submit"
                                            className="navy-button-primary"
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem 1rem',
                                                borderRadius: '8px',
                                                cursor: 'pointer',
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                fontSize: '1rem',
                                                opacity: (loading || !user) ? 0.6 : 1
                                            }}
                                            disabled={loading || !user}
                                        >
                                            {loading ? <div className="loading-spinner" style={{ marginRight: '0.5rem' }}></div> : <i className="fas fa-plus" style={{ marginRight: '0.5rem' }}></i>}
                                            Add Task
                                        </button>
                                    )}
                                </div>
                            </form>
                        </div>

                        {/* Filters */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                {['all', 'active', 'completed'].map((f) => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        style={{
                                            padding: '0.5rem 1rem',
                                            borderRadius: '8px',
                                            textTransform: 'capitalize',
                                            fontSize: '0.875rem',
                                            cursor: 'pointer',
                                            transition: 'all 0.3s',
                                            background: filter === f 
                                                ? 'rgba(212, 175, 55, 0.2)' 
                                                : 'rgba(20, 29, 59, 0.6)',
                                            color: filter === f ? '#f1c40f' : '#a0aabf',
                                            border: filter === f 
                                                ? '1px solid rgba(212, 175, 55, 0.4)' 
                                                : '1px solid rgba(160, 170, 191, 0.2)',
                                            opacity: loading ? 0.6 : 1
                                        }}
                                        disabled={loading}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                            {completedCount > 0 && (
                                <button
                                    onClick={clearCompleted}
                                    style={{
                                        padding: '0.5rem 1rem',
                                        borderRadius: '8px',
                                        fontSize: '0.875rem',
                                        cursor: 'pointer',
                                        transition: 'all 0.3s',
                                        background: 'rgba(239, 71, 111, 0.2)',
                                        color: '#f87171',
                                        border: '1px solid rgba(239, 71, 111, 0.3)',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        opacity: loading ? 0.6 : 1
                                    }}
                                    disabled={loading}
                                >
                                    {loading ? <div className="loading-spinner" style={{ marginRight: '0.5rem', borderColor: '#f87171', borderTopColor: 'transparent' }}></div> : <i className="fas fa-trash" style={{ marginRight: '0.5rem' }}></i>}
                                    Clear Completed
                                </button>
                            )}
                        </div>

                        {/* Task List */}
                        <div className="space-y-3">
                            {loading && tasks.length === 0 ? (
                                <div className="navy-card" style={{ padding: '2rem', textAlign: 'center', borderRadius: '12px' }}>
                                    <div className="loading-spinner" style={{ width: '40px', height: '40px', margin: '0 auto 1rem', borderColor: '#d4af37', borderTopColor: 'transparent' }}></div>
                                    <p style={{ color: '#a0aabf', fontSize: '1.125rem' }}>Loading tasks...</p>
                                </div>
                            ) : filteredTasks.length === 0 ? (
                                <div className="navy-card" style={{ padding: '2rem', textAlign: 'center', borderRadius: '12px' }}>
                                    <i className="fas fa-inbox" style={{ fontSize: '2.5rem', color: 'rgba(212, 175, 55, 0.2)', marginBottom: '1rem' }}></i>
                                    <p style={{ color: '#a0aabf', fontSize: '1.125rem' }}>
                                        {filter === 'completed' 
                                            ? "No completed tasks yet - keep going! 💪"
                                            : filter === 'active'
                                            ? "No active tasks - time to add some! 🎯"
                                            : "No tasks yet. Add your first task to get started! 🚀"
                                        }
                                    </p>
                                </div>
                            ) : (
                                filteredTasks.map((task) => (
                                    <div key={task.id} className="navy-card fade-in" style={{ 
                                        borderRadius: '12px',
                                        transition: 'all 0.3s',
                                        cursor: 'default'
                                    }}>
                                        <div style={{ padding: '1rem' }}>
                                            {editingId === task.id ? (
                                                <div className="space-y-3">
                                                    <input
                                                        type="text"
                                                        value={editTitle}
                                                        onChange={(e) => setEditTitle(e.target.value)}
                                                        className="navy-input"
                                                        style={{
                                                            width: '100%',
                                                            padding: '0.5rem 0.75rem',
                                                            borderRadius: '8px',
                                                            fontWeight: '600',
                                                            fontSize: '1rem'
                                                        }}
                                                        disabled={loading}
                                                    />
                                                    <textarea
                                                        value={editDescription}
                                                        onChange={(e) => setEditDescription(e.target.value)}
                                                        className="navy-input"
                                                        style={{
                                                            width: '100%',
                                                            padding: '0.5rem 0.75rem',
                                                            borderRadius: '8px',
                                                            resize: 'vertical'
                                                        }}
                                                        rows="2"
                                                        disabled={loading}
                                                    />
                                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                                        <button
                                                            onClick={saveEdit}
                                                            className="navy-button-primary"
                                                            style={{
                                                                padding: '0.5rem 1rem',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                justifyContent: 'center',
                                                                opacity: loading ? 0.6 : 1
                                                            }}
                                                            disabled={loading}
                                                        >
                                                            {loading && <div className="loading-spinner" style={{ marginRight: '0.5rem' }}></div>}
                                                            Save
                                                        </button>
                                                        <button
                                                            onClick={cancelEditing}
                                                            className="navy-button-secondary"
                                                            style={{
                                                                padding: '0.5rem 1rem',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                opacity: loading ? 0.6 : 1
                                                            }}
                                                            disabled={loading}
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                                                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '0.75rem', flex: '1' }}>
                                                        <button
                                                            onClick={() => toggleComplete(task.id)}
                                                            style={{
                                                                marginTop: '0.25rem',
                                                                width: '1.25rem',
                                                                height: '1.25rem',
                                                                borderRadius: '50%',
                                                                border: task.completed ? '2px solid #34d399' : '2px solid rgba(160, 170, 191, 0.4)',
                                                                background: task.completed ? '#34d399' : 'transparent',
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                justifyContent: 'center',
                                                                cursor: 'pointer',
                                                                opacity: loading ? 0.6 : 1,
                                                                transition: 'all 0.3s'
                                                            }}
                                                            disabled={loading}
                                                        >
                                                            {task.completed && <i className="fas fa-check" style={{ color: '#0a1128', fontSize: '0.65rem' }}></i>}
                                                        </button>
                                                        <div style={{ flex: '1' }} className={task.completed ? 'task-completed' : ''}>
                                                            <h3 style={{ fontWeight: '600', color: '#e6e9f0', fontSize: '1.1rem' }}>
                                                                {task.title}
                                                            </h3>
                                                            {task.description && (
                                                                <p style={{ color: '#a0aabf', marginTop: '0.25rem' }}>{task.description}</p>
                                                            )}
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginTop: '0.5rem', fontSize: '0.8rem' }}>
                                                                <span style={{ color: '#a0aabf' }}>
                                                                    <i className="fas fa-calendar" style={{ marginRight: '0.25rem', color: '#d4af37' }}></i>
                                                                    {task.createdAt}
                                                                </span>
                                                                {task.completed && (
                                                                    <span style={{ color: '#34d399' }}>
                                                                        <i className="fas fa-check-circle" style={{ marginRight: '0.25rem' }}></i>
                                                                        Completed
                                                                    </span>
                                                                )}
                                                                {firebaseInitialized && syncStatus === 'synced' && (
                                                                    <span style={{ color: '#60a5fa' }}>
                                                                        <i className="fas fa-cloud" style={{ marginRight: '0.25rem' }}></i>
                                                                        Cloud
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div style={{ display: 'flex', gap: '0.25rem', marginLeft: '0.5rem' }}>
                                                        <button
                                                            onClick={() => startEditing(task)}
                                                            style={{
                                                                padding: '0.5rem',
                                                                color: '#60a5fa',
                                                                background: 'transparent',
                                                                border: 'none',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                transition: 'all 0.2s',
                                                                opacity: loading ? 0.6 : 1
                                                            }}
                                                            title="Edit task"
                                                            disabled={loading}
                                                            onMouseEnter={(e) => e.target.style.background = 'rgba(96, 165, 250, 0.1)'}
                                                            onMouseLeave={(e) => e.target.style.background = 'transparent'}
                                                        >
                                                            <i className="fas fa-edit"></i>
                                                        </button>
                                                        <button
                                                            onClick={() => deleteTask(task.id)}
                                                            style={{
                                                                padding: '0.5rem',
                                                                color: '#f87171',
                                                                background: 'transparent',
                                                                border: 'none',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                transition: 'all 0.2s',
                                                                opacity: loading ? 0.6 : 1
                                                            }}
                                                            title="Delete task"
                                                            disabled={loading}
                                                            onMouseEnter={(e) => e.target.style.background = 'rgba(248, 113, 113, 0.1)'}
                                                            onMouseLeave={(e) => e.target.style.background = 'transparent'}
                                                        >
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Footer */}
                        <div style={{ textAlign: 'center', marginTop: '2rem' }}>
                            <p style={{ color: '#a0aabf', fontSize: '0.8rem' }}>
                                Built with React 18 and Firebase v9
                            </p>
                            <p style={{ color: '#a0aabf', fontSize: '0.8rem', marginTop: '0.25rem' }}>
                                Tasks automatically sync to the cloud and persist locally
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // Use React 18 createRoot
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskManager />);
    </script>
</body>
</html>
