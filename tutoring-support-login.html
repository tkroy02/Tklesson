<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Support - Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --danger: #ef4444;
            --success: #06d6a0;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-lg: 0 20px 60px rgba(11, 61, 145, 0.15);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background shapes */
        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
        }

        .bg-shape-1 {
            width: 500px; height: 500px;
            background: white;
            top: -10%; right: -8%;
            animation: float 12s ease-in-out infinite;
        }

        .bg-shape-2 {
            width: 350px; height: 350px;
            background: var(--secondary);
            bottom: -10%; left: -5%;
            animation: float 15s ease-in-out infinite reverse;
        }

        .bg-shape-3 {
            width: 200px; height: 200px;
            background: white;
            top: 50%; left: 15%;
            animation: float 10s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 20px) scale(0.94); }
        }

        /* Login Card */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 40px 36px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9a84c, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #03152e;
            font-size: 1.5rem;
            margin: 0 auto 16px;
        }

        .login-logo h1 {
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .login-logo p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--background-light);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-label i {
            color: var(--primary);
            font-size: 0.8rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            background: var(--background);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.08);
        }

        .form-input::placeholder {
            color: #b0b8c4;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* Error Message */
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: var(--border-radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem;
        }

        .login-footer a {
            color: var(--secondary);
            font-weight: 600;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-shapes">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo-icon">TK</div>
                <h1>Support Portal</h1>
                <p>TK Tutoring</p>
            </div>

            <div style="text-align:center;">
                <div class="login-badge">
                    <i class="fas fa-headset"></i> Authorized Agents Only
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" class="form-input" id="email" 
                           placeholder="agent@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" 
                               placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div style="text-align:center; margin-top:16px;">
                <a href="#" onclick="forgotPassword()" style="color:var(--primary); font-size:0.85rem; font-weight:600; text-decoration:none;">
                    Forgot password?
                </a>
            </div>
        </div>

        <div class="login-footer">
            &copy; 2026 TK Tutoring · <a href="/privacy.html">Privacy</a>
        </div>
    </div>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyBjo5LY4EsFlX8j_8NbLUObooUsCqJM8KM",
            authDomain: "tk-scheduler.firebaseapp.com",
            projectId: "tk-scheduler",
            storageBucket: "tk-scheduler.appspot.com",
            messagingSenderId: "746606755052",
            appId: "1:746606755052:web:d7eae92976cb2f2fa9f9c9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== CHECK IF ALREADY LOGGED IN =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Check if user is a support agent
                const agentDoc = await db.collection('support_agents').doc(user.uid).get();
                if (agentDoc.exists) {
                    window.location.href = 'tutoring-support.html';
                } else {
                    // Not an agent — sign out
                    auth.signOut();
                }
            }
        });

        // ===== HANDLE LOGIN =====
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Hide previous errors
            hideError();

            // Validate
            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                // Sign in with Firebase Auth
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check if user is a support agent
                const agentDoc = await db.collection('support_agents').doc(user.uid).get();
                
                if (!agentDoc.exists) {
                    // Not a support agent
                    await auth.signOut();
                    showError('Access denied. You are not authorized as a support agent.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }

                // Check if agent is active
                const agentData = agentDoc.data();
                if (agentData.active === false) {
                    await auth.signOut();
                    showError('Your support account has been deactivated. Contact your administrator.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }

                // Success — redirect to dashboard
                window.location.href = 'tutoring-support.html';

            } catch (error) {
                console.error('Login error:', error);
                
                let message = 'An error occurred. Please try again.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                    case 'auth/invalid-credential':
                        message = 'Invalid email or password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Too many failed attempts. Please wait a few minutes and try again.';
                        break;
                    case 'auth/user-disabled':
                        message = 'This account has been disabled. Contact your administrator.';
                        break;
                    case 'auth/network-request-failed':
                        message = 'Network error. Please check your internet connection.';
                        break;
                }
                
                showError(message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        // ===== TOGGLE PASSWORD =====
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // ===== FORGOT PASSWORD =====
        async function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('Please enter your email address first.');
                return;
            }

            try {
                await auth.sendPasswordResetEmail(email);
                showError('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                let message = 'Failed to send reset email.';
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with that email.';
                }
                showError(message);
            }
        }

        // ===== ERROR HANDLING =====
        function showError(message, type = 'error') {
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const icon = errorEl.querySelector('i');

            errorText.textContent = message;
            
            if (type === 'success') {
                errorEl.style.background = '#d1fae5';
                errorEl.style.color = '#065f46';
                icon.className = 'fas fa-check-circle';
            } else {
                errorEl.style.background = '#fee2e2';
                errorEl.style.color = '#991b1b';
                icon.className = 'fas fa-exclamation-circle';
            }
            
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // ===== ENTER KEY =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const email = document.getElementById('email');
                const password = document.getElementById('password');
                if (document.activeElement === email) {
                    password.focus();
                }
            }
        });
    </script>

</body>
</html>
