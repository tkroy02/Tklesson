<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TK Insights - Business Insights Repository</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
  <meta name="theme-color" content="#0b3d91">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --primary: #0b3d91;
      --primary-light: #1e5bbf;
      --primary-dark: #082b6f;
      --secondary: #ffd700;
      --secondary-light: #ffe066;
      --text-dark: #0b1e3d;
      --text-light: #ffffff;
      --text-gray: #4a5568;
      --text-muted: #708090;
      --background: #ffffff;
      --background-light: #f7f9fc;
      --background-alt: #eef3fb;
      --border-radius: 16px;
      --border-radius-sm: 10px;
      --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
      --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
      --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
      --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
      --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      color: var(--text-gray);
      background-color: var(--background-light);
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--primary);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
    h2 { font-size: clamp(1.8rem, 3.5vw, 2.4rem); text-align: center; margin-bottom: 1rem; }
    h3 { font-size: 1.25rem; }

    .section-badge {
      display: inline-block;
      background: var(--background-alt);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .section-title { text-align: center; margin-bottom: 0.75rem; }

    .section-subtitle {
      text-align: center;
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 3.5rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #dce4f0; border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 6px; border: 2px solid #dce4f0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    html { scrollbar-color: var(--primary) #dce4f0; scrollbar-width: thin; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      outline: none;
      gap: 10px;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--text-light);
      box-shadow: 0 4px 16px rgba(11, 61, 145, 0.3);
    }
    .btn-primary:hover {
      background-color: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(11, 61, 145, 0.4);
    }

    .btn-secondary {
      background-color: var(--background-alt);
      color: var(--primary);
      border: 2px solid var(--background-alt);
    }
    .btn-secondary:hover {
      background-color: var(--primary);
      color: var(--text-light);
      transform: translateY(-3px);
    }

    .btn-outline {
      background-color: transparent;
      color: var(--primary);
      border: 2.5px solid var(--primary);
    }
    .btn-outline:hover {
      background-color: var(--primary);
      color: var(--text-light);
      transform: translateY(-3px);
    }

    .btn-outline-white {
      background-color: transparent;
      color: var(--text-light);
      border: 2px solid rgba(255,255,255,0.5);
    }
    .btn-outline-white:hover {
      background-color: rgba(255,255,255,0.15);
      border-color: white;
      transform: translateY(-3px);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== HERO ========== */
    .hero {
      background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
      color: var(--text-light);
      padding: 80px 0 70px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-bg-shapes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }

    .hero-shape-1 {
      width: 500px; height: 500px; background: white;
      top: -15%; right: -10%;
      animation: floatShape 12s ease-in-out infinite;
    }

    .hero-shape-2 {
      width: 350px; height: 350px; background: var(--secondary);
      bottom: -12%; left: -8%;
      animation: floatShape 15s ease-in-out infinite reverse;
    }

    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -25px) scale(1.08); }
      66% { transform: translate(-20px, 20px) scale(0.94); }
    }

    .hero-grid {
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
    }

    .hero-content {
      position: relative; z-index: 2; text-align: center;
      max-width: 850px; margin: 0 auto;
    }

    .hero-title {
      color: var(--text-light); margin-bottom: 18px;
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }

    .hero-title span {
      background: linear-gradient(135deg, #ffd700, #ffed80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-description {
      font-size: 1.2rem; margin-bottom: 12px; opacity: 0.85;
      animation: fadeInUp 0.8s ease-out 0.3s both; line-height: 1.6;
    }

    /* ========== MAIN CONTENT ========== */
    .main-content { padding: 60px 0; }

    /* ========== FORMS ========== */
    .form-section {
      background: var(--background);
      border-radius: var(--border-radius);
      padding: 36px;
      margin-bottom: 40px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid transparent;
    }

    .form-section:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow-lg);
    }

    .form-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }

    .form-header i {
      font-size: 1.4rem; color: var(--primary);
      width: 48px; height: 48px;
      background: var(--background-alt);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .form-header h3 {
      font-size: 1.3rem; margin: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-group { margin-bottom: 4px; }
    .form-group.full-width { grid-column: 1 / -1; }

    .form-label {
      display: block;
      font-size: 0.9rem; font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 2px solid #e2e8f0;
      border-radius: var(--border-radius-sm);
      background: var(--background);
      color: var(--text-dark);
      transition: var(--transition);
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.1);
    }

    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      display: flex; gap: 14px; margin-top: 28px;
    }

    /* ========== LIST SECTION ========== */
    .list-section {
      background: var(--background);
      border-radius: var(--border-radius);
      padding: 36px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid transparent;
    }

    .list-section:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow-lg);
    }

    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }

    .list-header-left {
      display: flex; align-items: center; gap: 12px;
    }

    .list-header-left i {
      font-size: 1.4rem; color: var(--primary);
      width: 48px; height: 48px;
      background: var(--background-alt);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .list-header-left h3 {
      font-size: 1.3rem; margin: 0;
    }

    .filter-controls {
      display: flex; gap: 12px;
    }

    .filter-select {
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: var(--border-radius-sm);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      background: var(--background);
      transition: var(--transition);
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.1);
    }

    /* ========== INSIGHT CARDS ========== */
    .insights-list {
      display: flex; flex-direction: column; gap: 20px;
    }

    .insight-card {
      background: var(--background-light);
      border-radius: var(--border-radius-sm);
      padding: 24px;
      border: 1px solid transparent;
      transition: var(--transition);
    }

    .insight-card:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .insight-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }

    .insight-title {
      font-size: 1.15rem; font-weight: 700;
      color: var(--text-dark);
    }

    .insight-type {
      padding: 5px 14px; border-radius: 50px;
      font-size: 0.8rem; font-weight: 700;
    }

    .type-success { background: rgba(6, 214, 160, 0.12); color: #059669; }
    .type-failure { background: rgba(239, 71, 111, 0.12); color: #dc2626; }
    .type-observation { background: rgba(11, 61, 145, 0.12); color: var(--primary); }

    .insight-meta {
      display: flex; gap: 20px; margin-bottom: 14px;
      font-size: 0.9rem; color: var(--text-muted);
    }

    .insight-meta i { margin-right: 6px; color: var(--primary); }

    .insight-content {
      margin-bottom: 16px;
      color: var(--text-gray); line-height: 1.7;
    }

    .insight-tags {
      margin-bottom: 16px;
    }

    .insight-tags p {
      font-size: 0.85rem; color: var(--text-muted);
    }

    .insight-actions {
      display: flex; gap: 10px;
    }

    .action-btn {
      padding: 8px 16px; border: none; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 6px;
    }

    .action-btn.edit {
      background: var(--background-alt); color: var(--primary);
    }
    .action-btn.edit:hover { background: var(--primary); color: white; }

    .action-btn.delete {
      background: #fee2e2; color: #dc2626;
    }
    .action-btn.delete:hover { background: #dc2626; color: white; }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center; padding: 60px 20px;
    }

    .empty-state i {
      font-size: 3.5rem; color: #cbd5e1;
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 1.3rem; color: var(--text-dark);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-muted); font-size: 1rem;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .hero { padding: 60px 0 50px; }
      .hero-title { font-size: 1.9rem; }
      .hero-description { font-size: 1.05rem; }
      .main-content { padding: 40px 0; }
      .form-grid { grid-template-columns: 1fr; }
      .form-section, .list-section { padding: 24px; }
      .list-header { flex-direction: column; align-items: flex-start; }
      .filter-controls { width: 100%; }
      .filter-select { flex: 1; }
      .insight-header { flex-direction: column; }
      .form-actions { flex-direction: column; }
      .form-actions .btn { width: 100%; }
    }

    @media (max-width: 480px) {
      .hero-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- HEADER (fetched dynamically) -->
<div id="header"></div>
<script>
fetch("super-header.html")
  .then(r => r.text())
  .then(data => {
    const headerDiv = document.getElementById("header");
    headerDiv.innerHTML = data;

    // Execute scripts from header
    headerDiv.querySelectorAll("script").forEach(oldScript => {
      const s = document.createElement("script");
      s.textContent = oldScript.textContent;
      document.head.appendChild(s);
    });
  });
</script>

<!-- ========== HERO ========== -->
<section class="hero" id="hero">
  <div class="hero-bg-shapes">
    <div class="hero-shape hero-shape-1"></div>
    <div class="hero-shape hero-shape-2"></div>
  </div>
  <div class="hero-grid"></div>
  <div class="container hero-content">
    <h1 class="hero-title"><span>Business Insights</span> Repository</h1>
    <p class="hero-description">Document what worked, what didn't, and key observations to improve your business practices.</p>
  </div>
</section>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content">
  <div class="container">

    <!-- Add New Insight Form -->
    <section class="form-section">
      <div class="form-header">
        <i class="fas fa-plus-circle"></i>
        <h3>Add New Insight</h3>
      </div>
      <form id="insight-form">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Insight Title</label>
            <input type="text" id="insight-title" class="form-input" placeholder="e.g., Successful social media campaign" required>
          </div>

          <div class="form-group">
            <label class="form-label">Type</label>
            <select id="insight-type" class="form-select" required>
              <option value="">Select type</option>
              <option value="success">Success / What Worked</option>
              <option value="failure">Failure / What Didn't Work</option>
              <option value="observation">Observation / Learning</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label class="form-label">Description</label>
            <textarea id="insight-description" class="form-textarea" placeholder="Describe the situation, actions taken, and results..." required></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="insight-category" class="form-select">
              <option value="marketing">Marketing</option>
              <option value="sales">Sales</option>
              <option value="operations">Operations</option>
              <option value="finance">Finance</option>
              <option value="product">Product</option>
              <option value="customer-service">Customer Service</option>
              <option value="hr">HR</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="insight-date" class="form-input" required>
          </div>

          <div class="form-group full-width">
            <label class="form-label">Tags (comma separated)</label>
            <input type="text" id="insight-tags" class="form-input" placeholder="e.g., social media, campaign, ROI">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Insight
          </button>
          <button type="button" class="btn btn-secondary" id="clear-form">
            <i class="fas fa-eraser"></i> Clear Form
          </button>
        </div>
      </form>
    </section>

    <!-- Insights List -->
    <section class="list-section">
      <div class="list-header">
        <div class="list-header-left">
          <i class="fas fa-list"></i>
          <h3>Previous Insights</h3>
        </div>
        <div class="filter-controls">
          <select class="filter-select" id="filter-type">
            <option value="all">All Types</option>
            <option value="success">Success</option>
            <option value="failure">Failure</option>
            <option value="observation">Observation</option>
          </select>
          <select class="filter-select" id="filter-category">
            <option value="all">All Categories</option>
            <option value="marketing">Marketing</option>
            <option value="sales">Sales</option>
            <option value="operations">Operations</option>
            <option value="finance">Finance</option>
            <option value="product">Product</option>
            <option value="customer-service">Customer Service</option>
            <option value="hr">HR</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="insights-list" id="insights-list">
        <div class="empty-state">
          <i class="fas fa-clipboard-list"></i>
          <h3>No insights yet</h3>
          <p>Add your first business insight using the form above</p>
        </div>
      </div>
    </section>

  </div>
</div>

<!-- FOOTER (fetched dynamically) -->
<div id="footer"></div>
<script>
fetch("super-footer.html")
.then(response => response.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<script>
  // Firebase configuration
  const firebaseConfig = {
            apiKey: "AIzaSyDq9F28x6D4ivUJoT3ycHRlU_c-YNctFtE",
            authDomain: "email-notifications-1c77b.firebaseapp.com",
            projectId: "email-notifications-1c77b",
            storageBucket: "email-notifications-1c77b.firebasestorage.app",
            messagingSenderId: "272046681025",
            appId: "1:272046681025:web:e0aff95e41caa65c6d1d40",
            measurementId: "G-B3VJ7R5R8H"
        };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = 'etante.html';
    }
  });

  const insightForm = document.getElementById('insight-form');
  const insightsList = document.getElementById('insights-list');
  const clearFormBtn = document.getElementById('clear-form');
  const filterType = document.getElementById('filter-type');
  const filterCategory = document.getElementById('filter-category');

  document.getElementById('insight-date').valueAsDate = new Date();

  insightForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const title = document.getElementById('insight-title').value;
    const type = document.getElementById('insight-type').value;
    const description = document.getElementById('insight-description').value;
    const category = document.getElementById('insight-category').value;
    const date = document.getElementById('insight-date').value;
    const tags = document.getElementById('insight-tags').value.split(',').map(tag => tag.trim()).filter(t => t);

    try {
      await db.collection('insights').add({
        title, type, description, category, date, tags,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      insightForm.reset();
      document.getElementById('insight-date').valueAsDate = new Date();
      loadInsights();
      alert('Insight saved successfully!');
    } catch (error) {
      console.error('Error saving insight:', error);
      alert('Error saving insight. Please try again.');
    }
  });

  clearFormBtn.addEventListener('click', () => {
    insightForm.reset();
    document.getElementById('insight-date').valueAsDate = new Date();
  });

  async function loadInsights() {
    try {
      const snapshot = await db.collection('insights')
        .orderBy('createdAt', 'desc')
        .get();

      insightsList.innerHTML = '';

      if (snapshot.empty) {
        insightsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <h3>No insights yet</h3>
            <p>Add your first business insight using the form above</p>
          </div>
        `;
        return;
      }

      let hasResults = false;

      snapshot.forEach(doc => {
        const insight = doc.data();
        const insightId = doc.id;

        const typeFilter = filterType.value;
        const categoryFilter = filterCategory.value;

        if ((typeFilter !== 'all' && insight.type !== typeFilter) || 
            (categoryFilter !== 'all' && insight.category !== categoryFilter)) {
          return;
        }

        hasResults = true;

        const insightCard = document.createElement('div');
        insightCard.className = 'insight-card';
        insightCard.innerHTML = `
          <div class="insight-header">
            <h4 class="insight-title">${insight.title}</h4>
            <span class="insight-type type-${insight.type}">${getTypeLabel(insight.type)}</span>
          </div>
          <div class="insight-meta">
            <span><i class="fas fa-tag"></i> ${getCategoryLabel(insight.category)}</span>
            <span><i class="fas fa-calendar"></i> ${formatDate(insight.date)}</span>
          </div>
          <div class="insight-content">
            <p>${insight.description}</p>
          </div>
          <div class="insight-tags">
            ${insight.tags && insight.tags.length > 0 ? 
              `<p><strong>Tags:</strong> ${insight.tags.join(', ')}</p>` : ''}
          </div>
          <div class="insight-actions">
            <button class="action-btn edit" data-id="${insightId}">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="action-btn delete" data-id="${insightId}">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        `;

        insightsList.appendChild(insightCard);
      });

      if (!hasResults) {
        insightsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-filter"></i>
            <h3>No matching insights</h3>
            <p>Try adjusting your filters</p>
          </div>
        `;
      }

      // Attach event listeners to action buttons
      document.querySelectorAll('.action-btn.delete').forEach(btn => {
        btn.addEventListener('click', () => deleteInsight(btn.getAttribute('data-id')));
      });
      document.querySelectorAll('.action-btn.edit').forEach(btn => {
        btn.addEventListener('click', () => editInsight(btn.getAttribute('data-id')));
      });

    } catch (error) {
      console.error('Error loading insights:', error);
      insightsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Error loading insights</h3>
          <p>Please try refreshing the page</p>
        </div>
      `;
    }
  }

  function getTypeLabel(type) {
    const labels = { 'success': 'Success', 'failure': 'Failure', 'observation': 'Observation' };
    return labels[type] || type;
  }

  function getCategoryLabel(category) {
    const labels = {
      'marketing': 'Marketing', 'sales': 'Sales', 'operations': 'Operations',
      'finance': 'Finance', 'product': 'Product', 'customer-service': 'Customer Service',
      'hr': 'HR', 'other': 'Other'
    };
    return labels[category] || category;
  }

  function formatDate(dateString) {
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    return new Date(dateString).toLocaleDateString(undefined, options);
  }

  async function deleteInsight(insightId) {
    if (confirm('Are you sure you want to delete this insight?')) {
      try {
        await db.collection('insights').doc(insightId).delete();
        loadInsights();
      } catch (error) {
        console.error('Error deleting insight:', error);
        alert('Error deleting insight. Please try again.');
      }
    }
  }

  function editInsight(insightId) {
    alert('Edit functionality will be implemented in a future version.');
  }

  filterType.addEventListener('change', loadInsights);
  filterCategory.addEventListener('change', loadInsights);

  loadInsights();
</script>

</body>
</html>
