<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Insights - TK Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --navy-deep: #040d1f;
      --navy: #0a1628;
      --navy-mid: #0f1f3a;
      --navy-light: #162d50;
      --blue: #0b3d91;
      --blue-bright: #1a5bc6;
      --blue-glow: #3b82f6;
      --gold: #e8a80c;
      --gold-light: #f5c842;
      --gold-dark: #b8860b;
      --surface: #ffffff;
      --surface-alt: #f6f8fc;
      --border: #e0e6ef;
      --border-light: #eef2f8;
      --text: #141f2e;
      --text-secondary: #44566b;
      --text-muted: #7b8ea8;
      --success: #0d8a4e;
      --warning: #c2780a;
      --danger: #c62828;
      --radius-sm: 12px;
      --radius: 18px;
      --radius-lg: 24px;
      --shadow: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
      --shadow-lg: 0 16px 44px rgba(0,0,0,0.09), 0 4px 14px rgba(0,0,0,0.04);
      --shadow-xl: 0 24px 60px rgba(0,0,0,0.13), 0 8px 22px rgba(0,0,0,0.05);
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(160deg, #040d1f 0%, #0a1628 30%, #0f1f3a 60%, #0b1a35 100%);
      color: var(--text);
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background orbs */
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(90px); opacity: 0.08;
    }
    .bg-orb:nth-child(1) { width:500px; height:500px; background: var(--blue); top:-140px; left:-100px; animation: drift 22s infinite ease-in-out; }
    .bg-orb:nth-child(2) { width:380px; height:380px; background: var(--gold); bottom:-100px; right:-90px; animation: drift 26s infinite ease-in-out reverse; }
    .bg-orb:nth-child(3) { width:280px; height:280px; background: var(--blue-glow); top:50%; left:60%; animation: drift 30s infinite ease-in-out; opacity:0.05; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(40px,-30px) scale(1.06); }
      66% { transform: translate(-25px,20px) scale(0.95); }
    }
    .grid-pattern {
      position: fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(ellipse at center, black 22%, transparent 72%);
    }

    /* Dynamic header/footer containers */
    #super-header-container, #super-footer-container { width: 100%; position: relative; z-index: 10; }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .page-title {
      margin-bottom: 40px;
      text-align: center;
    }

    .page-title h2 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: white;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .page-title h2 span {
      background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-title p {
      color: rgba(255,255,255,0.5);
      max-width: 600px;
      margin: 0 auto;
      font-size: 0.9rem;
    }

    /* Form Section */
    .insights-form-section {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 30px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
    }

    .form-title {
      font-size: 1.3rem;
      margin-bottom: 25px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .form-title i {
      color: var(--gold);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      font-size: 0.82rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.95rem;
      transition: var(--transition);
      color: white;
      font-family: var(--font);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue-glow);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    select option {
      background: var(--navy);
      color: white;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-bright));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(11,61,145,0.35);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    /* Insights List */
    .insights-list-section {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .list-title {
      font-size: 1.3rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .list-title i {
      color: var(--gold);
    }

    .filter-controls {
      display: flex;
      gap: 15px;
    }

    .filter-select {
      padding: 8px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      font-family: var(--font);
      cursor: pointer;
      outline: none;
    }

    .filter-select:focus {
      border-color: var(--blue-glow);
    }

    .filter-select option {
      background: var(--navy);
      color: white;
    }

    .insights-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .insight-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-sm);
      padding: 20px;
      transition: var(--transition);
    }

    .insight-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .insight-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .insight-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
    }

    .insight-type {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .type-success {
      background: rgba(13,138,78,0.15);
      border: 1px solid rgba(13,138,78,0.25);
      color: #34d399;
    }

    .type-failure {
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.2);
      color: #fca5a5;
    }

    .type-observation {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      color: #60a5fa;
    }

    .insight-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .insight-meta i {
      margin-right: 4px;
      color: var(--gold);
    }

    .insight-content {
      margin-bottom: 15px;
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .insight-tags {
      margin-bottom: 12px;
    }

    .insight-tags p {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }

    .insight-tags strong {
      color: var(--gold-light);
    }

    .insight-actions {
      display: flex;
      gap: 10px;
    }

    .btn-icon {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
    }

    .btn-edit {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      color: #60a5fa;
    }

    .btn-edit:hover {
      background: rgba(59,130,246,0.2);
    }

    .btn-delete {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.2);
      color: #fca5a5;
    }

    .btn-delete:hover {
      background: rgba(220,38,38,0.2);
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: rgba(255,255,255,0.3);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 15px;
      color: rgba(255,255,255,0.1);
    }

    .empty-state h3 {
      color: rgba(255,255,255,0.5);
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 992px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 24px 16px;
      }

      .page-title h2 {
        font-size: 1.6rem;
      }

      .list-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .filter-controls {
        width: 100%;
      }

      .filter-select {
        flex: 1;
      }

      .insight-header {
        flex-direction: column;
        gap: 10px;
      }
    }

    @media (max-width: 576px) {
      .form-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .insight-actions {
        flex-direction: column;
      }

      .btn-icon {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Dynamic Header Container -->
  <div id="super-header-container"></div>

  <!-- Background effects -->
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="grid-pattern"></div>

  <!-- Toast Notification -->
  <div id="toast" style="
    position: fixed;
    bottom: 28px;
    right: 28px;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    color: #fff;
    z-index: 9999;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  "></div>

  <!-- Business Insights Dashboard -->
  <div id="dashboard">
    <div class="main-content">
      <section class="page-title">
        <h2>Business <span>Insights</span> Repository</h2>
        <p>Document what worked, what didn't, and key observations to improve your business practices</p>
      </section>

      <section class="insights-form-section">
        <h3 class="form-title"><i class="fas fa-plus-circle"></i> Add New Insight</h3>
        <form id="insight-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="insight-title">Insight Title</label>
              <input type="text" id="insight-title" placeholder="e.g., Successful social media campaign" required>
            </div>

            <div class="form-group">
              <label for="insight-type">Type</label>
              <select id="insight-type" required>
                <option value="">Select type</option>
                <option value="success">Success / What Worked</option>
                <option value="failure">Failure / What Didn't Work</option>
                <option value="observation">Observation / Learning</option>
              </select>
            </div>

            <div class="form-group full-width">
              <label for="insight-description">Description</label>
              <textarea id="insight-description" placeholder="Describe the situation, actions taken, and results..." required></textarea>
            </div>

            <div class="form-group">
              <label for="insight-category">Category</label>
              <select id="insight-category">
                <option value="marketing">Marketing</option>
                <option value="sales">Sales</option>
                <option value="operations">Operations</option>
                <option value="finance">Finance</option>
                <option value="product">Product</option>
                <option value="customer-service">Customer Service</option>
                <option value="hr">HR</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="insight-date">Date</label>
              <input type="date" id="insight-date" required>
            </div>

            <div class="form-group full-width">
              <label for="insight-tags">Tags (comma separated)</label>
              <input type="text" id="insight-tags" placeholder="e.g., social media, campaign, ROI">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Save Insight
            </button>
            <button type="button" class="btn btn-secondary" id="clear-form">
              <i class="fas fa-eraser"></i> Clear Form
            </button>
          </div>
        </form>
      </section>

      <section class="insights-list-section">
        <div class="list-header">
          <h3 class="list-title"><i class="fas fa-list"></i> Previous Insights</h3>
          <div class="filter-controls">
            <select class="filter-select" id="filter-type">
              <option value="all">All Types</option>
              <option value="success">Success</option>
              <option value="failure">Failure</option>
              <option value="observation">Observation</option>
            </select>
            <select class="filter-select" id="filter-category">
              <option value="all">All Categories</option>
              <option value="marketing">Marketing</option>
              <option value="sales">Sales</option>
              <option value="operations">Operations</option>
              <option value="finance">Finance</option>
              <option value="product">Product</option>
              <option value="customer-service">Customer Service</option>
              <option value="hr">HR</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="insights-list" id="insights-list">
          <div class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <h3>No insights yet</h3>
            <p>Add your first business insight using the form above</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- Dynamic Footer Container -->
  <div id="super-footer-container"></div>

  <script>
    // ===== TOAST NOTIFICATION =====
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.background = type === 'success'
        ? 'linear-gradient(135deg, #0d8a4e, #0f9f5a)'
        : 'linear-gradient(135deg, #c62828, #e53935)';
      toast.style.opacity = '1';
      toast.style.transform = 'translateY(0)';
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(12px)';
      }, 3000);
    }

    // ===== LOAD HEADER / FOOTER =====
    async function loadSharedComponents() {
      const headerContainer = document.getElementById('super-header-container');
      const footerContainer = document.getElementById('super-footer-container');

      try {
        const [headerRes, footerRes] = await Promise.all([
          fetch('super-header.html'),
          fetch('super-footer.html')
        ]);

        if (!headerRes.ok || !footerRes.ok) throw new Error('Failed to load components');

        const [headerHtml, footerHtml] = await Promise.all([
          headerRes.text(),
          footerRes.text()
        ]);

        headerContainer.innerHTML = headerHtml;
        footerContainer.innerHTML = footerHtml;

        // Re-execute inline scripts from injected HTML
        [headerContainer, footerContainer].forEach(container => {
          container.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) newScript.src = oldScript.src;
            else newScript.textContent = oldScript.textContent;
            document.body.appendChild(newScript);
          });
        });

        // ---------- HAMBURGER MENU SETUP ----------
        const header = headerContainer.querySelector('header');
        const navMenu = header?.querySelector('#navMenu');
        const hamburger = header?.querySelector('.hamburger');

        if (hamburger && navMenu) {
          // Toggle on button click
          hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = navMenu.classList.toggle('open');
            hamburger.setAttribute('aria-expanded', String(isOpen));
          });

          // Close when any nav link is clicked
          navMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
              navMenu.classList.remove('open');
              hamburger.setAttribute('aria-expanded', 'false');
            });
          });

          // Close when clicking outside the header
          document.addEventListener('click', (e) => {
            if (!header.contains(e.target)) {
              navMenu.classList.remove('open');
              hamburger.setAttribute('aria-expanded', 'false');
            }
          });

          // Close on Escape key, return focus to trigger
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && navMenu.classList.contains('open')) {
              navMenu.classList.remove('open');
              hamburger.setAttribute('aria-expanded', 'false');
              hamburger.focus();
            }
          });
        }

      } catch (err) {
        console.error('Error loading header/footer:', err);
        headerContainer.innerHTML = '<header style="background:#0a1628;color:#fff;padding:12px 20px;text-align:center;font-weight:600;font-family:Inter,sans-serif;">TK Dashboard</header>';
      }
    }

    // ===== FIREBASE INIT (guarded) =====
    const firebaseConfig = {
      apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
      authDomain: "tkmachines-945b9.firebaseapp.com",
      projectId: "tkmachines-945b9",
      storageBucket: "tkmachines-945b9.firebasestorage.app",
      messagingSenderId: "137087394703",
      appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
      measurementId: "G-Y8GH34Q2FN"
    };

    // FIX: guard prevents double-init when header also calls initializeApp
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    // ===== AUTH CHECK =====
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        window.location.href = 'index.html';
      }
    });

    // ===== DOM REFERENCES =====
    const insightForm     = document.getElementById('insight-form');
    const insightsList    = document.getElementById('insights-list');
    const clearFormBtn    = document.getElementById('clear-form');
    const filterType      = document.getElementById('filter-type');
    const filterCategory  = document.getElementById('filter-category');

    // Default date to today
    document.getElementById('insight-date').valueAsDate = new Date();

    // ===== FORM SUBMIT =====
    insightForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const title       = document.getElementById('insight-title').value.trim();
      const type        = document.getElementById('insight-type').value;
      const description = document.getElementById('insight-description').value.trim();
      const category    = document.getElementById('insight-category').value;
      const date        = document.getElementById('insight-date').value;
      const tags        = document.getElementById('insight-tags').value
                            .split(',').map(t => t.trim()).filter(Boolean);

      try {
        await db.collection('insights').add({
          title, type, description, category, date, tags,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        insightForm.reset();
        document.getElementById('insight-date').valueAsDate = new Date();
        loadInsights();
        showToast('Insight saved successfully!');               // FIX: toast replaces alert()
      } catch (error) {
        console.error('Error saving insight:', error);
        showToast('Error saving insight. Please try again.', 'error');
      }
    });

    // ===== CLEAR FORM =====
    clearFormBtn.addEventListener('click', () => {
      insightForm.reset();
      document.getElementById('insight-date').valueAsDate = new Date();
    });

    // ===== LOAD INSIGHTS =====
    async function loadInsights() {
      try {
        const snapshot = await db.collection('insights')
          .orderBy('createdAt', 'desc')
          .get();

        insightsList.innerHTML = '';

        if (snapshot.empty) {
          renderEmptyState('No insights yet', 'Add your first business insight using the form above', 'fa-clipboard-list');
          return;
        }

        const typeFilter     = filterType.value;
        const categoryFilter = filterCategory.value;
        let rendered = 0;

        snapshot.forEach(doc => {
          const insight   = doc.data();
          const insightId = doc.id;

          if ((typeFilter !== 'all' && insight.type !== typeFilter) ||
              (categoryFilter !== 'all' && insight.category !== categoryFilter)) return;

          insightsList.appendChild(buildInsightCard(insight, insightId));
          rendered++;
        });

        if (rendered === 0) {
          renderEmptyState('No matching insights', 'Try adjusting the filters above', 'fa-filter');
        }

      } catch (error) {
        console.error('Error loading insights:', error);
        renderEmptyState('Error loading insights', 'Please try refreshing the page', 'fa-exclamation-triangle');
      }
    }

    // ===== BUILD CARD (FIX: textContent for all user data — no XSS risk) =====
    function buildInsightCard(insight, insightId) {
      const card = document.createElement('div');
      card.className = 'insight-card';

      // Header row
      const header = document.createElement('div');
      header.className = 'insight-header';

      const titleEl = document.createElement('h4');
      titleEl.className = 'insight-title';
      titleEl.textContent = insight.title;           // safe

      const typeBadge = document.createElement('span');
      typeBadge.className = `insight-type type-${insight.type}`;
      typeBadge.textContent = getTypeLabel(insight.type);

      header.append(titleEl, typeBadge);

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'insight-meta';

      const catSpan = document.createElement('span');
      catSpan.innerHTML = '<i class="fas fa-tag"></i> ';
      catSpan.append(document.createTextNode(getCategoryLabel(insight.category)));

      const dateSpan = document.createElement('span');
      dateSpan.innerHTML = '<i class="fas fa-calendar"></i> ';
      dateSpan.append(document.createTextNode(formatDate(insight.date)));

      meta.append(catSpan, dateSpan);

      // Description
      const content = document.createElement('div');
      content.className = 'insight-content';
      const desc = document.createElement('p');
      desc.textContent = insight.description;        // safe
      content.appendChild(desc);

      // Tags
      const tagsDiv = document.createElement('div');
      tagsDiv.className = 'insight-tags';
      if (insight.tags && insight.tags.length > 0) {
        const tagsP = document.createElement('p');
        const strong = document.createElement('strong');
        strong.textContent = 'Tags: ';
        tagsP.appendChild(strong);
        tagsP.append(document.createTextNode(insight.tags.join(', '))); // safe
        tagsDiv.appendChild(tagsP);
      }

      // Actions
      const actions = document.createElement('div');
      actions.className = 'insight-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-icon btn-edit';
      editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
      editBtn.addEventListener('click', () => editInsight(insightId));

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-icon btn-delete';
      deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Delete';
      deleteBtn.addEventListener('click', () => deleteInsight(insightId));

      actions.append(editBtn, deleteBtn);
      card.append(header, meta, content, tagsDiv, actions);
      return card;
    }

    // ===== EMPTY / ERROR STATE =====
    function renderEmptyState(heading, message, icon) {
      insightsList.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = `<i class="fas ${icon}"></i>`;
      const h3 = document.createElement('h3');
      h3.textContent = heading;
      const p = document.createElement('p');
      p.textContent = message;
      div.append(h3, p);
      insightsList.appendChild(div);
    }

    // ===== HELPERS =====
    function getTypeLabel(type) {
      return { success: 'Success', failure: 'Failure', observation: 'Observation' }[type] || type;
    }

    function getCategoryLabel(category) {
      return {
        marketing: 'Marketing', sales: 'Sales', operations: 'Operations',
        finance: 'Finance', product: 'Product', 'customer-service': 'Customer Service',
        hr: 'HR', other: 'Other'
      }[category] || category;
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // ===== DELETE =====
    async function deleteInsight(insightId) {
      if (confirm('Are you sure you want to delete this insight?')) {
        try {
          await db.collection('insights').doc(insightId).delete();
          loadInsights();
          showToast('Insight deleted.');                        // FIX: toast replaces alert()
        } catch (error) {
          console.error('Error deleting insight:', error);
          showToast('Error deleting insight. Please try again.', 'error');
        }
      }
    }

    // ===== EDIT (placeholder) =====
    function editInsight(insightId) {
      showToast('Edit functionality coming soon.', 'error');   // FIX: toast replaces alert()
    }

    // ===== FILTER LISTENERS =====
    filterType.addEventListener('change', loadInsights);
    filterCategory.addEventListener('change', loadInsights);

    // ===== INIT =====
    loadInsights();
    loadSharedComponents();
  </script>
</body>
</html>
