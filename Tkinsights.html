<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Insights - TK Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
      
  <style>
    :root {
      /* Navy & Gold Theme */
      --tk-navy-dark: #0a1128;
      --tk-navy-main: #141d3b;
      --tk-navy-light: #1e2a4a;
      --tk-gold-main: #d4af37;
      --tk-gold-light: #f1c40f;
      --tk-gold-glow: rgba(212, 175, 55, 0.4);
      --tk-text-light: #e6e9f0;
      --tk-text-muted: #a0aabf;
      --tk-bg-surface: rgba(20, 29, 59, 0.6);
      --tk-border: rgba(212, 175, 55, 0.3);
      --tk-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --success: #06d6a0;
      --warning: #ffd166;
      --danger: #ef476f;
      --info: #3b82f6;
      --purple: #8b5cf6;
      --border-radius: 12px;
      --box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--tk-navy-dark) 0%, var(--tk-navy-main) 30%, var(--tk-navy-light) 60%, #0f1a30 100%);
      color: var(--tk-text-light);
      line-height: 1.6;
    }

    /* Containers for dynamic header/footer */
    #super-header-container, #super-footer-container { 
      width: 100%; 
      z-index: 50; 
      position: relative;
    }

    /* Background decorations */
    .bg-orb {
      position: fixed; 
      border-radius: 50%; 
      pointer-events: none; 
      z-index: 0;
      filter: blur(90px); 
      opacity: 0.10;
    }
    .bg-orb:nth-child(1) { 
      width:500px; 
      height:500px; 
      background: var(--tk-navy-light); 
      top:-140px; 
      left:-100px; 
      animation: drift 22s infinite ease-in-out; 
    }
    .bg-orb:nth-child(2) { 
      width:380px; 
      height:380px; 
      background: var(--tk-gold-main); 
      bottom:-100px; 
      right:-90px; 
      animation: drift 26s infinite ease-in-out reverse; 
    }
    .bg-orb:nth-child(3) { 
      width:280px; 
      height:280px; 
      background: var(--tk-gold-glow); 
      top:50%; 
      left:60%; 
      animation: drift 30s infinite ease-in-out; 
      opacity:0.06; 
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(40px,-30px) scale(1.06); }
      66% { transform: translate(-25px,20px) scale(0.95); }
    }
    
    .grid-pattern {
      position: fixed; 
      inset:0; 
      pointer-events:none; 
      z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(ellipse at center, black 22%, transparent 72%);
    }

    /* Navy & Gold Card Styling */
    .navy-card {
      background: rgba(20, 29, 59, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: var(--border-radius);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .navy-card:hover {
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
      transform: translateY(-2px);
    }

    .navy-input {
      background: rgba(20, 29, 59, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #e6e9f0;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 1rem;
      transition: var(--tk-transition);
    }

    .navy-input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }

    .navy-input::placeholder {
      color: #a0aabf;
    }

    .navy-button-primary {
      background: linear-gradient(135deg, #d4af37, #f1c40f);
      color: #0a1128;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 12px 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--tk-transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navy-button-primary:hover {
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
      transform: translateY(-2px);
    }

    .navy-button-secondary {
      background: rgba(160, 170, 191, 0.15);
      color: var(--tk-text-light);
      border: 1px solid rgba(160, 170, 191, 0.3);
      border-radius: 8px;
      padding: 12px 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--tk-transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navy-button-secondary:hover {
      background: rgba(160, 170, 191, 0.25);
      border-color: var(--tk-gold-main);
    }

    /* Select styling */
    select {
      color-scheme: dark;
    }

    select.navy-input {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23d4af37' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
      padding-right: 2.5rem;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    input[type="date"] {
      color-scheme: dark;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(0.2) saturate(2) hue-rotate(10deg) brightness(1.1);
      cursor: pointer;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .page-title {
      margin-bottom: 40px;
      text-align: center;
    }

    .page-title h2 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: var(--tk-gold-light);
    }

    .page-title p {
      color: var(--tk-text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Form Section */
    .insights-form-section {
      margin-bottom: 40px;
      padding: 30px;
    }

    .form-title {
      font-size: 1.5rem;
      margin-bottom: 25px;
      color: var(--tk-text-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-title i {
      color: var(--tk-gold-main);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--tk-text-muted);
      font-size: 0.9rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    /* Insights List */
    .insights-list-section {
      padding: 30px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .list-title {
      font-size: 1.5rem;
      color: var(--tk-text-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .list-title i {
      color: var(--tk-gold-main);
    }

    .filter-controls {
      display: flex;
      gap: 15px;
    }

    .filter-select {
      padding: 8px 15px;
    }

    .insights-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .insight-card {
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--border-radius);
      padding: 20px;
      transition: var(--tk-transition);
      background: rgba(20, 29, 59, 0.4);
    }

    .insight-card:hover {
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      background: rgba(20, 29, 59, 0.6);
    }

    .insight-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .insight-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--tk-text-light);
    }

    .insight-type {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .type-success {
      background: rgba(6, 214, 160, 0.15);
      color: var(--success);
    }

    .type-failure {
      background: rgba(239, 71, 111, 0.15);
      color: var(--danger);
    }

    .type-observation {
      background: rgba(59, 130, 246, 0.15);
      color: var(--info);
    }

    .insight-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: var(--tk-text-muted);
    }

    .insight-meta span i {
      color: var(--tk-gold-main);
      margin-right: 4px;
    }

    .insight-content {
      margin-bottom: 15px;
      color: var(--tk-text-light);
      line-height: 1.7;
    }

    .insight-tags {
      margin-bottom: 15px;
    }

    .insight-tags p {
      color: var(--tk-text-muted);
      font-size: 0.85rem;
    }

    .insight-actions {
      display: flex;
      gap: 10px;
    }

    .btn-icon {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--tk-transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.15);
      color: var(--info);
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.25);
    }

    .btn-delete {
      background: rgba(239, 71, 111, 0.15);
      color: var(--danger);
    }

    .btn-delete:hover {
      background: rgba(239, 71, 111, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--tk-text-muted);
    }

    .empty-state i {
      font-size: 3.5rem;
      margin-bottom: 20px;
      color: rgba(212, 175, 55, 0.2);
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: var(--tk-text-light);
    }

    /* Responsive */
    @media (max-width: 992px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 30px 20px;
      }
      
      .list-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      
      .filter-controls {
        width: 100%;
      }
      
      .filter-select {
        flex: 1;
      }

      .insight-header {
        flex-direction: column;
        gap: 10px;
      }

      .page-title h2 {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 576px) {
      .main-content {
        padding: 20px 15px;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Header will be loaded from super-header.html -->
  <div id="super-header-container"></div>

  <!-- Background decorations -->
  <div class="bg-orb" style="position: fixed;"></div>
  <div class="bg-orb" style="position: fixed;"></div>
  <div class="bg-orb" style="position: fixed;"></div>
  <div class="grid-pattern" style="position: fixed;"></div>

  <!-- Business Insights Dashboard -->
  <div class="main-content">
    <section class="page-title">
      <h2><i class="fas fa-lightbulb" style="margin-right: 12px;"></i>Business Insights Repository</h2>
      <p>Document what worked, what didn't, and key observations to improve your business practices</p>
    </section>

    <section class="insights-form-section navy-card">
      <h3 class="form-title"><i class="fas fa-plus-circle"></i> Add New Insight</h3>
      <form id="insight-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="insight-title">Insight Title</label>
            <input type="text" id="insight-title" class="navy-input" placeholder="e.g., Successful social media campaign" required>
          </div>
          
          <div class="form-group">
            <label for="insight-type">Type</label>
            <select id="insight-type" class="navy-input" required>
              <option value="">Select type</option>
              <option value="success">Success / What Worked</option>
              <option value="failure">Failure / What Didn't Work</option>
              <option value="observation">Observation / Learning</option>
            </select>
          </div>
          
          <div class="form-group full-width">
            <label for="insight-description">Description</label>
            <textarea id="insight-description" class="navy-input" placeholder="Describe the situation, actions taken, and results..." required></textarea>
          </div>
          
          <div class="form-group">
            <label for="insight-category">Category</label>
            <select id="insight-category" class="navy-input">
              <option value="marketing">Marketing</option>
              <option value="sales">Sales</option>
              <option value="operations">Operations</option>
              <option value="finance">Finance</option>
              <option value="product">Product</option>
              <option value="customer-service">Customer Service</option>
              <option value="hr">HR</option>
              <option value="other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="insight-date">Date</label>
            <input type="date" id="insight-date" class="navy-input" required>
          </div>
          
          <div class="form-group full-width">
            <label for="insight-tags">Tags (comma separated)</label>
            <input type="text" id="insight-tags" class="navy-input" placeholder="e.g., social media, campaign, ROI">
          </div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="navy-button-primary">
            <i class="fas fa-save"></i> Save Insight
          </button>
          <button type="button" class="navy-button-secondary" id="clear-form">
            <i class="fas fa-eraser"></i> Clear Form
          </button>
        </div>
      </form>
    </section>

    <section class="insights-list-section navy-card">
      <div class="list-header">
        <h3 class="list-title"><i class="fas fa-list"></i> Previous Insights</h3>
        <div class="filter-controls">
          <select class="navy-input filter-select" id="filter-type">
            <option value="all">All Types</option>
            <option value="success">Success</option>
            <option value="failure">Failure</option>
            <option value="observation">Observation</option>
          </select>
          <select class="navy-input filter-select" id="filter-category">
            <option value="all">All Categories</option>
            <option value="marketing">Marketing</option>
            <option value="sales">Sales</option>
            <option value="operations">Operations</option>
            <option value="finance">Finance</option>
            <option value="product">Product</option>
            <option value="customer-service">Customer Service</option>
            <option value="hr">HR</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      
      <div class="insights-list" id="insights-list">
        <!-- Insights will be loaded here dynamically -->
        <div class="empty-state">
          <i class="fas fa-clipboard-list"></i>
          <h3>No insights yet</h3>
          <p>Add your first business insight using the form above</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Footer will be loaded from super-footer.html -->
  <div id="super-footer-container"></div>

  <script>
    // Load super-header and super-footer
    async function loadComponent(url, containerId) {
      try {
        const response = await fetch(url);
        if (response.ok) {
          const html = await response.text();
          document.getElementById(containerId).innerHTML = html;
        } else {
          console.warn(`Could not load ${url}: ${response.status}`);
        }
      } catch (error) {
        console.warn(`Error loading ${url}:`, error);
      }
    }
    
    // Load header and footer
    loadComponent('super-header.html', 'super-header-container');
    loadComponent('super-footer.html', 'super-footer-container');

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
      authDomain: "tkmachines-945b9.firebaseapp.com",
      projectId: "tkmachines-945b9",
      storageBucket: "tkmachines-945b9.firebasestorage.app",
      messagingSenderId: "137087394703",
      appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
      measurementId: "G-Y8GH34Q2FN"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ADD AUTHENTICATION CHECK
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        // User is not logged in, redirect to login page
        window.location.href = 'login.html';
      }
    });

    // DOM elements
    const insightForm = document.getElementById('insight-form');
    const insightsList = document.getElementById('insights-list');
    const clearFormBtn = document.getElementById('clear-form');
    const filterType = document.getElementById('filter-type');
    const filterCategory = document.getElementById('filter-category');

    // Set today's date as default
    document.getElementById('insight-date').valueAsDate = new Date();

    // Form submission handler
    insightForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('insight-title').value;
      const type = document.getElementById('insight-type').value;
      const description = document.getElementById('insight-description').value;
      const category = document.getElementById('insight-category').value;
      const date = document.getElementById('insight-date').value;
      const tags = document.getElementById('insight-tags').value.split(',').map(tag => tag.trim()).filter(tag => tag);
      
      try {
        // Add insight to Firestore
        await db.collection('insights').add({
          title,
          type,
          description,
          category,
          date,
          tags,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          userId: auth.currentUser ? auth.currentUser.uid : null
        });
        
        // Reset form
        insightForm.reset();
        document.getElementById('insight-date').valueAsDate = new Date();
        
        // Reload insights
        loadInsights();
        
        // Show success message
        alert('Insight saved successfully!');
      } catch (error) {
        console.error('Error saving insight:', error);
        alert('Error saving insight. Please try again.');
      }
    });

    // Clear form handler
    clearFormBtn.addEventListener('click', () => {
      insightForm.reset();
      document.getElementById('insight-date').valueAsDate = new Date();
    });

    // Load insights from Firestore
    async function loadInsights() {
      try {
        const user = auth.currentUser;
        if (!user) return;
        
        let query = db.collection('insights')
          .where('userId', '==', user.uid)
          .orderBy('createdAt', 'desc');
        
        const snapshot = await query.get();
        
        insightsList.innerHTML = '';
        
        if (snapshot.empty) {
          insightsList.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-clipboard-list"></i>
              <h3>No insights yet</h3>
              <p>Add your first business insight using the form above</p>
            </div>
          `;
          return;
        }
        
        let hasVisibleInsights = false;
        
        snapshot.forEach(doc => {
          const insight = doc.data();
          const insightId = doc.id;
          
          // Apply filters
          const typeFilter = filterType.value;
          const categoryFilter = filterCategory.value;
          
          if ((typeFilter !== 'all' && insight.type !== typeFilter) || 
              (categoryFilter !== 'all' && insight.category !== categoryFilter)) {
            return;
          }
          
          hasVisibleInsights = true;
          
          const insightCard = document.createElement('div');
          insightCard.className = 'insight-card';
          insightCard.innerHTML = `
            <div class="insight-header">
              <h4 class="insight-title">${escapeHtml(insight.title)}</h4>
              <span class="insight-type type-${insight.type}">${getTypeLabel(insight.type)}</span>
            </div>
            <div class="insight-meta">
              <span><i class="fas fa-tag"></i> ${getCategoryLabel(insight.category)}</span>
              <span><i class="fas fa-calendar"></i> ${formatDate(insight.date)}</span>
            </div>
            <div class="insight-content">
              <p>${escapeHtml(insight.description)}</p>
            </div>
            <div class="insight-tags">
              ${insight.tags && insight.tags.length > 0 ? 
                `<p><strong>Tags:</strong> ${escapeHtml(insight.tags.join(', '))}</p>` : ''}
            </div>
            <div class="insight-actions">
              <button class="btn-icon btn-edit" onclick="editInsight('${insightId}')">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="btn-icon btn-delete" onclick="deleteInsight('${insightId}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          `;
          
          insightsList.appendChild(insightCard);
        });
        
        if (!hasVisibleInsights) {
          insightsList.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-filter"></i>
              <h3>No matching insights</h3>
              <p>Try changing your filter criteria</p>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error loading insights:', error);
        insightsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Error loading insights</h3>
            <p>Please try refreshing the page</p>
          </div>
        `;
      }
    }

    // Helper functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTypeLabel(type) {
      const typeLabels = {
        'success': 'Success',
        'failure': 'Failure',
        'observation': 'Observation'
      };
      return typeLabels[type] || type;
    }

    function getCategoryLabel(category) {
      const categoryLabels = {
        'marketing': 'Marketing',
        'sales': 'Sales',
        'operations': 'Operations',
        'finance': 'Finance',
        'product': 'Product',
        'customer-service': 'Customer Service',
        'hr': 'HR',
        'other': 'Other'
      };
      return categoryLabels[category] || category;
    }

    function formatDate(dateString) {
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return new Date(dateString).toLocaleDateString(undefined, options);
    }

    // Delete insight function
    async function deleteInsight(insightId) {
      if (confirm('Are you sure you want to delete this insight?')) {
        try {
          await db.collection('insights').doc(insightId).delete();
          loadInsights();
        } catch (error) {
          console.error('Error deleting insight:', error);
          alert('Error deleting insight. Please try again.');
        }
      }
    }

    // Edit insight function
    async function editInsight(insightId) {
      try {
        const doc = await db.collection('insights').doc(insightId).get();
        if (doc.exists) {
          const insight = doc.data();
          
          // Populate form with insight data
          document.getElementById('insight-title').value = insight.title || '';
          document.getElementById('insight-type').value = insight.type || '';
          document.getElementById('insight-description').value = insight.description || '';
          document.getElementById('insight-category').value = insight.category || 'marketing';
          document.getElementById('insight-date').value = insight.date || '';
          document.getElementById('insight-tags').value = (insight.tags || []).join(', ');
          
          // Scroll to form
          document.querySelector('.insights-form-section').scrollIntoView({ behavior: 'smooth' });
          
          // Change submit button text
          const submitBtn = insightForm.querySelector('button[type="submit"]');
          submitBtn.innerHTML = '<i class="fas fa-save"></i> Update Insight';
          
          // Store editing ID
          insightForm.dataset.editingId = insightId;
          
          // Change form submit behavior
          const originalSubmit = insightForm.onsubmit;
          insightForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const updatedData = {
              title: document.getElementById('insight-title').value,
              type: document.getElementById('insight-type').value,
              description: document.getElementById('insight-description').value,
              category: document.getElementById('insight-category').value,
              date: document.getElementById('insight-date').value,
              tags: document.getElementById('insight-tags').value.split(',').map(tag => tag.trim()).filter(tag => tag),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
              await db.collection('insights').doc(insightId).update(updatedData);
              
              // Reset form
              insightForm.reset();
              document.getElementById('insight-date').valueAsDate = new Date();
              submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Insight';
              insightForm.dataset.editingId = '';
              insightForm.onsubmit = originalSubmit;
              
              // Reload insights
              loadInsights();
              
              alert('Insight updated successfully!');
            } catch (error) {
              console.error('Error updating insight:', error);
              alert('Error updating insight. Please try again.');
            }
          };
        }
      } catch (error) {
        console.error('Error fetching insight for edit:', error);
        alert('Error loading insight for editing. Please try again.');
      }
    }

    // Filter change handlers
    filterType.addEventListener('change', loadInsights);
    filterCategory.addEventListener('change', loadInsights);

    // Initial load - wait for auth
    auth.onAuthStateChanged(function(user) {
      if (user) {
        loadInsights();
      }
    });
  </script>
</body>
</html>
