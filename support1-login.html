<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson — Support Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a1f3f;
            --navy-light: #0d2b56;
            --gold: #d4a843;
            --gold-hover: #c49632;
            --white: #ffffff;
            --bg: #f5f6f8;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #e74c3c;
            --success: #27ae60;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
        }

        .login-container {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header img {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .login-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--navy);
        }

        .login-header h1 span { color: var(--gold); }

        .login-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 42px 12px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,168,67,0.08);
        }

        .input-wrapper .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
            display: block;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--navy);
            color: var(--white);
        }

        .btn-primary:hover { background: var(--navy-light); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-gold {
            background: var(--gold);
            color: var(--white);
        }

        .btn-gold:hover { background: var(--gold-hover); }

        .btn-outline {
            background: transparent;
            color: var(--navy);
            border: 2px solid var(--navy);
        }

        .btn-outline:hover { background: var(--navy); color: var(--white); }

        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 0.82rem;
        }

        .links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover { text-decoration: underline; }

        /* TOTP Verify Screen */
        .screen {
            display: none;
        }

        .screen.active { display: block; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            margin-bottom: 24px;
            background: none;
            border: none;
        }

        .back-link:hover { color: var(--navy); }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        .otp-inputs input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,168,67,0.08);
        }

        .otp-inputs input.filled { background: #f8fafc; }

        .timer-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 14px 0;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 2px;
            transition: width 1s linear;
            width: 100%;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Screen 1: Sign In -->
    <div class="screen active" id="screen-signin">
        <div class="login-header">
            <img src="tklesson3.png" alt="Tklesson">
            <h1>TK<span>lesson</span></h1>
            <p>Customer Support Portal</p>
        </div>

        <div class="message" id="message-signin"></div>

        <form id="signin-form">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="you@tklesson.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="signin-btn">
                <span id="signin-btn-text">Sign In</span>
                <span class="spinner" id="signin-spinner"></span>
            </button>
        </form>

        <div class="links">
            <a href="#" id="forgotPassword">Forgot Password?</a>
        </div>
    </div>

    <!-- Screen 2: TOTP Verify -->
    <div class="screen" id="screen-totp">
        <button class="back-link" id="back-to-signin">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="login-header">
            <h1>Verify Identity</h1>
            <p>Enter the 6-digit code from your authenticator app</p>
        </div>

        <div class="message" id="message-totp"></div>

        <div class="otp-inputs" id="totp-inputs">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>

        <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar"></div></div>

        <button class="btn btn-primary" id="verify-totp-btn">
            <span id="verify-btn-text">Verify Code</span>
            <span class="spinner" id="verify-spinner"></span>
        </button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

// Firebase init
const config = await fetch('https://us-central1-tk-scheduler.cloudfunctions.net/getClientConfig')
    .then(r => r.json());

const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

// Check if already logged in
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const adminSnap = await getDoc(doc(db, 'user_security', user.uid));
        if (adminSnap.exists() && adminSnap.data().role === 'support_agent') {
            window.location.href = 'tutoring-support.html';
        }
    }
});

// Toggle password visibility
document.getElementById('togglePassword').addEventListener('click', function() {
    const inp = document.getElementById('password');
    const icon = this.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { inp.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
});

// Show message helper
function showMessage(msgId, text, type) {
    const el = document.getElementById(msgId);
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
}

// Show screen helper
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// State
let pendingUser = null;
let challengeToken = null;

// Sign In
document.getElementById('signin-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signin-btn');
    
    btn.disabled = true;
    document.getElementById('signin-btn-text').style.display = 'none';
    document.getElementById('signin-spinner').style.display = 'inline';
    
    try {
        const { user } = await signInWithEmailAndPassword(auth, email, password);
        
        // Check if user is a support agent
        const securitySnap = await getDoc(doc(db, 'user_security', user.uid));
        if (!securitySnap.exists() || securitySnap.data().role !== 'support_agent') {
            await signOut(auth);
            showMessage('message-signin', 'Access denied. Support agents only.', 'error');
            return;
        }
        
        // Check if 2FA is enabled
        if (securitySnap.data().totpEnabled === true) {
            pendingUser = user;
            
            // Initiate server-side TFA challenge
            const initiateTFA = httpsCallable(functions, 'initiateTFA');
            const result = await initiateTFA({ context: 'user_security' });
            challengeToken = result.data.challengeToken;
            
            showScreen('screen-totp');
            clearOtpInputs();
            startTimer();
            document.querySelector('#totp-inputs input').focus();
        } else {
            window.location.href = 'tutoring-support.html';
        }
    } catch (err) {
        let msg = 'Sign in failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        else if (err.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
        else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
        showMessage('message-signin', msg, 'error');
    } finally {
        btn.disabled = false;
        document.getElementById('signin-btn-text').style.display = 'inline';
        document.getElementById('signin-spinner').style.display = 'none';
    }
});

// Forgot Password
document.getElementById('forgotPassword').addEventListener('click', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    if (!email) { showMessage('message-signin', 'Enter your email first.', 'error'); return; }
    try {
        await sendPasswordResetEmail(auth, email);
        showMessage('message-signin', 'Password reset email sent! Check your inbox.', 'success');
    } catch (err) {
        showMessage('message-signin', 'Error sending reset email. Please try again.', 'error');
    }
});

// OTP Input Handling
function setupOtpInputs() {
    const inputs = document.querySelectorAll('#totp-inputs input');
    inputs.forEach((inp, i) => {
        inp.addEventListener('input', e => {
            inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
            inp.classList.toggle('filled', inp.value !== '');
            if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        inp.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
        });
        inp.addEventListener('paste', e => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
            inputs.forEach((box, j) => { box.value = text[j] || ''; box.classList.toggle('filled', !!box.value); });
            const next = inputs[Math.min(text.length, inputs.length - 1)];
            if (next) next.focus();
        });
    });
}
setupOtpInputs();

function getOtpValue() {
    return Array.from(document.querySelectorAll('#totp-inputs input')).map(i => i.value).join('');
}

function clearOtpInputs() {
    document.querySelectorAll('#totp-inputs input').forEach(i => { i.value = ''; i.classList.remove('filled'); });
}

// Timer
let timerInterval;
function startTimer() {
    clearInterval(timerInterval);
    const bar = document.getElementById('timer-bar');
    function tick() {
        const secs = Math.floor(Date.now() / 1000);
        const rem = 30 - (secs % 30);
        bar.style.width = `${(rem / 30) * 100}%`;
    }
    tick();
    timerInterval = setInterval(tick, 1000);
}

// Verify TOTP
document.getElementById('verify-totp-btn').addEventListener('click', async () => {
    const token = getOtpValue();
    if (token.length < 6) { showMessage('message-totp', 'Enter the complete 6-digit code.', 'error'); return; }
    
    const btn = document.getElementById('verify-totp-btn');
    btn.disabled = true;
    document.getElementById('verify-btn-text').style.display = 'none';
    document.getElementById('verify-spinner').style.display = 'inline';
    
    try {
        const verifyTOTP = httpsCallable(functions, 'verifyTOTP');
        const result = await verifyTOTP({ challengeToken, token });
        
        if (result.data.valid) {
            clearInterval(timerInterval);
            window.location.href = 'tutoring-support.html';
        } else {
            showMessage('message-totp', 'Incorrect code. Please try again.', 'error');
            clearOtpInputs();
            document.querySelector('#totp-inputs input').focus();
        }
    } catch (err) {
        if (err.code === 'resource-exhausted') {
            showMessage('message-totp', 'Too many attempts. Please sign in again.', 'error');
            await signOut(auth);
            pendingUser = null;
            setTimeout(() => showScreen('screen-signin'), 1500);
        } else if (err.code === 'failed-precondition') {
            showMessage('message-totp', 'Challenge expired. Please sign in again.', 'error');
            await signOut(auth);
            pendingUser = null;
            setTimeout(() => showScreen('screen-signin'), 1500);
        } else {
            showMessage('message-totp', 'Verification failed. Please try again.', 'error');
        }
    } finally {
        btn.disabled = false;
        document.getElementById('verify-btn-text').style.display = 'inline';
        document.getElementById('verify-spinner').style.display = 'none';
    }
});

// Back to signin
document.getElementById('back-to-signin').addEventListener('click', async (e) => {
    e.preventDefault();
    clearInterval(timerInterval);
    await signOut(auth);
    pendingUser = null;
    challengeToken = null;
    showScreen('screen-signin');
});
</script>
</body>
</html>
