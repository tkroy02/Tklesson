<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tklesson For Schools — Institution Login</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/Tklesson1-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://tklesson.com/resources-loader.js"></script>
    <script>loadCommonResources();</script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --accent: #e74c3c;
            --success: #27ae60;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #f7f9fc;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.15);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #03152e 0%, #082250 40%, #0b3d91 70%, #061d45 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-area img {
            height: 48px;
            width: auto;
            margin-bottom: 8px;
        }

        .logo-area .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .login-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: var(--background);
            color: var(--text-dark);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(11, 61, 145, 0.1);
            background: white;
        }

        .form-input.error {
            border-color: var(--accent);
        }

        .school-select-wrapper {
            position: relative;
        }

        .school-select-wrapper .form-input {
            padding-right: 40px;
            cursor: pointer;
        }

        .school-select-wrapper .dropdown-arrow {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: var(--transition);
            font-size: 0.8rem;
        }

        .school-detected {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #f0fff4;
            border: 1.5px solid var(--success);
            border-radius: var(--border-radius-sm);
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--success);
            font-weight: 600;
        }

        .school-detected i {
            font-size: 1.1rem;
        }

        .school-dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--primary);
            border-top: none;
            border-radius: 0 0 var(--border-radius-sm) var(--border-radius-sm);
            max-height: 220px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: var(--shadow-lg);
        }

        .school-dropdown-list.open {
            display: block;
        }

        .school-dropdown-list .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-dark);
            transition: background 0.15s ease;
            border-bottom: 1px solid #f1f5f9;
        }

        .school-dropdown-list .dropdown-item:hover {
            background: var(--background);
        }

        .school-dropdown-list .dropdown-item.selected {
            background: #eef3fb;
            font-weight: 600;
            color: var(--primary);
        }

        .school-dropdown-list .no-results {
            padding: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: none;
            border: none;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--accent);
            padding: 12px 16px;
            border-radius: var(--border-radius-sm);
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(11, 61, 145, 0.35);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-links a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .login-links a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="header"></div>
<script>
fetch("header.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("header").innerHTML = data;
        
        const header = document.querySelector("#header header");
        const navMenu = header.querySelector("#navMenu");
        const hamburger = header.querySelector(".hamburger");
        
        if (hamburger && navMenu) {
            hamburger.addEventListener("click", () => {
                const isOpen = navMenu.classList.toggle("open");
                hamburger.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
        }
        
        header.querySelectorAll(".dropdown").forEach(dropdown => {
            const dropbtn = dropdown.querySelector(".dropbtn");
            dropbtn.addEventListener("click", e => {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    const nowActive = dropdown.classList.toggle("active");
                    dropbtn.setAttribute("aria-expanded", nowActive ? "true" : "false");
                }
            });
        });
    })
    .catch(err => console.error("Header load error:", err));
</script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            doc, 
            getDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq9F28x6D4ivUJoT3ycHRlU_c-YNctFtE",
            authDomain: "email-notifications-1c77b.firebaseapp.com",
            projectId: "email-notifications-1c77b",
            storageBucket: "email-notifications-1c77b.firebasestorage.app",
            messagingSenderId: "272046681025",
            appId: "1:272046681025:web:e0aff95e41caa65c6d1d40",
            measurementId: "G-B3VJ7R5R8H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const emailInput = document.getElementById('email');
        const schoolDetectedBadge = document.getElementById('school-detected-badge');
        const detectedSchoolName = document.getElementById('detected-school-name');
        const schoolDropdownGroup = document.getElementById('school-dropdown-group');
        const schoolSelectInput = document.getElementById('school-select-input');
        const schoolDropdownList = document.getElementById('school-dropdown-list');
        const selectedSchoolId = document.getElementById('selected-school-id');
        const dropdownArrow = document.getElementById('dropdown-arrow');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const loginButton = document.getElementById('login-button');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const loginForm = document.getElementById('school-login-form');

        let allSchools = [];
        let detectedSchool = null;

        async function loadSchools() {
            try {
                const schoolsRef = collection(db, 'schools');
                const snapshot = await getDocs(schoolsRef);
                allSchools = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.isActive !== false) {
                        allSchools.push({
                            id: doc.id,
                            name: data.name,
                            city: data.city || '',
                            country: data.country || '',
                            domains: data.domains || []
                        });
                    }
                });

                allSchools.sort((a, b) => a.name.localeCompare(b.name));
                console.log(`Loaded ${allSchools.length} schools`);
            } catch (error) {
                console.error('Error loading schools:', error);
                showError('Unable to load school list. Please check your connection.');
            }
        }

        function detectSchoolFromEmail(email) {
            if (!email || !email.includes('@')) return null;
            const domain = email.split('@')[1].toLowerCase();

            for (const school of allSchools) {
                if (school.domains && school.domains.length > 0) {
                    for (const schoolDomain of school.domains) {
                        if (domain === schoolDomain.toLowerCase()) {
                            return school;
                        }
                    }
                }
            }
            return null;
        }

        emailInput.addEventListener('input', function() {
            const email = this.value.trim();
            detectedSchool = detectSchoolFromEmail(email);

            if (detectedSchool) {
                schoolDetectedBadge.style.display = 'flex';
                detectedSchoolName.textContent = detectedSchool.name;
                schoolDropdownGroup.style.display = 'none';
                selectedSchoolId.value = detectedSchool.id;
            } else {
                schoolDetectedBadge.style.display = 'none';
                schoolDropdownGroup.style.display = 'block';
                selectedSchoolId.value = '';

                if (!email) {
                    schoolSelectInput.value = '';
                    schoolSelectInput.placeholder = 'Search for your school...';
                }
            }

            hideError();
        });

        schoolSelectInput.addEventListener('click', function() {
            const isOpen = schoolDropdownList.classList.contains('open');
            if (isOpen) {
                closeDropdown();
            } else {
                openDropdown();
            }
        });

        schoolSelectInput.addEventListener('input', function() {
            filterDropdown(this.value);
        });

        function openDropdown() {
            renderDropdown(allSchools);
            schoolDropdownList.classList.add('open');
            dropdownArrow.classList.remove('fa-chevron-down');
            dropdownArrow.classList.add('fa-chevron-up');
        }

        function closeDropdown() {
            schoolDropdownList.classList.remove('open');
            dropdownArrow.classList.remove('fa-chevron-up');
            dropdownArrow.classList.add('fa-chevron-down');
        }

        function renderDropdown(schools) {
            if (schools.length === 0) {
                schoolDropdownList.innerHTML = '<div class="no-results">No schools found</div>';
                return;
            }

            schoolDropdownList.innerHTML = schools.map(school => {
                const location = [school.city, school.country].filter(Boolean).join(', ');
                return `
                    <div class="dropdown-item" data-school-id="${school.id}" data-school-name="${school.name}">
                        <strong>${school.name}</strong>
                        ${location ? `<span style="color: var(--text-muted); font-size: 0.8rem; display: block;">${location}</span>` : ''}
                    </div>
                `;
            }).join('');

            schoolDropdownList.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function() {
                    const schoolId = this.getAttribute('data-school-id');
                    const schoolName = this.getAttribute('data-school-name');
                    selectSchool(schoolId, schoolName);
                });
            });
        }

        function filterDropdown(query) {
            if (!query) {
                renderDropdown(allSchools);
                return;
            }
            const filtered = allSchools.filter(school =>
                school.name.toLowerCase().includes(query.toLowerCase()) ||
                school.city.toLowerCase().includes(query.toLowerCase()) ||
                school.country.toLowerCase().includes(query.toLowerCase())
            );
            renderDropdown(filtered);
        }

        function selectSchool(schoolId, schoolName) {
            selectedSchoolId.value = schoolId;
            schoolSelectInput.value = schoolName;
            closeDropdown();
            hideError();
        }

        document.addEventListener('click', function(e) {
            if (!schoolSelectInput.contains(e.target) && !schoolDropdownList.contains(e.target)) {
                closeDropdown();
            }
        });

        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError();

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const schoolId = selectedSchoolId.value;

    if (!email) {
        showError('Please enter your email address.');
        emailInput.focus();
        return;
    }

    if (!schoolId) {
        if (detectedSchool) {
            selectedSchoolId.value = detectedSchool.id;
        } else {
            showError('Please select your school from the dropdown.');
            return;
        }
    }

    if (!password) {
        showError('Please enter your password.');
        passwordInput.focus();
        return;
    }

    loginButton.classList.add('loading');
    loginButton.disabled = true;

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const finalSchoolId = selectedSchoolId.value;

        // ========== STEP 1: Check schooladmins collection first ==========
        let userData = null;
        let userRole = null;

        const schoolAdminRef = doc(db, 'schooladmins', user.uid);
        const schoolAdminDoc = await getDoc(schoolAdminRef);

        if (schoolAdminDoc.exists()) {
            const adminData = schoolAdminDoc.data();
            
            // Verify this admin belongs to the selected school
            if (adminData.schoolId === finalSchoolId) {
                userData = adminData;
                userRole = 'admin';
                console.log('✅ User identified as school admin for:', finalSchoolId);
            } else {
                // Admin exists but for a different school
                await auth.signOut();
                showError('You are an administrator for a different school. Please select the correct school from the dropdown.');
                loginButton.classList.remove('loading');
                loginButton.disabled = false;
                return;
            }
        }

        // ========== STEP 2: If not an admin, check regular users ==========
        if (!userRole) {
            const userRef = doc(db, 'schools', finalSchoolId, 'users', user.uid);
            const userDoc = await getDoc(userRef);

            if (!userDoc.exists()) {
                await auth.signOut();
                showError('You are not registered at this school. Please select the correct school or contact your administrator.');
                loginButton.classList.remove('loading');
                loginButton.disabled = false;
                return;
            }

            userData = userDoc.data();
            userRole = userData.role || 'student';
            console.log('✅ User identified as:', userRole, 'for school:', finalSchoolId);
        }

        // ========== STEP 3: Get school info ==========
        const schoolRef = doc(db, 'schools', finalSchoolId);
        const schoolDoc = await getDoc(schoolRef);
        const schoolData = schoolDoc.exists() ? schoolDoc.data() : {};

        // ========== STEP 4: Store session ==========
                // ========== STEP 4: Check 2FA for students ==========
        if (userRole === 'student') {
            const studentDoc = await getDoc(doc(db, 'students', user.uid));
            if (studentDoc.exists() && studentDoc.data().twoFactorEnabled === true) {
                // 2FA is enabled — send verification email and show prompt
                try {
                    const { sendEmailVerification } = await import(
                        "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
                    );
                    await sendEmailVerification(user);
                } catch (e) {
                    console.error('Failed to send 2FA email:', e);
                }
                
                // Store partial session so we know login was started
                sessionStorage.setItem('pendingSchoolId', finalSchoolId);
                sessionStorage.setItem('pendingUserRole', userRole);
                sessionStorage.setItem('pendingDisplayName', userData.displayName || user.email);
                sessionStorage.setItem('pendingEmail', user.email);
                sessionStorage.setItem('pendingUid', user.uid);
                sessionStorage.setItem('pendingSchoolName', schoolData.name || 'Your School');
                sessionStorage.setItem('pendingSchoolLocation', 
                    [schoolData.city, schoolData.country].filter(Boolean).join(', ') || 'Learning Portal'
                );
                
                // Show 2FA overlay instead of redirecting
                loginButton.classList.remove('loading');
                loginButton.disabled = false;
                showTwoFactorOverlay(user.email);
                return; // Stop here — don't redirect yet
            }
        }
        
        // ========== STEP 5: Store session ==========
        sessionStorage.setItem('schoolId', finalSchoolId);
        sessionStorage.setItem('userRole', userRole);
        sessionStorage.setItem('userDisplayName', userData.displayName || user.email);
        sessionStorage.setItem('userEmail', user.email);
        sessionStorage.setItem('userUid', user.uid);
        sessionStorage.setItem('schoolName', schoolData.name || 'Your School');
        sessionStorage.setItem('schoolLocation', 
            [schoolData.city, schoolData.country].filter(Boolean).join(', ') || 'Learning Portal'
        );

        console.log('✅ Login successful — Role:', userRole, '| School:', schoolData.name);

        // ========== STEP 6: Redirect to hub ==========
        window.location.href = 'school-hub.html';

    } catch (error) {
        console.error('❌ Login error:', error);
        loginButton.classList.remove('loading');
        loginButton.disabled = false;

        switch (error.code) {
            case 'auth/user-not-found':
            case 'auth/invalid-credential':
            case 'auth/wrong-password':
                showError('Invalid email or password. Please try again.');
                break;
            case 'auth/invalid-email':
                showError('Please enter a valid email address.');
                break;
            case 'auth/too-many-requests':
                showError('Too many login attempts. Please try again later.');
                break;
            case 'auth/network-request-failed':
                showError('Network error. Please check your connection.');
                break;
            default:
                showError('Login failed. Please try again.');
        }
    }
});

onAuthStateChanged(auth, async (user) => {
    if (user && sessionStorage.getItem('schoolId')) {
        window.location.href = 'school-hub.html';
    }
});

loadSchools();
    </script>
