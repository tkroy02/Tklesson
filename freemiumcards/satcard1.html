<!-- ============================================================

<script>
const flashcards = [
  { question: "What are **context clues**?", answer: "Words, phrases, or sentences surrounding an unfamiliar word that hint at its meaning." },
  { question: "What is the **first step** in a words-in-context question?", answer: "Go back to the passage and read the sentence containing the word, plus the sentences before and after." },
  { question: "What are the **types of context clues**?", answer: "Definition/explanation, synonym, antonym/contrast, example, inference/general sense." },
  { question: "What is a **definition context clue**?", answer: "The meaning is directly explained in the sentence:<br>\"X, which is...\" or \"X, meaning...\"" },
  { question: "What is a **synonym context clue**?", answer: "A word with similar meaning appears nearby:<br>\"The arduous, grueling task...\"" },
  { question: "What is an **antonym context clue**?", answer: "A word with opposite meaning signals contrast:<br>\"Unlike her gregarious sister, she was shy.\"" },
  { question: "What is **denotation**?", answer: "The literal, dictionary definition of a word." },
  { question: "What is **connotation**?", answer: "The emotional or cultural association a word carries — positive, negative, or neutral." },
  { question: "Give an example of **connotation vs. denotation**.", answer: "\"Thrifty\" and \"stingy\" both mean careful with money (denotation).<br>\"Thrifty\" = positive. \"Stingy\" = negative (connotation)." },
  { question: "Why does **connotation** matter on the SAT?", answer: "Wrong answers often match denotation but carry the wrong connotation for the passage's tone." },
  { question: "What are **multiple-meaning words**?", answer: "Words with several definitions — only one fits the context.<br>You must choose the contextually correct meaning." },
  { question: "How do you handle a **familiar word** used in an unfamiliar way?", answer: "Ignore your prior knowledge.<br>Rely only on how the word is used in that specific passage." },
  { question: "What is a **common trap** with multiple-meaning words?", answer: "Choosing the most common definition instead of the one that fits the passage context." },
  { question: "What is **discipline-specific vocabulary**?", answer: "Academic or technical terms used in a specific field (science, law, economics, etc.)." },
  { question: "How do you approach **discipline-specific vocabulary**?", answer: "Use the surrounding explanation — SAT passages usually define or illustrate technical terms in context." },
  { question: "How does **word choice** affect tone?", answer: "Formal vs. informal, positive vs. negative, emotional vs. neutral — each shapes the reader's perception." },
  { question: "What is **figurative language**?", answer: "Non-literal language used for effect:<br>metaphors, similes, personification, hyperbole, idioms." },
  { question: "What is a **metaphor**?", answer: "A direct comparison between two unlike things without \"like\" or \"as.\"" },
  { question: "What is a **simile**?", answer: "A comparison using \"like\" or \"as.\"" },
  { question: "What is **personification**?", answer: "Giving human traits to non-human objects or ideas." },
  { question: "What is **hyperbole**?", answer: "Deliberate exaggeration for emphasis or effect." },
  { question: "How do you interpret **idioms** in context?", answer: "Don't translate literally.<br>Use surrounding sentences to infer the intended meaning." },
  { question: "How is **vocabulary tested in science passages**?", answer: "Technical terms are usually defined or explained — focus on how the term functions in the argument." },
  { question: "How is **vocabulary tested in historical passages**?", answer: "May use archaic or formal language.<br>Use context and surrounding arguments to determine meaning." },
  { question: "What is the **best strategy** when you don't know a word?", answer: "Substitute each answer choice into the sentence.<br>The one that preserves meaning and tone is correct." },
  { question: "Why should you **predict the meaning** before looking at choices?", answer: "Prevents being misled by plausible-sounding distractors that don't quite fit." },
  { question: "What is a **distractor** in vocabulary questions?", answer: "An answer choice that is a real definition of the word, but not the one used in the passage." },
  { question: "What makes an answer choice **too extreme**?", answer: "A word with stronger emotional charge than the passage supports — e.g., \"thrilled\" vs. \"pleased.\"" },
  { question: "What does **\"most nearly means\"** signal?", answer: "You need the closest match in context, not the exact dictionary definition." },
  { question: "How do **transition words** affect word meaning?", answer: "\"But,\" \"however,\" and \"although\" signal contrast — the target word may mean the opposite of nearby ideas." },
  { question: "What is the **role of punctuation** in context clues?", answer: "Commas, dashes, and colons often set off definitions, examples, or restatements of a word." },
  { question: "How do you handle **words in paired passages**?", answer: "Context may differ between passages.<br>Determine meaning separately for each passage." },
  { question: "What does **neutral connotation** mean?", answer: "The word carries no strong positive or negative emotional association." },
  { question: "What is the **difference between analyze and summarize**?", answer: "Analyze = break down and examine.<br>Summarize = condense main points.<br>Context determines which fits." },
  { question: "What is the **best way to improve vocabulary for the SAT**?", answer: "Read widely and practice using context to determine meaning — not just memorizing word lists." },
  { question: "What should you do if two answers seem correct?", answer: "Focus on connotation and tone.<br>Only one will match the passage's emotional register precisely." },
  { question: "How does **repetition** help with context?", answer: "If a concept is repeated in different words, those synonyms help clarify meaning." },
  { question: "What is a **semantic field**?", answer: "A set of words related in meaning.<br>Identifying the field helps narrow down a word's meaning." },
  { question: "What is the **relationship between word choice and author's purpose**?", answer: "Authors choose words deliberately — word choice reveals tone, bias, and what they want readers to feel." },
  { question: "What is the **golden rule** for words-in-context questions?", answer: "Forget the dictionary. The passage is your only authority.<br>Meaning comes entirely from context." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');

  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
