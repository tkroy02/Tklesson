<!-- ============================================================

<script>
const flashcards = [
  { question: "What is an **inequality**?", answer: "A mathematical statement comparing two expressions using $<$, $>$, $\\leq$, $\\geq$, or $\\neq$." },
  { question: "How do you read the inequality symbol '$\\leq$'?", answer: "Less than or equal to." },
  { question: "How do you read the inequality symbol '$\\geq$'?", answer: "Greater than or equal to." },
  { question: "What is the **solution of an inequality**?", answer: "All values of the variable that make the inequality true." },
  { question: "How is solving an inequality **similar** to solving an equation?", answer: "You can add, subtract, multiply, or divide both sides by the same number to isolate the variable." },
  { question: "What is the **key difference** when solving an inequality compared to an equation?", answer: "When you multiply or divide both sides by a negative number, you must reverse (flip) the inequality sign." },
  { question: "How do you solve $2x + 3 > 7$?", answer: "Subtract 3: $2x > 4$. Divide by 2: $x > 2$." },
  { question: "How do you solve $-3x \\leq 12$?", answer: "Divide by $-3$ (reverse sign): $x \\geq -4$." },
  { question: "What is a **compound inequality**?", answer: "Two inequalities joined by 'and' or 'or'." },
  { question: "How is a compound inequality with 'and' written?", answer: "Often as a single statement: $a < x < b$ (e.g., $2 < x < 5$)." },
  { question: "What does **'and'** mean in a compound inequality?", answer: "Both inequalities must be true. The solution is the intersection of their individual solutions." },
  { question: "What does **'or'** mean in a compound inequality?", answer: "At least one of the inequalities must be true. The solution is the union of their individual solutions." },
  { question: "How do you solve $1 \\leq 2x - 3 < 7$?", answer: "Add 3 to all parts: $4 \\leq 2x < 10$. Divide all parts by 2: $2 \\leq x < 5$." },
  { question: "What is the solution to $x < 2$ or $x \\geq 5$ on a number line?", answer: "Two separate rays: one from negative infinity to 2 (open circle), and one from 5 to infinity (closed circle)." },
  { question: "What is an **absolute value inequality**?", answer: "An inequality that contains an absolute value expression, like $|x| < a$ or $|x| > a$." },
  { question: "How do you solve $|x| < 5$?", answer: "Rewrite as a compound inequality: $-5 < x < 5$." },
  { question: "How do you solve $|x| > 5$?", answer: "Rewrite as a compound inequality: $x < -5$ or $x > 5$." },
  { question: "What is the general rule for solving $|\\text{expression}| < a$ (where $a > 0$)?", answer: "Rewrite as: $-a < \\text{expression} < a$" },
  { question: "What is the general rule for solving $|\\text{expression}| > a$ (where $a > 0$)?", answer: "Rewrite as: $\\text{expression} < -a$ or $\\text{expression} > a$" },
  { question: "How do you solve $|2x - 3| \\leq 7$?", answer: "Rewrite: $-7 \\leq 2x - 3 \\leq 7$. Add 3: $-4 \\leq 2x \\leq 10$. Divide by 2: $-2 \\leq x \\leq 5$." },
  { question: "What is a **linear inequality in two variables**?", answer: "An inequality that can be written in forms like $y < mx + b$, $Ax + By \\leq C$, etc." },
  { question: "How do you graph the solution to $y > 2x + 1$?", answer: "1) Graph the boundary line $y = 2x + 1$ with a dashed line ($>$). 2) Shade the region above the line." },
  { question: "When graphing an inequality, what does a **solid** boundary line indicate?", answer: "The points on the line are included in the solution ($\\leq$ or $\\geq$)." },
  { question: "When graphing an inequality, what does a **dashed** boundary line indicate?", answer: "The points on the line are NOT included in the solution ($<$ or $>$)." },
  { question: "How do you test which side of a boundary line to shade?", answer: "Pick a test point not on the line (e.g., $(0,0)$). If it satisfies the inequality, shade that side." },
  { question: "What is a **system of linear inequalities**?", answer: "Two or more linear inequalities with the same variables." },
  { question: "How do you find the solution to a system of linear inequalities?", answer: "Graph each inequality. The solution is the region where all shaded areas overlap (the intersection)." },
  { question: "What are the boundary lines for the system $y \\geq x$ and $y < 3$?", answer: "$y = x$ (solid) and $y = 3$ (dashed)." },
  { question: "What is a **feasible region**?", answer: "In optimization problems, the graph of a system of inequalities that contains all possible solutions." },
  { question: "Can an inequality have **no solution**?", answer: "Yes, e.g., $x > 3$ and $x < 1$ has no solution because no number satisfies both." },
  { question: "Can an inequality have **infinitely many solutions**?", answer: "Yes, most inequalities have an infinite set of solutions, often represented as an interval or region." },
  { question: "How do you write the solution $x \\leq 4$ in **interval notation**?", answer: "$(-\\infty, 4]$" },
  { question: "How do you write the solution $x > -2$ in **interval notation**?", answer: "$(-2, \\infty)$" },
  { question: "What does a **parenthesis** '(' or ')' mean in interval notation?", answer: "The endpoint is NOT included (corresponds to $<$ or $>$)." },
  { question: "What does a **bracket** '[' or ']' mean in interval notation?", answer: "The endpoint IS included (corresponds to $\\leq$ or $\\geq$)." },
  { question: "How do you write the solution $1 < x \\leq 5$ in **interval notation**?", answer: "$(1, 5]$" },
  { question: "How do you write the solution $x < 0$ or $x \\geq 3$ in **interval notation**?", answer: "$(-\\infty, 0) \\cup [3, \\infty)$" },
  { question: "What is the solution to $3(x - 2) \\geq 5x + 4$?", answer: "$3x - 6 \\geq 5x + 4$ → $-2x \\geq 10$ → $x \\leq -5$ (reverse sign)." },
  { question: "Why don't you flip the inequality sign when adding or subtracting?", answer: "Adding/subtracting a number doesn't change the order, unlike multiplying/dividing by a negative." },
  { question: "What is the final check after solving an inequality?", answer: "Test a value from your solution in the original inequality to verify it's true." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
