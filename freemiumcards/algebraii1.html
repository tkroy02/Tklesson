  tex: {

  },
  startup: {
    ready() {

    }
  }
};

<style>
  /* ============================================================
     Design System Variables
     ============================================================ */
  :root {
    --primary: #0f4c81;
    --primary-light: #1a5d9f;
    --primary-dark: #0a3a66;
    --secondary: #e67e22;
    --secondary-light: #f39c12;
    --secondary-dark: #d35400;
    --accent: #2ecc71;
    --light: #f8fafc;
    --dark: #1e293b;
    --gray: #94a3b8;
    --success: #27ae60;
    --error: #e74c3c;

  /* ============================================================
     Reset & Base
     ============================================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    line-height: 1.6;
    color: var(--text);

  }

  .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

  /* ============================================================
     Site Navigation
     ============================================================ */
  .site-nav {
    background: var(--nav-bg);
    border-bottom: 3px solid var(--secondary);
    padding: 0;
    position: sticky;

    z-index: 1000;

  }

  .site-nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    flex-wrap: wrap;
  }

  .site-nav-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: white;
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 1.3rem;
    padding: 0.75rem 0;
  }

  .site-nav-brand img { height: 36px; width: auto; }

  .site-nav-links {
    display: flex;
    align-items: center;

    list-style: none;

    margin: 0;

  .site-nav-links a:hover { color: white; background: var(--nav-hover); }
  .site-nav-links a.nav-cta { background: var(--secondary); color: white; font-weight: 600; border-radius: 0.375rem; margin-left: 0.5rem; }

    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;

  /* ============================================================
     Page Header
     ============================================================ */
  .page-header {
    background: var(--gradient);
    color: white;
    padding: 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;

    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flashcard {
    width: 90%;
    max-width: 700px;
    height: 350px;
    perspective: 1000px;
    cursor: pointer;
    margin: 20px auto;
    position: relative;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }

  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }

  .flashcard-front,
  .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1em;
    font-weight: bold;
    border-radius: 10px;
    padding: 20px;
    box-sizing: border-box;
    border: 2px solid var(--primary);
    color: var(--primary-dark);
    text-align: center;
    flex-direction: column;
    box-shadow: var(--shadow);
  }

  .flashcard-front {
    background-color: #e1f5fe;
  }

  .flashcard-back {
    background-color: #c8e6c9;
    transform: rotateY(180deg);
  }

  .flashcard-front p, 
  .flashcard-back p {
    margin: 0;
    font-weight: normal;
  }

  .flashcard-front strong,
  .flashcard-back strong {
    margin: 0 4px;
    color: var(--primary);
  }

  /* ============================================================
     Controls & Status
     ============================================================ */
  .controls {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    width: 100%;
    max-width: 500px;
  }

  .btn {
    background-color: var(--primary);
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    font-size: 1em;
    border-radius: 5px;
    font-family: 'Poppins', sans-serif;
    flex: 1 1 120px;
    transition: background-color 0.3s ease;
  }

  .btn:hover {
    background-color: var(--primary-dark);
  }

  .btn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }

  .status {
    margin-top: 15px;
    font-size: 1em;
    color: var(--text-light);
    text-align: center;
    font-weight: 500;
  }

  /* ============================================================
     Site Footer
     ============================================================ */
  .site-footer {
    background: var(--nav-bg);
    color: #e2e8f0;
    padding: 2rem 1.5rem;
    margin-top: auto;
    border-top: 3px solid var(--secondary);

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;

  .footer-brand { font-family: 'Roboto Slab', serif; font-weight: 600; font-size: 1rem; color: white; }
  .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; list-style: none; padding: 0; margin: 0; }
  .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: color 0.2s ease; }
  .footer-links a:hover { color: white; }

  .footer-bottom {

    border-top: 1px solid rgba(255,255,255,0.1);

  /* ============================================================

  @media (max-width: 768px) {
    .nav-toggle { display: block; }
    .site-nav-links { display: none; flex-direction: column; width: 100%; padding-bottom: 0.5rem; }

    .site-nav-links a { padding: 0.6rem 0.5rem; width: 100%; }
    .site-nav-links a.nav-cta { margin-left: 0; text-align: center; }
    
    .page-header { padding: 1rem; }
    .header-back-link { text-align: center; margin-bottom: 0.5rem; }
    .header-title { font-size: 1.8rem; }

    .flashcard {

    .footer-inner { flex-direction: column; text-align: center; }

  }

  @media (min-width: 900px) {
    .flashcard-front,
    .flashcard-back {
      font-size: 1.5rem;
    }

</style>

<!-- ============================================================
     Flashcard Logic
     ============================================================ -->
<script>
const flashcards = [
  { question: "What is the **standard form** of a quadratic function?", answer: "$f(x) = ax^2 + bx + c$, where $a \\neq 0$." },
  { question: "What is the **vertex form** of a quadratic function?", answer: "$f(x) = a(x - h)^2 + k$, where $(h, k)$ is the vertex." },
  { question: "What is the **factored form** of a quadratic function?", answer: "$f(x) = a(x - r_1)(x - r_2)$, where $r_1$ and $r_2$ are the roots." },
  { question: "How do you find the **vertex** from standard form?", answer: "Vertex $x$-coordinate $= -\\frac{b}{2a}$. Substitute back into $f(x)$ to find $y$-coordinate." },
  { question: "What is the **axis of symmetry** of a quadratic function?", answer: "The vertical line through the vertex: $x = h$ (vertex form) or $x = -\\frac{b}{2a}$ (standard form)." },
  { question: "What does the sign of '$a$' tell you about the parabola?", answer: "If $a > 0$, opens upward (minimum). If $a < 0$, opens downward (maximum)." },
  { question: "What is the **discriminant** and what does it tell about roots?", answer: "$D = b^2 - 4ac$. $D > 0$ → two real roots; $D = 0$ → one real double root; $D < 0$ → two complex roots." },
  { question: "What is the **quadratic formula**?", answer: "$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$" },
  { question: "How do you **complete the square** to convert from standard to vertex form?", answer: "1) Factor '$a$' from first two terms. 2) Add/subtract $(\\frac{b}{2a})^2$ inside. 3) Write as a perfect square trinomial and simplify." },
  { question: "What are the **roots/zeros/$x$-intercepts** of a quadratic function?", answer: "The $x$-values where $f(x) = 0$." },
  { question: "How can you find roots from **factored form**?", answer: "Set each factor $(x - r_i) = 0$ → $x = r_i$." },
  { question: "What is the **$y$-intercept** of $f(x) = ax^2 + bx + c$?", answer: "$(0, c)$" },
  { question: "What is the vertex of $f(x) = 2(x - 3)^2 + 5$?", answer: "$(3, 5)$" },
  { question: "What is the vertex of $f(x) = x^2 - 6x + 8$?", answer: "$x = -\\frac{-6}{2 \\cdot 1} = 3$, $f(3) = 9 - 18 + 8 = -1$ → vertex: $(3, -1)$." },
  { question: "What is a **parabola**?", answer: "The U-shaped graph of a quadratic function." },
  { question: "What is the **minimum or maximum value** of a quadratic function?", answer: "The $y$-coordinate of the vertex." },
  { question: "How do you find the maximum height in a projectile motion problem?", answer: "Find the vertex $(t, h)$ of the quadratic height function $h(t) = at^2 + bt + c$; the $y$-coordinate is the max height." },
  { question: "What is the difference between solving $f(x) = 0$ and finding the vertex?", answer: "Solving $f(x) = 0$ finds $x$-intercepts; the vertex is the turning point (min or max)." },
  { question: "How do you write the equation of a quadratic given its **vertex and a point**?", answer: "Use vertex form $f(x) = a(x - h)^2 + k$, substitute vertex $(h,k)$ and the other point $(x,y)$ to solve for $a$." },
  { question: "How do you write the equation of a quadratic given its **roots and a point**?", answer: "Use factored form $f(x) = a(x - r_1)(x - r_2)$, substitute roots and point to solve for $a$." },
  { question: "What does it mean if the discriminant is a **perfect square**?", answer: "The quadratic has rational roots (if coefficients are rational)." },
  { question: "How do you find the **range** of a quadratic function?", answer: "If $a > 0$, range: $[k, \\infty)$. If $a < 0$, range: $(-\\infty, k]$, where $k$ is the $y$-coordinate of the vertex." },
  { question: "What is the **domain** of any quadratic function?", answer: "All real numbers $(-\\infty, \\infty)$." },
  { question: "What is the effect of changing '$a$' on the parabola's width?", answer: "Larger $|a|$ makes it narrower; smaller $|a|$ makes it wider." },
  { question: "How do you shift the graph of $y = x^2$ to get $y = (x - h)^2 + k$?", answer: "Shift right $h$ units (if $h>0$) or left $|h|$ units (if $h<0$), and up $k$ units (if $k>0$) or down $|k|$ units (if $k<0$)." },
  { question: "What is a **quadratic inequality**?", answer: "An inequality like $ax^2 + bx + c > 0$, $< 0$, $\\geq 0$, or $\\leq 0$." },
  { question: "How do you solve a quadratic inequality?", answer: "1) Solve corresponding equation $ax^2+bx+c=0$. 2) Use test points in intervals between roots. 3) Determine sign of quadratic in each interval." },
  { question: "How do you find the intersection of a line and a parabola?", answer: "Set equations equal, solve for $x$ (may yield quadratic), then find corresponding $y$." },
  { question: "What is the vertex of $f(x) = -3x^2 + 12x - 7$?", answer: "$x = -\\frac{12}{2 \\cdot (-3)} = 2$; $f(2) = -12 + 24 - 7 = 5$ → vertex: $(2, 5)$." },
  { question: "How do you determine if a quadratic is **factorable over the integers**?", answer: "Check if discriminant is a perfect square and if factors exist with integer coefficients." },
  { question: "What is a **perfect square trinomial**?", answer: "A quadratic of the form $a^2x^2 + 2abx + b^2 = (ax + b)^2$." },
  { question: "How do you solve $2x^2 + 5x - 3 = 0$ by factoring?", answer: "$(2x - 1)(x + 3) = 0$ → $x = \\frac{1}{2}$ or $x = -3$." },
  { question: "What is the **sum and product of roots** of $ax^2 + bx + c = 0$?", answer: "Sum $= -\\frac{b}{a}$, Product $= \\frac{c}{a}$." },
  { question: "How can you write a quadratic given sum $S$ and product $P$ of its roots?", answer: "$x^2 - Sx + P = 0$." },
  { question: "What is the effect of the constant term $c$ on the graph?", answer: "It shifts the parabola vertically; $c$ is the $y$-intercept." },
  { question: "How do you find the axis of symmetry from the roots?", answer: "Axis is the midpoint of the roots: $x = \\frac{r_1 + r_2}{2}$." },
  { question: "What is the vertex of a quadratic in intercept form $f(x) = a(x - p)(x - q)$?", answer: "$x$-coordinate $= \\frac{p+q}{2}$; substitute to find $y$." },
  { question: "How can you tell from the equation if the vertex is a **maximum**?", answer: "If $a < 0$." },
  { question: "How can you tell from the equation if the vertex is a **minimum**?", answer: "If $a > 0$." },
  { question: "How do you find the quadratic function that models a set of points?", answer: "Set up a system of equations using $y = ax^2 + bx + c$ for each point, solve for $a$, $b$, $c$." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
