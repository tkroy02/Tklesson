<!-- ============================================================

     ============================================================ -->
<script>
const flashcards = [
  { question: "What does it mean to **factor** a polynomial?", answer: "To write it as a product of its factors (simpler polynomials)." },
  { question: "What is the **greatest common factor (GCF)**?", answer: "The largest expression that divides all terms of a polynomial." },
  { question: "What is the **first step** in factoring any polynomial?", answer: "Factor out the greatest common factor (GCF), if one exists." },
  { question: "How do you factor a quadratic in the form $x^2 + bx + c$?", answer: "Find two numbers that multiply to $c$ and add to $b$: $(x + m)(x + n)$." },
  { question: "How do you factor a quadratic in the form $ax^2 + bx + c$ when $a = 1$?", answer: "Same as $x^2 + bx + c$: find two numbers that multiply to $c$ and add to $b$." },
  { question: "What is the factoring method called when $a \\neq 1$ in $ax^2 + bx + c$?", answer: "The $ac$ method (or grouping method)." },
  { question: "What is the first step in the **$ac$ method**?", answer: "Multiply $a$ and $c$. Find two numbers that multiply to $ac$ and add to $b$." },
  { question: "What is a **perfect square trinomial**?", answer: "A trinomial that is the square of a binomial: $a^2 + 2ab + b^2 = (a + b)^2$ or $a^2 - 2ab + b^2 = (a - b)^2$." },
  { question: "How do you recognize a **perfect square trinomial**?", answer: "First and last terms are perfect squares, middle term is $2 \\times \\sqrt{\\text{first}} \\times \\sqrt{\\text{last}}$." },
  { question: "What is the **difference of squares** formula?", answer: "$a^2 - b^2 = (a - b)(a + b)$" },
  { question: "What is the **sum of squares** formula?", answer: "$a^2 + b^2$ is prime over the reals (cannot be factored using real numbers)." },
  { question: "What is the **difference of cubes** formula?", answer: "$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$" },
  { question: "What is the **sum of cubes** formula?", answer: "$a^3 + b^3 = (a + b)(a^2 - ab + b^2)$" },
  { question: "How many terms does a polynomial need for **factoring by grouping**?", answer: "Four terms (or sometimes six after initial steps)." },
  { question: "What is the first step in **factoring by grouping**?", answer: "Group terms into pairs and factor the GCF from each pair." },
  { question: "What is a **prime polynomial**?", answer: "A polynomial that cannot be factored using integer coefficients." },
  { question: "What is the **zero product property**?", answer: "If $a \\cdot b = 0$, then $a = 0$ or $b = 0$. Used to solve equations after factoring." },
  { question: "How do you solve a quadratic equation by **factoring**?", answer: "1) Write in standard form $ax^2 + bx + c = 0$. 2) Factor completely. 3) Apply zero product property." },
  { question: "What is **standard form** for a quadratic equation?", answer: "$ax^2 + bx + c = 0$" },
  { question: "How do you factor $4x^2 - 9$?", answer: "$(2x - 3)(2x + 3)$ — difference of squares." },
  { question: "How do you factor $x^2 - 5x + 6$?", answer: "$(x - 2)(x - 3)$ — numbers multiply to $6$, add to $-5$." },
  { question: "How do you factor $2x^2 + 7x + 3$?", answer: "$(2x + 1)(x + 3)$ — $ac = 6$, factors $6$ and $1$ sum to $7$." },
  { question: "What is the **GCF** of $6x^3 + 9x^2$?", answer: "$3x^2$" },
  { question: "How do you factor $x^2 + 10x + 25$?", answer: "$(x + 5)^2$ — perfect square trinomial." },
  { question: "How do you factor $8x^3 - 27$?", answer: "$(2x - 3)(4x^2 + 6x + 9)$ — difference of cubes." },
  { question: "What should you always **check after factoring**?", answer: "Multiply the factors back to verify they give the original polynomial." },
  { question: "What is factoring out a **negative GCF** useful for?", answer: "Making the leading coefficient positive, which can simplify further factoring." },
  { question: "How do you factor $x^4 - 16$ **completely**?", answer: "$(x^2 - 4)(x^2 + 4) = (x - 2)(x + 2)(x^2 + 4)$" },
  { question: "How do you factor a trinomial with a **leading negative**?", answer: "Factor out $-1$ first, then factor the resulting trinomial." },
  { question: "What is an **irreducible quadratic**?", answer: "A quadratic that cannot be factored over the integers (e.g., $x^2 + 4$)." },
  { question: "How can you check if **factoring is complete**?", answer: "All factors are prime (cannot be factored further over the integers)." },
  { question: "What is the relationship between **factoring and solving equations**?", answer: "Factoring converts an equation into product form so the zero product property can be applied." },
  { question: "What is the first step to factor $3x^3 + 6x^2 - 24x$?", answer: "Factor out the GCF: $3x(x^2 + 2x - 8)$." },
  { question: "What is the next step after factoring out the GCF in $3x(x^2 + 2x - 8)$?", answer: "Factor the quadratic: $3x(x + 4)(x - 2)$." },
  { question: "When factoring by grouping, what should the **binomial factors** be after the first step?", answer: "Identical binomials (common factor)." },
  { question: "How do you factor a perfect square trinomial like $9x^2 - 12x + 4$?", answer: "$(3x - 2)^2$ — since $(3x)^2 = 9x^2$, $2^2 = 4$, and $-2 \\cdot (3x) \\cdot 2 = -12x$." },
  { question: "What is the factored form of $2x^2 - 8$?", answer: "$2(x^2 - 4) = 2(x - 2)(x + 2)$" },
  { question: "How do you factor a sum of squares if **imaginary numbers** are allowed?", answer: "$a^2 + b^2 = (a + bi)(a - bi)$ — but this is not covered in standard Algebra 1 real factoring." },
  { question: "What is a useful **shortcut** for factoring simple quadratics when $a = 1$?", answer: "Find two numbers that multiply to $c$ and add to $b$." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
