<!-- ============================================================
     Flashcard Logic
     ============================================================ -->
<script>
const flashcards = [
  { question: "What is a **polynomial function**?", answer: "A function of the form $f(x) = a_nx^n + a_{n-1}x^{n-1} + \\cdots + a_1x + a_0$, where $n$ is a non-negative integer and coefficients are real numbers." },
  { question: "What is the **degree** of a polynomial function?", answer: "The highest power of $x$ with a non-zero coefficient." },
  { question: "What is the **leading coefficient**?", answer: "The coefficient of the term with the highest degree." },
  { question: "What is the **constant term**?", answer: "The term $a_0$ (degree 0)." },
  { question: "How do you determine the **end behavior** of a polynomial?", answer: "By the degree and the sign of the leading coefficient." },
  { question: "What is the end behavior of an **odd-degree polynomial** with a positive leading coefficient?", answer: "As $x \\to -\\infty$, $f(x) \\to -\\infty$; as $x \\to \\infty$, $f(x) \\to \\infty$." },
  { question: "What is the end behavior of an **even-degree polynomial** with a negative leading coefficient?", answer: "As $x \\to -\\infty$, $f(x) \\to -\\infty$; as $x \\to \\infty$, $f(x) \\to -\\infty$." },
  { question: "What is a **turning point**?", answer: "A point where the graph changes direction from increasing to decreasing or vice versa." },
  { question: "What is the **maximum number of turning points** for a polynomial of degree $n$?", answer: "$n - 1$" },
  { question: "What is a **zero (or root)** of a polynomial function?", answer: "A value $r$ such that $f(r) = 0$." },
  { question: "What is the **multiplicity** of a zero?", answer: "The number of times the factor $(x - r)$ appears in the factored form of the polynomial." },
  { question: "How does the multiplicity affect the graph at a zero?", answer: "Odd multiplicity: graph crosses $x$-axis. Even multiplicity: graph touches $x$-axis and turns around." },
  { question: "What is the **Intermediate Value Theorem** for polynomials?", answer: "If $f$ is continuous on $[a,b]$ and $f(a)$ and $f(b)$ have opposite signs, then $f$ has at least one zero in $(a,b)$." },
  { question: "What is the **Rational Root Theorem**?", answer: "Any rational zero $\\frac{p}{q}$ of a polynomial with integer coefficients must have $p$ as a factor of the constant term and $q$ as a factor of the leading coefficient." },
  { question: "What is the **Factor Theorem**?", answer: "$(x - c)$ is a factor of $f(x)$ if and only if $f(c) = 0$." },
  { question: "What is the **Remainder Theorem**?", answer: "If $f(x)$ is divided by $(x - c)$, the remainder is $f(c)$." },
  { question: "How do you perform **synthetic division**?", answer: "A shortcut to divide a polynomial by $(x - c)$ using only coefficients." },
  { question: "What is a **local maximum**?", answer: "A point where $f(x)$ is greater than at nearby points." },
  { question: "What is a **local minimum**?", answer: "A point where $f(x)$ is less than at nearby points." },
  { question: "What is the **global (absolute) maximum/minimum**?", answer: "The highest/lowest point on the entire graph." },
  { question: "How do you find the **$y$-intercept** of a polynomial function?", answer: "Evaluate $f(0)$." },
  { question: "What does the **Fundamental Theorem of Algebra** state?", answer: "Every polynomial equation of degree $n \\geq 1$ has at least one complex root (including real roots)." },
  { question: "What is the **Conjugate Pairs Theorem**?", answer: "If a polynomial has real coefficients and $a + bi$ is a root, then $a - bi$ is also a root." },
  { question: "What is a polynomial in **factored form**?", answer: "$f(x) = a(x - r_1)(x - r_2)\\cdots(x - r_n)$, where $r_i$ are zeros." },
  { question: "How do you write a polynomial given its zeros?", answer: "Multiply factors $(x - r_i)$ together and multiply by a leading coefficient." },
  { question: "What is **Descartes' Rule of Signs**?", answer: "Determines possible number of positive and negative real zeros by counting sign changes in $f(x)$ and $f(-x)$." },
  { question: "What is an **even function**?", answer: "$f(-x) = f(x)$; symmetric about the $y$-axis." },
  { question: "What is an **odd function**?", answer: "$f(-x) = -f(x)$; symmetric about the origin." },
  { question: "What is the degree of $f(x) = 5x^4 - 2x^3 + x - 7$?", answer: "$4$" },
  { question: "What is the maximum number of real zeros for a degree 5 polynomial?", answer: "$5$" },
  { question: "How many turning points can a cubic function have?", answer: "At most $2$." },
  { question: "What does a cubic graph with a positive leading coefficient look like?", answer: "Starts in bottom left, ends in top right (or variations with turns)." },
  { question: "How do you determine if $x = c$ is a zero of $f(x)$?", answer: "Check if $f(c) = 0$." },
  { question: "What is the relationship between zeros, factors, and $x$-intercepts?", answer: "If $r$ is a zero, then $(x - r)$ is a factor, and $(r, 0)$ is an $x$-intercept." },
  { question: "How do you find the behavior of the graph near a zero of multiplicity 3?", answer: "The graph crosses the $x$-axis and flattens out near the intercept." },
  { question: "What is a **cubic polynomial**?", answer: "A polynomial of degree 3." },
  { question: "What is a **quartic polynomial**?", answer: "A polynomial of degree 4." },
  { question: "Can a polynomial of degree $n$ have more than $n$ zeros?", answer: "No, it has exactly $n$ zeros if you count multiplicities and complex zeros." },
  { question: "What is a **repeated root**?", answer: "A zero with multiplicity greater than 1." },
  { question: "How do you use synthetic division to test a possible zero?", answer: "If the remainder is 0, then the tested value is a zero." },
  { question: "What is the **leading term test**?", answer: "Using the leading term to determine end behavior." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
