<!-- ============================================================

     ============================================================ -->
<script>
const flashcards = [
  { question: "What is **price elasticity of demand**?", answer: "A measure of how responsive quantity demanded is to price changes. Formula: Ed = (%Δ in quantity demanded) / (%Δ in price)." },
  { question: "How do you interpret **elasticity coefficient values**?", answer: "|Ed| > 1: elastic (responsive)<br>|Ed| = 1: unit elastic<br>|Ed| < 1: inelastic (unresponsive)<br>|Ed| = ∞: perfectly elastic<br>|Ed| = 0: perfectly inelastic" },
  { question: "What does **elastic demand** mean for consumers' price sensitivity?", answer: "Consumers are highly sensitive to price changes. Small price changes lead to large quantity changes." },
  { question: "What does **inelastic demand** mean for consumers' price sensitivity?", answer: "Consumers are not very sensitive to price changes. Price changes lead to proportionally smaller quantity changes." },
  { question: "What are the **key determinants of price elasticity of demand**?", answer: "1) Availability of close substitutes<br>2) Necessity vs luxury<br>3) Proportion of income spent<br>4) Time horizon" },
  { question: "How does **availability of substitutes** affect elasticity?", answer: "More substitutes = more elastic demand. Fewer substitutes = more inelastic demand." },
  { question: "Why are **luxuries generally more elastic** than necessities?", answer: "Consumers can more easily postpone or forego luxury purchases when prices rise." },
  { question: "How does the **proportion of income spent** affect elasticity?", answer: "Goods that take a large portion of income tend to have more elastic demand (consumers are more price-sensitive)." },
  { question: "Why is demand usually **more elastic in the long run**?", answer: "Consumers have more time to adjust behavior: find substitutes, change habits, or alter consumption patterns." },
  { question: "What is the **midpoint (arc) elasticity formula**?", answer: "Ed = [(Q2 - Q1) / ((Q1 + Q2)/2)] / [(P2 - P1) / ((P1 + P2)/2)]<br>Uses averages to avoid direction bias." },
  { question: "What is the relationship between **elasticity and total revenue**?", answer: "Elastic: Price and total revenue move in opposite directions.<br>Inelastic: Price and total revenue move together.<br>Unit elastic: Total revenue unchanged by price changes." },
  { question: "If demand is **elastic**, should a firm raise or lower price to increase revenue?", answer: "Lower price. The percentage increase in quantity demanded will exceed the percentage decrease in price, increasing total revenue." },
  { question: "If demand is **inelastic**, should a firm raise or lower price to increase revenue?", answer: "Raise price. The percentage decrease in quantity demanded will be less than the percentage increase in price, increasing total revenue." },
  { question: "What does a **perfectly elastic demand curve** look like?", answer: "Horizontal line at a specific price. Consumers will buy any quantity at that price, but none at any higher price." },
  { question: "What does a **perfectly inelastic demand curve** look like?", answer: "Vertical line at a specific quantity. Quantity demanded does not change regardless of price." },
  { question: "What is **price elasticity of supply**?", answer: "A measure of how responsive quantity supplied is to price changes. Formula: Es = (%Δ in quantity supplied) / (%Δ in price)." },
  { question: "What are the **key determinants of price elasticity of supply**?", answer: "1) Time (most important)<br>2) Production flexibility<br>3) Availability of inputs<br>4) Excess capacity" },
  { question: "Why is supply **more elastic in the long run**?", answer: "Firms have more time to adjust production: build new facilities, train workers, develop new technologies." },
  { question: "What does **perfectly elastic supply** look like?", answer: "Horizontal line at a specific price. Producers will supply any quantity at that price." },
  { question: "What does **perfectly inelastic supply** look like?", answer: "Vertical line at a specific quantity. Quantity supplied does not change regardless of price." },
  { question: "What is **income elasticity of demand**?", answer: "A measure of how responsive demand is to income changes. Formula: Ey = (%Δ in quantity demanded) / (%Δ in income)." },
  { question: "What does **positive income elasticity** indicate?", answer: "Normal good: demand increases as income increases. Ey > 0." },
  { question: "What does **negative income elasticity** indicate?", answer: "Inferior good: demand decreases as income increases. Ey < 0." },
  { question: "What is a **luxury good** in terms of income elasticity?", answer: "Normal good with income elasticity > 1. Demand increases more than proportionally to income increases." },
  { question: "What is a **necessity** in terms of income elasticity?", answer: "Normal good with 0 < income elasticity < 1. Demand increases, but less than proportionally to income increases." },
  { question: "What is **cross-price elasticity of demand**?", answer: "A measure of how demand for one good responds to price changes of another. Formula: Exy = (%Δ in quantity demanded of X) / (%Δ in price of Y)." },
  { question: "What does **positive cross-price elasticity** indicate?", answer: "Substitute goods: price of Y increases, demand for X increases. Exy > 0." },
  { question: "What does **negative cross-price elasticity** indicate?", answer: "Complement goods: price of Y increases, demand for X decreases. Exy < 0." },
  { question: "What does **zero cross-price elasticity** indicate?", answer: "Unrelated goods: price change of one has no effect on demand for the other." },
  { question: "How is **elasticity related to the slope** of a demand curve?", answer: "Elasticity varies along a straight-line demand curve. It is not the same as slope: elasticity = (1/slope) × (P/Q)." },
  { question: "Where on a linear demand curve is demand **elastic**?", answer: "In the upper portion (higher prices)." },
  { question: "Where on a linear demand curve is demand **inelastic**?", answer: "In the lower portion (lower prices)." },
  { question: "Where on a linear demand curve is demand **unit elastic**?", answer: "At the midpoint of the demand curve." },
  { question: "What is the relationship between **elasticity and the burden of a tax**?", answer: "The more inelastic side bears more of the tax burden. If demand is more inelastic than supply, consumers pay more of the tax." },
  { question: "Why do **agricultural products** often have inelastic demand?", answer: "They are necessities with few substitutes, and represent a small portion of consumer budgets." },
  { question: "Why is demand for **gasoline** relatively inelastic in the short run?", answer: "Few immediate substitutes, necessary for commuting, and habit-driven consumption patterns." },
  { question: "What happens to elasticity as you move from a **specific brand** to a **general product category**?", answer: "Demand becomes more inelastic. Example: Demand for Coca-Cola (specific) is more elastic than demand for soda (category)." },
  { question: "How does **addiction** affect elasticity of demand?", answer: "Makes demand more inelastic. Addicted consumers are less responsive to price changes." },
  { question: "What is the relationship between **elasticity and consumer surplus**?", answer: "More inelastic demand leads to greater consumer surplus loss from price increases." },
  { question: "What is the relationship between **elasticity and producer surplus**?", answer: "More inelastic supply leads to greater producer surplus loss from price decreases." },
  { question: "How does elasticity affect the **efficiency of price controls**?", answer: "More inelastic demand or supply leads to larger deadweight losses from price ceilings or floors." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
