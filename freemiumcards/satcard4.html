<!-- ============================================================
     Flashcard Logic
     ============================================================ -->
<script>
const flashcards = [
  { question: "What is **textual evidence**?", answer: "A direct quote or specific detail from a passage used to support a claim or answer." },
  { question: "What does **command of evidence** mean on the SAT?", answer: "The ability to find, select, and evaluate evidence that best supports or weakens a claim." },
  { question: "What are the **two types** of evidence questions on the SAT?", answer: "1. Textual evidence (quotations from the passage).<br>2. Quantitative evidence (graphs, tables, charts)." },
  { question: "What is the **first step** in answering evidence-based questions?", answer: "Identify the claim being made — what specific point needs support or challenge." },
  { question: "How do you select the **best supporting quotation**?", answer: "Choose the quote that directly proves the claim — not just related to the topic, but actually supporting the point." },
  { question: "What makes evidence **relevant**?", answer: "It directly addresses the claim and helps prove or disprove it." },
  { question: "What makes evidence **irrelevant**?", answer: "It may be true and from the passage, but doesn't actually support or weaken the specific claim." },
  { question: "What is a **common trap** in evidence questions?", answer: "Choosing a quote that mentions the same topic as the claim but doesn't actually prove it." },
  { question: "How do you approach **paired evidence + claim questions**?", answer: "First answer the claim question, then find the exact lines that support your answer to the previous question." },
  { question: "What is **quantitative evidence**?", answer: "Numerical data presented in graphs, tables, charts, or statistical summaries." },
  { question: "How do you read a **graph** for evidence questions?", answer: "Check title, axes labels, units, legend, and overall trend before answering." },
  { question: "How do you read a **table** for evidence questions?", answer: "Check title, column headers, row labels, units, and footnotes." },
  { question: "What is the purpose of **integrating text and data** questions?", answer: "To test whether data supports or contradicts claims made in the passage." },
  { question: "How do you **connect passage claims to data**?", answer: "Find the specific claim in the text, then check if the data point confirms or contradicts it." },
  { question: "What does it mean to **strengthen a claim**?", answer: "Provide evidence that makes the claim more likely to be true or more convincing." },
  { question: "What does it mean to **weaken a claim**?", answer: "Provide evidence that casts doubt on the claim or makes it less convincing." },
  { question: "What type of data **strengthens** a causal claim?", answer: "Data showing correlation, or experimental results where the cause leads to the predicted effect." },
  { question: "What type of data **weakens** a causal claim?", answer: "Counterexamples, data showing no correlation, or evidence of an alternative cause." },
  { question: "What is a **completing claims** question?", answer: "Given a partial claim, choose the data point that logically completes or fills in the blank." },
  { question: "How do you approach **completing claims** questions?", answer: "Read the claim carefully, identify the gap, and select the data that fits the trend or logic." },
  { question: "What makes evidence **strong** in science passages?", answer: "Data from controlled experiments, large sample sizes, consistent results, peer-reviewed findings." },
  { question: "What makes evidence **weak** in science passages?", answer: "Small sample sizes, no control group, anecdotal evidence, unverified claims." },
  { question: "How is evidence used in **social studies passages**?", answer: "Historical documents, survey data, economic indicators, and expert analysis to support arguments about society." },
  { question: "What is the **role of a counterexample** in evidence questions?", answer: "A single contrary case that weakens a general claim." },
  { question: "How do you verify evidence **directly supports** a claim?", answer: "Ask: if this evidence is true, does it make the claim more believable? If yes, it supports." },
  { question: "What does **line reference** mean in evidence questions?", answer: "The specific sentence(s) in the passage identified by line numbers that serve as the evidence." },
  { question: "What is the **best order** to answer paired claim-evidence questions?", answer: "Answer the claim question first, then match your reasoning to the correct line reference." },
  { question: "How do you handle **multiple data points** supporting different conclusions?", answer: "Compare each data point to the specific claim — only one will directly support it." },
  { question: "What does **statistically significant** mean in quantitative evidence?", answer: "The result is unlikely to have occurred by chance — makes evidence stronger." },
  { question: "What is the **difference between correlation and causation** in evidence?", answer: "Correlation = two things happen together.<br>Causation = one thing causes the other.<br>Evidence must show mechanism for causation." },
  { question: "How do you identify **flawed evidence**?", answer: "Look for unsupported assumptions, non-representative samples, or data that doesn't actually prove the conclusion." },
  { question: "What is an **evidence-based conclusion**?", answer: "A claim that follows directly from the data provided, without overreaching." },
  { question: "What does **extrapolate** mean in data questions?", answer: "Extending a trend beyond the given data to predict a future or unknown value." },
  { question: "How do you answer **\"which finding would support/weaken\"** questions?", answer: "Test each option against the claim — the correct answer directly strengthens or challenges the argument." },
  { question: "What is a **placebo effect** in evidence questions?", answer: "A change not caused by the treatment itself — important to control for in evaluating evidence." },
  { question: "How should you approach **evidence questions with graphs and text together**?", answer: "Read the claim in the text, then locate the relevant data point in the graph or table to confirm or refute it." },
  { question: "What is the **key to speed** on evidence questions?", answer: "Pre-identify the claim before looking at evidence options — eliminates half the choices immediately." },
  { question: "What does **\"directly supports\"** mean on the SAT?", answer: "The evidence explicitly proves or confirms the claim without requiring additional assumptions." },
  { question: "Why is it important to read **graph titles and labels**?", answer: "They define what is being measured — misunderstanding them leads to wrong conclusions." },
  { question: "What is the **ultimate test** for any evidence answer choice?", answer: "Ask: does this evidence make the specific claim more or less believable?<br>If neither, eliminate it." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');

  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
