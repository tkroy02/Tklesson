<script>
const flashcards = [
  { question: "What is the **formal definition of a limit**?", answer: "$\\lim_{x \\to c} f(x) = L$ means for every $\\epsilon > 0$, there exists $\\delta > 0$ such that if $0 < |x - c| < \\delta$, then $|f(x) - L| < \\epsilon$." },
  { question: "How do you evaluate a limit by **direct substitution**?", answer: "If $f$ is continuous at $c$, then $\\lim_{x \\to c} f(x) = f(c)$." },
  { question: "What are the **limit laws**?", answer: "Sum, difference, product, quotient, constant multiple, and power laws for limits." },
  { question: "How do you handle the indeterminate form $\\frac{0}{0}$?", answer: "Factor, rationalize, simplify, or use algebraic manipulation to remove the discontinuity." },
  { question: "What is the **Squeeze Theorem**?", answer: "If $g(x) \\le f(x) \\le h(x)$ near $c$ and $\\lim_{x \\to c} g(x) = \\lim_{x \\to c} h(x) = L$, then $\\lim_{x \\to c} f(x) = L$." },
  { question: "What is $\\lim_{x \\to 0} \\frac{\\sin x}{x}$?", answer: "$1$" },
  { question: "What is $\\lim_{x \\to 0} \\frac{1 - \\cos x}{x}$?", answer: "$0$" },
  { question: "How do you find a limit at infinity?", answer: "For rational functions, divide numerator and denominator by the highest power of $x$ in the denominator and evaluate." },
  { question: "What is the horizontal asymptote of a rational function?", answer: "Compare degrees: if degree(num) $<$ degree(denom) → $y=0$; if equal → ratio of leading coefficients; if greater → no HA (may have slant asymptote)." },
  { question: "What is an **infinite limit**?", answer: "$\\lim_{x \\to c} f(x) = \\infty$ (or $-\\infty$) means $f(x)$ grows without bound as $x$ approaches $c$." },
  { question: "How do you determine if a limit exists from a graph?", answer: "Check if the left-hand limit equals the right-hand limit as $x$ approaches the point." },
  { question: "What is a **one-sided limit**?", answer: "$\\lim_{x \\to c^+} f(x)$ is the limit as $x$ approaches $c$ from the right; $\\lim_{x \\to c^-} f(x)$ from the left." },
  { question: "When does a limit **not exist**?", answer: "If left-hand and right-hand limits differ, if the function oscillates without approaching a value, or if it approaches $\\pm\\infty$ from different sides." },
  { question: "How do you evaluate $\\lim_{x \\to \\infty} \\left(1 + \\frac{1}{x}\\right)^x$?", answer: "$e$" },
  { question: "What is **continuity at a point**?", answer: "$f$ is continuous at $c$ if: 1) $f(c)$ is defined, 2) $\\lim_{x \\to c} f(x)$ exists, 3) $\\lim_{x \\to c} f(x) = f(c)$." },
  { question: "What are the three types of discontinuities?", answer: "Removable (hole), jump, and infinite (vertical asymptote)." },
  { question: "What is the **Intermediate Value Theorem**?", answer: "If $f$ is continuous on $[a,b]$ and $k$ is between $f(a)$ and $f(b)$, then there exists $c \\in (a,b)$ such that $f(c) = k$." },
  { question: "How do you evaluate limits involving radicals?", answer: "Multiply numerator and denominator by the conjugate to rationalize." },
  { question: "What is $\\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}$?", answer: "The definition of the derivative $f'(x)$." },
  { question: "What is the limit of a piecewise function at a break point?", answer: "Evaluate left-hand and right-hand limits separately using the appropriate piece." },
  { question: "What is the end behavior of a polynomial?", answer: "Determined by the leading term: as $x \\to \\infty$, $a_n x^n$ dominates." },
  { question: "What is $\\lim_{x \\to 0} \\frac{e^x - 1}{x}$?", answer: "$1$" },
  { question: "What is $\\lim_{x \\to 0} \\frac{\\ln(1+x)}{x}$?", answer: "$1$" },
  { question: "What is $\\lim_{x \\to 0} \\frac{\\tan x}{x}$?", answer: "$1$" },
  { question: "How do you find vertical asymptotes?", answer: "Set denominator = 0 (for rational functions) and check if the limit approaches $\\pm\\infty$." },
  { question: "What is the difference between a limit and a function value?", answer: "A limit describes behavior as $x$ approaches a point; the function value is the actual output at that point." },
  { question: "What is $\\lim_{x \\to \\infty} \\frac{\\sin x}{x}$?", answer: "$0$ (by Squeeze Theorem: $-\\frac{1}{x} \\le \\frac{\\sin x}{x} \\le \\frac{1}{x}$)." },
  { question: "What is the limit of a constant function?", answer: "$\\lim_{x \\to c} k = k$" },
  { question: "What is the limit of the identity function?", answer: "$\\lim_{x \\to c} x = c$" },
  { question: "What is a **removable discontinuity**?", answer: "A hole in the graph where the limit exists but $f(c)$ is either undefined or not equal to the limit." },
  { question: "What is a **jump discontinuity**?", answer: "Where left-hand and right-hand limits exist but are not equal." },
  { question: "What is the limit of a sum/difference?", answer: "$\\lim_{x \\to c} [f(x) \\pm g(x)] = \\lim_{x \\to c} f(x) \\pm \\lim_{x \\to c} g(x)$" },
  { question: "What is the limit of a product?", answer: "$\\lim_{x \\to c} [f(x) \\cdot g(x)] = \\lim_{x \\to c} f(x) \\cdot \\lim_{x \\to c} g(x)$" },
  { question: "What is the limit of a quotient?", answer: "$\\lim_{x \\to c} \\frac{f(x)}{g(x)} = \\frac{\\lim_{x \\to c} f(x)}{\\lim_{x \\to c} g(x)}$, provided $\\lim_{x \\to c} g(x) \\neq 0$." },
  { question: "What is the limit of a composite function?", answer: "If $\\lim_{x \\to c} g(x) = L$ and $f$ is continuous at $L$, then $\\lim_{x \\to c} f(g(x)) = f(L)$." },
  { question: "How do you find $\\lim_{x \\to \\infty} \\frac{p(x)}{q(x)}$ for polynomials?", answer: "Divide numerator and denominator by $x^n$ where $n$ is the highest degree in the denominator." },
  { question: "What is $\\lim_{x \\to 0^+} \\ln x$?", answer: "$-\\infty$" },
  { question: "What is $\\lim_{x \\to \\infty} \\arctan x$?", answer: "$\\frac{\\pi}{2}$" },
  { question: "What is $\\lim_{x \\to -\\infty} \\arctan x$?", answer: "$-\\frac{\\pi}{2}$" },
  { question: "How do you handle limits with absolute value?", answer: "Consider cases: $x > c$ and $x < c$ to evaluate one-sided limits." },
  { question: "What is the limit of a function that oscillates, like $\\sin(1/x)$ as $x \\to 0$?", answer: "Does not exist (oscillatory behavior)." },
  { question: "What is the relationship between limits and continuity?", answer: "A function is continuous at $c$ if and only if the limit as $x \\to c$ equals $f(c)$." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
