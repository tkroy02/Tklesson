<!-- ============================================================

<script>
const flashcards = [
  { question: "What is a **polynomial**?", answer: "An expression consisting of variables and coefficients, combined using addition, subtraction, and multiplication, with non-negative integer exponents." },
  { question: "What is a **monomial**?", answer: "A polynomial with one term (e.g., $5x^2$)." },
  { question: "What is a **binomial**?", answer: "A polynomial with two terms (e.g., $3x + 2$)." },
  { question: "What is a **trinomial**?", answer: "A polynomial with three terms (e.g., $x^2 + 5x + 6$)." },
  { question: "What is the **degree of a term**?", answer: "The sum of the exponents of its variables." },
  { question: "What is the **degree of a polynomial**?", answer: "The highest degree of any term in the polynomial." },
  { question: "What is the degree of $4x^3 + 2x - 7$?", answer: "$3$" },
  { question: "What is a **constant term**?", answer: "A term with no variable (degree 0)." },
  { question: "What is the **leading coefficient**?", answer: "The coefficient of the term with the highest degree." },
  { question: "How do you **add polynomials**?", answer: "Combine like terms (terms with the same variable and exponent)." },
  { question: "How do you **subtract polynomials**?", answer: "Distribute the negative sign to the second polynomial, then combine like terms." },
  { question: "What is the **distributive property** for polynomial multiplication?", answer: "Multiply each term in the first polynomial by each term in the second polynomial." },
  { question: "How do you multiply $(x + 3)(x + 4)$?", answer: "$x \\cdot x + x \\cdot 4 + 3 \\cdot x + 3 \\cdot 4 = x^2 + 4x + 3x + 12 = x^2 + 7x + 12$." },
  { question: "What is **FOIL** used for?", answer: "Multiplying two binomials: First, Outer, Inner, Last." },
  { question: "What is the square of a binomial formula: $(a + b)^2$?", answer: "$a^2 + 2ab + b^2$" },
  { question: "What is the square of a binomial formula: $(a - b)^2$?", answer: "$a^2 - 2ab + b^2$" },
  { question: "What is the product of a sum and difference: $(a + b)(a - b)$?", answer: "$a^2 - b^2$" },
  { question: "How do you divide a polynomial by a monomial?", answer: "Divide each term of the polynomial by the monomial." },
  { question: "What is $(6x^3 + 9x^2) \\div 3x$?", answer: "$2x^2 + 3x$" },
  { question: "What is the **remainder theorem**?", answer: "If a polynomial $f(x)$ is divided by $(x - c)$, the remainder is $f(c)$." },
  { question: "What is the **factor theorem**?", answer: "$(x - c)$ is a factor of $f(x)$ if and only if $f(c) = 0$." },
  { question: "What is **synthetic division** used for?", answer: "A shortcut method to divide a polynomial by a binomial of the form $(x - c)$." },
  { question: "What is a **root or zero** of a polynomial?", answer: "A value of $x$ for which the polynomial equals zero." },
  { question: "What is the **standard form** of a polynomial?", answer: "Terms written in descending order of degree." },
  { question: "What is the **end behavior** of a polynomial?", answer: "Describes what happens to the graph as $x$ approaches positive or negative infinity." },
  { question: "What is the end behavior of an **even-degree polynomial** with a positive leading coefficient?", answer: "Both ends rise: as $x \\to \\infty$, $y \\to \\infty$ and as $x \\to -\\infty$, $y \\to \\infty$." },
  { question: "What is the end behavior of an **odd-degree polynomial** with a negative leading coefficient?", answer: "Left end rises, right end falls: as $x \\to \\infty$, $y \\to -\\infty$ and as $x \\to -\\infty$, $y \\to \\infty$." },
  { question: "What is a **turning point** of a polynomial graph?", answer: "A point where the graph changes direction from increasing to decreasing or vice versa." },
  { question: "What is the **maximum number of turning points** for a polynomial of degree $n$?", answer: "$n - 1$" },
  { question: "What is the **maximum number of real zeros** for a polynomial of degree $n$?", answer: "$n$" },
  { question: "What is **factoring a polynomial**?", answer: "Writing it as a product of simpler polynomials." },
  { question: "What is the **greatest common factor (GCF)** method of factoring?", answer: "Factor out the largest common factor from all terms." },
  { question: "How do you **factor by grouping**?", answer: "Group terms in pairs, factor out the GCF from each pair, then factor out the common binomial." },
  { question: "What is a **quadratic polynomial**?", answer: "A polynomial of degree 2: $ax^2 + bx + c$." },
  { question: "What is a **cubic polynomial**?", answer: "A polynomial of degree 3: $ax^3 + bx^2 + cx + d$." },
  { question: "What is the **sum of cubes** factoring formula?", answer: "$a^3 + b^3 = (a + b)(a^2 - ab + b^2)$" },
  { question: "What is the **difference of cubes** factoring formula?", answer: "$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$" },
  { question: "How do you factor a **perfect square trinomial**?", answer: "$a^2 + 2ab + b^2 = (a + b)^2$ or $a^2 - 2ab + b^2 = (a - b)^2$." },
  { question: "What is a **prime polynomial**?", answer: "A polynomial that cannot be factored using integer coefficients." },
  { question: "What is the **zero product property**?", answer: "If $a \\cdot b = 0$, then $a = 0$ or $b = 0$." },
  { question: "How do you solve a polynomial equation by **factoring**?", answer: "1) Write in standard form. 2) Factor completely. 3) Set each factor $= 0$. 4) Solve each equation." }
];

let currentCardIndex = 0;
const flashcardElement = document.getElementById('flashcard');
const flashcardFront = document.getElementById('flashcard-front');
const flashcardBack = document.getElementById('flashcard-back');
const statusElement = document.querySelector('.status');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function renderMarkdown(text) {
  const htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<p>${htmlText}</p>`;
}

function updateCardContent() {
  const card = flashcards[currentCardIndex];
  flashcardFront.innerHTML = renderMarkdown(card.question);
  flashcardBack.innerHTML = renderMarkdown(card.answer);
  statusElement.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
  flashcardElement.classList.remove('flipped');
  
  prevBtn.disabled = currentCardIndex === 0;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([flashcardFront, flashcardBack]);
  }
}

function nextCard() {
  currentCardIndex = (currentCardIndex + 1) % flashcards.length;
  updateCardContent();
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    updateCardContent();
  }
}

flashcardElement.addEventListener('click', () => {
  flashcardElement.classList.toggle('flipped');
});

nextBtn.addEventListener('click', nextCard);
prevBtn.addEventListener('click', prevCard);

updateCardContent();
</script>
