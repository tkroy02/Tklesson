<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tklesson Hub • Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy-deep:    #0a1628;
      --navy-primary: #0f1f3a;
      --navy-surface: #132444;
      --navy-light:   #1e3355;
      --gold:         #d4af37;
      --gold-bright:  #e6c458;
      --gold-soft:    #f5e7b3;
      --gold-glow:    rgba(212, 175, 55, 0.25);
      --text-light:   #e9edf5;
      --text-muted:   #8e9bb5;
      --danger:       #e85d75;
      --success:      #2dd4bf;
      --border-navy:  #253b5c;
      --shadow-card:  0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.15);
      --radius-lg:    26px;
      --radius-md:    16px;
      --radius-sm:    12px;
      --transition:   all 0.25s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 20% 30%, #132444 0%, #0a1628 85%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      color: var(--text-light);
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 30% 40%, rgba(212,175,55,0.06) 0%, transparent 45%),
        radial-gradient(circle at 75% 70%, rgba(212,175,55,0.04) 0%, transparent 40%);
      pointer-events: none; z-index: 0;
    }

    /* ── Card wrapper ── */
    .login-container {
      position: relative; z-index: 2;
      width: 100%; max-width: 450px;
      margin: auto;
    }

    /* Slide panels sit inside a fixed-height clipper */
    .card-clipper {
      overflow: hidden;
      border-radius: var(--radius-lg);
    }

    .card-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .card-track.show-step2 { transform: translateX(-100%); }

    .login-card {
      background: linear-gradient(145deg, rgba(19,36,68,0.9) 0%, rgba(15,31,58,0.95) 100%);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 2.5rem 2.2rem;
      border: 1px solid rgba(212,175,55,0.25);
      position: relative;
      overflow: hidden;
      min-width: 100%; /* each panel takes full width */
      flex-shrink: 0;
    }

    .login-card::after {
      content: '';
      position: absolute; top: 0; left: 20%; width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 4px;
    }

    /* ── Logo ── */
    .login-logo { margin-bottom: 2rem; text-align: center; }

    .icon-wrapper {
      background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.05) 100%);
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.4);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(212,175,55,0.2);
      transition: var(--transition);
    }

    .icon-wrapper i {
      font-size: 2.4rem; color: var(--gold);
      text-shadow: 0 0 12px rgba(212,175,55,0.7);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }

    .login-logo h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.5px;
      color: white; margin-bottom: 0.25rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .login-logo p {
      color: var(--gold-soft); font-weight: 500; font-size: 0.88rem;
      display: flex; align-items: center; justify-content: center;
      gap: 0.35rem; opacity: 0.9; letter-spacing: 0.3px;
    }
    .login-logo p i { font-size: 0.75rem; color: var(--gold); }

    /* ── Step 2 header ── */
    .step2-header { text-align: center; margin-bottom: 1.8rem; }
    .step2-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, rgba(212,175,55,0.18), rgba(212,175,55,0.06));
      border: 1px solid rgba(212,175,55,0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 2rem; color: var(--gold);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35), 0 0 14px rgba(212,175,55,0.15);
    }
    .step2-header h2 { font-size: 1.55rem; font-weight: 700; color: white; margin-bottom: 0.3rem; }
    .step2-header p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.55; }
    .step2-email {
      display: inline-block; margin-top: 0.4rem;
      color: var(--gold-soft); font-weight: 600; font-size: 0.82rem;
    }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.4rem; text-align: left; }

    .form-group label {
      display: block; margin-bottom: 0.5rem;
      font-weight: 600; font-size: 0.78rem;
      color: var(--gold-soft); letter-spacing: 0.06em;
      text-transform: uppercase; opacity: 0.9;
    }

    .input-field { position: relative; display: flex; align-items: center; }

    .input-field i {
      position: absolute; left: 16px; color: #7a8aa8;
      font-size: 0.95rem; transition: var(--transition); z-index: 2;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: rgba(10,22,40,0.7);
      border: 1.5px solid var(--border-navy);
      border-radius: var(--radius-sm);
      font-size: 0.95rem; font-weight: 500; color: #f0f4ff;
      transition: var(--transition);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
      font-family: 'Inter', sans-serif;
    }
    .form-control::placeholder { color: #6b7c9e; font-weight: 400; }
    .form-control:focus {
      outline: none; border-color: var(--gold);
      background: rgba(10,22,40,0.85);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.22), inset 0 1px 3px rgba(0,0,0,0.4);
    }
    .input-field:focus-within i { color: var(--gold); }

    /* ── OTP row ── */
    .otp-row {
      display: flex; gap: 9px; justify-content: center;
      margin: 4px 0 20px;
    }

    .otp-digit {
      width: 50px; height: 58px; text-align: center;
      font-size: 1.5rem; font-weight: 800; color: var(--gold);
      background: rgba(10,22,40,0.75);
      border: 1.5px solid var(--border-navy);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      caret-color: var(--gold);
      font-family: 'Inter', sans-serif;
    }
    .otp-digit:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.22);
      background: rgba(10,22,40,0.9);
    }
    .otp-digit.filled { border-color: rgba(212,175,55,0.55); }

    /* ── Countdown ── */
    .totp-timer {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.78rem; color: var(--text-muted);
      margin-bottom: 18px;
    }
    .totp-timer svg { flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: linear-gradient(105deg, #b8942e 0%, #d4af37 60%, #e0bc45 100%);
      color: #0a1628; border: none; border-radius: var(--radius-sm);
      padding: 0.9rem 1.5rem; font-weight: 700; font-size: 0.95rem;
      letter-spacing: 0.4px; cursor: pointer; transition: var(--transition);
      width: 100%;
      box-shadow: 0 10px 22px -8px rgba(212,175,55,0.5), 0 0 0 1px rgba(212,175,55,0.3);
      margin-top: 0.4rem; text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover {
      background: linear-gradient(105deg, #c9a52f 0%, #e0bc45 100%);
      transform: translateY(-2px);
      box-shadow: 0 18px 28px -10px rgba(212,175,55,0.6), 0 0 0 1px var(--gold);
      color: #050d1a;
    }
    .btn:active { transform: translateY(1px); box-shadow: 0 5px 12px rgba(212,175,55,0.4); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: rgba(212,175,55,0.06);
      border: 1.5px solid rgba(212,175,55,0.4);
      color: var(--gold); box-shadow: none;
      font-weight: 600; margin-top: 0.5rem;
      letter-spacing: 0.3px; text-transform: none;
    }
    .btn-secondary:hover {
      background: rgba(212,175,55,0.12); border-color: var(--gold);
      color: #f0d874; box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent; border: none;
      color: var(--text-muted); font-size: 0.82rem;
      font-weight: 500; cursor: pointer; width: auto;
      padding: 6px 0; margin: 0 auto; display: flex;
      gap: 6px; align-items: center; transition: var(--transition);
      text-transform: none; letter-spacing: 0; box-shadow: none;
      font-family: 'Inter', sans-serif;
    }
    .btn-ghost:hover { color: var(--gold); transform: none; box-shadow: none; }

    /* ── Messages ── */
    .msg {
      display: none; padding: 0.82rem 1.1rem; border-radius: 12px;
      margin-bottom: 1.2rem; font-weight: 500; font-size: 0.83rem;
      align-items: flex-start; gap: 0.65rem; backdrop-filter: blur(8px);
      line-height: 1.45;
    }
    .msg.show { display: flex; }
    .msg-error   { background: rgba(232,93,117,0.12); color: #fecaca; border: 1px solid rgba(232,93,117,0.5); }
    .msg-success { background: rgba(45,212,191,0.1);  color: #ccfbf1; border: 1px solid rgba(45,212,191,0.45); }
    .msg i { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; margin: 1.4rem 0 0.9rem;
      color: #7a8aa8; font-size: 0.73rem; font-weight: 500; letter-spacing: 0.6px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, #2e4060, transparent);
    }
    .divider span { padding: 0 1rem; color: #9aa9c1; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid rgba(10,22,40,0.35); border-radius: 50%;
      border-top-color: #0a1628; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Animations ── */
    @keyframes fadeSlide {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .login-container { animation: fadeSlide 0.5s ease; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.4rem; }
      .otp-digit  { width: 42px; height: 52px; font-size: 1.3rem; }
      .otp-row    { gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="card-clipper">
      <div class="card-track" id="card-track">

        <!-- ══════════════════════════
             PANEL 1 — Email + Password
        ══════════════════════════ -->
        <div class="login-card" id="panel-login">

          <div class="login-logo">
            <div class="icon-wrapper">
              <i class="fas fa-crown"></i>
            </div>
            <h1>Tklesson Hub</h1>
            <p><i class="fas fa-shield-halved"></i> Administrative Portal</p>
          </div>

          <div class="msg msg-error" id="login-error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="login-error-text">Invalid credentials</span>
          </div>

          <div class="msg msg-success" id="login-success">
            <i class="fas fa-check-circle"></i>
            <span id="login-success-text">Reset email sent</span>
          </div>

          <form id="login-form" autocomplete="on">
            <div class="form-group">
              <label>Email address</label>
              <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control"
                       placeholder="admin@tklesson.com"
                       autocomplete="email" required>
              </div>
            </div>

            <div class="form-group">
              <label>Password</label>
              <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control"
                       placeholder="••••••••"
                       autocomplete="current-password" required>
              </div>
            </div>

            <button type="submit" class="btn" id="login-btn">
              <span class="spinner" id="login-spinner" style="display:none;"></span>
              <span id="login-text">Access Dashboard</span>
            </button>
          </form>

          <div class="divider"><span>security options</span></div>

          <div style="display:flex;flex-direction:column;gap:0.6rem;">
            <button class="btn btn-secondary" id="reset-password-btn">
              <i class="fas fa-key"></i> Reset credentials
            </button>
          </div>
        </div>
        <!-- end panel-login -->

        <!-- ══════════════════════════
             PANEL 2 — TOTP 2FA
        ══════════════════════════ -->
        <div class="login-card" id="panel-2fa">

          <div class="step2-header">
            <div class="step2-icon"><i class="fas fa-mobile-screen-button"></i></div>
            <h2>Two-Step Verification</h2>
            <p>Enter the 6-digit code from your authenticator app</p>
            <span class="step2-email" id="tfa-display-email"></span>
          </div>

          <div class="msg msg-error" id="tfa-error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="tfa-error-text">Incorrect code</span>
          </div>

          <div class="otp-row">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d0">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4">
            <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d5">
          </div>

          <!-- Countdown ring -->
          <div class="totp-timer">
            <svg width="20" height="20" viewBox="0 0 20 20">
              <circle cx="10" cy="10" r="8" fill="none" stroke="#253b5c" stroke-width="2.5"/>
              <circle cx="10" cy="10" r="8" fill="none" stroke="var(--gold)" stroke-width="2.5"
                      stroke-dasharray="50.3" id="timer-ring"
                      stroke-linecap="round"
                      style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s linear;"/>
            </svg>
            <span id="timer-label">30s</span> until code refreshes
          </div>

          <button class="btn" id="tfa-verify-btn" onclick="verifyLogin2FA()">
            <span class="spinner" id="tfa-spinner" style="display:none;"></span>
            <span id="tfa-btn-text"><i class="fas fa-check" style="margin-right:6px;"></i>Verify & Enter</span>
          </button>

          <div style="text-align:center;margin-top:1.1rem;">
            <button class="btn-ghost" onclick="cancelLogin2FA()">
              <i class="fas fa-arrow-left"></i> Back to login
            </button>
          </div>

        </div>
        <!-- end panel-2fa -->

      </div>
      <!-- end card-track -->
    </div>
    <!-- end card-clipper -->
  </div>

  <script>
  (function () {

    /* ══════════════════════════════════
       Firebase
    ══════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
      authDomain:        "tkmachines-945b9.firebaseapp.com",
      projectId:         "tkmachines-945b9",
      storageBucket:     "tkmachines-945b9.firebasestorage.app",
      messagingSenderId: "137087394703",
      appId:             "1:137087394703:web:81c3383fd6ee961ef3e1fa",
      measurementId:     "G-Y8GH34Q2FN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    /* ══════════════════════════════════
       TOTP Engine (RFC 6238 / HMAC-SHA1)
    ══════════════════════════════════ */
    const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

    function base32Decode(s) {
      let bits = 0, val = 0;
      const out = [];
      for (const c of s.toUpperCase().replace(/=+$/, '')) {
        const idx = B32.indexOf(c);
        if (idx < 0) continue;
        val = (val << 5) | idx; bits += 5;
        if (bits >= 8) { out.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
      }
      return new Uint8Array(out);
    }

    async function getTOTP(secret, offset) {
      const step = 30;
      const T    = Math.floor(Date.now() / 1000 / step) + (offset || 0);
      const buf  = new ArrayBuffer(8);
      new DataView(buf).setUint32(4, T, false);
      const key  = await crypto.subtle.importKey(
        'raw', base32Decode(secret),
        { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
      );
      const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', key, buf));
      const off  = hmac[hmac.length - 1] & 0xf;
      const code = ((hmac[off] & 0x7f) << 24 |
                    hmac[off+1] << 16 |
                    hmac[off+2] << 8  |
                    hmac[off+3]) % 1_000_000;
      return code.toString().padStart(6, '0');
    }

    async function verifyTOTP(secret, token) {
      for (const offset of [0, -1, 1]) {
        if (await getTOTP(secret, offset) === token) return true;
      }
      return false;
    }

    /* ══════════════════════════════════
       State
    ══════════════════════════════════ */
    let pendingUser   = null;   // Firebase user after password OK
    let pendingSecret = null;   // TOTP secret from Firestore
    let countdownTimer = null;

    /* ══════════════════════════════════
       UI Helpers
    ══════════════════════════════════ */
    const track = document.getElementById('card-track');

    function slideToPanel(panel) {
      track.classList.toggle('show-step2', panel === 2);
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      document.getElementById('login-error-text').textContent = msg;
      el.classList.add('show');
      document.getElementById('login-success').classList.remove('show');
    }

    function showLoginSuccess(msg) {
      const el = document.getElementById('login-success');
      document.getElementById('login-success-text').textContent = msg;
      el.classList.add('show');
      document.getElementById('login-error').classList.remove('show');
    }

    function hideLoginMsgs() {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById('login-success').classList.remove('show');
    }

    function showTFAError(msg) {
      const el = document.getElementById('tfa-error');
      document.getElementById('tfa-error-text').textContent = msg;
      el.classList.add('show');
      // Shake the OTP row
      const row = document.querySelector('.otp-row');
      row.style.animation = 'none';
      row.offsetHeight; // reflow
      row.style.animation = 'shake 0.35s ease';
    }

    function hideTFAError() {
      document.getElementById('tfa-error').classList.remove('show');
    }

    /* ── Countdown ring ── */
    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      const ring  = document.getElementById('timer-ring');
      const label = document.getElementById('timer-label');
      const circ  = 50.3;

      function tick() {
        const rem = 30 - (Math.floor(Date.now() / 1000) % 30);
        if (ring) {
          ring.style.strokeDashoffset = circ * (1 - rem / 30);
          ring.style.stroke = rem <= 5 ? '#e85d75' : 'var(--gold)';
        }
        if (label) label.textContent = rem + 's';
      }
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    /* ── OTP digit auto-advance ── */
    ['d0','d1','d2','d3','d4','d5'].forEach((id, idx) => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.value = el.value.replace(/[^0-9]/g, '');
        el.classList.toggle('filled', !!el.value);
        if (el.value && idx < 5) document.getElementById(`d${idx+1}`).focus();
        // Auto-submit when all 6 filled
        const all = ['d0','d1','d2','d3','d4','d5'].every(i => document.getElementById(i).value);
        if (all) verifyLogin2FA();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !el.value && idx > 0) {
          const prev = document.getElementById(`d${idx-1}`);
          prev.value = '';
          prev.classList.remove('filled');
          prev.focus();
        }
      });
      el.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        [...pasted].forEach((ch, i) => {
          const target = document.getElementById(`d${i}`);
          if (target) { target.value = ch; target.classList.add('filled'); }
        });
        if (pasted.length === 6) verifyLogin2FA();
        else document.getElementById(`d${Math.min(pasted.length, 5)}`).focus();
      });
    });

    /* ══════════════════════════════════
       Step 1 — Email + Password login
    ══════════════════════════════════ */
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideLoginMsgs();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const btn     = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      const text    = document.getElementById('login-text');

      spinner.style.display = 'inline-block';
      btn.disabled = true;
      text.textContent = 'Verifying...';

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const user = cred.user;

        // Check Firestore for TOTP secret
        const snap = await db.collection('user_security').doc(user.uid).get();

        if (snap.exists && snap.data().totpEnabled && snap.data().totpSecret) {
          // 2FA required — hold on to user & secret, slide to step 2
          pendingUser   = user;
          pendingSecret = snap.data().totpSecret;

          document.getElementById('tfa-display-email').textContent = email;
          slideToPanel(2);
          startCountdown();
          // Small delay so the slide animation finishes before focusing
          setTimeout(() => document.getElementById('d0').focus(), 480);

          // Reset button for next login attempt
          spinner.style.display = 'none';
          btn.disabled = false;
          text.textContent = 'Access Dashboard';
        } else {
          // No 2FA — go straight to dashboard
          window.location.href = 'super-dashboard.html';
        }
      } catch (err) {
        spinner.style.display = 'none';
        btn.disabled = false;
        text.textContent = 'Access Dashboard';

        const msgs = {
          'auth/user-not-found':    'No account linked to this email.',
          'auth/wrong-password':    'Incorrect password. Please retry.',
          'auth/invalid-email':     'Invalid email format.',
          'auth/too-many-requests': 'Too many attempts. Account temporarily locked.',
          'auth/invalid-credential':'Invalid credentials. Check email and password.',
        };
        showLoginError(msgs[err.code] || 'Authentication failed. Check credentials.');
      }
    });

    /* ══════════════════════════════════
       Step 2 — Verify TOTP
    ══════════════════════════════════ */
    window.verifyLogin2FA = async function () {
      hideTFAError();
      const code = ['d0','d1','d2','d3','d4','d5'].map(i => document.getElementById(i).value).join('');
      if (code.length < 6) { showTFAError('Please enter all 6 digits.'); return; }

      const btn     = document.getElementById('tfa-verify-btn');
      const spinner = document.getElementById('tfa-spinner');
      const text    = document.getElementById('tfa-btn-text');

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      text.innerHTML = 'Verifying…';

      try {
        const valid = await verifyTOTP(pendingSecret, code);
        if (!valid) {
          btn.disabled = false;
          spinner.style.display = 'none';
          text.innerHTML = '<i class="fas fa-check" style="margin-right:6px;"></i>Verify & Enter';
          showTFAError('Incorrect code. Try again or wait for the next code.');
          // Clear digits
          ['d0','d1','d2','d3','d4','d5'].forEach(i => {
            const el = document.getElementById(i);
            el.value = '';
            el.classList.remove('filled');
          });
          document.getElementById('d0').focus();
          return;
        }

        // ✅ TOTP valid — proceed
        if (countdownTimer) clearInterval(countdownTimer);
        window.location.href = 'super-dashboard.html';

      } catch (err) {
        btn.disabled = false;
        spinner.style.display = 'none';
        text.innerHTML = '<i class="fas fa-check" style="margin-right:6px;"></i>Verify & Enter';
        showTFAError('Verification error. Please try again.');
      }
    };

    /* ── Back button on panel 2 ── */
    window.cancelLogin2FA = function () {
      if (countdownTimer) clearInterval(countdownTimer);
      // Sign out the partially-authenticated user
      auth.signOut().catch(() => {});
      pendingUser   = null;
      pendingSecret = null;
      // Clear OTP digits
      ['d0','d1','d2','d3','d4','d5'].forEach(i => {
        const el = document.getElementById(i);
        el.value = '';
        el.classList.remove('filled');
      });
      hideTFAError();
      slideToPanel(1);
    };

    /* ══════════════════════════════════
       Password Reset (panel 1)
    ══════════════════════════════════ */
    document.getElementById('reset-password-btn').addEventListener('click', function () {
      const email = document.getElementById('email').value.trim();
      hideLoginMsgs();

      if (!email) { showLoginError('Enter your admin email first, then click Reset.'); return; }

      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending link…';

      auth.sendPasswordResetEmail(email)
        .then(() => {
          this.disabled = false;
          this.innerHTML = '<i class="fas fa-key"></i> Reset credentials';
          showLoginSuccess('Recovery email dispatched. Check your inbox.');
        })
        .catch(err => {
          this.disabled = false;
          this.innerHTML = '<i class="fas fa-key"></i> Reset credentials';
          const msgs = {
            'auth/user-not-found': 'Email not registered.',
            'auth/invalid-email':  'Invalid email address.',
          };
          showLoginError(msgs[err.code] || 'Reset request failed.');
        });
    });

    /* ── Clear messages on input ── */
    document.getElementById('email').addEventListener('input', hideLoginMsgs);
    document.getElementById('password').addEventListener('input', hideLoginMsgs);

  })();
  </script>

  <!-- Shake keyframe (inline so it's self-contained) -->
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
  </style>

</body>
</html>
