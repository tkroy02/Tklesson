<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tklesson Hub • Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Navy & Gold palette */
      --navy-deep: #0a1628;
      --navy-primary: #0f1f3a;
      --navy-surface: #132444;
      --navy-light: #1e3355;
      --gold: #d4af37;
      --gold-bright: #e6c458;
      --gold-soft: #f5e7b3;
      --gold-glow: rgba(212, 175, 55, 0.25);
      --white-soft: #f8f9fc;
      --text-light: #e9edf5;
      --text-muted: #8e9bb5;
      --danger: #e85d75;
      --danger-soft: rgba(232, 93, 117, 0.15);
      --success: #2dd4bf;
      --success-soft: rgba(45, 212, 191, 0.15);
      --border-navy: #253b5c;
      --shadow-card: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.15);
      --radius-lg: 26px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: all 0.25s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 20% 30%, #132444 0%, #0a1628 85%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      color: var(--text-light);
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Subtle gold mesh overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.06) 0%, transparent 45%),
                        radial-gradient(circle at 75% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 450px;
      margin: auto;
      animation: fadeSlide 0.5s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(15, 31, 58, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: linear-gradient(145deg, rgba(19, 36, 68, 0.9) 0%, rgba(15, 31, 58, 0.95) 100%);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 2.5rem 2.2rem;
      border: 1px solid rgba(212, 175, 55, 0.25);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* Gold accent line at top */
    .login-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 4px;
    }

    .login-logo {
      margin-bottom: 2.2rem;
      text-align: center;
    }

    .icon-wrapper {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.3rem;
      border-radius: 20px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(212, 175, 55, 0.2);
    }

    .icon-wrapper i {
      font-size: 2.6rem;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.7);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }

    .login-logo h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: white;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .login-logo p {
      color: var(--gold-soft);
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      opacity: 0.9;
      letter-spacing: 0.3px;
    }

    .login-logo p i {
      font-size: 0.75rem;
      color: var(--gold);
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--gold-soft);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .input-field {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-field i {
      position: absolute;
      left: 16px;
      color: #7a8aa8;
      font-size: 0.95rem;
      transition: var(--transition);
      z-index: 2;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: rgba(10, 22, 40, 0.7);
      border: 1.5px solid var(--border-navy);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 500;
      color: #f0f4ff;
      transition: var(--transition);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }

    .form-control::placeholder {
      color: #6b7c9e;
      font-weight: 400;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(10, 22, 40, 0.8);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25), inset 0 1px 3px rgba(0,0,0,0.4);
    }

    .form-control:focus + i,
    .input-field:focus-within i {
      color: var(--gold);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(105deg, #b8942e 0%, #d4af37 60%, #e0bc45 100%);
      color: #0a1628;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.9rem 1.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      box-shadow: 0 10px 22px -8px rgba(212, 175, 55, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.3);
      margin-top: 0.4rem;
      text-transform: uppercase;
    }

    .btn:hover {
      background: linear-gradient(105deg, #c9a52f 0%, #e0bc45 100%);
      transform: translateY(-2px);
      box-shadow: 0 18px 28px -10px rgba(212, 175, 55, 0.6), 0 0 0 1px var(--gold);
      color: #050d1a;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 5px 12px rgba(212, 175, 55, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid rgba(212, 175, 55, 0.45);
      color: var(--gold);
      box-shadow: none;
      backdrop-filter: blur(4px);
      font-weight: 600;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.05);
      letter-spacing: 0.3px;
      text-transform: none;
    }

    .btn-secondary:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--gold);
      color: #f0d874;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .error-message, .success-message {
      display: none;
      padding: 0.85rem 1.2rem;
      border-radius: 14px;
      margin-bottom: 1.4rem;
      font-weight: 500;
      font-size: 0.85rem;
      align-items: center;
      gap: 0.7rem;
      backdrop-filter: blur(8px);
    }

    .error-message {
      background: rgba(232, 93, 117, 0.12);
      color: #fecaca;
      border: 1px solid rgba(232, 93, 117, 0.5);
    }

    .success-message {
      background: rgba(45, 212, 191, 0.1);
      color: #ccfbf1;
      border: 1px solid rgba(45, 212, 191, 0.45);
    }

    .error-message i, .success-message i {
      font-size: 1rem;
    }

    .login-options {
      margin-top: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0 1rem;
      color: #7a8aa8;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.6px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #2e4060, transparent);
    }

    .divider span {
      padding: 0 1rem;
      color: #9aa9c1;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(10, 22, 40, 0.4);
      border-radius: 50%;
      border-top-color: #0a1628;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      .icon-wrapper {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <div id="login-page" class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon-wrapper">
          <i class="fas fa-crown"></i>
        </div>
        <h1>Tklesson Hub</h1>
        <p><i class="fas fa-shield-haltered"></i> Administrative Portal</p>
      </div>
      
      <div id="error-message" class="error-message">
        <i class="fas fa-exclamation-circle"></i> <span id="error-text">Invalid credentials</span>
      </div>
      
      <div id="success-message" class="success-message">
        <i class="fas fa-check-circle"></i> <span id="success-text">Reset email sent</span>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email address</label>
          <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" class="form-control" placeholder="admin@tklesson.com" autocomplete="email" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>
        
        <button type="submit" class="btn" id="login-btn">
          <span class="spinner" id="login-spinner" style="display: none;"></span>
          <span id="login-text">Access Dashboard</span>
        </button>
      </form>
      
      <div class="divider">
        <span>security options</span>
      </div>
      
      <div class="login-options">
        <button class="btn btn-secondary" id="reset-password-btn">
          <i class="fas fa-key"></i> Reset credentials
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const firebaseConfig = {
        apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
        authDomain: "tkmachines-945b9.firebaseapp.com",
        projectId: "tkmachines-945b9",
        storageBucket: "tkmachines-945b9.firebasestorage.app",
        messagingSenderId: "137087394703",
        appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
        measurementId: "G-Y8GH34Q2FN"
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const loginForm = document.getElementById('login-form');
      const errorMessageDiv = document.getElementById('error-message');
      const successMessageDiv = document.getElementById('success-message');
      const errorTextSpan = document.getElementById('error-text');
      const successTextSpan = document.getElementById('success-text');
      const resetPasswordBtn = document.getElementById('reset-password-btn');
      const loginBtn = document.getElementById('login-btn');
      const loginSpinner = document.getElementById('login-spinner');
      const loginTextSpan = document.getElementById('login-text');

      function hideMessages() {
        errorMessageDiv.style.display = 'none';
        successMessageDiv.style.display = 'none';
      }

      function showError(message) {
        errorTextSpan.textContent = message;
        errorMessageDiv.style.display = 'flex';
        successMessageDiv.style.display = 'none';
      }

      function showSuccess(message) {
        successTextSpan.textContent = message;
        successMessageDiv.style.display = 'flex';
        errorMessageDiv.style.display = 'none';
      }

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        hideMessages();
        loginSpinner.style.display = 'inline-block';
        loginBtn.disabled = true;
        loginTextSpan.textContent = 'Verifying...';

        auth.signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            window.location.href = "super-dashboard.html";
          })
          .catch((error) => {
            loginSpinner.style.display = 'none';
            loginBtn.disabled = false;
            loginTextSpan.textContent = 'Access Dashboard';
            
            let msg = "Authentication failed. Check credentials.";
            if (error.code === 'auth/user-not-found') msg = "No account linked to this email.";
            else if (error.code === 'auth/wrong-password') msg = "Incorrect password. Please retry.";
            else if (error.code === 'auth/invalid-email') msg = "Invalid email format.";
            else if (error.code === 'auth/too-many-requests') msg = "Too many attempts. Temporary lock.";
            
            showError(msg);
          });
      });

      resetPasswordBtn.addEventListener('click', function() {
        const email = document.getElementById('email').value.trim();
        hideMessages();
        
        if (!email) {
          showError("Provide your admin email to reset.");
          return;
        }
        
        resetPasswordBtn.disabled = true;
        resetPasswordBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending link...';
        
        auth.sendPasswordResetEmail(email)
          .then(() => {
            resetPasswordBtn.disabled = false;
            resetPasswordBtn.innerHTML = '<i class="fas fa-key"></i> Reset credentials';
            showSuccess("Recovery email dispatched. Check inbox.");
          })
          .catch((error) => {
            resetPasswordBtn.disabled = false;
            resetPasswordBtn.innerHTML = '<i class="fas fa-key"></i> Reset credentials';
            let msg = "Reset request failed.";
            if (error.code === 'auth/user-not-found') msg = "Email not registered.";
            else if (error.code === 'auth/invalid-email') msg = "Invalid email address.";
            showError(msg);
          });
      });

      document.getElementById('email').addEventListener('input', hideMessages);
      document.getElementById('password').addEventListener('input', hideMessages);
    })();
  </script>
</body>
</html>
